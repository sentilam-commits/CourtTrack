// ── Progress Section ──────────────────────────────────────────

function skillStatus(score) {
  if (score >= 10) return 'Dominado';
  if (score >= 7) return 'Mejorando';
  if (score >= 5) return 'Estable';
  return 'A trabajar';
}

function StatusBadge({ status }) {
  const map = {
    'Dominado':   { bg: '#DCE9F1', color: '#3D6B8A' },
    'Mejorando':  { bg: '#D6EFE0', color: '#2E7A4B' },
    'Estable':    { bg: '#E8EDEC', color: '#5A7570' },
    'A trabajar': { bg: '#FDE8D4', color: '#B35A18' },
  };
  const s = map[status] || map['Estable'];
  return (
    <span style={{
      fontSize: '0.68rem', fontWeight: 700, letterSpacing: '0.04em',
      padding: '2px 7px', borderRadius: 20,
      background: s.bg, color: s.color,
    }}>{status}</span>
  );
}

function fmtSparkDate(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)}-${months[parseInt(m)-1]}`;
}

function Sparkline({ points, dates, milestones }) {
  const [activeIdx, setActiveIdx] = useState(null);
  const [hinted, setHinted] = useState(false);
  const svgRef = useRef(null);
  const w = 120, h = 32, pad = 4;
  const min = Math.min(...points), max = Math.max(...points);
  const range = max - min || 1;
  const xs = points.map((_, i) => pad + (i / (points.length - 1)) * (w - pad * 2));
  const ys = points.map(v => h - pad - ((v - min) / range) * (h - pad * 2));
  const d = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x},${ys[i]}`).join(' ');
  const fill = `${d} L${xs[xs.length-1]},${h} L${xs[0]},${h} Z`;
  const last = xs.length - 1;

  function getNearestIdx(touch) {
    const rect = svgRef.current.getBoundingClientRect();
    const relX = (touch.clientX - rect.left) / rect.width * w;
    let best = 0, bestDist = Infinity;
    xs.forEach((x, i) => { const dist = Math.abs(x - relX); if (dist < bestDist) { bestDist = dist; best = i; } });
    return best;
  }

  function onTouchStart(e) { e.preventDefault(); setHinted(true); setActiveIdx(getNearestIdx(e.touches[0])); }
  function onTouchMove(e)  { e.preventDefault(); setActiveIdx(getNearestIdx(e.touches[0])); }
  function onTouchEnd()    { setActiveIdx(null); }

  const aIdx = activeIdx;
  const pillW = 40, pillH = 14;
  const pillX = aIdx != null ? Math.max(0, Math.min(xs[aIdx] - pillW / 2, w - pillW)) : 0;

  return (
    <svg ref={svgRef} width={w} height={h + 14} viewBox={`0 0 ${w} ${h + 14}`}
      style={{overflow:'visible', touchAction:'none', userSelect:'none', WebkitUserSelect:'none'}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      <path d={fill} fill="rgba(255,255,255,0.12)" />
      <path d={d} fill="none" stroke="rgba(255,255,255,0.75)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {xs.map((x, i) => (
        <circle key={i} cx={x} cy={ys[i]}
          r={aIdx === i ? 5 : i === last ? 4 : 2.5}
          fill={aIdx === i ? '#fff' : i === last ? '#fff' : 'rgba(255,255,255,0.55)'} />
      ))}
      {aIdx == null && (
        <circle cx={xs[last]} cy={ys[last]} r="4" fill="none" stroke="rgba(255,255,255,0.55)" strokeWidth="1.5">
          <animate attributeName="r" from="4" to="13" dur="1.8s" repeatCount="indefinite" />
          <animate attributeName="opacity" from="0.55" to="0" dur="1.8s" repeatCount="indefinite" />
        </circle>
      )}
      {milestones && xs.map((x, i) => milestones.has(i) ? (
        <text key={`ms${i}`} x={x} y={ys[i] - 7} pointerEvents="none"
          textAnchor="middle" fontSize="9" fill="#FFD700" fontFamily="inherit">★</text>
      ) : null)}
      {dates && hinted && <>
        <text x={xs[0]} y={h + 12} textAnchor="start"
          fontSize="7" fill="rgba(255,255,255,0.45)" fontFamily="inherit">
          {fmtSparkDate(dates[0])}
        </text>
        <text x={xs[last]} y={h + 12} textAnchor="end"
          fontSize="7" fill="rgba(255,255,255,0.45)" fontFamily="inherit">
          {fmtSparkDate(dates[dates.length - 1])}
        </text>
      </>}
      {!hinted && (
        <text x={w / 2} y={h + 12} textAnchor="middle"
          fontSize="6.5" fill="rgba(255,255,255,0.38)" fontFamily="inherit" fontStyle="italic">
          desliza
        </text>
      )}
      {aIdx != null && <>
        <line x1={xs[aIdx]} y1={pad} x2={xs[aIdx]} y2={h}
          stroke="rgba(255,255,255,0.4)" strokeWidth="1" strokeDasharray="2,3" />
        <rect x={pillX} y={-22} width={pillW} height={pillH} rx="7"
          fill="rgba(0,0,0,0.32)" />
        <text x={pillX + pillW / 2} y={-22 + pillH - 3} textAnchor="middle"
          fontSize="7" fill="rgba(255,255,255,0.95)" fontFamily="inherit" fontWeight="700">
          {dates ? fmtSparkDate(dates[aIdx]) : ''}
        </text>
      </>}
    </svg>
  );
}

function AnimatedScore({ value, delay = 0, start = true, decimals = 0 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!start) return;
    const factor = Math.pow(10, decimals);
    const t = setTimeout(() => {
      const begin = Date.now(), dur = 1400;
      function tick() {
        const progress = Math.min((Date.now() - begin) / dur, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setDisplay(Math.round(eased * value * factor) / factor);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, delay);
    return () => clearTimeout(t);
  }, [value, delay, start, decimals]);
  return <>{decimals > 0 ? display.toFixed(decimals) : display}</>;
}

// A+C progress: each history point averages only the aspects that were
// "established" at that time. An aspect counts once it's in the original
// baseline (history[0]) OR has improved at least once since it was added —
// so adding a new low-scored aspect never drops the headline or the graph.
function computeProgress(student) {
  const current = student?.skills || {};
  const history = student?.skill_history || [];
  const keysNow = Object.keys(current).filter(k => current[k] != null);
  if (!keysNow.length) return null;

  const firstVal = {};
  history.forEach(snap => Object.keys(snap.skills || {}).forEach(k => {
    if (firstVal[k] == null) firstVal[k] = snap.skills[k];
  }));
  keysNow.forEach(k => { if (firstVal[k] == null) firstVal[k] = current[k]; });
  const baseline = new Set(history.length ? Object.keys(history[0].skills || {}) : keysNow);

  const isEstablished = (k, val) => baseline.has(k) || val > firstVal[k];

  const avgEstablished = (skills) => {
    const all = Object.keys(skills).filter(k => skills[k] != null);
    const est = all.filter(k => isEstablished(k, skills[k]));
    const use = est.length ? est : all;
    if (!use.length) return 0;
    return parseFloat((use.reduce((s, k) => s + skills[k], 0) / use.length).toFixed(1));
  };

  const overall = avgEstablished(current);
  const sparkPoints = history.length >= 2 ? history.map(snap => avgEstablished(snap.skills || {})) : null;

  // Racha: clases consecutivas (desde la última) donde el promedio no bajó.
  let streak = 0;
  if (sparkPoints) {
    for (let i = sparkPoints.length - 1; i > 0; i--) {
      if (sparkPoints[i] >= sparkPoints[i - 1]) streak++;
      else break;
    }
  }

  return { overall, sparkPoints, isEstablished, streak };
}

// Logro de la semana: mayor mejora positiva por aspecto en los últimos 7 días.
// Devuelve {key,label,diff} o null (datos insuficientes o sin mejora → banner oculto).
function weeklyAchievement(student) {
  const history = student?.skill_history || [];
  const current = student?.skills || {};
  if (history.length < 2) return null;

  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  const weekAgoStr = weekAgo.toISOString().slice(0, 10);

  // Baseline = snapshot más reciente con fecha <= hace 7 días; si no hay, el más antiguo.
  let baseline = null;
  history.forEach(snap => { if (snap.date <= weekAgoStr) baseline = snap; });
  if (!baseline) baseline = history[0];
  const base = baseline.skills || {};

  let best = null;
  Object.keys(current).forEach(k => {
    if (current[k] == null || base[k] == null) return;
    const diff = current[k] - base[k];
    if (diff > 0 && (!best || diff > best.diff)) best = { key: k, label: labelFor(k), diff };
  });
  return best;
}

// Aro de "próxima meta": promedio actual sobre el siguiente umbral de LEVELS,
// + estimación de cuántas clases faltan al ritmo reciente (oculta si <2 snapshots).
function NextGoalSection({ overall, sparkPoints }) {
  if (overall == null) return null;

  // Nivel actual = el más alto cuyo min <= overall; siguiente = el de arriba.
  let curIdx = 0;
  for (let i = 0; i < LEVELS.length; i++) { if (overall >= LEVELS[i].min) curIdx = i; }
  const current = LEVELS[curIdx];
  const next = LEVELS[curIdx + 1] || null;

  const r = 34, C = 2 * Math.PI * r;
  const frac = next
    ? Math.max(0, Math.min(1, (overall - current.min) / (next.min - current.min)))
    : 1;
  const dash = C * frac;
  const remaining = next ? Math.max(0, next.min - overall) : 0;

  // Estimación: ganancia media por snapshot reciente (ventana de hasta 4).
  let estimate = null;
  if (next && sparkPoints && sparkPoints.length >= 2) {
    const w = sparkPoints.slice(-4);
    const perStep = (w[w.length - 1] - w[0]) / (w.length - 1);
    if (perStep > 0 && remaining > 0) estimate = Math.ceil(remaining / perStep);
  }

  return (
    <div style={{
      display:'flex', alignItems:'center', gap:16,
      background:'var(--white)', border:'1px solid var(--border)',
      borderRadius:16, padding:'16px 18px', marginBottom:10
    }}>
      <svg width="84" height="84" viewBox="0 0 84 84" style={{flexShrink:0}}>
        <circle cx="42" cy="42" r={r} fill="none" stroke="var(--border)" strokeWidth="7" />
        <circle cx="42" cy="42" r={r} fill="none" stroke="var(--green-mid)" strokeWidth="7"
          strokeLinecap="round" strokeDasharray={`${dash} ${C}`} transform="rotate(-90 42 42)" />
        <text x="42" y="48" textAnchor="middle" fontSize="20" fontWeight="800" fill="var(--green-dark)">{overall.toFixed(1)}</text>
      </svg>
      <div style={{flex:1}}>
        <div style={{fontSize:'0.66rem', fontWeight:800, letterSpacing:'0.1em', color:'var(--green-mid)', marginBottom:3}}>
          PRÓXIMA META
        </div>
        {next ? (
          <>
            <div style={{fontSize:'1.05rem', fontWeight:800, color:'var(--green-dark)', marginBottom:3}}>
              {next.name}
            </div>
            <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', lineHeight:1.4}}>
              Te faltan <b style={{color:'var(--green-dark)'}}>{remaining.toFixed(1)}</b> puntos para {next.name}
              {estimate != null && (
                <span style={{color:'var(--green-mid)', fontWeight:700}}> · ~{estimate} {estimate === 1 ? 'clase' : 'clases'} a este ritmo</span>
              )}
            </div>
          </>
        ) : (
          <>
            <div style={{fontSize:'1.05rem', fontWeight:800, color:'var(--green-dark)', marginBottom:3}}>
              {current.name}
            </div>
            <div style={{fontSize:'0.8rem', color:'var(--text-secondary)'}}>¡Nivel máximo alcanzado! 🎉</div>
          </>
        )}
      </div>
    </div>
  );
}

// Mini sparkline para cada tarjeta de habilidad: tendencia compacta y estática.
// Verde si sube, ámbar si plano, neutro si baja (nunca rojo). 1 punto → punto.
function MiniSpark({ values }) {
  if (!values || values.length === 0) return null;
  const w = 40, h = 16, pad = 2;
  if (values.length === 1) {
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}} aria-hidden="true">
        <circle cx={w - pad - 2} cy={h / 2} r="2.2" fill="var(--text-hint)" />
      </svg>
    );
  }
  const dir = values[values.length - 1] - values[0];
  const color = dir > 0 ? 'var(--green-mid)' : dir === 0 ? 'var(--orange)' : 'var(--text-hint)';
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const xs = values.map((_, i) => pad + (i / (values.length - 1)) * (w - pad * 2));
  const ys = values.map(v => h - pad - ((v - min) / range) * (h - pad * 2));
  const d = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}} aria-hidden="true">
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={xs[xs.length - 1].toFixed(1)} cy={ys[ys.length - 1].toFixed(1)} r="1.8" fill={color} />
    </svg>
  );
}

function ProgressSection({ student }) {
  const [barFill, setBarFill] = useState(false);
  const [overallStart, setOverallStart] = useState(false);
  const gridRef = useRef(null);
  const headerRef = useRef(null);
  useEffect(() => {
    const el = gridRef.current;
    if (!el) return;
    if (!('IntersectionObserver' in window)) { setBarFill(true); return; }
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) { setBarFill(true); obs.disconnect(); }
    }, { threshold: 0.25 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  useEffect(() => {
    const el = headerRef.current;
    if (!el) return;
    if (!('IntersectionObserver' in window)) { setOverallStart(true); return; }
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) { setOverallStart(true); obs.disconnect(); }
    }, { threshold: 0.5 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  const raw = student?.skills || {};
  const history = student?.skill_history || [];
  const prog = computeProgress(student);

  if (!prog) return null;

  const { overall, sparkPoints, isEstablished, streak } = prog;
  const overallStr = overall.toFixed(1);
  const aspects = scoredAspects(raw);

  const delta = sparkPoints ? (overall - sparkPoints[0]).toFixed(1) : null;
  const milestones = sparkPoints ? (() => {
    const s = new Set();
    for (let i = 1; i < sparkPoints.length; i++) {
      const prev = sparkPoints[i - 1], curr = sparkPoints[i];
      if ((prev < 7 && curr >= 7) || (prev < 5 && curr >= 5)) s.add(i);
    }
    return s.size > 0 ? s : null;
  })() : null;

  // Last 3 entries, newest first
  const recentHistory = history.slice().reverse().slice(0, 3);

  const arrowSvg = (color) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  );

  return (
    <div style={{marginTop: 32, marginBottom: 24}}>
      <div className="section-label" style={{marginBottom: 10}}>TU PROGRESO</div>

      {/* Main card */}
      <div ref={headerRef} style={{
        background: 'var(--green-dark)', borderRadius: 18,
        padding: '20px 20px 16px', marginBottom: 10,
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
      }}>
        <div>
          <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.1em', color:'rgba(255,255,255,0.55)', marginBottom:4}}>
            PROGRESO GENERAL
          </div>
          <div style={{fontSize:'3rem', fontWeight:800, color:'#fff', lineHeight:1, marginBottom:4}}>
            <AnimatedScore value={overall} decimals={1} start={overallStart} />
          </div>
          <div style={{fontSize:'0.78rem', color:'rgba(255,255,255,0.65)', display:'flex', alignItems:'center', gap:4}}>
            {delta != null ? (
              <>
                {parseFloat(delta) >= 0
                  ? <span style={{color:'#7DEFA1', fontWeight:700}}>+{delta}</span>
                  : <span style={{color:'#f4a261', fontWeight:700}}>{delta}</span>}
                promedio de habilidades
              </>
            ) : (
              <span>primera evaluación</span>
            )}
          </div>
          {streak >= 2 && (
            <div style={{
              display:'inline-flex', alignItems:'center', gap:4, marginTop:10,
              background:'rgba(255,255,255,0.12)', color:'#fff',
              fontSize:'0.72rem', fontWeight:700, borderRadius:20, padding:'3px 10px',
            }}>🔥 Racha de {streak}</div>
          )}
        </div>
        {sparkPoints && (
          <div style={{paddingBottom: 4}}>
            <Sparkline points={sparkPoints} dates={history.map(h => h.date)} milestones={milestones} />
          </div>
        )}
      </div>

      <NextGoalSection overall={overall} sparkPoints={sparkPoints} />

      {/* Skill cards — 2 col grid */}
      <div ref={gridRef} style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
        {(() => {
          const prevSkills = history.length >= 2 ? history[history.length - 2].skills : null;

          // Mini-tendencia por habilidad: últimos ~5 valores reales de skill_history.
          const sparkFor = (k) => {
            const vals = history.map(s => s.skills?.[k]).filter(v => v != null).slice(-5);
            return vals.length ? vals : [raw[k]];
          };

          // "Tu próximo foco": habilidad más baja; desempate por la que mejoró hace más tiempo.
          const focusKey = (() => {
            const scored = aspects.filter(a => raw[a.key] != null);
            if (!scored.length) return null;
            const minScore = Math.min(...scored.map(a => raw[a.key]));
            const lowest = scored.filter(a => raw[a.key] === minScore);
            if (lowest.length === 1) return lowest[0].key;
            const lastImproved = (k) => {
              let at = -1;
              for (let i = 1; i < history.length; i++) {
                const p = history[i - 1].skills?.[k], c = history[i].skills?.[k];
                if (p != null && c != null && c > p) at = i;
              }
              return at;
            };
            return lowest.slice().sort((a, b) => lastImproved(a.key) - lastImproved(b.key))[0].key;
          })();

          return aspects.map(({ key, label }, idx) => {
          const score = raw[key];
          if (score == null) return null;
          const delta = prevSkills?.[key] != null ? score - prevSkills[key] : null;
          const isNew = !isEstablished(key, score);
          const delay = idx * 180;
          return (
            <div key={key} style={{
              background:'var(--white)', border:'1px solid var(--border)',
              borderRadius:14, padding:'14px 14px 12px',
              animation:`card-in 0.35s ease-out ${delay}ms both`,
            }}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                <div style={{fontSize:'0.78rem', fontWeight:700, color:'var(--text-primary)', display:'flex', alignItems:'center', gap:5, flexWrap:'wrap'}}>
                  {label}
                  {isNew && <span style={{fontSize:'0.58rem', fontWeight:800, letterSpacing:'0.05em', color:'var(--blue-slate)', background:'#DCE9F1', borderRadius:20, padding:'1px 6px'}}>NUEVO</span>}
                </div>
                <span style={{fontSize:'0.78rem', fontWeight:800, color: score >= 10 ? 'var(--blue-slate)' : 'var(--green-dark)'}}>
                  <AnimatedScore value={score} delay={delay} start={barFill} />
                  <span style={{fontSize:'0.65rem', color:'var(--text-hint)', fontWeight:600}}>/10</span>
                </span>
              </div>
              <div style={{height:5, borderRadius:99, background:'var(--border)', marginBottom:8, overflow:'hidden'}}>
                <div style={{
                  height:'100%', borderRadius:99,
                  width: barFill ? `${score * 10}%` : '0%',
                  background: score >= 10 ? 'var(--blue-slate)' : score >= 7 ? 'var(--green-mid)' : score >= 5 ? 'var(--orange)' : '#c0392b',
                  transition: `width 1.4s cubic-bezier(0.25,0.8,0.3,1) ${delay}ms`,
                }} />
              </div>
              <div style={{display:'flex', alignItems:'center', gap:6, rowGap:8, flexWrap:'wrap'}}>
                {key === focusKey ? (
                  <span style={{
                    fontSize:'0.66rem', fontWeight:800, letterSpacing:'0.02em',
                    padding:'2px 9px', borderRadius:20, background:'var(--green-dark)', color:'#fff',
                    display:'inline-flex', alignItems:'center', gap:4, whiteSpace:'nowrap',
                  }}>🎯 Tu próximo foco</span>
                ) : (
                  <>
                    <StatusBadge status={skillStatus(score)} />
                    <div style={{display:'flex', alignItems:'center', gap:6, marginLeft:'auto', flexShrink:0}}>
                      {delta > 0 && barFill && (
                        <span style={{fontSize:'0.72rem', fontWeight:700, color:'#2E7A4B',
                          animation:`pop-in 0.3s ease-out ${delay + 1100}ms both`}}>↑ +{delta}</span>
                      )}
                      <MiniSpark values={sparkFor(key)} />
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        });
        })()}
      </div>

      {/* Últimas clases — desde historial real */}
      {history.length > 0 && (
        <div style={{background:'var(--white)', border:'1px solid var(--border)', borderRadius:14, padding:'14px 16px'}}>
          <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--text-secondary)', marginBottom:10}}>
            ÚLTIMAS CLASES
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {recentHistory.map((entry, i) => {
              const classNum = history.length - i;
              const prevEntry = i < recentHistory.length - 1 ? recentHistory[i + 1] : null;

              if (!prevEntry) {
                // Primera entrada — mostrar habilidad con puntuación más alta
                const topSkill = Object.keys(entry.skills || {})
                  .filter(k => entry.skills[k] != null)
                  .map(k => ({ key: k, label: labelFor(k) }))
                  .sort((a, b) => entry.skills[b.key] - entry.skills[a.key])[0];
                if (!topSkill) return null;
                return (
                  <div key={i} style={{display:'flex', alignItems:'center'}}>
                    <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                    <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-primary)', fontWeight:600}}>{topSkill.label}</div>
                    <div style={{display:'flex', alignItems:'center', gap:5}}>
                      <span style={{fontSize:'0.82rem', color:'var(--text-hint)'}}>Inicio</span>
                      {arrowSvg('var(--green-mid)')}
                      <span style={{fontSize:'0.82rem', fontWeight:800, color:'var(--green-mid)'}}>{entry.skills[topSkill.key]}</span>
                    </div>
                  </div>
                );
              }

              // Mostrar el cambio más grande respecto a la clase anterior
              const changes = Object.keys(entry.skills || {})
                .filter(k => entry.skills[k] != null && prevEntry.skills[k] != null)
                .map(k => ({ label: labelFor(k), from: prevEntry.skills[k], to: entry.skills[k], diff: Math.abs(entry.skills[k] - prevEntry.skills[k]) }))
                .filter(c => c.diff > 0)
                .sort((a, b) => b.diff - a.diff);

              if (changes.length === 0) return (
                <div key={i} style={{display:'flex', alignItems:'center'}}>
                  <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                  <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-hint)'}}>Sin cambios</div>
                </div>
              );

              const top = changes[0];
              const improved = top.to > top.from;
              return (
                <div key={i} style={{display:'flex', alignItems:'center'}}>
                  <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                  <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-primary)', fontWeight:600}}>{top.label}</div>
                  <div style={{display:'flex', alignItems:'center', gap:5}}>
                    <span style={{fontSize:'0.82rem', color:'var(--text-hint)'}}>{top.from}</span>
                    {arrowSvg(improved ? 'var(--green-mid)' : '#c0392b')}
                    <span style={{fontSize:'0.82rem', fontWeight:800, color: improved ? 'var(--green-mid)' : '#c0392b'}}>{top.to}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── S13 Student Profile ──────────────────────────────────────
// ── Tarjeta de progreso compartible (PNG 1080×1080, sin librerías) ──
// Dibuja en canvas: nombre, nivel, promedio, logro de la semana y racha.
// Comparte vía Web Share (móvil → WhatsApp) o descarga directa (desktop).
function drawProgressCard(ctx, student) {
  const prog = computeProgress(student);
  if (!prog) return;
  const overall = prog.overall;
  const streak = prog.streak || 0;
  const win = weeklyAchievement(student);

  const S = 1080, M = 90;
  const FAM = 'Inter, system-ui, -apple-system, sans-serif';

  const rr = (x, y, w, h, r) => {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  };
  const fitFont = (text, maxW, weight, startPx) => {
    let px = startPx;
    do { ctx.font = `${weight} ${px}px ${FAM}`; if (ctx.measureText(text).width <= maxW) break; px -= 4; } while (px > 22);
    return px;
  };
  const space = (v) => { if ('letterSpacing' in ctx) ctx.letterSpacing = v; };

  // Fondo verde oscuro + acento radial sutil
  ctx.fillStyle = '#0E2A1C'; ctx.fillRect(0, 0, S, S);
  const grad = ctx.createRadialGradient(S - 160, 210, 30, S - 160, 210, 640);
  grad.addColorStop(0, 'rgba(79,143,95,0.28)');
  grad.addColorStop(1, 'rgba(79,143,95,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, S, S);
  ctx.textBaseline = 'alphabetic';

  // Wordmark
  ctx.fillStyle = '#8FBF9B';
  ctx.beginPath(); ctx.arc(M + 9, 98, 9, 0, Math.PI * 2); ctx.fill();
  ctx.font = `700 42px ${FAM}`; ctx.fillStyle = '#fff';
  ctx.fillText('Padel', M + 32, 112);
  const pw = ctx.measureText('Padel').width;
  ctx.font = `400 42px ${FAM}`; ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText(' Log', M + 32 + pw, 112);

  // Kicker
  space('6px');
  ctx.font = `700 26px ${FAM}`; ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('REPORTE DE PROGRESO', M, 246);
  space('0px');

  // Nombre (se achica si es largo)
  const nameSize = fitFont(student.name, S - 2 * M, '700', 90);
  ctx.font = `700 ${nameSize}px ${FAM}`; ctx.fillStyle = '#fff';
  ctx.fillText(student.name, M, 330);

  let y = 360;
  if (student.level) {
    const lvl = student.level.toUpperCase();
    ctx.font = `700 28px ${FAM}`;
    const lw = ctx.measureText(lvl).width, padX = 24, ph = 52;
    rr(M, y, lw + padX * 2, ph, 26); ctx.fillStyle = 'rgba(255,255,255,0.14)'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle';
    ctx.fillText(lvl, M + padX, y + ph / 2 + 2); ctx.textBaseline = 'alphabetic';
    y += ph;
  }

  // Promedio (héroe)
  const heroBaseline = 700;
  ctx.font = `700 300px ${FAM}`; ctx.fillStyle = '#fff';
  const avgStr = overall.toFixed(1);
  ctx.fillText(avgStr, M - 6, heroBaseline);
  const aw = ctx.measureText(avgStr).width;
  ctx.font = `700 64px ${FAM}`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('/10', M + aw + 12, heroBaseline);
  space('4px');
  ctx.font = `700 28px ${FAM}`; ctx.fillStyle = '#7DEFA1';
  ctx.fillText('PROMEDIO DE HABILIDADES', M, heroBaseline + 56);
  space('0px');

  // Tarjetas: logro de la semana / racha
  const cards = [];
  if (win) cards.push({ k: 'ESTA SEMANA', v: `${win.label} +${Math.round(win.diff)}`, c: '#7DEFA1' });
  if (streak >= 2) cards.push({ k: 'RACHA', v: `${streak} clase${streak !== 1 ? 's' : ''}`, c: '#fff' });
  if (cards.length) {
    const cardY = 838, cardH = 152, gap = 24, fullW = S - 2 * M;
    const cw = cards.length === 2 ? (fullW - gap) / 2 : fullW;
    cards.forEach((c, i) => {
      const cx = M + i * (cw + gap);
      rr(cx, cardY, cw, cardH, 22); ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
      space('3px');
      ctx.font = `700 24px ${FAM}`; ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText(c.k, cx + 30, cardY + 52);
      space('0px');
      const vSize = fitFont(c.v, cw - 60, '700', 48);
      ctx.font = `700 ${vSize}px ${FAM}`; ctx.fillStyle = c.c;
      ctx.fillText(c.v, cx + 30, cardY + 116);
    });
  }

  // Footer
  ctx.font = `600 26px ${FAM}`; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('padel-log-app.vercel.app', M, 1024);
}

// Carga la fuente, dibuja la tarjeta y la comparte (móvil) o descarga (desktop).
async function shareProgressCard(student) {
  if (!computeProgress(student)) return;
  if (document.fonts?.load) {
    try {
      await Promise.all([
        document.fonts.load('700 100px Inter'),
        document.fonts.load('600 40px Inter'),
        document.fonts.load('400 40px Inter'),
      ]);
      await document.fonts.ready;
    } catch (e) {}
  }
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1080;
  drawProgressCard(canvas.getContext('2d'), student);
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  if (!blob) return;
  const fileName = `progreso-${(student.name || 'alumno').trim().replace(/\s+/g, '-').toLowerCase()}.png`;
  const file = new File([blob], fileName, { type: 'image/png' });
  if (navigator.share && navigator.canShare?.({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Progreso', text: `Progreso de ${student.name}` }); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

    ? 'https://padel-log-app.vercel.app'

  function shareStudent() {
    try {
      navigator.clipboard.writeText(shareUrl);

      ta.value = shareUrl; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);

    let alive = true;
    setFeedbackLoading(true);
    sb.from('student_feedback')
      .select('*')

              : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            }
          </button>

          <div style={{display:'flex', alignItems:'center', gap:14, paddingRight:28}}>
            <Avatar name={student.name} size={52} />
            <div>
              <div style={{fontWeight:700, fontSize:'1.1rem'}}>{student.name}</div>
              {student.level && <div style={{fontSize:'0.82rem', color:'var(--text-secondary)', marginTop:2}}>{student.level}</div>}

              {student.last_seen_at && (

                  )}
                  {log.coach_note && (
                    <div style={{marginBottom: (log.media_url || log.visual_what) ? 8 : 0}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:4}}>NOTA</div>
                      <div style={{fontSize:'0.88rem', fontStyle:'italic'}}>{log.coach_note}</div>
                    </div>
                  )}
                  {(log.media_url || log.visual_what) && (
                    <div style={{
                      marginTop:10, borderTop:'1px solid var(--border)', paddingTop:10
                    }}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:8, display:'flex', alignItems:'center', gap:5}}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
                        </svg>
                        REFERENCIA VISUAL
                      </div>
                      {log.media_url && (
                        <div style={{borderRadius:10, overflow:'hidden', background:'#000', marginBottom: log.visual_what ? 8 : 0, lineHeight:0}}>
                          {log.media_type === 'video'
                            ? <VideoPlayer src={log.media_url} maxHeight={400} loop />
                            : <a href={log.media_url} target="_blank" rel="noopener noreferrer">
                                <img src={log.media_url} alt="Referencia visual" loading="lazy"
                                  style={{width:'100%', maxHeight:200, objectFit:'cover', display:'block', cursor:'zoom-in'}} />
                              </a>
                          }
                        </div>
                      )}
                      {log.visual_what && (
                        <div style={{fontSize:'0.85rem', color:'var(--text-primary)', lineHeight:1.5}}>{log.visual_what}</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <div style={{height:16}} />
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute]                   = useState('loading');
  const [user, setUser]                     = useState(null);
  const [profile, setProfile]               = useState(null);
  const [students, setStudents]             = useState([]);
  const [payments, setPayments]             = useState([]);
  const [bonuses, setBonuses]               = useState([]);
  const [scheduledClasses, setScheduledClasses] = useState([]);
  const [unreadFeedback, setUnreadFeedback] = useState([]);
  const [todayCount, setTodayCount]         = useState(0);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [groupStudents, setGroupStudents] = useState(null);
  const [selectedScheduledClass, setSelectedScheduledClass] = useState(null);
  const [selectedPayment, setSelectedPayment] = useState(null);
  const [selectedBonus, setSelectedBonus] = useState(null);
  const [savedOffline, setSavedOffline]     = useState(false);
  const [savedLog, setSavedLog]             = useState(null);
  const [selectedLog, setSelectedLog]         = useState(null);
  const [isOffline, setIsOffline]           = useState(!navigator.onLine);
  const [isManaging, setIsManaging]         = useState(() => LS.get('isManaging') || false);
  const [edgePreviewHtml, setEdgePreviewHtml] = useState('');
  const edgePreviewStackRef = useRef([]);
  useEffect(() => { LS.set('isManaging', isManaging); }, [isManaging]);

  const captureActiveScreenHtml = () => {
    const screens = document.querySelectorAll('#root .screen');
    const screen = Array.from(screens).filter(el => !el.closest('.screen-edge-preview')).pop();
    return screen ? screen.outerHTML : '';
  };

  const go = (r, options = {}) => {
    if (options.history === 'back') {
      edgePreviewStackRef.current.pop();
      setEdgePreviewHtml(edgePreviewStackRef.current[edgePreviewStackRef.current.length - 1] || '');
    } else if (options.history !== 'replace') {
      const html = captureActiveScreenHtml();
      if (html) {
        edgePreviewStackRef.current.push(html);
        setEdgePreviewHtml(html);
      }
    }
    setRoute(r);
    if (r && r !== 'loading' && r !== 'auth') {
      LS.set('lastRoute', r);
      LS.set('lastRouteTs', Date.now());
    }
  };

  const publicMatch = () => {
    const pm = location.pathname.match(/^\/p\/([0-9a-f-]{36})$/i);
    if (pm) return pm[1];
    const hm = location.hash.match(/^#\/p\/([0-9a-f-]{36})$/i);
    return hm ? hm[1] : null;
  };

  // Online/offline detection + queue flush
  useEffect(() => {
    const onOnline  = () => { setIsOffline(false); if (user) flushQueue(user.id); };
    const onOffline = () => setIsOffline(true);
    window.addEventListener('online',  onOnline);
    window.addEventListener('offline', onOffline);
    return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
  }, [user]);

  useEffect(() => {
    const publicId = publicMatch();
    if (publicId) { go({ name: 'public', id: publicId }); return; }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        saveCoachEmail(session.user.email);
        setUser(session.user);
        loadEverything(session.user.id);
      } else {
        go('auth');
      }
    }).catch(() => go('auth'));

    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) { saveCoachEmail(session.user.email); setUser(session.user); loadEverything(session.user.id); }
      else { setUser(null); setProfile(null); setStudents([]); setPayments([]); setBonuses([]); setScheduledClasses([]); setUnreadFeedback([]); setSelectedScheduledClass(null); setSelectedPayment(null); setSelectedBonus(null); go('auth'); }
    });

    const handleHash = () => { const pid = publicMatch(); if (pid) go({ name: 'public', id: pid }); };
    window.addEventListener('hashchange', handleHash);
    return () => { subscription.unsubscribe(); window.removeEventListener('hashchange', handleHash); };
  }, []);

  async function loadEverything(uid) {
    const prof = await fetchProfile(uid);
    if (!prof?.display_name) { go('onboarding'); return; }
    setProfile(prof);
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    const mappedStudents = studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null }));
    setStudents(mappedStudents);
    const ops = await fetchCoachOps(uid);
    setPayments(ops.payments);
    setBonuses(ops.bonuses);
    setScheduledClasses(ops.scheduledClasses);
    await refreshUnreadFeedback();

    // Restore last route (no time limit)
    const savedRoute = LS.get('lastRoute');
    const isPublicUrl = !!location.hash.match(/^#\/p\//);
    if (!isPublicUrl && savedRoute && savedRoute !== 'dashboard' && savedRoute !== 'auth' && savedRoute !== 'loading') {
      const rName = typeof savedRoute === 'object' ? savedRoute.name : savedRoute;
      if (['logClass','editLog','share','studentProfile','editStudent'].includes(rName)) {
        const sId = typeof savedRoute === 'object' ? savedRoute.studentId : null;
        const restoredS = sId ? mappedStudents.find(s => s.id === sId) : null;
        if (restoredS) {
          setSelectedStudent(restoredS);
          if (rName === 'editLog' && savedRoute?.logId) {
            const restoredLog = logs.find(l => l.id === savedRoute.logId);
            if (!restoredLog) { go('dashboard'); flushQueue(uid); return; }
            setSelectedLog(restoredLog);
          }
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
        // Student not found (deleted?), fall through to dashboard
      } else if (rName === 'editScheduledClass') {
        const restoredClass = ops.scheduledClasses.find(c => c.id === savedRoute?.classId);
        if (restoredClass) {
          setSelectedScheduledClass(restoredClass);
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
      } else if (rName === 'editPayment') {
        const restoredPayment = ops.payments.find(p => p.id === savedRoute?.paymentId);
        if (restoredPayment) {
          setSelectedPayment(restoredPayment);
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
      } else if (rName === 'editBonus') {
        const restoredBonus = ops.bonuses.find(b => b.id === savedRoute?.bonusId);
        if (restoredBonus) {
          setSelectedBonus(restoredBonus);
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
      } else if (['pickStudent','addStudent','addPayment','addBonus','addScheduledClass','editProfile','manageStudents'].includes(rName)) {
        setRoute(savedRoute);
        flushQueue(uid);
        return;
      }
    }
    LS.set('lastRoute', 'dashboard');
    go('dashboard');
    flushQueue(uid);
  }

  async function refreshStudents(uid) {
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    setStudents(studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null })));
  }

  async function setStudentNextClass(studentId, nextClass) {
    // Optimistic UI + persist; used to clear/upgrade the legacy "next_class" agenda slot
    setStudents(prev => prev.map(s => s.id === studentId ? { ...s, next_class: nextClass } : s));
    try {
      await sb.from('students').update({ next_class: nextClass, updated_at: new Date().toISOString() }).eq('id', studentId);
    } catch (e) {}
    const cacheKey = `s:${user.id}`;
    const cached = LS.get(cacheKey);
    if (Array.isArray(cached)) {
      LS.set(cacheKey, cached.map(s => s.id === studentId ? { ...s, next_class: nextClass } : s));
    }
  }

  async function refreshCoachOps(uid) {
    const ops = await fetchCoachOps(uid);
    setPayments(ops.payments);
    setBonuses(ops.bonuses);
    setScheduledClasses(ops.scheduledClasses);
  }

  async function refreshUnreadFeedback() {
    const rows = await fetchUnreadStudentFeedback();
    setUnreadFeedback(rows);
    return rows;
  }

  const routeName = typeof route === 'object' ? route.name : route;
  const goBack = r => go(r, { history: 'back' });

  function backFromCurrentRoute() {
    if (routeName === 'studentProfile') {
      setSelectedStudent(null);
      goBack('dashboard');
      return;
    }
    if (routeName === 'logClass') {
      if (route.from === 'studentProfile' && selectedStudent?.id) {
        goBack({ name: 'studentProfile', studentId: selectedStudent.id });
      } else if (route.from === 'dashboard') {
        goBack('dashboard');
      } else {
        goBack('pickStudent');
      }
      return;
    }
    if (routeName === 'editStudent') {
      if (route?.from === 'studentProfile' && selectedStudent?.id) goBack({ name: 'studentProfile', studentId: selectedStudent.id });
      else goBack('dashboard');
      return;
    }
    if (routeName === 'addStudent' && route?.from === 'pickStudent') {
      goBack(route?.group ? { name: 'pickStudent', group: true } : 'pickStudent');
      return;
    }
    if (routeName === 'share') {
      setSelectedStudent(null);
      setSavedOffline(false);
      setSavedLog(null);
      LS.set('lastRoute', null);
      goBack('dashboard');
      return;
    }
    if (routeName === 'editScheduledClass') {
      setSelectedScheduledClass(null);
      goBack('dashboard');
      return;
    }
    if (routeName === 'editPayment') {
      setSelectedPayment(null);
      goBack('dashboard');
      return;
    }
    if (routeName === 'editBonus') {
      setSelectedBonus(null);
      goBack('dashboard');
      return;
    }
    goBack('dashboard');
  }

  useEdgeSwipeBack(
    !!user && !['loading', 'auth', 'onboarding', 'dashboard'].includes(routeName) && routeName !== 'public',
    backFromCurrentRoute,
    edgePreviewHtml
  );

  // ── Render ──
  if (route?.name === 'public') return <PublicReportScreen studentId={route.id} />;
  if (route === 'loading') return <div className="loading">Cargando…</div>;

  return (
    <>
      <div className={`offline-banner${isOffline ? ' show' : ''}`}>
        Sin conexión — los cambios se guardan localmente
      </div>

      {route === 'auth' && <AuthScreen />}

      {route === 'onboarding' && (
        <OnboardingScreen user={user}
          onDone={(prof, authUser) => {
            const savedUser = authUser || user;
            if (authUser) setUser(authUser);
            setProfile(prof);
            if (savedUser?.id) refreshStudents(savedUser.id);
            go('dashboard');
          }} />
      )}

      {route === 'dashboard' && (
        <DashboardScreen profile={profile} students={students} payments={payments} bonuses={bonuses} scheduledClasses={scheduledClasses} unreadFeedback={unreadFeedback} todayCount={todayCount}
          onAddStudent={() => go('addStudent')}
          onRegisterClass={() => go('pickStudent')}
          onSelectStudent={s => { setSelectedStudent(s); go({ name: 'studentProfile', studentId: s.id }); }}
          onSignOut={() => { LS.set('lastRoute', null); sb.auth.signOut(); }}
          onEditProfile={() => go('editProfile')}
          onEditStudent={s => { setSelectedStudent(s); go({ name: 'editStudent', studentId: s.id }); }}
          onEditLog={(s, log) => { setSelectedStudent(s); setSelectedLog(log); go({ name: 'editLog', studentId: s.id, logId: log.id }); }}
          onManageStudents={() => go('manageStudents')}
          onQuickLog={s => { setGroupStudents(null); setSelectedStudent(s); go({ name: 'logClass', from: 'dashboard', studentId: s.id }); }}
          onAddPayment={() => go('addPayment')}
          onAddBonus={() => go('addBonus')}
          onAddScheduledClass={() => go('addScheduledClass')}
          onAssignTime={s => go({ name: 'addScheduledClass', studentId: s.id, date: s.next_class, fromLegacy: true })}
          onRemoveLegacy={async s => {
            const ok = window.confirm(`¿Quitar la clase de ${s.name} de la agenda? El alumno y su historial no se borran.`);
            if (!ok) return;
            await setStudentNextClass(s.id, null);
          }}
          onEditScheduledClass={scheduled => {
            setSelectedScheduledClass(scheduled);
            go({ name: 'editScheduledClass', classId: scheduled.id });
          }}
          onDeleteScheduledClass={async scheduled => {
            const ok = window.confirm('¿Eliminar esta clase agendada? No se borran pagos, bonos ni reportes.');
            if (!ok) return;
            const deletedId = await deleteScheduledClass(user.id, scheduled);
            setScheduledClasses(prev => prev.filter(c => c.id !== deletedId));
          }}
          onCompleteScheduledClass={async scheduled => {
            const saved = await updateScheduledClass(user.id, scheduled, { ...scheduled, status: 'completed' });
            setScheduledClasses(prev => prev.map(c => c.id === (saved?.id || scheduled.id) ? (saved || { ...scheduled, status: 'completed' }) : c));
          }}
          onMarkPaymentPaid={async payment => {
            const saved = await markCoachPaymentPaid(user.id, payment);
            setPayments(prev => prev.map(p => p.id === saved.id ? saved : p));
          }}
          onUseBonus={async bonus => {
            const saved = await useClassBonus(user.id, bonus);
            setBonuses(prev => prev.map(b => b.id === saved.id ? saved : b));
          }}
          onEditPayment={payment => {
            setSelectedPayment(payment);
            go({ name: 'editPayment', paymentId: payment.id });
          }}
          onDeletePayment={async payment => {
            const ok = window.confirm('¿Eliminar este pago? Esta acción no borra alumnos, bonos ni clases.');
            if (!ok) return;
            const deletedId = await deleteCoachPayment(user.id, payment);
            setPayments(prev => prev.filter(p => p.id !== deletedId));
          }}
          onEditBonus={bonus => {
            setSelectedBonus(bonus);
            go({ name: 'editBonus', bonusId: bonus.id });
          }}
          onDeleteBonus={async bonus => {
            const ok = window.confirm('¿Eliminar este bono? No se borran pagos, alumnos ni reportes.');
            if (!ok) return;
            const deletedId = await deleteClassBonus(user.id, bonus);
            setBonuses(prev => prev.filter(b => b.id !== deletedId));
          }}
          onOpenFeedbackStudent={studentId => {
            const s = students.find(st => st.id === studentId);
            if (!s) return;
            setSelectedStudent(s);
            go({ name: 'studentProfile', studentId: s.id });
          }}
          managing={isManaging}
          onManagingChange={setIsManaging} />
      )}

      {route?.name === 'studentProfile' && (
        (() => {
          const s = selectedStudent || students.find(st => st.id === route.studentId);
          return s ? (
            <StudentProfileScreen
              student={s}
              coachId={user.id}
              onBack={() => go('dashboard')}
              onEdit={() => { setSelectedStudent(s); go({ name: 'editStudent', from: 'studentProfile', studentId: s.id }); }}
              onRegisterClass={() => { setGroupStudents(null); setSelectedStudent(s); go({ name: 'logClass', from: 'studentProfile', studentId: s.id }); }}
              onEditLog={log => { setSelectedStudent(s); setSelectedLog(log); go({ name: 'editLog', from: 'studentProfile', studentId: s.id, logId: log.id }); }}
              onLogDeleted={() => refreshStudents(user.id)}
              onFeedbackRead={() => refreshUnreadFeedback()} />
          ) : null;
        })()
      )}

      {routeName === 'pickStudent' && (
        <PickStudentScreen students={students} initialGroupMode={!!route?.group} onBack={() => go('dashboard')}
          onSelect={s => { setGroupStudents(null); setSelectedStudent(s); go({ name: 'logClass', from: 'pickStudent', studentId: s.id }); }}
          onSelectGroup={arr => { setGroupStudents(arr); setSelectedStudent(arr[0]); go({ name: 'logClass', from: 'pickStudent', group: true }); }}
          onAddStudent={fromGroup => go({ name: 'addStudent', from: 'pickStudent', group: !!fromGroup })} />
      )}

      {routeName === 'addStudent' && (
        <AddStudentScreen coachId={user.id} onBack={() => go(route?.from === 'pickStudent' ? 'pickStudent' : 'dashboard')}
          onDone={s => {
            const savedStudent = { ...s, lastLog: null };
            setStudents(prev =>
              [...prev, savedStudent].sort((a, b) => a.name.localeCompare(b.name))
            );
            if (route?.from === 'pickStudent' && route?.group) {
              go({ name: 'pickStudent', group: true });
            } else if (route?.from === 'pickStudent') {
              setGroupStudents(null);
              setSelectedStudent(savedStudent);
              go({ name: 'logClass', from: 'pickStudent', studentId: savedStudent.id });
            } else {
              go('dashboard');
            }
          }} />
      )}

      {route === 'addPayment' && (
        <AddPaymentScreen coachId={user.id} students={students} onBack={() => go('dashboard')}
          onDone={payment => {
            setPayments(prev => [payment, ...prev.filter(p => p.id !== payment.id)]);
            go('dashboard');
          }} />
      )}

      {route?.name === 'editPayment' && (
        (() => {
          const payment = selectedPayment || payments.find(p => p.id === route.paymentId);
          return payment ? (
            <AddPaymentScreen
              coachId={user.id}
              students={students}
              existingPayment={payment}
              onBack={() => { setSelectedPayment(null); go('dashboard'); }}
              onDone={updated => {
                setPayments(prev => [updated, ...prev.filter(p => p.id !== updated.id)]);
                setSelectedPayment(null);
                go('dashboard');
              }}
              onDeleted={deletedId => {
                setPayments(prev => prev.filter(p => p.id !== deletedId));
                setSelectedPayment(null);
                go('dashboard');
              }} />
          ) : null;
        })()
      )}

      {routeName === 'addScheduledClass' && (
        <AddScheduledClassScreen coachId={user.id} students={students}
          prefill={typeof route === 'object' ? { student_id: route.studentId, class_date: route.date } : null}
          onBack={() => go('dashboard')}
          onDone={async scheduled => {
            setScheduledClasses(prev => upcomingScheduledClasses([scheduled, ...prev.filter(c => c.id !== scheduled.id)]));
            go('dashboard');
          }} />
      )}

      {route?.name === 'editScheduledClass' && (
        (() => {
          const scheduled = selectedScheduledClass || scheduledClasses.find(c => c.id === route.classId);
          return scheduled ? (
            <AddScheduledClassScreen
              coachId={user.id}
              students={students}
              existingClass={scheduled}
              onBack={() => go('dashboard')}
              onDone={updated => {
                setScheduledClasses(prev => upcomingScheduledClasses([updated, ...prev.filter(c => c.id !== updated.id)]));
                setSelectedScheduledClass(null);
                go('dashboard');
              }}
              onDeleted={deletedId => {
                setScheduledClasses(prev => prev.filter(c => c.id !== deletedId));
                setSelectedScheduledClass(null);
                go('dashboard');
              }} />
          ) : null;
        })()
      )}

      {route === 'addBonus' && (
        <AddBonusScreen coachId={user.id} students={students} onBack={() => go('dashboard')}
          onDone={bonus => {
            setBonuses(prev => [bonus, ...prev.filter(b => b.id !== bonus.id)]);
            go('dashboard');
          }} />
      )}

      {route?.name === 'editBonus' && (
        (() => {
          const bonus = selectedBonus || bonuses.find(b => b.id === route.bonusId);
          return bonus ? (
            <AddBonusScreen
              coachId={user.id}
              students={students}
              existingBonus={bonus}
              onBack={() => { setSelectedBonus(null); go('dashboard'); }}
              onDone={updated => {
                setBonuses(prev => [updated, ...prev.filter(b => b.id !== updated.id)]);
                setSelectedBonus(null);
                go('dashboard');
              }}
              onDeleted={deletedId => {
                setBonuses(prev => prev.filter(b => b.id !== deletedId));
                setSelectedBonus(null);
                go('dashboard');
              }} />
          ) : null;
        })()
      )}

      {route?.name === 'logClass' && (selectedStudent || groupStudents) && (
        <LogClassScreen students={groupStudents || [selectedStudent]} coachId={user.id}
          onBack={() => go(route.from === 'dashboard' || route.from === 'studentProfile' ? (route.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard') : 'pickStudent')}
          onSaved={async (offline, logs) => {
            const classStudents = groupStudents || [selectedStudent];
            const isGroup = classStudents.length > 1;
            setSavedOffline(offline);
            setSavedLog(logs[0]);
            for (const st of classStudents) {
              const activeBonus = bonuses.find(b =>
                b.student_id === st.id &&
                b.status !== 'exhausted' &&
                Number(b.remaining_classes || 0) > 0
              );
              if (activeBonus) {
                const savedBonus = await useClassBonus(user.id, activeBonus);
                setBonuses(prev => prev.map(b => b.id === savedBonus.id ? savedBonus : b));
              }
            }
            await refreshStudents(user.id);
            if (isGroup) { setGroupStudents(null); go('dashboard'); }
            else { go({ name: 'share', studentId: selectedStudent.id }); }
          }} />
      )}

      {route === 'manageStudents' && (
        <ManageStudentsScreen students={students} onBack={() => go('dashboard')}
          onEditStudent={s => { setSelectedStudent(s); go({ name: 'editStudent', studentId: s.id }); }} />
      )}

      {(route === 'editStudent' || route?.name === 'editStudent') && selectedStudent && (
        <EditStudentScreen student={selectedStudent}
          coachId={user.id}
          nextScheduled={sortScheduledClasses((scheduledClasses || []).filter(c => c.student_id === selectedStudent.id && isUpcomingClass(c)))[0] || null}
          onScheduledSync={() => refreshCoachOps(user.id)}
          onBack={() => {
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: selectedStudent.id });
            else go('dashboard');
          }}
          onSaved={updated => {
            setStudents(prev => prev.map(s => s.id === updated.id ? { ...s, ...updated } : s));
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: updated.id });
            else go('dashboard');
          }}
          onDeleted={id => {
            setStudents(prev => prev.filter(s => s.id !== id));
            setSelectedStudent(null);
            go('dashboard');
          }} />
      )}

      {(route === 'editLog' || route?.name === 'editLog') && selectedLog && selectedStudent && (
        <EditLogScreen log={selectedLog} student={selectedStudent}
          onBack={() => go(route?.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard')}
          onSaved={updated => {
            refreshStudents(user.id);
            go(route?.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard');
          }} />
      )}

      {route === 'editProfile' && (
        <EditProfileScreen user={user} profile={profile} onBack={() => go('dashboard')}
          onSaved={(prof, authUser) => { if (authUser) setUser(authUser); setProfile(prof); go('dashboard'); }}
          onDeleted={() => { setUser(null); setProfile(null); go('auth'); }} />
      )}

      {(route === 'share' || route?.name === 'share') && (
        <ShareScreen student={selectedStudent} savedOffline={savedOffline} savedLog={savedLog}
          onHome={() => { setSelectedStudent(null); setSavedOffline(false); setSavedLog(null); LS.set('lastRoute', null); go('dashboard'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  <!-- Service Worker registration (requires HTTP/HTTPS, not file://) -->
  <script>
  (function() {
    const APP_VERSION = '2026-06-25-optional-agenda-time';
    window.PADEL_LOG_APP_VERSION = APP_VERSION;
    console.log('Padel Log build:', APP_VERSION);

    async function checkDeployedVersion() {
      if (location.protocol === 'file:') return;
      try {
        const response = await fetch(`./version.json?ts=${Date.now()}`, {
          cache: 'no-store',
        });
        if (!response.ok) return;
        const data = await response.json();
        if (data.version && data.version !== APP_VERSION) {
          console.log('New Padel Log build found:', data.version);
          window.location.reload();
        }
      } catch (_) {}
    }

    checkDeployedVersion();
    window.addEventListener('focus', checkDeployedVersion);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) checkDeployedVersion();
    });
    setInterval(checkDeployedVersion, 5 * 60 * 1000);

    if (!('serviceWorker' in navigator) || location.protocol === 'file:') return;

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'APP_UPDATED' && event.data.version !== APP_VERSION) {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      }
    });

    function activateWaitingWorker(registration) {
      if (registration && registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    }

    window.addEventListener('load', async () => {
      try {
        const registration = await navigator.serviceWorker.register(`./sw.js?v=${APP_VERSION}`, {
          updateViaCache: 'none',
        });

        activateWaitingWorker(registration);

        registration.addEventListener('updatefound', () => {
          const worker = registration.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });

        registration.update().catch(() => {});
      } catch (e) {
        console.log('SW registration skipped:', e.message);
      }
    });
  })();
  </script>

<script>
  // Reset zoom when user finishes typing (blur or enter)
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    var base = 'width=device-width, initial-scale=1, viewport-fit=cover';
    document.addEventListener('focusout', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        vp.setAttribute('content', base + ', maximum-scale=1');
        requestAnimationFrame(function() {
          vp.setAttribute('content', base);
        });
      }
    });
  })();
</script>

  // iOS home-screen apps expose safe-area values through env().

    document.documentElement.classList.add('is-standalone');
