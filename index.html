  <!-- Supabase + React (production builds) + Babel -->
  <!-- Clear stale service worker caches from broken deployments -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!--
  ══════════════════════════════════════════════
   SQL — Run once in your Supabase SQL Editor
  ══════════════════════════════════════════════

  -- Update get_public_student to include coach profile:
  CREATE OR REPLACE FUNCTION public.get_public_student(public_student_id uuid)
  RETURNS jsonb LANGUAGE sql SECURITY DEFINER SET search_path = public AS $$
    SELECT CASE WHEN s.id IS NULL THEN NULL ELSE jsonb_build_object(
      'student',    to_jsonb(s),
      'class_logs', COALESCE((
        SELECT jsonb_agg(to_jsonb(cl) ORDER BY cl.date DESC, cl.created_at DESC)
        FROM public.class_logs cl WHERE cl.student_id = s.id
      ), '[]'::jsonb),
      'coach', (
        SELECT jsonb_build_object('display_name', p.display_name, 'club_name', p.club_name)
        FROM public.profiles p WHERE p.id = s.coach_id LIMIT 1
      )
    ) END
    FROM public.students s WHERE s.id = public_student_id LIMIT 1;
  $$;
  GRANT EXECUTE ON FUNCTION public.get_public_student(uuid) TO anon, authenticated;

  -- Referencia Visual: run once in Supabase SQL Editor
  ALTER TABLE public.class_logs
    ADD COLUMN IF NOT EXISTS media_url        TEXT,
    ADD COLUMN IF NOT EXISTS media_type       TEXT,
    ADD COLUMN IF NOT EXISTS visual_what      TEXT,
    ADD COLUMN IF NOT EXISTS visual_correction TEXT,
    ADD COLUMN IF NOT EXISTS visual_task      TEXT;

  -- Storage bucket: run once in Supabase SQL Editor
  INSERT INTO storage.buckets (id, name, public)
    VALUES ('class-media', 'class-media', true)
    ON CONFLICT (id) DO NOTHING;

  CREATE POLICY IF NOT EXISTS "Coaches can upload media"
    ON storage.objects FOR INSERT TO authenticated
    WITH CHECK (bucket_id = 'class-media');

  CREATE POLICY IF NOT EXISTS "Media is public"
    ON storage.objects FOR SELECT TO anon, authenticated
    USING (bucket_id = 'class-media');
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:     #0E2A1C;
      --green-mid:      #4F8F5F;
      --green-soft:     #E8F0EA;
      --bg:             #ECEEE9;
      --white:          #FFFFFF;
      --orange:         #D47A2F;
      --whatsapp:       #1AAD5E;
      --text-primary:   #0E1311;
      --text-secondary: #888888;
      --text-hint:      #AAAAAA;
      --blue-slate:     #3D6B8A;
      --border:         #E0E4E1;
      --top-safe-area:   0px;
      --header-bottom-gap: 12px;
      --header-height:   64px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
    }

    button, input, textarea, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; border: none; background: none; }
    input, textarea { outline: none; }

    /* ── Offline banner ── */
    .offline-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--orange);
      color: white;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 16px;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .offline-banner.show { transform: translateY(0); }

    /* ── Screen layout ── */
    .screen {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      max-width: 480px;
      margin: 0 auto;
    }

    .screen-content {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen-bottom {
      padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      min-height: var(--header-height);
      padding: var(--top-safe-area) 16px var(--header-bottom-gap);
      background: var(--green-dark);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .header-back {
      color: white;
      font-size: 1.4rem;
      line-height: 1;
      padding: 8px;
      margin-left: -8px;
      min-width: 44px;
      display: flex;
      align-items: center;
    }

    .header-title { flex: 1; text-align: center; font-weight: 600; font-size: 0.95rem; }
    .header-right { min-width: 44px; text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.65); }
    .header-spacer { min-width: 44px; }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 5px; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .logo-dot  { color: var(--green-mid); font-size: 0.55rem; line-height: 1; animation: pulse-dot 2.8s ease-in-out infinite; }
    .logo-text { font-size: 1rem; color: white; letter-spacing: -0.01em; }
    .logo-text strong { font-weight: 700; }

    /* ── Avatar ── */
    .avatar {
      background: var(--green-soft);
      color: var(--green-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Student card ── */
    .student-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      height: 64px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
      width: 100%;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .student-card:active { opacity: 0.85; }
    .student-card--hl { border-color: var(--green-dark); border-width: 2px; }

    .sc-info { flex: 1; min-width: 0; overflow: hidden; }
    .sc-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-sub  { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .sc-chev { color: var(--text-hint); font-size: 1.1rem; line-height: 1; flex-shrink: 0; }

    .student-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .chip:active { opacity: 0.8; }
    .chip-edit-wrap { display: inline-flex; align-items: center; gap: 4px; }
    .chip-edit-input {
      height: 36px; padding: 0 12px;
      border: 2px solid var(--green-dark); border-radius: 100px;
      font-size: 16px; font-weight: 500;
      background: var(--white); color: var(--text-primary);
      min-width: 80px; max-width: 160px; outline: none;
    }
    .chip-edit-ok {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--green-dark); color: white;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .chip--on { background: var(--green-dark); border-color: var(--green-dark); color: white; }

    .chip-group { display: flex; flex-direction: column; gap: 10px; }

    .chip-input-row { display: flex; gap: 8px; }
    .chip-input {
      flex: 1; height: 44px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; background: var(--white);
      color: var(--text-primary); font-size: 16px;
    }
    .chip-input:focus { border-color: var(--green-dark); }
    .chip-input-add {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--green-dark); color: white;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; height: 52px; border-radius: 14px;
      font-size: 0.95rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; transition: opacity 0.15s; border: none;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; pointer-events: none; }

    .btn-primary  { background: var(--green-dark); color: white; }
    .btn-outline  { background: var(--white); color: var(--text-primary); border: 1.5px solid var(--border); }
    .btn-whatsapp { background: var(--whatsapp); color: white; }
    .btn-link {
      background: none; border: none;
      color: var(--text-secondary); font-size: 0.9rem;
      text-align: center; width: 100%; padding: 12px; cursor: pointer;
    }

    /* ── Forms ── */
    .form-field { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; height: 52px;
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0 16px; background: var(--white);
      color: var(--text-primary); font-size: 16px;
    }
    .field-input:focus { border-color: var(--green-dark); }

    .error-msg {
      font-size: 0.84rem; color: #c0392b;
      padding: 10px 14px; background: #fdf0ef;
      border-radius: 8px; margin-bottom: 12px;
    }

    .screen-title    { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .screen-subtitle { font-size: 0.88rem; color: var(--text-secondary); }

    .section-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-secondary); margin-bottom: 12px;
    }

    /* ── Auth ── */
    .auth-screen {
      min-height: 100svh; background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 28px; max-width: 480px; margin: 0 auto;
    }
    .auth-logo { margin-bottom: 48px; }
    .auth-logo .logo-text { color: var(--text-primary); font-size: 1.5rem; }
    .auth-logo .logo-dot  { color: var(--green-mid); font-size: 0.9rem; }
    .auth-form { width: 100%; display: flex; flex-direction: column; }
    .auth-form .form-field { margin-bottom: 14px; }
    .auth-form .btn { margin-top: 6px; }
    .auth-toggle {
      text-align: center; margin-top: 16px;
      font-size: 0.88rem; color: var(--text-secondary);
    }
    .auth-toggle button {
      color: var(--green-dark); font-weight: 600;
      text-decoration: underline; font-size: 0.88rem;
    }
    .auth-forgot {
      text-align: right; margin-top: -4px; margin-bottom: 16px;
    }
    .auth-forgot button {
      font-size: 0.82rem; color: var(--text-secondary);
      text-decoration: none; background: none; border: none; cursor: pointer;
    }
    .auth-forgot button:hover { color: var(--green-dark); }
    .auth-success-box {
      width: 100%; background: #f0faf4; border: 1.5px solid var(--green-mid);
      border-radius: 16px; padding: 28px 24px; text-align: center;
    }

    /* ── Dashboard ── */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      min-height: var(--header-height); padding: var(--top-safe-area) 20px var(--header-bottom-gap);
      background: var(--green-dark); position: sticky; top: 0; z-index: 10; flex-shrink: 0;
      box-sizing: border-box;
    }
    .dash-avatar-wrap {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .dash-avatar-wrap .avatar {
      width: 36px !important; height: 36px !important;
      border-radius: 50% !important; background: white !important;
      color: var(--green-dark) !important; font-size: 0.8rem !important;
    }
    .dash-date     { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .dash-greeting { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }

    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .stat-card  { border-radius: 14px; padding: 20px 18px; }
    .stat-card--light { background: var(--white); color: var(--text-primary); }
    .stat-card--dark  { background: var(--green-dark); color: white; }
    .stat-num { font-size: 2.6rem; font-weight: 800; line-height: 1; color: inherit; -webkit-text-fill-color: inherit; }
    .stat-lbl { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 6px; }
    .stat-card--dark .stat-lbl { color: rgba(255,255,255,0.55); }

    .bottom-bar {
      display: flex; gap: 12px; padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg); border-top: 1px solid var(--border);
      position: sticky; bottom: 0; flex-shrink: 0;
    }
    .bottom-bar .btn { flex: 1; }

    /* ── Log Class ── */
    .log-content { padding-bottom: 24px; }

    .student-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--green-dark); color: white;
      border-radius: 100px; padding: 8px 14px 8px 10px;
      font-size: 0.88rem; font-weight: 600; margin-bottom: 28px;
    }
    .student-pill-sq {
      width: 20px; height: 20px; border-radius: 5px;
      background: var(--green-mid); flex-shrink: 0;
    }

    .log-section { margin-bottom: 28px; }
    .log-section-lbl {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-primary); margin-bottom: 12px;
    }
    .log-section-lbl--green  { color: var(--green-mid); }
    .log-section-lbl--orange { color: var(--orange); }

    .log-textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
      padding: 14px 16px; background: var(--white);
      color: var(--text-primary); font-size: 16px; resize: none; min-height: 80px;
    }
    .log-textarea:focus { border-color: var(--green-dark); }

    /* ── Share ── */
    .share-screen {
      background: var(--white); min-height: 100svh;
      max-width: 480px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .share-header {
      min-height: var(--header-height); padding-top: var(--top-safe-area); padding-bottom: var(--header-bottom-gap);
      display: flex; align-items: center; justify-content: center;
      background: var(--green-dark); flex-shrink: 0;
      box-sizing: border-box;
    }
    .share-header-txt { color: var(--green-mid); font-size: 0.92rem; font-weight: 600; }
    .share-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 56px 28px 40px; gap: 14px;
    }
    .share-check {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--green-soft); color: var(--green-mid);
      font-size: 1.8rem;
      display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
    }
    .share-title { font-size: 1.6rem; font-weight: 800; text-align: center; }
    .share-sub   { color: var(--text-secondary); font-size: 0.9rem; text-align: center; }
    .share-link-card { width: 100%; background: var(--bg); border-radius: 14px; padding: 16px 18px; margin: 4px 0; }
    .share-link-lbl  { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 6px; }
    .share-link-url  { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); word-break: break-all; }
    .share-link-note { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
    .share-offline-note {
      font-size: 0.8rem; color: var(--orange); text-align: center;
      padding: 8px 16px; background: #fff8f3; border-radius: 10px; width: 100%;
    }

    /* ── Public report ── */
    .pub-screen { min-height: 100svh; background: var(--bg); max-width: 480px; margin: 0 auto; }
    .pub-header { background: var(--green-dark); padding: 20px 20px 24px; }
    .pub-header .logo-dot { color: var(--green-mid) !important; }
    .pub-coach-block { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; margin-top: 14px; }
    .pub-coach-tag  { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; color: var(--green-mid); margin-bottom: 4px; }
    .pub-coach-name { font-size: 1rem; font-weight: 700; color: white; }
    .pub-coach-club { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .pub-body { padding: 24px 20px; }
    .pub-report-for { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .pub-student-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .pub-date { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 24px; }

    .pub-section { border-bottom: 1px solid var(--border); padding: 16px 0; }
    .pub-section:first-of-type { border-top: 1px solid var(--border); }

    .pub-sec-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot--green  { background: var(--green-mid); }
    .dot--orange { background: var(--orange); }
    .dot--dark   { background: var(--text-primary); }

    .pub-sec-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; }
    .pub-sec-title--green  { color: var(--green-mid); }
    .pub-sec-title--orange { color: var(--orange); }
    .pub-sec-body { font-size: 0.95rem; color: var(--text-primary); line-height: 1.55; }

    .pub-hist-lbl { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); margin: 24px 0 12px; }

    .hist-list { display: flex; flex-direction: column; gap: 10px; }
    .hist-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .hist-card-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .hist-card-body {
      margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .hist-field-lbl {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 3px;
    }
    .hist-field-lbl--worked  { color: var(--green-dark); }
    .hist-field-lbl--improved { color: var(--green-mid); }
    .hist-field-lbl--correct { color: var(--orange); }
    .hist-field-lbl--tarea   { color: var(--blue-slate); }
    .hist-field-lbl--visual  { color: var(--green-mid); }
    .hist-field-val {
      font-size: 0.88rem; color: var(--text-primary); line-height: 1.5;
    }
    .hist-ver-mas {
      background: none; border: none; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; color: var(--green-mid);
      padding: 0; margin-top: 10px; display: flex; align-items: center; gap: 4px;
    }
    .hist-media { width: 100%; border-radius: 10px; margin-top: 6px; max-height: 240px; object-fit: cover; }
    .video-wrap { width: 100%; margin-top: 8px; background: #000; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 9/16; }
    .video-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }

    .video-player {
      position: relative; width: 100%; aspect-ratio: 9 / 16;

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Supabase ─────────────────────────────────────────────────
const SUPABASE_URL      = 'https://svviqpjdorxiyywnblxt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HSl0bc6L62gGl5egjtVfRg_6DfhA35X';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── LocalStorage cache + offline queue ───────────────────────
const LS = {
  _k: k => 'pl:' + k,
  get(k)    { try { return JSON.parse(localStorage.getItem(this._k(k))); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) { console.warn('LS write:', e); } },
  queue: {
    get()    { return LS.get('q') || []; },
    push(op) { LS.set('q', [...LS.queue.get(), { ...op, _ts: Date.now() }]); },
    set(q)   { LS.set('q', q); },
  },
};

const SAVED_EMAIL_KEY = 'saved_email';
const normalizeEmail = email => (email || '').trim().toLowerCase();
function getSavedCoachEmail() {
  return normalizeEmail(localStorage.getItem(SAVED_EMAIL_KEY) || '');
}
function saveCoachEmail(email) {
  const value = normalizeEmail(email);
  if (value) localStorage.setItem(SAVED_EMAIL_KEY, value);
  return value;
}
function clearLocalStorageKeepingCoachEmail() {
  const savedEmail = getSavedCoachEmail();
  localStorage.clear();
  if (savedEmail) saveCoachEmail(savedEmail);
}

// Attempt to push any queued offline writes to Supabase
async function flushQueue(uid) {
  if (!navigator.onLine) return;
  const q = LS.queue.get();
  if (!q.length) return;
  const failed = [];
  for (const op of q) {
    try {
      if (op.type === 'student') {
        const { data } = await sb.from('students').insert(op.data).select().single();
        if (data) {
          // replace the tmp entry in cache with the real one
          const studs = (LS.get(`s:${uid}`) || []).map(s => s._tmp === op._ts ? data : s);
          LS.set(`s:${uid}`, studs);
        }
      } else if (op.type === 'log') {
        const { data } = await sb.from('class_logs').insert(op.data).select().single();
        if (data) {
          const logs = (LS.get(`l:${uid}`) || []).map(l => l._tmp === op._ts ? data : l);
          LS.set(`l:${uid}`, logs);
        }
      }
    } catch (e) { failed.push(op); }
  }
  LS.queue.set(failed);
}

// ── Helpers ──────────────────────────────────────────────────
const initials = name =>
  (name || '?').trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');

const todayISO = () => new Date().toISOString().split('T')[0];

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  return `hace ${diff} días`;
}

function formatDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatFullDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]}`;
}

function shortDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

const fromArr = arr => arr.join(', ');
const toArr = str => {
  if (!str) return [];
  if (Array.isArray(str)) return str;
  return str.split(',').map(s => s.trim()).filter(Boolean);
};

// ── Data access (network → localStorage fallback) ─────────────
async function fetchProfile(uid) {
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', uid).single();
    if (!error && data) { LS.set(`p:${uid}`, data); return data; }
  } catch(e) {}
  return LS.get(`p:${uid}`);
}

async function fetchStudentsAndLogs(uid) {
  try {
    const [sr, lr] = await Promise.all([
      sb.from('students').select('*').eq('coach_id', uid).is('deleted_at', null).order('name'),
      sb.from('class_logs').select('*').eq('coach_id', uid).is('deleted_at', null).order('date', { ascending: false }),
    ]);
    if (!sr.error && sr.data) LS.set(`s:${uid}`, sr.data);
    if (!lr.error && lr.data) LS.set(`l:${uid}`, lr.data);
    return {
      studs: sr.data  || LS.get(`s:${uid}`) || [],
      logs:  lr.data  || LS.get(`l:${uid}`) || [],
    };
  } catch(e) {}
  return { studs: LS.get(`s:${uid}`) || [], logs: LS.get(`l:${uid}`) || [] };
}

async function insertStudent({ coachId, name, level }) {
  const payload = { coach_id: coachId, name, level: level || null };
  try {
    const { data, error } = await sb.from('students').insert(payload).select().single();
    if (!error && data) {
      const studs = [...(LS.get(`s:${coachId}`) || []), data]
        .sort((a, b) => a.name.localeCompare(b.name));
      LS.set(`s:${coachId}`, studs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const studs = [...(LS.get(`s:${coachId}`) || []), tmp]
    .sort((a, b) => a.name.localeCompare(b.name));
  LS.set(`s:${coachId}`, studs);
  LS.queue.push({ type: 'student', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

async function insertLog(payload) {
  const { coach_id } = payload;
  try {
    const { data, error } = await sb.from('class_logs').insert(payload).select().single();
    if (!error && data) {
      const logs = [data, ...(LS.get(`l:${coach_id}`) || [])];
      LS.set(`l:${coach_id}`, logs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const logs = [tmp, ...(LS.get(`l:${coach_id}`) || [])];
  LS.set(`l:${coach_id}`, logs);
  LS.queue.push({ type: 'log', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

// ── Linkify ──────────────────────────────────────────────────
function linkify(text) {
  if (!text || typeof text !== 'string') return text;
  const parts = text.split(/(https?:\/\/[^\s]+)/);
  // split with a capturing group: even indices = plain text, odd indices = URLs
  return parts.map((part, i) =>
    i % 2 === 1
      ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" style={{
          color:'var(--green-mid)', textDecoration:'underline', wordBreak:'break-all'
        }}>{part}</a>
      : part
  );
}

// ── Media upload ─────────────────────────────────────────────
async function uploadMedia(file, coachId, studentId) {
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${coachId}/${studentId}/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from('class-media').upload(path, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  const { data: { publicUrl } } = sb.storage.from('class-media').getPublicUrl(path);
  return publicUrl;
}

// ── VisualReferenceSection ────────────────────────────────────
function VisualReferenceSection({ coachId, studentId, mediaUrl, mediaType, localPreview, uploading, uploadError,
  visualWhat,
  onMediaChange, onFieldChange }) {

  const fileRef = useRef();
  const hasMedia = localPreview || mediaUrl;

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const isVideo = file.type.startsWith('video');
    const maxMB = isVideo ? 80 : 15;
    if (file.size > maxMB * 1024 * 1024) {
      onMediaChange({ uploadError: `El archivo supera el límite de ${maxMB} MB.` });
      return;
    }
    const preview = URL.createObjectURL(file);
    const type = isVideo ? 'video' : 'image';
    onMediaChange({ localPreview: preview, mediaType: type, uploading: true, uploadError: null, mediaUrl: null });
    try {
      const url = await uploadMedia(file, coachId, studentId);
      onMediaChange({ localPreview: preview, mediaType: type, uploading: false, mediaUrl: url, uploadError: null });
    } catch(err) {
      onMediaChange({ localPreview: null, mediaType: null, uploading: false, mediaUrl: null, uploadError: 'Error al subir. Intenta de nuevo.' });
    }
  }

  function removeMedia() {
    onMediaChange({ localPreview: null, mediaType: null, uploading: false, mediaUrl: null, uploadError: null });
    if (fileRef.current) fileRef.current.value = '';
  }

  return (
    <div className="log-section">
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
        <div className="log-section-lbl" style={{marginBottom:0}}>
          REFERENCIA VISUAL
          {mediaUrl && !uploading && <span style={{color:'var(--green-mid)', marginLeft:6}}>✓</span>}
        </div>
        <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
      </div>

      {/* Upload area */}
      {!hasMedia && (
        <button
          onClick={() => fileRef.current?.click()}
          style={{
            width:'100%', height:80, borderRadius:14,
            border:'1.5px dashed var(--border)', background:'var(--white)',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:6, cursor:'pointer', color:'var(--text-secondary)'
          }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
            <circle cx="12" cy="13" r="3"/>
          </svg>
          <span style={{fontSize:'0.82rem', fontWeight:500}}>Subir foto o video</span>
        </button>
      )}

      {/* Preview */}
      {hasMedia && (
        <div style={{position:'relative', borderRadius:14, overflow:'hidden', background:'#000', marginBottom:12}}>
          {mediaType === 'video'
            ? <video src={localPreview || mediaUrl} controls playsInline preload="metadata" style={{width:'100%', maxHeight:220, display:'block'}} />
            : <img src={localPreview || mediaUrl} alt="Referencia visual" style={{width:'100%', maxHeight:220, objectFit:'cover', display:'block'}} />
          }
          {uploading && (
            <div style={{
              position:'absolute', inset:0, background:'rgba(0,0,0,0.5)',
              display:'flex', alignItems:'center', justifyContent:'center',
              flexDirection:'column', gap:8
            }}>
              <div style={{
                width:32, height:32, border:'3px solid rgba(255,255,255,0.3)',
                borderTopColor:'white', borderRadius:'50%',
                animation:'spin 0.8s linear infinite'
              }} />
              <span style={{color:'white', fontSize:'0.8rem', fontWeight:600}}>Subiendo…</span>
            </div>
          )}
          {!uploading && (
            <button onClick={removeMedia} style={{
              position:'absolute', top:8, right:8,
              width:28, height:28, borderRadius:'50%',
              background:'rgba(0,0,0,0.55)', color:'white',
              border:'none', cursor:'pointer', fontSize:'0.85rem',
              display:'flex', alignItems:'center', justifyContent:'center'
            }}>✕</button>
          )}
        </div>
      )}

      {uploadError && <div className="error-msg" style={{marginBottom:10}}>{uploadError}</div>}

      <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:'none'}} onChange={handleFile} />

      {/* Single note field */}
      <div style={{marginTop: hasMedia ? 0 : 10}}>
        <div style={{fontSize:'0.65rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--text-secondary)', marginBottom:5}}>
          NOTA PARA EL ALUMNO
        </div>
        <input
          className="field-input"
          style={{height:44, fontSize:'16px'}}
          value={visualWhat}
          onChange={e => onFieldChange('visualWhat', e.target.value)}
          placeholder="ej: Fíjate en la posición del codo al impactar"
        />
      </div>
    </div>
  );
}

function Logo() {

// ── Avatar ───────────────────────────────────────────────────
function Avatar({ name, size = 44 }) {

// ── StudentCard ──────────────────────────────────────────────
function StudentCard({ student, lastLog, onClick, highlighted }) {
  const focusParts = lastLog ? toArr(lastLog.today_focus) : [];
  const parts = [
    student.level,
    focusParts[0] || null,
    lastLog ? relativeDate(lastLog.date) : 'Sin clases aún',
  ].filter(Boolean);

  return (
    <button className={`student-card${highlighted ? ' student-card--hl' : ''}`} onClick={onClick}>
      <Avatar name={student.name} size={44} />
      <div className="sc-info">
        <div className="sc-name">{student.name}</div>
        <div className="sc-sub">{parts.join(' · ')}</div>
      </div>
      <span className="sc-chev">›</span>
    </button>
  );
}

// ── Chip ─────────────────────────────────────────────────────
function Chip({ label, on, onClick, onLongPress }) {
  const timerRef = useRef(null);
  const longPressRef = useRef(false);

  function startPress(e) {
    if (!onLongPress) return;
    e.preventDefault();
    longPressRef.current = false;
    timerRef.current = setTimeout(() => {
      longPressRef.current = true;
      onLongPress();
      timerRef.current = null;
    }, 500);
  }
  function cancelPress() {
    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
  }
  function handleClick(e) {
    if (longPressRef.current) {
      e.preventDefault();
      longPressRef.current = false;
      return;
    }
    onClick(e);
  }

  return (
    <button
      className={`chip${on ? ' chip--on' : ''}`}
      onClick={handleClick}
      onTouchStart={startPress}
      onTouchEnd={e => { cancelPress(); }}
      onTouchMove={cancelPress}
      onMouseDown={startPress}
      onMouseUp={cancelPress}
      onMouseLeave={cancelPress}
      onContextMenu={e => { e.preventDefault(); onLongPress && onLongPress(); }}
    >
      {on && label !== '+ Otro' && label !== '+ Escribir' ? `${label} ✓` : label}
    </button>
  );
}

// ── ChipGroup ────────────────────────────────────────────────
function ChipGroup({ chips, addLabel, values, onChange, onNewChip, onEditChip, onDeleteChip }) {
  const [showInput, setShowInput]   = useState(false);
  const [inputVal, setInputVal]     = useState('');
  const [editing, setEditing]       = useState(null);
  const [localChips, setLocalChips] = useState(() => chips);
  const inputRef = useRef();
  const editRef  = useRef();

  useEffect(() => {
    setLocalChips(chips);
  }, [chips.join('\u0001')]);

  function toggle(chip) {
    onChange(values.includes(chip) ? values.filter(v => v !== chip) : [...values, chip]);
  }

  function addCustom() {
    const v = inputVal.trim();
    if (v) {
      if (!values.includes(v)) onChange([...values, v]);
      if (!localChips.includes(v)) setLocalChips(prev => [...prev, v]);
      if (onNewChip) onNewChip(v);
    }
    setInputVal(''); setShowInput(false);
  }

  function startEdit(chip) {
    setEditing({ original: chip, value: chip });
    setTimeout(() => editRef.current?.focus(), 50);
  }

  function confirmEdit() {
    if (!editing) return;
    const newVal = editing.value.trim();
    const oldVal = editing.original;
    if (!newVal) {
      if (values.includes(oldVal)) {
        onChange(values.filter(v => v !== oldVal));
      }
      setLocalChips(prev => prev.filter(c => c !== oldVal));
      if (onDeleteChip) onDeleteChip(oldVal);
      setEditing(null);
      return;
    }
    if (newVal !== oldVal) {
      if (values.includes(oldVal)) {
        onChange(values.map(v => v === oldVal ? newVal : v));
      }
      setLocalChips(prev => [...new Set(prev.map(c => c === oldVal ? newVal : c))]);
      if (onEditChip) onEditChip(oldVal, newVal);
    }
    setEditing(null);
  }

  function cancelEdit() { setEditing(null); }

  const customValues = values.filter(v => !localChips.includes(v));

  function renderChip(c) {
    if (editing && editing.original === c) {
      return (
        <span key={c} className="chip-edit-wrap">
          <input
            ref={editRef}
            className="chip-edit-input"
            value={editing.value}
            onChange={e => setEditing(ed => ({ ...ed, value: e.target.value }))}
            onKeyDown={e => { if (e.key === 'Enter') confirmEdit(); if (e.key === 'Escape') cancelEdit(); }}
            onBlur={confirmEdit}
          />
          <button className="chip-edit-ok" onMouseDown={e => { e.preventDefault(); confirmEdit(); }}>✓</button>
        </span>
      );
    }
    return (
      <Chip key={c} label={c} on={values.includes(c)}
        onClick={() => toggle(c)}
        onLongPress={() => startEdit(c)}
      />
    );
  }

  return (
    <div className="chip-group">
      <div className="chips">
        {localChips.map(c => renderChip(c))}
        {addLabel && (
          <Chip label={addLabel} on={showInput} onClick={() => {
            setShowInput(s => !s);
            if (!showInput) setTimeout(() => inputRef.current?.focus(), 50);
          }} />
        )}
      </div>
      {showInput && (
        <form className="chip-input-row" onSubmit={e => { e.preventDefault(); addCustom(); }}>
          <input ref={inputRef} className="chip-input" value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            placeholder="Escribe aquí..."
            onKeyDown={e => e.key === 'Enter' && addCustom()} />
          <button type="submit" className="chip-input-add">✓</button>
        </form>
      )}
      {customValues.length > 0 && (
        <div className="chips">
          {customValues.map(v => renderChip(v))}
        </div>
      )}
    </div>
  );
}

// ── Error translator ─────────────────────────────────────────
function translateError(msg) {
  if (!msg) return msg;
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials') || m.includes('invalid credentials'))
    return 'Email o contraseña incorrectos.';
  if (m.includes('email not confirmed'))
    return 'Debes confirmar tu email antes de iniciar sesión. Revisa tu bandeja de entrada.';
  if (m.includes('user already registered') || m.includes('already been registered'))
    return 'Este email ya tiene una cuenta. Inicia sesión.';
  if (m.includes('error sending confirmation email') || m.includes('sending confirmation'))
    return 'No se pudo enviar el email de confirmación. Intenta de nuevo en unos minutos.';
  if (m.includes('password should be at least'))
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('unable to validate email address'))
    return 'El email no es válido.';
  if (m.includes('email rate limit exceeded') || m.includes('rate limit'))
    return 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
  if (m.includes('network') || m.includes('fetch'))
    return 'Error de conexión. Verifica tu internet e intenta de nuevo.';
  return msg;
}

// ── S1 Auth ──────────────────────────────────────────────────
function AuthScreen() {
  const [isSignup, setIsSignup]       = useState(false);
  const [email, setEmail]             = useState(() => getSavedCoachEmail());
  const [password, setPassword]       = useState('');
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState('');
  const [signupDone, setSignupDone]   = useState(false);
  const [forgotMode, setForgotMode]   = useState(false);
  const [resetSent, setResetSent]     = useState(false);

  function handleEmailChange(val) {
    setEmail(val);
    saveCoachEmail(val);
  }

  async function submit() {
    if (!email.trim() || !password) return;
    setLoading(true); setError('');
    try {
      const fn = isSignup
        ? sb.auth.signUp({ email: email.trim(), password })
        : sb.auth.signInWithPassword({ email: email.trim(), password });
      const { error } = await fn;
      if (error) throw error;
      saveCoachEmail(email);
      if (isSignup) setSignupDone(true);
    } catch (e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  async function sendReset() {
    if (!email.trim()) { setError('Ingresá tu email primero.'); return; }
    saveCoachEmail(email);
    setLoading(true); setError('');
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
        redirectTo: location.origin + location.pathname
      });
      if (error) throw error;
      setResetSent(true);
    } catch(e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  // ── Signup success ───────────────────────────────────────────
  if (signupDone) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>¡Cuenta creada!</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Te enviamos un email a <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Verifica tu correo para activar tu cuenta e iniciar sesión.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        ¿Ya verificaste?{' '}
        <button onClick={() => { setSignupDone(false); setIsSignup(false); setPassword(''); }}>Iniciar sesión</button>
      </div>
    </div>
  );

  // ── Reset password success ───────────────────────────────────
  if (resetSent) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>Email enviado</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Revisá tu bandeja de entrada en <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Tocá el enlace del email para restablecer tu contraseña.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        <button onClick={() => { setResetSent(false); setForgotMode(false); setError(''); }}>
          ← Volver al inicio de sesión
        </button>
      </div>
    </div>
  );

  // ── Forgot password ──────────────────────────────────────────
  if (forgotMode) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        <div style={{marginBottom:24}}>
          <div style={{fontWeight:700, fontSize:'1.1rem', color:'var(--text-primary)', marginBottom:6}}>
            Restablecer contraseña
          </div>
          <div style={{fontSize:'0.88rem', color:'var(--text-secondary)', lineHeight:1.5}}>
            Te enviaremos un enlace a tu email para crear una nueva contraseña.
          </div>
        </div>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" value={email}
            onChange={e => handleEmailChange(e.target.value)}
            placeholder="tu@email.com"
            onKeyDown={e => e.key === 'Enter' && sendReset()} />
        </div>
        <button className="btn btn-primary" onClick={sendReset} disabled={loading || !email.trim()}>
          {loading ? 'Enviando...' : 'Enviar enlace'}
        </button>
        <div className="auth-toggle">
          <button onClick={() => { setForgotMode(false); setError(''); }}>← Volver al inicio de sesión</button>
        </div>
      </div>
    </div>
  );

  // ── Login / Signup ───────────────────────────────────────────
  return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" value={email}
            onChange={e => handleEmailChange(e.target.value)}
            placeholder="tu@email.com"
            autoComplete="email" />
        </div>
        <div className="form-field">
          <label className="field-label">Contraseña</label>
          <input className="field-input" type="password" value={password}
            onChange={e => setPassword(e.target.value)} placeholder="••••••••"
            autoComplete={isSignup ? 'new-password' : 'current-password'}
            onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        {!isSignup && (
          <div className="auth-forgot">
            <button onClick={() => { setForgotMode(true); setError(''); }}>
              ¿Olvidaste tu contraseña?
            </button>
          </div>
        )}
        <button className="btn btn-primary" onClick={submit}
          disabled={loading || !email || !password}>
          {loading ? 'Cargando...' : (isSignup ? 'Crear cuenta' : 'Iniciar sesión')}
        </button>
        <div className="auth-toggle">
          {isSignup ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?'}{' '}
          <button onClick={() => { setIsSignup(s => !s); setError(''); setPassword(''); }}>
            {isSignup ? 'Iniciar sesión' : 'Crear una cuenta nueva'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── S2 Onboarding ────────────────────────────────────────────
function OnboardingScreen({ user, onDone }) {
  const [displayName, setDisplayName] = useState('');
  const [clubName, setClubName]       = useState('');
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState('');

  async function save() {
    if (!displayName.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');

    // Refresh session so the JWT is current when Supabase evaluates RLS
    let uid = user?.id;
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) uid = session.user.id;
    } catch(_) {}
    if (!uid) { setError('Sesión expirada. Por favor inicia sesión de nuevo.'); setLoading(false); return; }

    const prof = { display_name: displayName.trim(), club_name: clubName.trim() || null };
    try {
      const { error } = await sb.from('profiles').upsert({ id: uid, ...prof });
      if (error) throw error;
    } catch(e) { setError(e.message); setLoading(false); return; }
    LS.set(`p:${uid}`, { id: uid, ...prof });
    onDone(prof);
  }

  return (
    <div className="screen">
      <Header title="Mi perfil" />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Cuéntanos sobre ti</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>Solo tarda un momento.</p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Nombre del coach</label>
          <input className="field-input" value={displayName}
            onChange={e => setDisplayName(e.target.value)} placeholder="Coach Diego" />
        </div>
        <div className="form-field">
          <label className="field-label">
            Club o academia{' '}
            <span style={{color:'var(--text-hint)',fontWeight:400,textTransform:'none',letterSpacing:0}}>· opcional</span>
          </label>
          <input className="field-input" value={clubName}
            onChange={e => setClubName(e.target.value)} placeholder="Padel Arena BCN" />
        </div>
      </div>
      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save}
          disabled={loading || !displayName.trim()}>
          {loading ? 'Guardando...' : 'Guardar y continuar'}
        </button>
      </div>
    </div>
  );
}

}

const DEFAULT_FOCUS    = ['Revés','Volea','Bandeja','Globo','Pared','Smash','Saque','Posicionamiento'];
const DEFAULT_IMPROVED = ['Volea','Reacción','Confianza','Consistencia','Técnica','Actitud','Potencia','Puntería','Juego en red'];
const DEFAULT_HOMEWORK = ['Practicar bandeja','Ver video','Ejercicio físico','Practicar saque','Ver partido','Fortalecer muñeca'];

const chipCustomKey = (coachId, category) => `coach_chips:${category}:${coachId}`;
const chipDeletedKey = (coachId, category) => `coach_chips_deleted:${category}:${coachId}`;
const normalizeChips = chips => [...new Set((chips || []).map(c => (c || '').trim()).filter(Boolean))];

function getCoachChips(coachId, category, defaults) {
  const custom = normalizeChips(LS.get(chipCustomKey(coachId, category)) || []);
  const deleted = new Set(normalizeChips(LS.get(chipDeletedKey(coachId, category)) || []));
  return [...new Set([...defaults.filter(chip => !deleted.has(chip)), ...custom])];
}
function saveCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []);
  if (!existing.includes(value)) LS.set(customKey, [...existing, value]);
  LS.set(deletedKey, normalizeChips(LS.get(deletedKey) || []).filter(c => c !== value));
}
function editCoachChip(coachId, category, oldChip, newChip) {
  const oldVal = (oldChip || '').trim();
  const newVal = (newChip || '').trim();
  if (!oldVal) return;
  if (!newVal) { deleteCoachChip(coachId, category, oldVal); return; }
  if (oldVal === newVal) return;

  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []).filter(c => c !== oldVal);
  LS.set(customKey, normalizeChips([...existing, newVal]));

  const deleted = normalizeChips(LS.get(deletedKey) || []).filter(c => c !== newVal);
  LS.set(deletedKey, normalizeChips([...deleted, oldVal]));
}
function deleteCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  LS.set(customKey, normalizeChips(LS.get(customKey) || []).filter(c => c !== value));
  LS.set(deletedKey, normalizeChips([...(LS.get(deletedKey) || []), value]));
}

function LogClassScreen({ student, coachId, onBack, onSaved }) {
  const draftKey = `draft:${student.id}`;
  const draft    = LS.get(draftKey) || {};
  const last     = student.lastLog;

  // If no draft, seed from last log as suggestions
  const seedFocus    = draft.focus    || (last ? toArr(last.today_focus)   : []);
  const seedImproved = draft.improved || (last ? toArr(last.what_improved) : []);
  const seedHomework = draft.homework || (last ? toArr(last.homework)      : []);
  const isSeeded     = !draft.focus && !!last;

  const [focus, setFocus]           = useState(seedFocus);
  const [improved, setImproved]     = useState(seedImproved);
  const [correction, setCorrection] = useState(draft.correction || '');
  const [homework, setHomework]     = useState(seedHomework);
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [seededBanner, setSeededBanner] = useState(isSeeded);

  // Visual reference state
  const [mediaUrl, setMediaUrl]           = useState('');
  const [mediaType, setMediaType]         = useState('');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat] = useState('');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat') setVisualWhat(val);
  }

  const date = todayISO();

  // Progress: count completed sections (1–5)
  const sectionsDone = [
    focus.length > 0,
    improved.length > 0,
    correction.trim().length > 0,
    homework.length > 0,
    !!mediaUrl || visualWhat.trim().length > 0,
  ].filter(Boolean).length;

  const progressPct = (sectionsDone / 5) * 100;
  const progressColor = sectionsDone < 2 ? 'var(--border)' : sectionsDone < 5 ? 'var(--green-mid)' : 'var(--green-dark)';

  // Save draft to localStorage on every change
  useEffect(() => {
    LS.set(draftKey, { focus, improved, correction, homework });
  }, [focus, improved, correction, homework]);

  async function save() {
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    const { data, offline } = await insertLog({
      student_id:        student.id,
      coach_id:          coachId,
      date,
      today_focus:       fromArr(focus),
      what_improved:     fromArr(improved),
      main_correction:   correction.trim() || null,
      homework:          fromArr(homework),
      media_url:         mediaUrl || null,
      media_type:        mediaType || null,
      visual_what:       visualWhat.trim() || null,
      visual_correction: null,
      visual_task:       null,
    });

    LS.set(draftKey, null);
    onSaved(offline);

  return (
    <div className="screen">

      {/* Progress bar */}
      <div style={{height:3, background:'var(--border)', flexShrink:0}}>
        <div style={{
          height:'100%', width:`${progressPct}%`,
          background: progressColor,
          transition:'width 0.3s ease, background 0.3s ease',
          borderRadius:'0 2px 2px 0'

      </div>

      <div className="screen-content log-content">

        {/* Student pill + progress label */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28}}>
          <div className="student-pill" style={{marginBottom:0}}>
            <div className="student-pill-sq" />
            {student.name}
          </div>
          <div style={{
            fontSize:'0.72rem', fontWeight:600, color: sectionsDone === 4 ? 'var(--green-mid)' : 'var(--text-hint)',
            letterSpacing:'0.04em'
          }}>
            {sectionsDone === 5 ? '✓ Completo' : `${sectionsDone}/5 secciones`}
          </div>
        </div>

        {/* Seeded from last session banner */}
        {seededBanner && (
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:'var(--green-soft)', borderRadius:10, padding:'8px 14px',
            marginBottom:20, gap:10
          }}>
            <span style={{fontSize:'0.78rem', color:'var(--green-dark)', fontWeight:500}}>
              💡 Preseleccionado desde la última clase
            </span>
            <button onClick={() => {
              setFocus([]); setImproved([]); setHomework([]); setSeededBanner(false);
            }} style={{
              fontSize:'0.72rem', fontWeight:700, color:'var(--green-dark)',
              background:'none', border:'none', cursor:'pointer', textDecoration:'underline',
              flexShrink:0
            }}>Limpiar</button>
          </div>
        )}

        <div className="log-section">
          <div className="log-section-lbl">
            ¿QUÉ TRABAJARON HOY?
            {focus.length > 0 && <span style={{color:'var(--green-mid)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={getCoachChips(coachId, 'focus', DEFAULT_FOCUS)}
            addLabel="+ Otro" values={focus} onChange={v => { setFocus(v); setSeededBanner(false); }}
            onNewChip={chip => saveCoachChip(coachId, 'focus', chip)}
            onEditChip={(old, nw) => editCoachChip(coachId, 'focus', old, nw)}

        </div>

        <div className="log-section">
          <div className="log-section-lbl log-section-lbl--green">
            LO QUE MEJORÓ
            {improved.length > 0 && <span style={{marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={getCoachChips(coachId, 'improved', DEFAULT_IMPROVED)}
            addLabel="+ Escribir" values={improved} onChange={v => { setImproved(v); setSeededBanner(false); }}
            onNewChip={chip => saveCoachChip(coachId, 'improved', chip)}
            onEditChip={(old, nw) => editCoachChip(coachId, 'improved', old, nw)}

        <div className="log-section">
          <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
            <div className="log-section-lbl log-section-lbl--orange" style={{marginBottom:0}}>
              QUÉ NECESITA CORREGIR
              {correction.trim() && <span style={{marginLeft:6}}>✓</span>}
            </div>
            <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
          </div>
          <textarea className="log-textarea" value={correction}
            onChange={e => setCorrection(e.target.value)}
            placeholder="ej: Mejorar el agarre en el revés, bajar más en la volea..." rows={3} />
        </div>

        <div className="log-section">
          <div className="log-section-lbl">
            TAREA PARA CASA
            {homework.length > 0 && <span style={{color:'var(--text-secondary)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={getCoachChips(coachId, 'homework', DEFAULT_HOMEWORK)}
            addLabel="+ Escribir" values={homework} onChange={v => { setHomework(v); setSeededBanner(false); }}
            onNewChip={chip => saveCoachChip(coachId, 'homework', chip)}
            onEditChip={(old, nw) => editCoachChip(coachId, 'homework', old, nw)}
            onDeleteChip={chip => deleteCoachChip(coachId, 'homework', chip)} />
        </div>

        <VisualReferenceSection
          coachId={coachId} studentId={student.id}
          mediaUrl={mediaUrl} mediaType={mediaType} localPreview={localPreview}
          uploading={mediaUploading} uploadError={uploadError}
          visualWhat={visualWhat}
          onMediaChange={handleMediaChange} onFieldChange={handleVisualField}
        />

        {error && <div className="error-msg">{error}</div>}
      </div>

      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || focus.length === 0 || mediaUploading}>
          {loading ? 'Guardando...' : mediaUploading ? 'Subiendo archivo…' : 'Guardar y compartir →'}
        </button>
        {focus.length === 0 && (
          <div style={{textAlign:'center', fontSize:'0.75rem', color:'var(--text-hint)', marginTop:8}}>
            Selecciona al menos qué trabajaron hoy
          </div>
        )}

    </div>
  );
}

async function downloadMedia(url, type) {
  const fileName = type === 'video' ? 'video-padel.mp4' : 'foto-padel.jpg';
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const file = new File([blob], fileName, { type: blob.type });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Padel Log' });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }
  } catch(e) {
    window.open(url, '_blank');
  }
}


// ── VideoPlayer ──────────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  const total = Math.floor(s);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const sec = String(total % 60).padStart(2, '0');
  return h ? `${h}:${String(m).padStart(2, '0')}:${sec}` : `${m}:${sec}`;
}

function VideoPlayer({ src, maxHeight = 300, loop = false }) {
  const videoRef      = useRef(null);
  const playerRef     = useRef(null);
  const tapTimer      = useRef(null);
  const lastTapSide   = useRef(null);
  const hideTimer     = useRef(null);
  const hintTimer     = useRef(null);
  const scrubbing     = useRef(false);
  const previewAttempted = useRef(false);

  const [playing, setPlaying]       = useState(false);
  const [controls, setControls]     = useState(true);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration]     = useState(0);
  const [ready, setReady]           = useState(false);
  const [waiting, setWaiting]       = useState(true);
  const [seekHint, setSeekHint]     = useState(null);
  const [error, setError]           = useState('');

  useEffect(() => {
    setPlaying(false);
    setControls(true);
    setCurrentTime(0);
    setDuration(0);
    setReady(false);
    setWaiting(true);
    setError('');
    previewAttempted.current = false;
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, [src]);

  useEffect(() => {
    clearTimeout(hideTimer.current);
    if (playing && controls) hideTimer.current = setTimeout(() => setControls(false), 2600);
    return () => clearTimeout(hideTimer.current);
  }, [playing, controls]);

  useEffect(() => () => {
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, []);

  function showControlsTemporarily() {
    setControls(true);
    clearTimeout(hideTimer.current);
    if (videoRef.current && !videoRef.current.paused) {
      hideTimer.current = setTimeout(() => setControls(false), 2600);
    }
  }

  function flashHint(side) {
    clearTimeout(hintTimer.current);
    setSeekHint(side);
    hintTimer.current = setTimeout(() => setSeekHint(null), 620);
  }

  function syncTime() {
    const v = videoRef.current;
    if (!v) return;
    setCurrentTime(v.currentTime || 0);
    if (isFinite(v.duration)) setDuration(v.duration || 0);
  }

  function markReady() {
    setReady(true);
    setWaiting(false);
    syncTime();
  }

  function preparePreviewFrame() {
    const v = videoRef.current;
    syncTime();
    if (!v) return;
    if (v.readyState >= 2) {
      markReady();
      return;
    }
    if (previewAttempted.current || !isFinite(v.duration) || v.duration <= 0) return;
    previewAttempted.current = true;
    try {
      v.currentTime = Math.min(0.05, Math.max(0, v.duration - 0.05));
    } catch (_) {}
  }

  function seek(delta) {
    const v = videoRef.current;
    if (!v) return;
    const max = isFinite(v.duration) ? v.duration : 0;
    v.currentTime = Math.max(0, Math.min(max, (v.currentTime || 0) + delta));
    syncTime();
    flashHint(delta > 0 ? 'right' : 'left');
    showControlsTemporarily();
  }

  function togglePlay(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const v = videoRef.current;
    if (!v || error) return;
    setControls(true);
    if (v.paused) {
      const playPromise = v.play();
      if (playPromise && playPromise.catch) playPromise.catch(() => setControls(true));
    } else {
      v.pause();
    }
  }

  function handleSurfaceTap(e) {
    if (e.target.closest('[data-video-control="true"]')) return;
    e.preventDefault();
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const side = x < rect.width / 2 ? 'left' : 'right';

    if (tapTimer.current && lastTapSide.current === side) {
      clearTimeout(tapTimer.current);
      tapTimer.current = null;
      seek(side === 'right' ? 5 : -5);
      return;
    }

    clearTimeout(tapTimer.current);
    lastTapSide.current = side;
    tapTimer.current = setTimeout(() => {
      tapTimer.current = null;
      togglePlay();
    }, 220);
  }

  function scrubTo(clientX) {
    const v = videoRef.current;
    if (!v || !duration) return;
    const rail = playerRef.current?.querySelector('.video-player__seek');
    if (!rail) return;
    const rect = rail.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    v.currentTime = ratio * duration;
    setCurrentTime(v.currentTime);
  }

  function handleScrubStart(e) {
    e.preventDefault();
    e.stopPropagation();
    scrubbing.current = true;
    e.currentTarget.setPointerCapture?.(e.pointerId);
    scrubTo(e.clientX);
    showControlsTemporarily();
  }

  function handleScrubMove(e) {
    if (!scrubbing.current) return;
    e.preventDefault();
    e.stopPropagation();
    scrubTo(e.clientX);
  }

  function handleScrubEnd(e) {
    e.preventDefault();
    e.stopPropagation();
    scrubbing.current = false;
    showControlsTemporarily();
  }

  function enterFullscreen(e) {
    e.preventDefault();
    e.stopPropagation();
    const v = videoRef.current;
    const root = playerRef.current;
    showControlsTemporarily();
    if (v && v.webkitEnterFullscreen) {
      v.webkitEnterFullscreen();
      return;
    }
    const target = root || v;
    if (target?.requestFullscreen) target.requestFullscreen().catch?.(() => {});
    else if (target?.webkitRequestFullscreen) target.webkitRequestFullscreen();
  }

  const pct = duration ? Math.max(0, Math.min(100, (currentTime / duration) * 100)) : 0;
  const loading = !ready || waiting;
  const playerClass = `video-player${controls || !playing ? ' video-player--controls' : ''}${loading ? ' video-player--loading' : ''}${ready ? ' video-player--ready' : ''}`;

  return (
    <div
      ref={playerRef}
      className={playerClass}
      style={{'--video-max-height': `${maxHeight}px`}}
      onContextMenu={e => e.preventDefault()}
    >
      <video
        ref={videoRef}
        className="video-player__video"
        src={src}
        playsInline
        webkit-playsinline="true"
        loop={loop}
        preload="auto"
        controls={false}
        controlsList="nodownload noplaybackrate"
        disablePictureInPicture
        onPlay={() => { setPlaying(true); setWaiting(false); }}
        onPause={() => { setPlaying(false); setControls(true); }}
        onEnded={() => { setPlaying(false); setControls(true); }}
        onTimeUpdate={syncTime}
        onLoadedMetadata={preparePreviewFrame}
        onLoadedData={markReady}
        onCanPlay={markReady}
        onSeeked={markReady}
        onWaiting={() => setWaiting(true)}
        onPlaying={() => { setWaiting(false); setPlaying(true); }}
        onError={() => { setError('No se pudo cargar el video. Intenta abrirlo de nuevo.'); setWaiting(false); }}
      />

      <div className={`video-player__poster${ready ? ' is-hidden' : ''}`} />
      <div className={`video-player__loading${loading ? ' is-visible' : ''}`} />
      <div className="video-player__tap-surface" onClick={handleSurfaceTap} />
      <div className="video-player__shade" />

      <div className="video-player__controls">
        <div className="video-player__topbar">
          <button
            type="button"
            className="video-player__btn video-player__btn--fullscreen"
            data-video-control="true"
            aria-label="Pantalla completa"
            onClick={enterFullscreen}
            onTouchStart={e => e.stopPropagation()}
          >
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
            </svg>
          </button>
        </div>

        <div className="video-player__center">
          <button
            type="button"
            className="video-player__btn video-player__btn--skip"
            data-video-control="true"
            aria-label="Retroceder 5 segundos"
            onClick={e => { e.preventDefault(); e.stopPropagation(); seek(-5); }}
            onTouchStart={e => e.stopPropagation()}
          >
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 .5-4.5"/>
            </svg>
            <span>5s</span>
          </button>
          <button
            type="button"
            className="video-player__btn video-player__btn--play"
            data-video-control="true"
            aria-label={playing ? 'Pausar video' : 'Reproducir video'}
            onClick={togglePlay}
            onTouchStart={e => e.stopPropagation()}
          >
            {playing
              ? <svg width="25" height="25" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4.5" height="16" rx="1"/><rect x="13.5" y="4" width="4.5" height="16" rx="1"/></svg>
              : <svg width="26" height="26" viewBox="0 0 24 24" fill="white" style={{marginLeft:3}}><polygon points="6,4 20,12 6,20"/></svg>
            }
          </button>
          <button
            type="button"
            className="video-player__btn video-player__btn--skip"
            data-video-control="true"
            aria-label="Adelantar 5 segundos"
            onClick={e => { e.preventDefault(); e.stopPropagation(); seek(5); }}
            onTouchStart={e => e.stopPropagation()}
          >
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-.5-4.5"/>
            </svg>
            <span>5s</span>
          </button>
        </div>

        <div className="video-player__bottom" data-video-control="true" onClick={e => e.stopPropagation()}>
          <div className="video-player__time">
            <span>{fmtTime(currentTime)}</span>
            <span>{fmtTime(duration)}</span>
          </div>
          <div
            className="video-player__seek"
            role="slider"
            aria-valuemin="0"
            aria-valuemax={Math.floor(duration || 0)}
            aria-valuenow={Math.floor(currentTime || 0)}
            onPointerDown={handleScrubStart}
            onPointerMove={handleScrubMove}
            onPointerUp={handleScrubEnd}
            onPointerCancel={handleScrubEnd}
          >
            <div className="video-player__seek-track">
              <div className="video-player__seek-fill" style={{width:`${pct}%`}} />
            </div>
            <div className="video-player__seek-thumb" style={{left:`${pct}%`}} />
          </div>
        </div>
      </div>

      {seekHint === 'left' && <div className="video-player__hint video-player__hint--left">-5s</div>}
      {seekHint === 'right' && <div className="video-player__hint video-player__hint--right">+5s</div>}
      {error && <div className="video-player__error">{error}</div>}
    </div>
  );
}

function HistCard({ log }) {

  return (
    <div className="hist-card">
      <div className="hist-card-header">
        <div>
          <div className="hist-date">{shortDateEs(log.date)}</div>
          <div className="hist-title">{fArr.join(' y ') || 'Clase'}</div>
        </div>
        {fArr[0] && <div className="hist-tag">✓ {fArr[0]}</div>}
      </div>
      {hasExtra && (
        <button className="hist-ver-mas" onClick={() => setExpanded(e => !e)}>
          {expanded

function EditProfileScreen({ user, profile, onBack, onSaved, onDeleted }) {
  const [displayName, setDisplayName] = useState(profile?.display_name || '');
  const [clubName, setClubName]       = useState(profile?.club_name || '');
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState('');
  const [saved, setSaved]             = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting]           = useState(false);

  async function save() {
    if (!displayName.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    const prof = { display_name: displayName.trim(), club_name: clubName.trim() || null };
    try {
      const { error } = await sb.from('profiles').upsert({ id: user.id, ...prof });
      if (error) throw error;
    } catch(e) { setError(e.message); setLoading(false); return; }
    LS.set(`p:${user.id}`, { id: user.id, ...prof });
    setSaved(true);
    setTimeout(() => { onSaved(prof); }, 800);
  }

  async function deleteAccount() {
    setDeleting(true); setError('');
    try {
      // Delete class logs, students, profile then user
      await sb.from('class_logs').delete().eq('coach_id', user.id);
      await sb.from('students').delete().eq('coach_id', user.id);
      await sb.from('profiles').delete().eq('id', user.id);
      await sb.auth.admin?.deleteUser(user.id);
      // Clear local app data but keep the last coach email on this device.
      clearLocalStorageKeepingCoachEmail();
      await sb.auth.signOut();
      onDeleted();
    } catch(e) {
      setError('Error al eliminar. Contacta soporte.');
      setDeleting(false);
    }
  }

  return (
    <div className="screen">
      <Header title="Mi perfil" onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Editar perfil</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>Actualiza tu información de coach.</p>
        {error && <div className="error-msg">{error}</div>}
        {saved && <div style={{fontSize:'0.84rem',color:'var(--green-mid)',padding:'10px 14px',background:'var(--green-soft)',borderRadius:8,marginBottom:12}}>¡Guardado correctamente!</div>}
        <div className="form-field">
          <label className="field-label">Correo electrónico</label>
          <div className="field-input" style={{display:'flex',alignItems:'center',color:'var(--text-secondary)',background:'var(--bg)'}}>
            {user?.email}
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">Nombre del coach</label>
          <input className="field-input" value={displayName}
            onChange={e => setDisplayName(e.target.value)} placeholder="Coach Diego" />
        </div>
        <div className="form-field">
          <label className="field-label">
            Club o academia{' '}
            <span style={{color:'var(--text-hint)',fontWeight:400,textTransform:'none',letterSpacing:0}}>· opcional</span>
          </label>
          <input className="field-input" value={clubName}
            onChange={e => setClubName(e.target.value)} placeholder="Padel Arena BCN" />
        </div>

        {/* Delete account section */}
        <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)'}}>
          {!confirmDelete ? (
            <button onClick={() => setConfirmDelete(true)} style={{
              background:'none', border:'none', color:'#c0392b',
              fontSize:'0.88rem', fontWeight:600, cursor:'pointer', padding:0
            }}>Eliminar cuenta</button>
          ) : (
            <div style={{background:'#fdf0ef', borderRadius:12, padding:16}}>
              <p style={{fontSize:'0.88rem', fontWeight:600, color:'#c0392b', marginBottom:8}}>¿Estás seguro?</p>
              <p style={{fontSize:'0.82rem', color:'var(--text-secondary)', marginBottom:16, lineHeight:1.5}}>
                Se eliminarán tu cuenta, todos tus alumnos y todas las clases registradas. Esta acción no se puede deshacer.
              </p>
              <div style={{display:'flex', gap:8}}>
                <button onClick={() => setConfirmDelete(false)} style={{
                  flex:1, height:44, borderRadius:10, border:'1.5px solid var(--border)',
                  background:'var(--white)', fontSize:'0.88rem', fontWeight:600, cursor:'pointer',
                  color:'var(--text-primary)'
                }}>Cancelar</button>
                <button onClick={deleteAccount} disabled={deleting} style={{
                  flex:1, height:44, borderRadius:10, border:'none',
                  background:'#c0392b', color:'white', fontSize:'0.88rem', fontWeight:600, cursor:'pointer'
                }}>{deleting ? 'Eliminando...' : 'Sí, eliminar'}</button>
              </div>
            </div>
          )}
        </div>
      </div>
      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || !displayName.trim()}>
          {loading ? 'Guardando...' : saved ? '¡Guardado! ✓' : 'Guardar cambios'}
        </button>
      </div>
    </div>
  );
}

function EditStudentScreen({ student, onBack, onSaved, onDeleted }) {
  const [name, setName]     = useState(student.name || '');
  const [level, setLevel]   = useState(student.level || '');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting]     = useState(false);
  const levels = ['Principiante', 'Intermedio', 'Avanzado'];

  async function save() {
    if (!name.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    try {
      const { data, error } = await sb.from('students')
        .update({ name: name.trim(), level: level || null })
        .eq('id', student.id)
        .select().single();
      if (error) throw error;
      onSaved(data);
    } catch(e) { setError(e.message); setLoading(false); }
  }

  async function deleteStudent() {
    setDeleting(true); setError('');
    try {
      const now = new Date().toISOString();
      await sb.from('class_logs').update({ deleted_at: now }).eq('student_id', student.id).is('deleted_at', null);
      await sb.from('students').update({ deleted_at: now }).eq('id', student.id);
      onDeleted(student.id);
    } catch(e) { setError('Error al eliminar. Intenta de nuevo.'); setDeleting(false); }

  return (
    <div className="screen">
      <Header title="Editar alumno" onBack={onBack} />
