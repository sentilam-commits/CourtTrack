  -- Próxima clase: run once in Supabase SQL Editor
  ALTER TABLE public.students ADD COLUMN IF NOT EXISTS next_class DATE;

  -- Agenda con hora opcional: run once in Supabase SQL Editor
  ALTER TABLE public.scheduled_classes

  -- Update get_public_student to include coach profile + upcoming scheduled classes:
  CREATE OR REPLACE FUNCTION public.get_public_student(public_student_id uuid)
  RETURNS jsonb LANGUAGE sql SECURITY DEFINER SET search_path = public AS $$
    SELECT CASE WHEN s.id IS NULL THEN NULL ELSE jsonb_build_object(
      'student',    to_jsonb(s),
      'class_logs', COALESCE((
        SELECT jsonb_agg(to_jsonb(cl) ORDER BY cl.date DESC, cl.created_at DESC)
        FROM public.class_logs cl WHERE cl.student_id = s.id
      ), '[]'::jsonb),
      'progress_score', (
        SELECT to_jsonb(ps)
        FROM public.progress_scores ps
        WHERE ps.student_id = s.id
        LIMIT 1
      ),
      'scheduled_classes', COALESCE((
        SELECT jsonb_agg(to_jsonb(sc) ORDER BY sc.class_date ASC, sc.start_time ASC)
        FROM (
          SELECT sc.*
          FROM public.scheduled_classes sc
          WHERE sc.student_id = s.id
            AND sc.status IN ('scheduled', 'confirmed')
            AND sc.class_date >= CURRENT_DATE
          ORDER BY sc.class_date ASC, sc.start_time ASC
          LIMIT 10
        ) sc
      ), '[]'::jsonb),
      'coach', (
        SELECT jsonb_build_object('display_name', p.display_name, 'club_name', p.club_name)
        FROM public.profiles p WHERE p.id = s.coach_id LIMIT 1
      )
    ) END
    FROM public.students s WHERE s.id = public_student_id LIMIT 1;
  $$;
  GRANT EXECUTE ON FUNCTION public.get_public_student(uuid) TO anon, authenticated;

  -- Comentarios del alumno desde el reporte público: run once in Supabase SQL Editor.
  CREATE TABLE IF NOT EXISTS public.student_feedback (
    id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    student_id uuid NOT NULL REFERENCES public.students(id) ON DELETE CASCADE,
    coach_id uuid NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    category text NOT NULL DEFAULT 'general'
      CHECK (category IN ('clase','reporte','videos','general')),
    message text NOT NULL CHECK (char_length(message) BETWEEN 1 AND 1000),
    created_at timestamptz DEFAULT now(),
    read_at timestamptz
  );
  CREATE INDEX IF NOT EXISTS student_feedback_coach_idx
    ON public.student_feedback (coach_id, read_at);
  ALTER TABLE public.student_feedback ENABLE ROW LEVEL SECURITY;

  DROP POLICY IF EXISTS "Coaches read own feedback" ON public.student_feedback;
  CREATE POLICY "Coaches read own feedback"
    ON public.student_feedback FOR ALL
    USING (auth.uid() = coach_id)
    WITH CHECK (auth.uid() = coach_id);

  CREATE OR REPLACE FUNCTION public.submit_student_feedback(
    public_student_id uuid, fb_category text, fb_message text
  ) RETURNS void LANGUAGE plpgsql SECURITY DEFINER SET search_path TO 'public' AS $$
  DECLARE v_coach uuid;
  BEGIN
    IF fb_message IS NULL OR char_length(trim(fb_message)) = 0 THEN RETURN; END IF;
    SELECT coach_id INTO v_coach FROM public.students WHERE id = public_student_id;
    IF v_coach IS NULL THEN RETURN; END IF;
    INSERT INTO public.student_feedback (student_id, coach_id, category, message)
    VALUES (
      public_student_id, v_coach,
      CASE WHEN fb_category IN ('clase','reporte','videos','general') THEN fb_category ELSE 'general' END,
      left(trim(fb_message), 1000)
    );
  END; $$;
  GRANT EXECUTE ON FUNCTION public.submit_student_feedback(uuid, text, text) TO anon, authenticated;

  -- Profiles RLS: run once in Supabase SQL Editor.
  -- The app writes profiles.id = auth.uid(). If your profiles table also has
  -- user_id, the app writes user_id = auth.uid() too.
  ALTER TABLE public.profiles ENABLE ROW LEVEL SECURITY;

  DROP POLICY IF EXISTS "profiles_select_own" ON public.profiles;
  DROP POLICY IF EXISTS "profiles_insert_own" ON public.profiles;
  DROP POLICY IF EXISTS "profiles_update_own" ON public.profiles;

  CREATE POLICY "profiles_select_own"
    ON public.profiles FOR SELECT TO authenticated
    USING (id = auth.uid());

  CREATE POLICY "profiles_insert_own"
    ON public.profiles FOR INSERT TO authenticated
    WITH CHECK (id = auth.uid());

  CREATE POLICY "profiles_update_own"
    ON public.profiles FOR UPDATE TO authenticated
    USING (id = auth.uid())
    WITH CHECK (id = auth.uid());

    ADD COLUMN IF NOT EXISTS visual_correction TEXT,
    ADD COLUMN IF NOT EXISTS visual_task      TEXT;

  -- Storage bucket: run once in Supabase SQL Editor
  INSERT INTO storage.buckets (id, name, public)

    ON CONFLICT (id) DO NOTHING;

  CREATE POLICY IF NOT EXISTS "Coaches can upload media"
    ON storage.objects FOR INSERT TO authenticated
    WITH CHECK (bucket_id = 'class-media');

  CREATE POLICY IF NOT EXISTS "Media is public"
    ON storage.objects FOR SELECT TO anon, authenticated
    USING (bucket_id = 'class-media');

  -- Account deletion + data retention: run once in Supabase SQL Editor.
  --
  -- Archive table survives coach deletion (no FK to auth.users). RLS enabled with
  -- NO policies, so coaches can't read it — only the Supabase dashboard / service role.
  -- Each row is a full JSONB snapshot, so every column (incl. media_*/visual_*) is kept.
  CREATE TABLE IF NOT EXISTS public.archived_records (
    id                 uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    kind               text NOT NULL,            -- 'student' | 'class_log' | 'progress_score'
    original_id        uuid,
    coach_id           uuid,
    coach_email        text,
    coach_display_name text,
    data               jsonb NOT NULL,           -- full snapshot of the original row
    archived_at        timestamptz DEFAULT now()
  );
  ALTER TABLE public.archived_records ENABLE ROW LEVEL SECURITY;

  -- Archives the coach's students/classes/scores/ops data (with coach email + name), then
  -- deletes the auth user — the cascade clears the live profile/students/logs/scores/ops data.
  -- Takes no arguments and uses auth.uid(), so a user can only delete themselves.
  CREATE OR REPLACE FUNCTION public.delete_my_account()
  RETURNS void LANGUAGE plpgsql SECURITY DEFINER SET search_path = public AS $$
  DECLARE
    uid     uuid := auth.uid();
    c_email text;
    c_name  text;
  BEGIN
    IF uid IS NULL THEN RAISE EXCEPTION 'Not authenticated'; END IF;

    SELECT u.email        INTO c_email FROM auth.users u    WHERE u.id = uid;
    SELECT p.display_name INTO c_name  FROM public.profiles p WHERE p.id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'student', s.id, uid, c_email, c_name, to_jsonb(s)
      FROM public.students s WHERE s.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'class_log', cl.id, uid, c_email, c_name, to_jsonb(cl)
      FROM public.class_logs cl WHERE cl.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'progress_score', ps.id, uid, c_email, c_name, to_jsonb(ps)
      FROM public.progress_scores ps WHERE ps.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'coach_payment', cp.id, uid, c_email, c_name, to_jsonb(cp)
      FROM public.coach_payments cp WHERE cp.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'class_bonus', cb.id, uid, c_email, c_name, to_jsonb(cb)
      FROM public.class_bonuses cb WHERE cb.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'scheduled_class', sc.id, uid, c_email, c_name, to_jsonb(sc)
      FROM public.scheduled_classes sc WHERE sc.coach_id = uid;

    DELETE FROM auth.users WHERE id = uid;
  END;
  $$;
  GRANT EXECUTE ON FUNCTION public.delete_my_account() TO authenticated;

  -- Habilidades del alumno: run once in Supabase SQL Editor.
  ALTER TABLE public.students
    ADD COLUMN IF NOT EXISTS skills jsonb;

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --green-mid:      #4F8F5F;
      --green-soft:     #E8F0EA;
      --bg:             #ECEEE9;
      --white:          #FFFFFF;
      --orange:         #D47A2F;
      --whatsapp:       #1AAD5E;
      --text-primary:   #0E1311;
      --text-secondary: #888888;
      --text-hint:      #AAAAAA;

      --border:         #E0E4E1;

    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);

    button, input, textarea, select { font: inherit; }

    input, textarea { outline: none; }

    /* ── Offline banner ── */
    .offline-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--orange);
      color: white;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 16px;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .offline-banner.show { transform: translateY(0); }

    /* ── Screen layout ── */
    .screen {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      max-width: 480px;
      margin: 0 auto;
      isolation: isolate;
    }
    .screen--edge-swiping,
    .screen--edge-settling {
      position: relative;
      z-index: 2;
      will-change: transform;
      box-shadow: -18px 0 32px rgba(15, 24, 20, 0.18);
    }
    .screen--edge-settling {
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
    }
    .screen-edge-preview {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      background: var(--bg);
    }
    .screen-edge-preview .screen {
      min-height: 100svh;
      max-height: 100svh;
      overflow: hidden;
      transform: translateX(-22px);
      opacity: 0.86;
      transition: transform 0.12s linear, opacity 0.12s linear;
    }
    .screen-edge-preview .screen-content {
      overflow: hidden;
    }

    .screen-content {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .screen-content--with-bottom-bar {
      padding-bottom: calc(112px + env(safe-area-inset-bottom));
    }

    .screen-bottom {
      padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      min-height: var(--header-height);
      padding: var(--top-safe-area) 16px var(--header-bottom-gap);
      background: var(--green-dark);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .header-back {
      color: white;
      line-height: 1;
      padding: 8px 10px;
      margin-left: -8px;
      min-width: 44px;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
    }

    .header-title { flex: 1; text-align: center; font-weight: 600; font-size: 0.95rem; }
    .header-right { min-width: 44px; text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.65); }
    .header-spacer { min-width: 44px; }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 5px; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .logo-dot  { color: var(--green-mid); font-size: 0.55rem; line-height: 1; animation: pulse-dot 2.8s ease-in-out infinite; }
    .logo-text { font-size: 1rem; color: white; letter-spacing: -0.01em; }

      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Student card ── */
    .student-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      height: 64px;

      flex-shrink: 0;

    .student-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .chip:active { opacity: 0.8; }
    .chip-edit-wrap { display: inline-flex; align-items: center; gap: 4px; }

      height: 36px; padding: 0 12px;
      border: 2px solid var(--green-dark); border-radius: 100px;

      background: var(--white); color: var(--text-primary);
      min-width: 80px; max-width: 160px; outline: none;
    }

      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--green-dark); color: white;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .chip--on { background: var(--green-dark); border-color: var(--green-dark); color: white; }

    .chip-group { display: flex; flex-direction: column; gap: 10px; }

    .chip-input-row { display: flex; gap: 8px; }
    .chip-input {
      flex: 1; height: 44px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; background: var(--white);
      color: var(--text-primary); font-size: 16px;

    .chip-input-add {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--green-dark); color: white;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; height: 52px; border-radius: 14px;
      font-size: 0.95rem; font-weight: 600;

const SUPABASE_ANON_KEY = 'sb_publishable_HSl0bc6L62gGl5egjtVfRg_6DfhA35X';

const LS = {
  _k: k => 'pl:' + k,
  get(k)    { try { return JSON.parse(localStorage.getItem(this._k(k))); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) { console.warn('LS write:', e); } },
  queue: {
    get()    { return LS.get('q') || []; },
    push(op) { LS.set('q', [...LS.queue.get(), { ...op, _ts: Date.now() }]); },
    set(q)   { LS.set('q', q); },
  },

const SAVED_EMAIL_KEY = 'saved_email';
const normalizeEmail = email => (email || '').trim().toLowerCase();
function getSavedCoachEmail() {
  return normalizeEmail(localStorage.getItem(SAVED_EMAIL_KEY) || '');
}
function saveCoachEmail(email) {
  const value = normalizeEmail(email);
  if (value) localStorage.setItem(SAVED_EMAIL_KEY, value);
  return value;

  const savedEmail = getSavedCoachEmail();

        const { data, error } = await sb.from('students').insert(op.data).select().single();

        const studs = (LS.get(`s:${uid}`) || []).map(s => s._tmp === op._ts ? data : s);
        LS.set(`s:${uid}`, studs);
      } else if (op.type === 'log') {
        const { data, error } = await sb.from('class_logs').insert(op.data).select().single();
        if (error || !data) { failed.push(op); continue; }
        const logs = (LS.get(`l:${uid}`) || []).map(l => l._tmp === op._ts ? data : l);
        LS.set(`l:${uid}`, logs);
      }
    } catch (e) { failed.push(op); }
  }
  LS.queue.set(failed);
}

const todayISO = () => {

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function viewedLabel(viewedAt) {
  if (!viewedAt) return null;
  const diffMs = Date.now() - new Date(viewedAt).getTime();
  const diffH  = diffMs / 3_600_000;
  const diffD  = diffMs / 86_400_000;
  if (diffH < 1)   return 'hace unos minutos';
  if (diffH < 24)  return `hace ${Math.round(diffH)}h`;
  if (diffD < 2)   return 'ayer';
  return shortDateEs(viewedAt.slice(0, 10));
}

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  return `hace ${diff} días`;
}

function timeInputValue(timeStr) {
  if (!timeStr) return '--:--';
  return String(timeStr).slice(0, 5);
}

function formatTimeShort(timeStr) {
  const value = timeInputValue(timeStr);
  if (value === '--:--') return value;
  const [hourRaw, minute = '00'] = value.split(':');
  const hour = Number(hourRaw);
  if (!Number.isFinite(hour)) return value;
  const suffix = hour >= 12 ? 'PM' : 'AM';
  const hour12 = hour % 12 || 12;
  return `${hour12}:${minute} ${suffix}`;
}

const PROFILE_SAVE_ERROR = 'No pudimos guardar tu perfil. Intenta nuevamente.';
const PROFILE_LOG_PREFIX = '[ProfileSave]';
let profileUserIdColumnSupported = null;

const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

class ProfileSaveError extends Error {
  constructor(kind, message, cause) {
    super(message || kind);
    this.name = 'ProfileSaveError';
    this.kind = kind;
    this.cause = cause;
  }
}

function supabaseErrorInfo(error) {
  return {
    name: error?.name || null,
    message: error?.message || String(error || ''),
    code: error?.code || null,
    status: error?.status || null,
    details: error?.details || null,
    hint: error?.hint || null,
  };
}

function errorText(error) {
  const info = supabaseErrorInfo(error);
  return [info.name, info.message, info.code, info.status, info.details, info.hint]
    .filter(Boolean)
    .join(' ')
    .toLowerCase();
}

function classifyProfileSaveError(error) {
  const text = errorText(error);
  const offline = typeof navigator !== 'undefined' && navigator.onLine === false;
  if (error?.kind === 'session-not-found' || text.includes('session')) return 'session-not-found';
  if (error?.kind === 'missing-user-id' || text.includes('user id')) return 'missing-user-id';
  if (offline || text.includes('load failed') || text.includes('failed to fetch') ||
      text.includes('network') || text.includes('fetcherror')) return 'network';
  if (text.includes('row-level security') || text.includes('rls') || text.includes('42501')) return 'rls';
  return 'supabase';
}

function logProfileSaveFailure(source, kind, error, extra = {}) {
  const label = {
    'session-not-found': 'session not found before saving profile',
    'missing-user-id': 'authenticated user id missing before saving profile',
    network: 'network error while saving profile',
    rls: 'RLS blocked profile save',
    supabase: 'Supabase error while saving profile',
  }[kind] || 'profile save failed';
  console.error(`${PROFILE_LOG_PREFIX} ${label}`, {
    source,
    kind,
    ...extra,
    error: supabaseErrorInfo(error),
  });
}

// Turns a ProfileSaveError (or raw Supabase/network error) into a clear,
// actionable Spanish message. The RLS rejection on profiles only happens when
// there is no authenticated session (auth.uid() is null) — typically a coach
// who signed up but hasn't confirmed their email yet, so we guide them there
// instead of showing a generic "try again".
function profileSaveErrorMessage(error) {
  const kind = error?.kind || classifyProfileSaveError(error);
  switch (kind) {
    case 'session-not-found':
    case 'missing-user-id':
    case 'rls':
      return 'Tu sesión no está activa. Si acabas de registrarte, confirma tu email (revisa tu bandeja de entrada y la carpeta de spam) e inicia sesión. Después vuelve a guardar tu perfil.';
    case 'network':
      return 'No hay conexión estable. Revisa tu internet e inténtalo de nuevo.';
    default:
      return PROFILE_SAVE_ERROR;
  }
}

function isMissingProfileColumn(error, columnName) {
  const text = errorText(error);
  return text.includes(`'${columnName}' column`) ||
         text.includes(`column "${columnName}" does not exist`) ||
         (text.includes(columnName) && text.includes('schema cache'));
}

async function getAuthenticatedUserForProfileSave(fallbackUser, source) {
  let session = null;
  let lastSessionError = null;

  for (let attempt = 1; attempt <= 3; attempt += 1) {
    try {
      const { data, error } = await sb.auth.getSession();
      if (error) throw error;
      session = data?.session || null;
      if (session?.user?.id) break;
      console.warn(`${PROFILE_LOG_PREFIX} session not ready`, { source, attempt });
    } catch (e) {
      lastSessionError = e;
      console.warn(`${PROFILE_LOG_PREFIX} getSession failed`, {
        source,
        attempt,
        error: supabaseErrorInfo(e),
      });
    }
    if (attempt < 3) await sleep(180 * attempt);
  }

  if (!session?.user) {
    logProfileSaveFailure(source, 'session-not-found', lastSessionError, {
      fallbackUserId: fallbackUser?.id || null,
    });
    throw new ProfileSaveError('session-not-found', 'No auth session', lastSessionError);
  }

  if (!session.user.id) {
    logProfileSaveFailure(source, 'missing-user-id', null, {
      fallbackUserId: fallbackUser?.id || null,
    });
    throw new ProfileSaveError('missing-user-id', 'Session user id missing');
  }

  if (fallbackUser?.id && fallbackUser.id !== session.user.id) {
    console.warn(`${PROFILE_LOG_PREFIX} prop user id differs from session user id`, {
      source,
      propUserId: fallbackUser.id,
      sessionUserId: session.user.id,
    });
  }

  let userResult;
  try {
    userResult = await sb.auth.getUser();
  } catch (e) {
    const kind = classifyProfileSaveError(e);
    logProfileSaveFailure(source, kind, e, { sessionUserId: session.user.id });
    throw new ProfileSaveError(kind, 'Could not verify authenticated user', e);
  }

  if (userResult.error) {
    const kind = classifyProfileSaveError(userResult.error);
    logProfileSaveFailure(source, kind, userResult.error, { sessionUserId: session.user.id });
    throw new ProfileSaveError(kind, 'Could not verify authenticated user', userResult.error);
  }

  const verifiedUser = userResult.data?.user || null;
  if (!verifiedUser?.id) {
    logProfileSaveFailure(source, 'missing-user-id', null, { sessionUserId: session.user.id });
    throw new ProfileSaveError('missing-user-id', 'Verified user id missing');
  }

  if (verifiedUser.id !== session.user.id) {
    console.warn(`${PROFILE_LOG_PREFIX} verified user id differs from session user id`, {
      source,
      verifiedUserId: verifiedUser.id,
      sessionUserId: session.user.id,
    });
  }

  console.info(`${PROFILE_LOG_PREFIX} authenticated user verified`, {
    source,
    userId: verifiedUser.id,
  });
  return verifiedUser;
}

async function upsertOwnProfile(profileFields, authUser, source) {
  const basePayload = { id: authUser.id, ...profileFields };
  const attempts = profileUserIdColumnSupported === false
    ? [{ payload: basePayload, hasUserId: false }]
    : [
        { payload: { ...basePayload, user_id: authUser.id }, hasUserId: true },
        { payload: basePayload, hasUserId: false },
      ];

  for (const attempt of attempts) {
    console.info(`${PROFILE_LOG_PREFIX} upserting own profile`, {
      source,
      userId: authUser.id,
      hasUserId: attempt.hasUserId,
    });

    let result;
    try {
      result = await sb.from('profiles').upsert(attempt.payload, { onConflict: 'id' });
    } catch (e) {
      const kind = classifyProfileSaveError(e);
      logProfileSaveFailure(source, kind, e, {
        userId: authUser.id,
        hasUserId: attempt.hasUserId,
      });
      throw new ProfileSaveError(kind, 'Profile upsert failed', e);
    }

    if (!result.error) {
      profileUserIdColumnSupported = attempt.hasUserId;
      console.info(`${PROFILE_LOG_PREFIX} profile saved`, {
        source,
        userId: authUser.id,
        hasUserId: attempt.hasUserId,
      });
      return attempt.payload;
    }

    if (attempt.hasUserId && isMissingProfileColumn(result.error, 'user_id')) {
      profileUserIdColumnSupported = false;
      console.info(`${PROFILE_LOG_PREFIX} profiles.user_id not found; retrying with id only`, {
        source,
        userId: authUser.id,
        error: supabaseErrorInfo(result.error),
      });
      continue;
    }

    const kind = classifyProfileSaveError(result.error);
    logProfileSaveFailure(source, kind, result.error, {
      userId: authUser.id,
      hasUserId: attempt.hasUserId,
    });
    throw new ProfileSaveError(kind, 'Profile upsert failed', result.error);
  }

  throw new ProfileSaveError('supabase', 'Profile upsert did not run');
}

async function saveOwnProfile(profileFields, fallbackUser, source) {
  const authUser = await getAuthenticatedUserForProfileSave(fallbackUser, source);
  const savedProfile = await upsertOwnProfile(profileFields, authUser, source);
  return { user: authUser, profile: savedProfile };
}

// Write a student's skill scores + append a dated skill_history snapshot (only when changed).

async function updateStudentSkills(student, skills) {
  const hasSkills = skills && Object.keys(skills).length > 0;
  const newSkillsVal = hasSkills ? skills : null;
  let newHistory = student.skill_history || [];
  if (hasSkills) {
    const last = newHistory[newHistory.length - 1];
    const changed = !last || JSON.stringify(last.skills) !== JSON.stringify(skills);
    if (changed) newHistory = [...newHistory, { date: new Date().toISOString().slice(0, 10), skills }];
  }
  try {
    await sb.from('students')
      .update({ skills: newSkillsVal, skill_history: newHistory, updated_at: new Date().toISOString() })
      .eq('id', student.id);
  } catch (e) {}
}

const moneyFmt = amount =>
  `$${Number(amount || 0).toLocaleString('es-CO', { maximumFractionDigits: 0 })}`;

const parseMoney = value => {
  let raw = String(value || '').replace(/[^\d.,]/g, '');
  if (!raw) return 0;
  const hasComma = raw.includes(',');
  const hasDot = raw.includes('.');
  if (hasComma && hasDot) {
    raw = raw.lastIndexOf(',') > raw.lastIndexOf('.')
      ? raw.replace(/\./g, '').replace(',', '.')
      : raw.replace(/,/g, '');
  } else if (hasComma) {
    const parts = raw.split(',');
    raw = parts.length === 2 && parts[1].length === 3
      ? raw.replace(/,/g, '')
      : raw.replace(',', '.');
  } else if (hasDot) {
    const parts = raw.split('.');
    raw = parts.length === 2 && parts[1].length === 3
      ? raw.replace(/\./g, '')
      : raw;
  }
  const n = Number(raw);
  return Number.isFinite(n) ? n : 0;
};

const opsLocalId = prefix =>
  `local_${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

const opsKey = (uid, kind) => `${kind}:${uid}`;

function isLocalRecord(record) {
  return String(record?.id || '').startsWith('local_');
}

function cacheOps(uid, kind, rows) {
  LS.set(opsKey(uid, kind), rows || []);
}

function mergeRemoteWithLocal(uid, kind, remoteRows) {
  const localRows = LS.get(opsKey(uid, kind)) || [];
  const localOnly = localRows.filter(isLocalRecord);
  const merged = [...(remoteRows || []), ...localOnly];
  cacheOps(uid, kind, merged);
  return merged;
}

function normalizePayment(row) {
  return {
    ...row,
    amount: Number(row.amount || 0),
    status: row.status || 'pending',
  };
}

function normalizeBonus(row) {
  const total = Number(row.total_classes || 0);
  const remaining = Number(row.remaining_classes ?? total);
  return {
    ...row,
    total_classes: total,
    remaining_classes: remaining,
    alert_at: Number(row.alert_at ?? 3),
    status: row.status || (remaining <= 0 ? 'exhausted' : 'active'),
  };
}

function normalizeScheduledClass(row) {
  return {
    ...row,
    class_date: row.class_date || todayISO(),
    start_time: row.start_time || null,
    duration_minutes: Number(row.duration_minutes || 60),
    status: row.status || 'scheduled',
  };
}

// A scheduled class whose date+start_time+duration is already in the past (device clock).
function classEndPassed(c) {
  if (!c || !c.class_date) return false;
  if (!c.start_time) return c.class_date < todayISO(); // no time → past only once the day is over
  const t = String(c.start_time).slice(0, 5);
  const end = new Date(`${c.class_date}T${t}:00`);
  if (isNaN(end.getTime())) return false;
  end.setMinutes(end.getMinutes() + Number(c.duration_minutes || 60));
  return end.getTime() < Date.now();
}
// Should this scheduled class still appear in agendas? (not cancelled/completed/past)
function isUpcomingClass(c) {
  return c && c.status !== 'cancelled' && c.status !== 'completed' && !classEndPassed(c);
}

function sortScheduledClasses(rows) {
  return [...(rows || [])].sort((a, b) => {
    const dateCompare = String(a.class_date || '').localeCompare(String(b.class_date || ''));
    if (dateCompare !== 0) return dateCompare;
    return String(a.start_time || '').localeCompare(String(b.start_time || ''));
  });
}

function upcomingScheduledClasses(rows) {
  return sortScheduledClasses((rows || []).filter(row => {
    const diff = daysFromToday(row.class_date);
    return diff !== null && diff >= 0;
  }));
}

async function createCoachPayment(uid, payload) {
  const paidAt = payload.status === 'paid'
    ? `${payload.paid_at || payload.due_date || todayISO()}T12:00:00`
    : null;
  const row = normalizePayment({
    coach_id: uid,
    student_id: payload.student_id || null,
    title: payload.title || 'Clase',
    amount: parseMoney(payload.amount),
    status: payload.status || 'pending',
    due_date: payload.due_date || null,
    paid_at: paidAt,
  });

  try {
    const { data, error } = await sb.from('coach_payments').insert(row).select().single();
    if (error) throw error;
    const saved = normalizePayment(data);
    cacheOps(uid, 'payments', [saved, ...(LS.get(opsKey(uid, 'payments')) || []).filter(p => p.id !== saved.id)]);
    return saved;
  } catch(e) {
    const local = normalizePayment({ ...row, id: opsLocalId('payment'), created_at: new Date().toISOString(), _local: true });
    cacheOps(uid, 'payments', [local, ...(LS.get(opsKey(uid, 'payments')) || [])]);
    return local;
  }
}

async function markCoachPaymentPaid(uid, payment) {
  const patch = { status: 'paid', paid_at: new Date().toISOString() };
  if (!isLocalRecord(payment)) {
    try {
      const { data, error } = await sb.from('coach_payments')
        .update(patch)
        .eq('id', payment.id)
        .select().single();
      if (error) throw error;
      const saved = normalizePayment(data);
      const rows = LS.get(opsKey(uid, 'payments')) || [];
      cacheOps(uid, 'payments', rows.some(p => p.id === saved.id)
        ? rows.map(p => p.id === saved.id ? saved : p)
        : [saved, ...rows]);
      return saved;
    } catch(e) {}
  }
  const saved = normalizePayment({ ...payment, ...patch });
  const rows = LS.get(opsKey(uid, 'payments')) || [];
  cacheOps(uid, 'payments', rows.some(p => p.id === saved.id)
    ? rows.map(p => p.id === saved.id ? saved : p)
    : [saved, ...rows]);
  return saved;
}

async function updateCoachPayment(uid, current, payload) {

// ── Linkify ──────────────────────────────────────────────────
function linkify(text) {
  if (!text || typeof text !== 'string') return text;
  const parts = text.split(/(https?:\/\/[^\s]+)/);
  // split with a capturing group: even indices = plain text, odd indices = URLs
  return parts.map((part, i) =>
    i % 2 === 1
      ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" style={{
          color:'var(--green-mid)', textDecoration:'underline', wordBreak:'break-all'
        }}>{part}</a>
      : part
  );
}

// ── Media upload ─────────────────────────────────────────────
async function uploadMedia(file, coachId, studentId) {
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${coachId}/${studentId}/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from('class-media').upload(path, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  const { data: { publicUrl } } = sb.storage.from('class-media').getPublicUrl(path);
  return publicUrl;
}

function VisualReferenceSection({ coachId, studentId, mediaUrl, mediaType, localPreview, uploading, uploadError,
  visualWhat,
  onMediaChange, onFieldChange }) {

  const fileRef = useRef();
  const hasMedia = localPreview || mediaUrl;

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const isVideo = file.type.startsWith('video');
    const maxMB = isVideo ? 50 : 15;
    if (file.size > maxMB * 1024 * 1024) {
      onMediaChange({ uploadError: `El archivo supera el límite de ${maxMB} MB.` });
      return;
    }
    const preview = URL.createObjectURL(file);
    const type = isVideo ? 'video' : 'image';
    onMediaChange({ localPreview: preview, mediaType: type, uploading: true, uploadError: null, mediaUrl: null });
    try {
      const url = await uploadMedia(file, coachId, studentId);
      onMediaChange({ localPreview: preview, mediaType: type, uploading: false, mediaUrl: url, uploadError: null });

      onMediaChange({ localPreview: null, mediaType: null, uploading: false, mediaUrl: null, uploadError: 'Error al subir. Intenta de nuevo.' });

const SWIPE_ACTION_WIDTH = 88;

function closestEl(target, selector) {
  return target?.closest ? target.closest(selector) : null;
}

function isSwipeIgnoredTarget(target) {
  return !!closestEl(target, 'input, textarea, select, [contenteditable="true"], video, [data-swipe-ignore], [data-swipe-action]');
}

function SwipeActionsRow({ children, actions = [] }) {
  const maxOffset = actions.length * SWIPE_ACTION_WIDTH;
  const [offset, setOffset] = useState(0);
  const [dragging, setDragging] = useState(false);
  const rowRef = useRef(null);
  const dragRef = useRef(null);
  const offsetRef = useRef(0);
  const suppressClickRef = useRef(false);

  const setLiveOffset = value => {
    offsetRef.current = value;
    setOffset(value);
  };

  useEffect(() => {
    if (!maxOffset) setLiveOffset(0);
  }, [maxOffset]);

  const snap = open => {
    setDragging(false);
    setLiveOffset(open && maxOffset ? -maxOffset : 0);
  };

  useEffect(() => {
    const closeOnOutsidePress = e => {
      if (offsetRef.current >= 0) return;
      if (rowRef.current?.contains(e.target)) return;
      snap(false);
    };
    document.addEventListener('pointerdown', closeOnOutsidePress, true);
    return () => document.removeEventListener('pointerdown', closeOnOutsidePress, true);
  }, []);

  const onPointerDown = e => {
    if (!maxOffset || isSwipeIgnoredTarget(e.target)) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    dragRef.current = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      startOffset: offsetRef.current,
      swiping: false,
    };
  };

  const onPointerMove = e => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== e.pointerId) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;

    if (!drag.swiping) {
      if (Math.abs(dx) < 7 && Math.abs(dy) < 7) return;
      if (Math.abs(dy) > Math.abs(dx)) {
        dragRef.current = null;
        return;
      }
      drag.swiping = true;
      e.currentTarget.setPointerCapture?.(e.pointerId);
      setDragging(true);
    }

    const next = Math.max(-maxOffset, Math.min(0, drag.startOffset + dx));
    setLiveOffset(next);
    e.preventDefault?.();
  };

  const onPointerEnd = e => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== e.pointerId) return;
    if (drag.swiping) {
      suppressClickRef.current = true;
      window.setTimeout(() => { suppressClickRef.current = false; }, 0);
    }
    const shouldOpen = offsetRef.current < -maxOffset * 0.35;
    snap(shouldOpen);
    if (e.currentTarget.hasPointerCapture?.(e.pointerId)) {
      e.currentTarget.releasePointerCapture?.(e.pointerId);
    }
    dragRef.current = null;
  };

  const onContentClickCapture = e => {
    if (suppressClickRef.current) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if (offsetRef.current < 0) {
      e.preventDefault();
      e.stopPropagation();
      snap(false);
    }
  };

  return (
    <div
      ref={rowRef}
      className={`swipe-row${offset < 0 ? ' swipe-row--open' : ''}`}
      data-swipe-row
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerEnd}
      onPointerCancel={onPointerEnd}>
      <div className="swipe-row-actions" style={{width: maxOffset}}>
        {actions.map(action => (
          <button
            key={action.label}
            type="button"
            data-swipe-action
            className={`swipe-action swipe-action--${action.tone || 'primary'}`}
            onClick={e => {
              e.stopPropagation();
              snap(false);
              action.onClick?.();
            }}>
            {action.label}
          </button>
        ))}
      </div>
      <div
        className={`swipe-row-content${dragging ? '' : ' swipe-row-content--animating'}`}
        style={{transform: `translateX(${offset}px)`}}
        onClickCapture={onContentClickCapture}>
        {children}
      </div>
    </div>
  );
}

function isEdgeSwipeBlockedTarget(target) {
  return !!closestEl(target, 'input, textarea, select, [contenteditable="true"], video, [data-swipe-row], .coach-detail-panel');
}

function useEdgeSwipeBack(enabled, onBack, previousScreenHtml = '') {
  const onBackRef = useRef(onBack);
  const previousScreenHtmlRef = useRef(previousScreenHtml);

  useEffect(() => {
    onBackRef.current = onBack;
  }, [onBack]);

  useEffect(() => {
    previousScreenHtmlRef.current = previousScreenHtml;
  }, [previousScreenHtml]);

  useEffect(() => {
    if (!enabled) return undefined;
    let start = null;
    let screenEl = null;
    let previewEl = null;
    let lastDx = 0;
    let cleanupTimer = null;

    const activeScreen = () => {
      const screens = document.querySelectorAll('#root .screen');
      return screens[screens.length - 1] || null;
    };

    const removePreview = () => {
      if (previewEl) {
        previewEl.remove();
        previewEl = null;
      }
    };

    const resetScreen = (removeEdgePreview = true) => {
      if (screenEl) {
        screenEl.classList.remove('screen--edge-swiping', 'screen--edge-settling');
        screenEl.style.transform = '';
        screenEl.style.transition = '';
        screenEl.style.boxShadow = '';
        screenEl = null;
      }
      if (removeEdgePreview) removePreview();
    };

    const showPreview = () => {
      removePreview();
      const html = previousScreenHtmlRef.current;
      if (!html) return;
      const root = document.getElementById('root');
      if (!root) return;
      previewEl = document.createElement('div');
      previewEl.className = 'screen-edge-preview';
      previewEl.setAttribute('aria-hidden', 'true');
      previewEl.innerHTML = html;
      const previewScreen = previewEl.querySelector('.screen');
      if (previewScreen) {
        previewScreen.classList.remove('screen--edge-swiping', 'screen--edge-settling');
        previewScreen.removeAttribute('style');
      }
      root.insertBefore(previewEl, screenEl);
    };

    const updatePreview = dx => {
      const previewScreen = previewEl?.querySelector('.screen');
      if (!previewScreen) return;
      const progress = Math.max(0, Math.min(1, dx / 160));
      previewScreen.style.transform = `translateX(${-22 + progress * 22}px)`;
      previewScreen.style.opacity = String(0.86 + progress * 0.14);
    };

    const settleBack = () => {
      if (!screenEl) return;
      screenEl.classList.remove('screen--edge-swiping');
      screenEl.classList.add('screen--edge-settling');
      screenEl.style.transition = 'transform 0.18s ease-out, box-shadow 0.18s ease-out';
      screenEl.style.transform = 'translateX(0px)';
      cleanupTimer = window.setTimeout(resetScreen, 190);
    };

    const onTouchStart = e => {
      const touch = e.touches?.[0];
      if (!touch || touch.clientX > 18 || isEdgeSwipeBlockedTarget(e.target)) return;
      if (cleanupTimer) window.clearTimeout(cleanupTimer);
      screenEl = activeScreen();
      showPreview();
      start = { x: touch.clientX, y: touch.clientY, time: Date.now() };
      lastDx = 0;
    };

    const onTouchMove = e => {
      if (!start) return;
      const touch = e.touches?.[0];
      if (!touch) return;
      const dx = touch.clientX - start.x;
      const dy = touch.clientY - start.y;

      if (Math.abs(dy) > 48 && Math.abs(dy) > Math.abs(dx)) {
        start = null;
        settleBack();
        return;
      }

      if (dx <= 0) return;

      if (dx > 8 && Math.abs(dx) > Math.abs(dy) && e.cancelable) {
        e.preventDefault();
      }

      if (Math.abs(dx) > Math.abs(dy) && screenEl) {
        const maxDrag = Math.min(window.innerWidth * 0.58, 260);
        lastDx = Math.min(maxDrag, dx);
        screenEl.classList.remove('screen--edge-settling');
        screenEl.classList.add('screen--edge-swiping');
        screenEl.style.transition = 'none';
        screenEl.style.transform = `translateX(${lastDx}px)`;
        updatePreview(lastDx);
      }
    };

    const onTouchEnd = () => {
      if (!start) {
        return;
      }
      const elapsed = Date.now() - start.time;
      const shouldGoBack = lastDx > 92 || (lastDx > 58 && elapsed < 320);
      start = null;

      if (shouldGoBack && screenEl) {
        const outgoing = screenEl;
        outgoing.classList.remove('screen--edge-swiping');
        outgoing.classList.add('screen--edge-settling');
        outgoing.style.transition = 'transform 0.18s ease-out, box-shadow 0.18s ease-out';
        outgoing.style.transform = 'translateX(100vw)';
        cleanupTimer = window.setTimeout(() => {
          resetScreen(false);
          onBackRef.current?.();
          window.setTimeout(removePreview, 80);
        }, 170);
      } else {
        settleBack();
      }
    };

    window.addEventListener('touchstart', onTouchStart, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd, { passive: true });
    window.addEventListener('touchcancel', onTouchEnd, { passive: true });
    return () => {
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
      window.removeEventListener('touchcancel', onTouchEnd);
      if (cleanupTimer) window.clearTimeout(cleanupTimer);
      resetScreen();
    };
  }, [enabled]);
}

// ── Chip ─────────────────────────────────────────────────────
function Chip({ label, on, onClick, onLongPress }) {
  const timerRef = useRef(null);
  const longPressRef = useRef(false);

  function startPress(e) {
    if (!onLongPress) return;
    e.preventDefault();
    longPressRef.current = false;
    timerRef.current = setTimeout(() => {
      longPressRef.current = true;
      onLongPress();
      timerRef.current = null;
    }, 500);
  }
  function cancelPress() {
    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
  }
  function handleClick(e) {
    if (longPressRef.current) {
      e.preventDefault();
      longPressRef.current = false;
      return;
    }
    onClick(e);
  }

  return (
    <button
      className={`chip${on ? ' chip--on' : ''}`}
      onClick={handleClick}
      onTouchStart={startPress}
      onTouchEnd={e => { cancelPress(); }}
      onTouchMove={cancelPress}
      onMouseDown={startPress}
      onMouseUp={cancelPress}
      onMouseLeave={cancelPress}
      onContextMenu={e => { e.preventDefault(); onLongPress && onLongPress(); }}
    >
      {label}
</button>
  );
}

// ── ChipGroup ────────────────────────────────────────────────
function ChipGroup({ chips, addLabel, values, onChange, onNewChip, onEditChip, onDeleteChip }) {
  const [showInput, setShowInput]   = useState(false);
  const [inputVal, setInputVal]     = useState('');
  const [editing, setEditing]       = useState(null);
  const [localChips, setLocalChips] = useState(() => chips);
  const inputRef = useRef();
  const editRef  = useRef();

  useEffect(() => {
    setLocalChips(chips);
  }, [chips.join('\u0001')]);

  function toggle(chip) {
    onChange(values.includes(chip) ? values.filter(v => v !== chip) : [...values, chip]);
  }

  function addCustom() {
    const v = inputVal.trim();
    if (v) {
      if (!values.includes(v)) onChange([...values, v]);
      if (!localChips.includes(v)) setLocalChips(prev => [...prev, v]);
      if (onNewChip) onNewChip(v);
    }
    setInputVal(''); setShowInput(false);
  }

  function startEdit(chip) {
    setEditing({ original: chip, value: chip });
    setTimeout(() => editRef.current?.focus(), 50);
  }

  function confirmEdit() {
    if (!editing) return;
    const newVal = editing.value.trim();
    const oldVal = editing.original;
    if (!newVal) {
      if (values.includes(oldVal)) {
        onChange(values.filter(v => v !== oldVal));
      }
      setLocalChips(prev => prev.filter(c => c !== oldVal));
      if (onDeleteChip) onDeleteChip(oldVal);
      setEditing(null);
      return;
    }
    if (newVal !== oldVal) {
      if (values.includes(oldVal)) {
        onChange(values.map(v => v === oldVal ? newVal : v));
      }
      setLocalChips(prev => [...new Set(prev.map(c => c === oldVal ? newVal : c))]);
      if (onEditChip) onEditChip(oldVal, newVal);
    }
    setEditing(null);
  }

  function cancelEdit() { setEditing(null); }

  const customValues = values.filter(v => !localChips.includes(v));

  function renderChip(c) {
    if (editing && editing.original === c) {
      return (
        <span key={c} className="chip-edit-wrap">
          <input
            ref={editRef}
            className="chip-edit-input"
            value={editing.value}
            onChange={e => setEditing(ed => ({ ...ed, value: e.target.value }))}
            onKeyDown={e => { if (e.key === 'Enter') confirmEdit(); if (e.key === 'Escape') cancelEdit(); }}
            onBlur={confirmEdit}
          />
          <button className="chip-edit-ok" onMouseDown={e => { e.preventDefault(); confirmEdit(); }}>✓</button>
        </span>
      );
    }
    return (
      <Chip key={c} label={c} on={values.includes(c)}
        onClick={() => toggle(c)}
        onLongPress={() => startEdit(c)}
      />
    );
  }

  return (
    <div className="chip-group">
      <div className="chips">
        {localChips.map(c => renderChip(c))}
        {addLabel && (
          <Chip label={addLabel} on={showInput} onClick={() => {
            setShowInput(s => !s);
            if (!showInput) setTimeout(() => inputRef.current?.focus(), 50);
          }} />
        )}
      </div>
      {showInput && (
        <form className="chip-input-row" onSubmit={e => { e.preventDefault(); addCustom(); }}>
          <input ref={inputRef} className="chip-input" value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            placeholder="Escribe aquí..."
            onKeyDown={e => e.key === 'Enter' && addCustom()} />
          <button type="submit" className="chip-input-add">✓</button>
        </form>
      )}
      {customValues.length > 0 && (
        <div className="chips">
          {customValues.map(v => renderChip(v))}
        </div>
      )}
    </div>
  );
}

// ── Error translator ─────────────────────────────────────────
function translateError(msg) {
  if (!msg) return msg;
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials') || m.includes('invalid credentials'))
    return 'Email o contraseña incorrectos.';
  if (m.includes('email not confirmed'))
    return 'Debes confirmar tu email antes de iniciar sesión. Revisa tu bandeja de entrada.';
  if (m.includes('user already registered') || m.includes('already been registered'))
    return 'Este email ya tiene una cuenta. Inicia sesión.';
  if (m.includes('error sending confirmation email') || m.includes('sending confirmation'))
    return 'No se pudo enviar el email de confirmación. Intenta de nuevo en unos minutos.';
  if (m.includes('password should be at least'))
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('unable to validate email address'))
    return 'El email no es válido.';
  if (m.includes('email rate limit exceeded') || m.includes('rate limit'))
    return 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
  if (m.includes('network') || m.includes('fetch') || m.includes('load failed'))
    return 'Error de conexión. Verifica tu internet e intenta de nuevo.';
  if (m.includes('row-level security') || m.includes('rls') || m.includes('42501'))
    return 'No pudimos guardar los cambios. Intenta nuevamente.';
  return msg;
}

// ── S1 Auth ──────────────────────────────────────────────────
function AuthScreen() {
  const [isSignup, setIsSignup]       = useState(false);
  const [email, setEmail]             = useState(() => getSavedCoachEmail());
  const [password, setPassword]       = useState('');
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState('');
  const [signupDone, setSignupDone]   = useState(false);
  const [forgotMode, setForgotMode]   = useState(false);
  const [resetSent, setResetSent]     = useState(false);

  function handleEmailChange(val) {
    setEmail(val);
    saveCoachEmail(val);
  }

  async function submit() {
    if (!email.trim() || !password) return;
    setLoading(true); setError('');
    try {
      if (isSignup) {
        const { data, error } = await sb.auth.signUp({
          email: email.trim(),
          password,
          options: { emailRedirectTo: location.origin + location.pathname },
        });
        if (error) throw error;
        // Supabase's anti-enumeration: signing up with an existing email returns
        // no error but an empty identities array, and sends no confirmation email.
        if (data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0) {
          setError('Este email ya tiene una cuenta. Inicia sesión.');
          return;
        }
        saveCoachEmail(email);
        setSignupDone(true);
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        saveCoachEmail(email);
      }
    } catch (e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  async function sendReset() {
    if (!email.trim()) { setError('Ingresá tu email primero.'); return; }
    saveCoachEmail(email);
    setLoading(true); setError('');
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
        redirectTo: location.origin + location.pathname
      });
      if (error) throw error;
      setResetSent(true);
    } catch(e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  // ── Signup success ───────────────────────────────────────────
  if (signupDone) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>¡Cuenta creada!</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Te enviamos un email a <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Verifica tu correo para activar tu cuenta e iniciar sesión.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        ¿Ya verificaste?{' '}
        <button onClick={() => { setSignupDone(false); setIsSignup(false); setPassword(''); }}>Iniciar sesión</button>
      </div>
    </div>
  );

  // ── Reset password success ───────────────────────────────────
  if (resetSent) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>Email enviado</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Revisá tu bandeja de entrada en <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Tocá el enlace del email para restablecer tu contraseña.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        <button onClick={() => { setResetSent(false); setForgotMode(false); setError(''); }}>
          ← Volver al inicio de sesión
        </button>
      </div>
    </div>
  );

  // ── Forgot password ──────────────────────────────────────────
  if (forgotMode) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        <div style={{marginBottom:24}}>
          <div style={{fontWeight:700, fontSize:'1.1rem', color:'var(--text-primary)', marginBottom:6}}>
            Restablecer contraseña
          </div>
          <div style={{fontSize:'0.88rem', color:'var(--text-secondary)', lineHeight:1.5}}>
            Te enviaremos un enlace a tu email para crear una nueva contraseña.
          </div>
        </div>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" value={email}
            onChange={e => handleEmailChange(e.target.value)}
            placeholder="tu@email.com"
            onKeyDown={e => e.key === 'Enter' && sendReset()} />
        </div>
        <button className="btn btn-primary" onClick={sendReset} disabled={loading || !email.trim()}>
          {loading ? 'Enviando...' : 'Enviar enlace'}
        </button>
        <div className="auth-toggle">
          <button onClick={() => { setForgotMode(false); setError(''); }}>← Volver al inicio de sesión</button>
        </div>
      </div>
    </div>
  );

  // ── Login / Signup ───────────────────────────────────────────
  return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" value={email}
            onChange={e => handleEmailChange(e.target.value)}
            placeholder="tu@email.com"
            autoComplete="email" />
        </div>
        <div className="form-field">
          <label className="field-label">Contraseña</label>
          <input className="field-input" type="password" value={password}
            onChange={e => setPassword(e.target.value)} placeholder="••••••••"
            autoComplete={isSignup ? 'new-password' : 'current-password'}
            onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        {!isSignup && (
          <div className="auth-forgot">
            <button onClick={() => { setForgotMode(true); setError(''); }}>
              ¿Olvidaste tu contraseña?
            </button>
          </div>
        )}
        <button className="btn btn-primary" onClick={submit}
          disabled={loading || !email || !password}>
          {loading ? 'Cargando...' : (isSignup ? 'Crear cuenta' : 'Iniciar sesión')}
        </button>
        <div className="auth-toggle">
          {isSignup ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?'}{' '}
          <button onClick={() => { setIsSignup(s => !s); setError(''); setPassword(''); }}>
            {isSignup ? 'Iniciar sesión' : 'Crear una cuenta nueva'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Panel de inicio del coach: clases de esta semana ──────────
// Solo lo que le importa al coach: qué clases tiene agendadas en los próximos 7 días.
function CoachDashboardPanel({ students, scheduledClasses, onSelectStudent, onAssignTime, onRemoveLegacy, onEditScheduledClass, onDeleteScheduledClass, onCompleteScheduledClass }) {
  const today = todayISO();
  const ahead = (d) => Math.round((new Date(d) - new Date(today)) / 86400000);
  const open = (s) => { if (s && onSelectStudent) onSelectStudent(s); };
  const studentMap = new Map((students || []).map(s => [s.id, s]));

  const exactSchedule = sortScheduledClasses((scheduledClasses || [])
    .map(normalizeScheduledClass)
    .filter(c => {
      const d = daysFromToday(c.class_date);
      return isUpcomingClass(c) && d !== null && d >= 0 && d < 7;
    }));
  const legacySchedule = students
    .filter(s => s.next_class && s.next_class >= today && ahead(s.next_class) < 7)
    .sort((a, b) => a.next_class.localeCompare(b.next_class));
  const rows = exactSchedule.length
    ? exactSchedule.map(item => ({ type: 'schedule', item }))
    : legacySchedule.map(student => ({ type: 'legacy', student }));

  return (
    <div style={{marginBottom: 24}}>
      <div className="section-label" style={{marginBottom: 10}}>AGENDA DE ESTA SEMANA</div>
      {rows.length === 0 ? (
        <div style={{background:'var(--white)', border:'1px solid var(--border)', borderRadius:14, padding:'16px', fontSize:'0.85rem', color:'var(--text-secondary)', textAlign:'center'}}>
          No hay clases agendadas para los próximos 7 días.
        </div>
      ) : (
        <div style={{background:'var(--white)', border:'1px solid var(--border)', borderRadius:14, padding:'2px 16px'}}>
          {rows.map((row, i) => {
            const item = row.item;
            const s = row.type === 'schedule' ? studentMap.get(item.student_id) : row.student;
            const date = row.type === 'schedule' ? item.class_date : s.next_class;
            const d = ahead(date);
            const when = row.type === 'schedule'
              ? `${d === 0 ? 'Hoy' : d === 1 ? 'Mañana' : formatDateEs(date)} · ${scheduleTimeText(item)}`
              : `${d === 0 ? 'Hoy' : d === 1 ? 'Mañana' : formatDateEs(date)} · sin hora`;
            const title = row.type === 'schedule' ? scheduleRowTitle(item, studentMap) : s.name;
            const rowButton = (
              <button onClick={() => row.type === 'schedule' ? onEditScheduledClass(item) : onAssignTime(s)} style={{
                width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', gap:10,
                background:'none', border:'none', borderTop: i === 0 ? 'none' : '1px solid var(--border)',
                padding:'13px 0', cursor:'pointer', textAlign:'left',
              }}>
                <span style={{fontSize:'0.9rem', fontWeight:600, color:'var(--text-primary)'}}>{title}</span>
                <span style={{flexShrink:0, fontSize:'0.82rem', fontWeight:700, color: d <= 1 ? 'var(--green-mid)' : 'var(--text-secondary)'}}>{when}</span>
              </button>
            );
            return row.type === 'schedule' ? (
              <SwipeActionsRow
                key={item.id}
                actions={[
                  { label: 'Dada', tone: 'primary', onClick: () => onCompleteScheduledClass(item) },
                  { label: 'Editar', tone: 'secondary', onClick: () => onEditScheduledClass(item) },
                  { label: 'Eliminar', tone: 'danger', onClick: () => onDeleteScheduledClass(item) },
                ]}>
                {rowButton}
              </SwipeActionsRow>
            ) : (
              <SwipeActionsRow
                key={s.id}
                actions={[
                  { label: 'Asignar hora', tone: 'secondary', onClick: () => onAssignTime(s) },
                  { label: 'Quitar', tone: 'danger', onClick: () => onRemoveLegacy(s) },
                ]}>
                {rowButton}
              </SwipeActionsRow>
            );
          })}
        </div>
      )}
    </div>
  );
}

function daysFromToday(dateStr) {
  if (!dateStr) return null;
  const today = new Date(todayISO() + 'T00:00:00');
  const date = new Date(dateStr + 'T00:00:00');
  return Math.round((date - today) / 86400000);
}

function dueLabel(dateStr) {
  const diff = daysFromToday(dateStr);
  if (diff === null) return '';
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  if (diff > 1 && diff < 7) return formatDateEs(dateStr);
  if (diff < 0) return 'Atrasada';
  return formatDateEs(dateStr);
}

function paymentDueLabel(payment) {
  if (payment.status === 'paid') return 'Pagado';
  if (!payment.due_date) return 'Pendiente';
  const diff = daysFromToday(payment.due_date);
  if (diff === 0) return 'Vence hoy';
  if (diff === 1) return 'Vence mañana';
  if (diff < 0) return `Vencido · ${Math.abs(diff)} días`;
  return `Vence ${formatDateEs(payment.due_date)}`;
}

function scheduleStatusLabel(status) {
  if (status === 'confirmed') return 'Confirmada';
  if (status === 'completed') return 'Completada';
  if (status === 'cancelled') return 'Cancelada';
  return 'Agendada';
}

function scheduleRowTitle(item, studentMap) {
  const student = studentMap.get(item.student_id);
  return student?.name || item.title || 'Clase';
}

function scheduleRowSub(item) {
  const duration = `${Number(item.duration_minutes || 60)} min`;
  return item.court ? `${duration} · ${item.court}` : duration;
}

    .map(normalizeScheduledClass)
    .filter(isUpcomingClass));
  const todaySchedule = activeSchedule.filter(c => c.class_date === today);
  const futureSchedule = activeSchedule.filter(c => {
    const diff = daysFromToday(c.class_date);
    return diff !== null && diff > 0;
  });
  const paidThisMonthRows = (payments || [])
    .filter(p => p.status === 'paid' && String(p.paid_at || p.created_at || '').slice(0, 7) === monthKey)
    .sort((a, b) => String(b.paid_at || b.created_at || '').localeCompare(String(a.paid_at || a.created_at || '')));
  const paidThisMonth = paidThisMonthRows.reduce((sum, p) => sum + Number(p.amount || 0), 0);
  const pendingPayments = (payments || [])
    .filter(p => p.status !== 'paid')
    .sort((a, b) => String(a.due_date || '9999').localeCompare(String(b.due_date || '9999')));
  const pendingTotal = pendingPayments.reduce((sum, p) => sum + Number(p.amount || 0), 0);
  const activeBonuses = (bonuses || []).filter(b => b.status !== 'exhausted' && Number(b.remaining_classes || 0) > 0);
  const lowBonuses = activeBonuses
    .filter(b => Number(b.remaining_classes || 0) <= Number(b.alert_at || 3))
    .sort((a, b) => Number(a.remaining_classes || 0) - Number(b.remaining_classes || 0));
  const paymentSwipeActions = payment => [
    { label: 'Editar', tone: 'secondary', onClick: () => { onClose(); onEditPayment(payment); } },
    { label: 'Eliminar', tone: 'danger', onClick: () => onDeletePayment(payment) },
  ];
  const bonusSwipeActions = bonus => [
    { label: 'Editar', tone: 'secondary', onClick: () => { onClose(); onEditBonus(bonus); } },
    { label: 'Eliminar', tone: 'danger', onClick: () => onDeleteBonus(bonus) },
  ];

  let title = '';
  let subtitle = '';
  let stats = [];
  let rows = null;

  if (type === 'income') {
    title = 'Ingresos del mes';
    subtitle = 'Pagos marcados como cobrados durante el mes actual.';
    stats = [
      { value: moneyFmt(paidThisMonth), label: 'Cobrado' },
      { value: paidThisMonthRows.length, label: 'Pagos' },
    ];
    rows = paidThisMonthRows.length ? paidThisMonthRows.map(payment => {
      const student = studentMap.get(payment.student_id);
      const title = student?.name || payment.title || 'Pago';
      return (
        <SwipeActionsRow key={payment.id} actions={paymentSwipeActions(payment)}>
          <div className="coach-detail-row">
            <div>
              <div className="coach-detail-row-title">{title}</div>
              <div className="coach-detail-row-sub">{payment.title || 'Pago'} · {formatDateEs(String(payment.paid_at || payment.created_at || today).slice(0, 10))}</div>
            </div>
            <div className="coach-detail-row-value">{moneyFmt(payment.amount)}</div>
          </div>
        </SwipeActionsRow>
      );
    }) : <div className="coach-home-empty">Todavía no hay pagos cobrados este mes.</div>;
  } else if (type === 'receivable') {
    title = 'Pagos pendientes';
    subtitle = 'Pagos pendientes ordenados por vencimiento.';
    stats = [
      { value: moneyFmt(pendingTotal), label: 'Pendiente' },
      { value: pendingPayments.length, label: 'Cobros' },
    ];
    rows = pendingPayments.length ? pendingPayments.map(payment => {
      const student = studentMap.get(payment.student_id);
      const title = student?.name || payment.title || 'Pago';
      return (
        <SwipeActionsRow key={payment.id} actions={paymentSwipeActions(payment)}>
          <div className="coach-detail-row">
            <div>
              <div className="coach-detail-row-title">{title}</div>
              <div className="coach-detail-row-sub">{paymentDueLabel(payment)}</div>
            </div>
            <div className="coach-detail-row-actions">
              <div className="coach-detail-row-value">{moneyFmt(payment.amount)}</div>
              <button className="coach-home-mini-btn" data-swipe-ignore onClick={() => onMarkPaymentPaid(payment)}>Cobrar</button>
            </div>
          </div>
        </SwipeActionsRow>
      );
    }) : <div className="coach-home-empty">No hay pagos pendientes.</div>;
  } else if (type === 'classesToday') {
    const scheduleRows = [...todaySchedule, ...futureSchedule].slice(0, 12);
    title = 'Agenda de clases';
    subtitle = 'Hoy y próximas clases con hora.';
    stats = [
      { value: todaySchedule.length, label: 'Hoy' },
      { value: futureSchedule.length, label: 'Futuras' },
      { value: todayCount, label: 'Reportes hoy' },
    ];
    rows = scheduleRows.length ? scheduleRows.map(item => (
      <div key={item.id} className="coach-detail-row">
        <div>
          <div className="coach-detail-row-title">{scheduleRowTitle(item, studentMap)}</div>
          <div className="coach-detail-row-sub">{formatDateEs(item.class_date)} · {scheduleTimeText(item)} · {scheduleRowSub(item)}</div>
        </div>
        <div className="coach-detail-row-actions">
          <span className="coach-home-badge">{scheduleStatusLabel(item.status)}</span>
          <button className="coach-home-mini-btn coach-home-mini-btn--light" onClick={() => { onClose(); onEditScheduledClass(item); }}>Reprogramar</button>
        </div>
      </div>
    )) : <div className="coach-home-empty">No hay clases agendadas. Usa Agendar clase para poner hora y cancha.</div>;
  } else {
    const rowsToShow = lowBonuses.length ? lowBonuses : activeBonuses;
    title = 'Bonos por agotarse';
    subtitle = lowBonuses.length ? 'Bonos que ya llegaron al umbral de alerta.' : 'Bonos activos registrados.';
    stats = [
      { value: lowBonuses.length, label: 'Por agotarse' },
      { value: activeBonuses.length, label: 'Activos' },
    ];
    rows = rowsToShow.length ? rowsToShow.map(bonus => {
      const student = studentMap.get(bonus.student_id);
      const remaining = Number(bonus.remaining_classes || 0);
      const total = Math.max(1, Number(bonus.total_classes || 1));
      return (
        <SwipeActionsRow key={bonus.id} actions={bonusSwipeActions(bonus)}>
          <div className="coach-detail-row">
            <div>
              <div className="coach-detail-row-title">{student?.name || bonus.name || 'Bono'}</div>
              <div className="coach-detail-row-sub">{bonus.name || `Bono ${total} clases`} · quedan {remaining} de {total}</div>
            </div>
            <div className="coach-detail-row-actions">
              <div className="coach-detail-row-value">{remaining}/{total}</div>
              <button className="coach-home-mini-btn" data-swipe-ignore onClick={() => onUseBonus(bonus)}>Descontar</button>
            </div>
          </div>
        </SwipeActionsRow>
      );
    }) : <div className="coach-home-empty">No hay bonos activos registrados.</div>;
  }

  return (
    <div className="coach-detail-backdrop" onClick={onClose}>
      <div className="coach-detail-panel" role="dialog" aria-modal="true" aria-label={title} onClick={e => e.stopPropagation()}>
        <div className="coach-detail-header">
          <div>
            <div className="coach-detail-title">{title}</div>
            <div className="coach-detail-subtitle">{subtitle}</div>
          </div>
          <button className="coach-detail-close" onClick={onClose} aria-label="Cerrar">×</button>
        </div>
        <div className="coach-detail-body">
          <div className="coach-detail-summary">
            {stats.map(stat => (
              <div key={stat.label} className="coach-detail-stat">
                <div className="coach-detail-stat-value">{stat.value}</div>
                <div className="coach-detail-stat-label">{stat.label}</div>
              </div>
            ))}
          </div>
          <div className="coach-detail-list">{rows}</div>
        </div>
      </div>
    </div>
  );
}

function CoachHomeOverview({ students, payments, bonuses, scheduledClasses, unreadFeedback, todayCount, selectedDetail, onRegisterClass, onSelectStudent, onOpenStudents, onAddPayment, onAddBonus, onAddScheduledClass, onAssignTime, onRemoveLegacy, onEditScheduledClass, onDeleteScheduledClass, onCompleteScheduledClass, onMarkPaymentPaid, onUseBonus, onEditPayment, onDeletePayment, onEditBonus, onDeleteBonus, onOpenFeedbackStudent, onOpenDetail }) {
  const today = todayISO();

    const diff = daysFromToday(c.class_date);
    return diff !== null && diff >= 0 && diff < 7;
  });

  const upcomingSchedule = weekSchedule.filter(c => c.class_date !== today);
  const legacyUpcoming = students

  const legacyToday = legacyUpcoming.filter(s => s.next_class === today);
  const agendaItems = todaySchedule.length
    ? todaySchedule.slice(0, 4).map(item => ({ type: 'schedule', item }))
    : legacyToday.slice(0, 4).map(student => ({ type: 'legacy', student }));
  const studentsWithoutNext = students.filter(s => !s.next_class).length;
  const paidThisMonth = (payments || [])
    .filter(p => p.status === 'paid' && String(p.paid_at || p.created_at || '').slice(0, 7) === monthKey)
    .reduce((sum, p) => sum + Number(p.amount || 0), 0);
  const pendingPayments = (payments || [])
    .filter(p => p.status !== 'paid')
    .sort((a, b) => String(a.due_date || '9999').localeCompare(String(b.due_date || '9999')));
  const pendingTotal = pendingPayments.reduce((sum, p) => sum + Number(p.amount || 0), 0);
  const activeBonuses = (bonuses || []).filter(b => b.status !== 'exhausted' && Number(b.remaining_classes || 0) > 0);
  const lowBonuses = activeBonuses

  const bonusesToShow = lowBonuses.length ? lowBonuses : activeBonuses;
  const unreadFeedbackRows = unreadFeedback || [];
  const firstFeedback = unreadFeedbackRows[0];
  const firstFeedbackStudent = firstFeedback ? studentMap.get(firstFeedback.student_id) : null;
  const todayClassesValue = Math.max(todaySchedule.length, legacyToday.length, todayCount);
  const todayClassesMeta = todaySchedule.length && todayCount
    ? `${todaySchedule.length} agendadas · ${todayCount} reportes`
    : todaySchedule.length
      ? 'Agendadas'
      : 'Reportes guardados';
  const alerts = [];

  if (todaySchedule.length > 0) {
    const nextToday = todaySchedule[0];
    alerts.push(`${nextToday.start_time ? `Próxima clase hoy a las ${formatTimeShort(nextToday.start_time)}` : 'Clase hoy'} · ${scheduleRowTitle(nextToday, studentMap)}`);
  } else if (legacyToday.length > 0) {
    alerts.push(`${legacyToday.length} ${legacyToday.length === 1 ? 'clase' : 'clases'} hoy sin hora`);
  } else {
    alerts.push('No hay clases agendadas para hoy');
  }
  if (upcomingSchedule.length > 0) {
    alerts.push(`${upcomingSchedule.length} ${upcomingSchedule.length === 1 ? 'clase futura' : 'clases futuras'} con hora en los próximos 7 días`);
  } else if (legacyUpcoming.length > legacyToday.length) {
    alerts.push(`${legacyUpcoming.length - legacyToday.length} ${legacyUpcoming.length - legacyToday.length === 1 ? 'clase futura' : 'clases futuras'} sin hora`);
  }
  if (studentsWithoutNext > 0) {
    alerts.push(`${studentsWithoutNext} ${studentsWithoutNext === 1 ? 'alumno sin próxima clase' : 'alumnos sin próxima clase'}`);
  }
  if (pendingPayments.length > 0) {
    alerts.push(`${pendingPayments.length} ${pendingPayments.length === 1 ? 'pago pendiente' : 'pagos pendientes'}`);
  }
  if (lowBonuses.length > 0) {
    alerts.push(`${lowBonuses.length} ${lowBonuses.length === 1 ? 'bono por agotarse' : 'bonos por agotarse'}`);

  if (alerts.length === 0) alerts.push('Todo al día por ahora');
  const paymentSwipeActions = payment => [
    { label: 'Editar', tone: 'secondary', onClick: () => onEditPayment(payment) },
    { label: 'Eliminar', tone: 'danger', onClick: () => onDeletePayment(payment) },
  ];
  const bonusSwipeActions = bonus => [
    { label: 'Editar', tone: 'secondary', onClick: () => onEditBonus(bonus) },
    { label: 'Eliminar', tone: 'danger', onClick: () => onDeleteBonus(bonus) },
  ];

  const kpis = [
    { type: 'income', label: 'Ingresos del mes', value: moneyFmt(paidThisMonth), meta: 'Pagos cobrados' },
    { type: 'receivable', label: 'Pagos pendientes', value: moneyFmt(pendingTotal), meta: pendingPayments.length ? `${pendingPayments.length} pendiente${pendingPayments.length === 1 ? '' : 's'}` : 'Al día' },
    { type: 'classesToday', label: 'Clases hoy', value: todayClassesValue, meta: todayClassesMeta },
    { type: 'lowBonuses', label: 'Bonos por agotarse', value: lowBonuses.length, meta: activeBonuses.length ? `${activeBonuses.length} activos` : 'Sin bonos activos' },
  ];

  return (
    <div className="coach-home">
      <div className="coach-home-actions">
        <div className="coach-home-eyebrow">Inicio del coach</div>
        <button className="coach-home-link" onClick={onRegisterClass}>+ Nueva clase ↗</button>

      <div className="coach-home-kpis">

          return (

              className={`coach-home-kpi${selected ? ' coach-home-kpi--selected' : ''}`}
              onClick={() => onOpenDetail(kpi.type)}
              aria-pressed={selected}
            >
              <div>
                <div className="coach-home-kpi-label">{kpi.label}</div>
                <div className="coach-home-kpi-meta">{kpi.meta}</div>

              <div className="coach-home-kpi-value">{kpi.value}</div>

          <div className="coach-home-section-title">Agenda de hoy</div>

                  key={s.id}
                  actions={[
                    { label: 'Asignar hora', tone: 'secondary', onClick: () => onAssignTime(s) },

                    <div className="coach-home-row-main">
                      <div className="coach-home-row-title">{s.name}</div>
                      <div className="coach-home-row-sub">{s.level || 'Alumno'} · toca para poner hora</div>
                    </div>
                    <span className="coach-home-badge coach-home-badge--muted">Sin hora</span>
                  </button>
                </SwipeActionsRow>
              );
            }
            const item = row.item;
            const student = studentMap.get(item.student_id);
            return (
              <SwipeActionsRow
                key={item.id}
                actions={[
                  { label: 'Dada', tone: 'primary', onClick: () => onCompleteScheduledClass(item) },
                  { label: 'Editar', tone: 'secondary', onClick: () => onEditScheduledClass(item) },
                  { label: 'Eliminar', tone: 'danger', onClick: () => onDeleteScheduledClass(item) },

                <button className="coach-home-row" onClick={() => onEditScheduledClass(item)}>
                  <div className="coach-home-time">{scheduleTimeText(item)}</div>

                </button>

      <section className="coach-home-section">

          {pendingPayments.length === 0 ? (
            <div className="coach-home-empty">Sin pagos pendientes.</div>

            const student = studentMap.get(payment.student_id);

              <SwipeActionsRow
                key={payment.id}
                actions={paymentSwipeActions(payment)}>
                <div className="coach-home-pay-row">
                  <div className="coach-home-initials">{initials(title)}</div>
                  <div className="coach-home-row-main">
                    <div className="coach-home-row-title">{title}</div>
                    <div className="coach-home-row-sub">{paymentDueLabel(payment)}</div>

                  <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6}}>
                    <div className="coach-home-amount">{moneyFmt(payment.amount)}</div>

            return (
              <SwipeActionsRow
                key={bonus.id}
                actions={bonusSwipeActions(bonus)}>
                <div className="coach-home-bonus-row">
                  <div className="coach-home-bonus-top">
                    <div className="coach-home-bonus-main">
                      <div className="coach-home-row-title">{student?.name || bonus.name || 'Bono'}</div>
                      <div className="coach-home-row-sub">{bonus.name || `Bono ${total} clases`}</div>

                    <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6, flexShrink:0}}>

                      <button
                        className="coach-home-mini-btn"
                        data-swipe-ignore
                        title="Descontar 1 clase manualmente"
                        onClick={() => onUseBonus(bonus)}>
                        Descontar
                      </button>
                    </div>
                  </div>
                  <div className="coach-home-meter"><span style={{width:`${pct}%`}} /></div>
                </div>
              </SwipeActionsRow>
            );
          })}
        </div>
      </section>

      <section className="coach-home-section" style={{marginBottom: 8}}>
        <div className="coach-home-section-head">
          <div className="coach-home-section-title">Atención</div>

                </svg>
              </div>
              <div className="coach-home-alert-text">
                {unreadFeedbackRows.length} comentario{unreadFeedbackRows.length === 1 ? '' : 's'} nuevo{unreadFeedbackRows.length === 1 ? '' : 's'}
                {firstFeedbackStudent ? ` · ${firstFeedbackStudent.name}` : ''}
              </div>
            </button>
          )}
          {alerts.slice(0, 3).map((alert, i) => (
            <div key={alert} className="coach-home-alert">
              <div className="coach-home-alert-icon">{i === 0 ? '!' : '·'}</div>
              <div className="coach-home-alert-text">{alert}</div>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}
