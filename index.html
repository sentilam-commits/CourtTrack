          <label className="field-label">Nombre completo</label>
          <input className="field-input" value={name}
            onChange={e => setName(e.target.value)} placeholder="María Álvarez"
            onKeyDown={e => e.key === 'Enter' && save()} />
        </div>
        <div className="form-field">
          <label className="field-label">Nivel</label>
          <div className="chips" style={{marginTop: 8}}>
            {levels.map(l => (
              <Chip key={l} label={l} on={level === l}
                onClick={() => setLevel(level === l ? '' : l)} />
            ))}
          </div>
        </div>

        {/* Delete student section */}
        <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)'}}>
          {!confirmDelete ? (
            <button onClick={() => setConfirmDelete(true)} style={{
              background:'none', border:'none', color:'#c0392b',
              fontSize:'0.88rem', fontWeight:600, cursor:'pointer', padding:0
            }}>Eliminar alumno</button>
          ) : (
            <div style={{background:'#fdf0ef', borderRadius:12, padding:16}}>
              <p style={{fontSize:'0.88rem', fontWeight:600, color:'#c0392b', marginBottom:8}}>¿Eliminar a {student.name}?</p>
              <p style={{fontSize:'0.82rem', color:'var(--text-secondary)', marginBottom:16, lineHeight:1.5}}>
                Se eliminarán el alumno y todas sus clases registradas. Esta acción no se puede deshacer.
              </p>
              <div style={{display:'flex', gap:8}}>
                <button onClick={() => setConfirmDelete(false)} style={{
                  flex:1, height:44, borderRadius:10, border:'1.5px solid var(--border)',
                  background:'var(--white)', fontSize:'0.88rem', fontWeight:600, cursor:'pointer',
                  color:'var(--text-primary)'
                }}>Cancelar</button>
                <button onClick={deleteStudent} disabled={deleting} style={{
                  flex:1, height:44, borderRadius:10, border:'none',
                  background:'#c0392b', color:'white', fontSize:'0.88rem', fontWeight:600, cursor:'pointer'
                }}>{deleting ? 'Eliminando...' : 'Sí, eliminar'}</button>
              </div>
            </div>
          )}
        </div>
      </div>
      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || !name.trim()}>
          {loading ? 'Guardando...' : 'Guardar cambios'}
        </button>
      </div>
    </div>
  );
}

function EditLogScreen({ log, student, onBack, onSaved }) {
  const [focus, setFocus]           = useState(toArr(log.today_focus));
  const [improved, setImproved]     = useState(toArr(log.what_improved));
  const [correction, setCorrection] = useState(log.main_correction || '');
  const [homework, setHomework]     = useState(toArr(log.homework));
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');

  // Visual reference state (pre-fill from existing log)
  const [mediaUrl, setMediaUrl]           = useState(log.media_url || '');
  const [mediaType, setMediaType]         = useState(log.media_type || '');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat]       = useState(log.visual_what || '');
  const [visualCorrection, setVisualCorrection] = useState(log.visual_correction || '');
  const [visualTask, setVisualTask]       = useState(log.visual_task || '');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat')       setVisualWhat(val);
    if (key === 'visualCorrection') setVisualCorrection(val);
    if (key === 'visualTask')       setVisualTask(val);
  }

  async function save() {
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    try {
      const { data, error } = await sb.from('class_logs')
        .update({
          today_focus:       fromArr(focus),
          what_improved:     fromArr(improved),
          main_correction:   correction.trim() || null,
          homework:          fromArr(homework),
          media_url:         mediaUrl || null,
          media_type:        mediaType || null,
          visual_what:       visualWhat.trim() || null,
          visual_correction: null,
          visual_task:       null,
        })
        .eq('id', log.id)
        .select().single();
      if (error) throw error;
      onSaved(data);
    } catch(e) { setError(e.message); setLoading(false); }
  }

  return (
    <div className="screen">
      <Header title="Editar clase" onBack={onBack} right={formatDateEs(log.date)} />
      <div className="screen-content log-content">
        <div className="student-pill">
          <div className="student-pill-sq" />
          {student.name}
        </div>

        <div className="log-section">
          <div className="log-section-lbl">
            ¿QUÉ TRABAJARON HOY?
            {focus.length > 0 && <span style={{color:'var(--green-mid)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup chips={getCoachChips(log.coach_id, 'focus', DEFAULT_FOCUS)}
            addLabel="+ Otro" values={focus} onChange={setFocus}
            onNewChip={chip => saveCoachChip(log.coach_id, 'focus', chip)}
            onEditChip={(old, nw) => editCoachChip(log.coach_id, 'focus', old, nw)}
            onDeleteChip={chip => deleteCoachChip(log.coach_id, 'focus', chip)} />
        </div>

        <div className="log-section">
          <div className="log-section-lbl log-section-lbl--green">
            LO QUE MEJORÓ
            {improved.length > 0 && <span style={{marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup chips={getCoachChips(log.coach_id, 'improved', DEFAULT_IMPROVED)}
            addLabel="+ Escribir" values={improved} onChange={setImproved}
            onNewChip={chip => saveCoachChip(log.coach_id, 'improved', chip)}
            onEditChip={(old, nw) => editCoachChip(log.coach_id, 'improved', old, nw)}
            onDeleteChip={chip => deleteCoachChip(log.coach_id, 'improved', chip)} />
        </div>

        <div className="log-section">
          <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
            <div className="log-section-lbl log-section-lbl--orange" style={{marginBottom:0}}>
              QUÉ NECESITA CORREGIR
              {correction.trim() && <span style={{marginLeft:6}}>✓</span>}
            </div>
            <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
          </div>
          <textarea className="log-textarea" value={correction}
            onChange={e => setCorrection(e.target.value)}
            placeholder="ej: Mejorar el agarre en el revés, bajar más en la volea..." rows={3} />
        </div>

        <div className="log-section">
          <div className="log-section-lbl">
            TAREA PARA CASA
            {homework.length > 0 && <span style={{color:'var(--text-secondary)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup chips={getCoachChips(log.coach_id, 'homework', DEFAULT_HOMEWORK)}
            addLabel="+ Escribir" values={homework} onChange={setHomework}
            onNewChip={chip => saveCoachChip(log.coach_id, 'homework', chip)}
            onEditChip={(old, nw) => editCoachChip(log.coach_id, 'homework', old, nw)}
            onDeleteChip={chip => deleteCoachChip(log.coach_id, 'homework', chip)} />
        </div>

        <VisualReferenceSection
          coachId={student.coach_id} studentId={student.id}
          mediaUrl={mediaUrl} mediaType={mediaType} localPreview={localPreview}
          uploading={mediaUploading} uploadError={uploadError}
          visualWhat={visualWhat}
          onMediaChange={handleMediaChange} onFieldChange={handleVisualField}
        />

        {error && <div className="error-msg">{error}</div>}
      </div>
      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || mediaUploading}>
          {loading ? 'Guardando...' : mediaUploading ? 'Subiendo archivo…' : 'Guardar cambios'}
        </button>
      </div>
    </div>
  );
}

// ── S13 Student Profile ──────────────────────────────────────
function StudentProfileScreen({ student, coachId, onBack, onEdit, onRegisterClass, onLogDeleted }) {
  const [logs, setLogs]           = useState([]);
  const [loading, setLoading]     = useState(true);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [shareCopied, setShareCopied]     = useState(false);

  const shareBase = location.origin.includes('localhost') || location.protocol === 'file:'
    ? 'https://padel-log-app.vercel.app'
    : location.origin;
  const shareUrl = `${shareBase}/#/p/${student.id}`;

  function shareStudent() {
    if (navigator.share) {
      navigator.share({ title: 'Padel Log', url: shareUrl }).catch(() => {});
    } else {
      try {
        navigator.clipboard.writeText(shareUrl);
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = shareUrl; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2000);
    }
  }

  useEffect(() => {
    sb.from('class_logs')
      .select('*')
      .eq('student_id', student.id)
      .is('deleted_at', null)
      .order('date', { ascending: false })
      .then(({ data }) => { setLogs(data || []); setLoading(false); });
  }, [student.id]);

  async function deleteLog(logId) {
    const { error } = await sb.from('class_logs').update({ deleted_at: new Date().toISOString() }).eq('id', logId);
    if (error) {
      alert('No se pudo eliminar la clase. Verificá tu conexión e intentá de nuevo.');
      setConfirmDelete(null);
      return;
    }
    setLogs(prev => prev.filter(l => l.id !== logId));
    setConfirmDelete(null);
    if (onLogDeleted) onLogDeleted();
  }

  return (
    <div className="screen">
      <Header title={student.name} onBack={onBack} />
      <div className="screen-content">

        {/* Student info card */}
        <div style={{
          background:'var(--white)', border:'1.5px solid var(--border)',
          borderRadius:16, padding:'20px', marginBottom:24, marginTop:8,
          position:'relative'
        }}>
          {/* Share button — top right */}
          <button onClick={shareStudent} title="Compartir reporte" style={{
            position:'absolute', top:14, right:14,
            width:34, height:34, borderRadius:10,
            border:'1.5px solid var(--border)', background:'var(--bg)',
            display:'flex', alignItems:'center', justifyContent:'center',
            cursor:'pointer', color: shareCopied ? 'var(--green-mid)' : 'var(--text-secondary)',
            transition:'color 0.2s'
          }}>
            {shareCopied
              ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            }
          </button>

          <div style={{display:'flex', alignItems:'center', gap:14, paddingRight:28}}>
            <Avatar name={student.name} size={52} />
            <div>
              <div style={{fontWeight:700, fontSize:'1.1rem'}}>{student.name}</div>
              {student.level && <div style={{fontSize:'0.82rem', color:'var(--text-secondary)', marginTop:2}}>{student.level}</div>}
              <div style={{fontSize:'0.82rem', color:'var(--text-secondary)', marginTop:2}}>{logs.length} clase{logs.length !== 1 ? 's' : ''} registrada{logs.length !== 1 ? 's' : ''}</div>
            </div>
          </div>
          <div style={{display:'flex', gap:8, marginTop:16}}>
            <button onClick={onRegisterClass} className="btn btn-primary" style={{flex:1, height:40, fontSize:'0.85rem'}}>
              + Registrar clase
            </button>
            <button onClick={onEdit} className="btn btn-outline" style={{flex:1, height:40, fontSize:'0.85rem'}}>
              Editar alumno
            </button>
          </div>
        </div>

        {/* Class history */}
        <div className="section-label">HISTORIAL DE CLASES</div>
        {loading && <div className="empty-state">Cargando...</div>}
        {!loading && logs.length === 0 && (
          <div className="empty-state">Sin clases registradas aún.</div>
        )}
        {!loading && logs.length > 0 && (
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            {logs.map(log => {
              const focusArr = toArr(log.today_focus);
              const improvedArr = toArr(log.what_improved);
              const homeworkArr = toArr(log.homework);
              return (
                <div key={log.id} style={{
                  background:'var(--white)', border:'1px solid var(--border)',
                  borderRadius:14, padding:16
                }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                    <div style={{fontSize:'0.82rem', color:'var(--text-secondary)'}}>{formatFullDateEs(log.date)}</div>
                    <div style={{display:'flex', alignItems:'stretch', gap:8}}>
                      {focusArr[0] && <div className="hist-tag">✓ {focusArr[0]}</div>}
                      {confirmDelete === log.id ? (
                        <div style={{display:'flex', alignItems:'center', gap:6}}>
                          <span style={{fontSize:'0.72rem', color:'var(--text-secondary)'}}>¿Borrar?</span>
                          <button onClick={() => deleteLog(log.id)} style={{
                            fontSize:'0.72rem', fontWeight:700, color:'white',
                            background:'#c0392b', border:'none', borderRadius:6,
                            padding:'3px 8px', cursor:'pointer'
                          }}>Sí</button>
                          <button onClick={() => setConfirmDelete(null)} style={{
                            fontSize:'0.72rem', fontWeight:700, color:'var(--text-secondary)',
                            background:'var(--border)', border:'none', borderRadius:6,
                            padding:'3px 8px', cursor:'pointer'
                          }}>No</button>
                        </div>
                      ) : (
                        <button onClick={() => setConfirmDelete(log.id)} style={{
                          background:'none', border:'none', cursor:'pointer',
                          color:'var(--text-hint)', padding:4, lineHeight:0
                        }} title="Borrar clase">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                          </svg>
                        </button>
                      )}
                    </div>
                  </div>
                  {focusArr.length > 0 && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-dark)', marginBottom:4}}>TRABAJARON</div>
                      <div style={{fontSize:'0.88rem'}}>{focusArr.join(', ')}</div>
                    </div>
                  )}
                  {improvedArr.length > 0 && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:4}}>MEJORÓ</div>
                      <div style={{fontSize:'0.88rem'}}>{improvedArr.join(', ')}</div>
                    </div>
                  )}
                  {log.main_correction && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--orange)', marginBottom:4}}>CORREGIR</div>
                      <div style={{fontSize:'0.88rem'}}>{log.main_correction}</div>
                    </div>
                  )}
                  {homeworkArr.length > 0 && (
                    <div style={{marginBottom: (log.media_url || log.visual_what) ? 8 : 0}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--blue-slate)', marginBottom:4}}>TAREA</div>
                      <div style={{fontSize:'0.88rem'}}>{homeworkArr.join(', ')}</div>
                    </div>
                  )}
                  {(log.media_url || log.visual_what) && (
                    <div style={{
                      marginTop:10, borderTop:'1px solid var(--border)', paddingTop:10
                    }}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:8, display:'flex', alignItems:'center', gap:5}}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
                        </svg>
                        REFERENCIA VISUAL
                      </div>
                      {log.media_url && (
                        <div style={{borderRadius:10, overflow:'hidden', background:'#000', marginBottom: log.visual_what ? 8 : 0, lineHeight:0}}>
                          {log.media_type === 'video'
                            ? <VideoPlayer src={log.media_url} maxHeight={200} />
                            : <a href={log.media_url} target="_blank" rel="noopener noreferrer">
                                <img src={log.media_url} alt="Referencia visual" loading="lazy"
                                  style={{width:'100%', maxHeight:200, objectFit:'cover', display:'block', cursor:'zoom-in'}} />
                              </a>
                          }
                        </div>
                      )}
                      {log.visual_what && (
                        <div style={{fontSize:'0.85rem', color:'var(--text-primary)', lineHeight:1.5}}>{log.visual_what}</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <div style={{height:16}} />
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [route, setRoute]                   = useState('loading');
  const [user, setUser]                     = useState(null);
  const [profile, setProfile]               = useState(null);
  const [students, setStudents]             = useState([]);
  const [todayCount, setTodayCount]         = useState(0);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [savedOffline, setSavedOffline]     = useState(false);
  const [selectedLog, setSelectedLog]         = useState(null);
  const [isOffline, setIsOffline]           = useState(!navigator.onLine);
  const [isManaging, setIsManaging]         = useState(false);

  const go = r => {
    setRoute(r);
    if (r && r !== 'loading' && r !== 'auth') {
      LS.set('lastRoute', r);
      LS.set('lastRouteTs', Date.now());
    }
  };

  const publicMatch = () => {
    const m = location.hash.match(/^#\/p\/([0-9a-f-]{36})$/i);
    return m ? m[1] : null;
  };

  // Online/offline detection + queue flush
  useEffect(() => {
    const onOnline  = () => { setIsOffline(false); if (user) flushQueue(user.id); };
    const onOffline = () => setIsOffline(true);
    window.addEventListener('online',  onOnline);
    window.addEventListener('offline', onOffline);
    return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
  }, [user]);

  useEffect(() => {
    const publicId = publicMatch();
    if (publicId) { go({ name: 'public', id: publicId }); return; }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        saveCoachEmail(session.user.email);
        setUser(session.user);
        loadEverything(session.user.id);
      } else {
        go('auth');
      }
    }).catch(() => go('auth'));

    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) { saveCoachEmail(session.user.email); setUser(session.user); loadEverything(session.user.id); }
      else { setUser(null); setProfile(null); go('auth'); }
    });

    const handleHash = () => { const pid = publicMatch(); if (pid) go({ name: 'public', id: pid }); };
    window.addEventListener('hashchange', handleHash);
    return () => { subscription.unsubscribe(); window.removeEventListener('hashchange', handleHash); };
  }, []);

  async function loadEverything(uid) {
    const prof = await fetchProfile(uid);
    if (!prof?.display_name) { go('onboarding'); return; }
    setProfile(prof);
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    const mappedStudents = studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null }));
    setStudents(mappedStudents);

    // Restore last route (no time limit)
    const savedRoute = LS.get('lastRoute');
    const isPublicUrl = !!location.hash.match(/^#\/p\//);
    if (!isPublicUrl && savedRoute && savedRoute !== 'dashboard' && savedRoute !== 'auth' && savedRoute !== 'loading') {
      const rName = typeof savedRoute === 'object' ? savedRoute.name : savedRoute;
      if (['logClass','editLog','share','studentProfile','editStudent'].includes(rName)) {
        const sId = typeof savedRoute === 'object' ? savedRoute.studentId : null;
        const restoredS = sId ? mappedStudents.find(s => s.id === sId) : null;
        if (restoredS) {
          setSelectedStudent(restoredS);
          if (rName === 'editLog' && savedRoute?.logId) {
            const restoredLog = logs.find(l => l.id === savedRoute.logId);
            if (!restoredLog) { go('dashboard'); flushQueue(uid); return; }
            setSelectedLog(restoredLog);
          }
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
        // Student not found (deleted?), fall through to dashboard
      } else if (['pickStudent','addStudent','editProfile','manageStudents'].includes(rName)) {
        setRoute(savedRoute);
        flushQueue(uid);
        return;
      }
    }
    LS.set('lastRoute', 'dashboard');
    go('dashboard');
    flushQueue(uid);
  }

  async function refreshStudents(uid) {
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    setStudents(studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null })));
  }

  // ── Render ──
  if (route?.name === 'public') return <PublicReportScreen studentId={route.id} />;
  if (route === 'loading') return <div className="loading">Cargando…</div>;

  return (
    <>
      <div className={`offline-banner${isOffline ? ' show' : ''}`}>
        Sin conexión — los cambios se guardan localmente
      </div>

      {route === 'auth' && <AuthScreen />}

      {route === 'onboarding' && (
        <OnboardingScreen user={user}
          onDone={prof => { setProfile(prof); refreshStudents(user.id); go('dashboard'); }} />
      )}

      {route === 'dashboard' && (
        <DashboardScreen profile={profile} students={students} todayCount={todayCount}
          onAddStudent={() => go('addStudent')}
          onRegisterClass={() => go('pickStudent')}
          onSelectStudent={s => { setSelectedStudent(s); go({ name: 'studentProfile', studentId: s.id }); }}
          onSignOut={() => { LS.set('lastRoute', null); sb.auth.signOut(); }}
          onEditProfile={() => go('editProfile')}
          onEditStudent={s => { setSelectedStudent(s); go('editStudent'); }}
          onEditLog={(s, log) => { setSelectedStudent(s); setSelectedLog(log); go({ name: 'editLog', studentId: s.id, logId: log.id }); }}
          onManageStudents={() => go('manageStudents')}
          onQuickLog={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'dashboard', studentId: s.id }); }}
          managing={isManaging}
          onManagingChange={setIsManaging} />
      )}

      {route?.name === 'studentProfile' && (
        (() => {
          const s = selectedStudent || students.find(st => st.id === route.studentId);
          return s ? (
            <StudentProfileScreen
              student={s}
              coachId={user.id}
              onBack={() => go('dashboard')}
              onEdit={() => { setSelectedStudent(s); go({ name: 'editStudent', from: 'studentProfile' }); }}
              onRegisterClass={() => { setSelectedStudent(s); go({ name: 'logClass', from: 'studentProfile', studentId: s.id }); }}
              onLogDeleted={() => refreshStudents(user.id)} />
          ) : null;
        })()
      )}

      {route === 'pickStudent' && (
        <PickStudentScreen students={students} onBack={() => go('dashboard')}
          onSelect={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'pickStudent', studentId: s.id }); }} />
      )}

      {route === 'addStudent' && (
        <AddStudentScreen coachId={user.id} onBack={() => go('dashboard')}
          onDone={s => {
            setStudents(prev =>
              [...prev, { ...s, lastLog: null }].sort((a, b) => a.name.localeCompare(b.name))
            );
            go('dashboard');
          }} />
      )}

      {route?.name === 'logClass' && (
        <LogClassScreen student={selectedStudent} coachId={user.id}
          onBack={() => go(route.from === 'dashboard' || route.from === 'studentProfile' ? (route.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard') : 'pickStudent')}
          onSaved={offline => {
            setSavedOffline(offline);
            refreshStudents(user.id);
            go({ name: 'share', studentId: selectedStudent.id });
          }} />
      )}

      {route === 'manageStudents' && (
        <ManageStudentsScreen students={students} onBack={() => go('dashboard')}
          onEditStudent={s => { setSelectedStudent(s); go('editStudent'); }} />
      )}

      {(route === 'editStudent' || route?.name === 'editStudent') && selectedStudent && (
        <EditStudentScreen student={selectedStudent}
          onBack={() => {
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: selectedStudent.id });
            else go('dashboard');
          }}
          onSaved={updated => {
            setStudents(prev => prev.map(s => s.id === updated.id ? { ...s, ...updated } : s));
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: updated.id });
            else go('dashboard');
          }}
          onDeleted={id => {
            setStudents(prev => prev.filter(s => s.id !== id));
            setSelectedStudent(null);
            go('dashboard');
          }} />
      )}

      {(route === 'editLog' || route?.name === 'editLog') && selectedLog && selectedStudent && (
        <EditLogScreen log={selectedLog} student={selectedStudent} onBack={() => go('dashboard')}
          onSaved={updated => {
            refreshStudents(user.id);
            go('dashboard');
          }} />
      )}

      {route === 'editProfile' && (
        <EditProfileScreen user={user} profile={profile} onBack={() => go('dashboard')}
          onSaved={prof => { setProfile(prof); go('dashboard'); }}
          onDeleted={() => { setUser(null); setProfile(null); go('auth'); }} />
      )}

      {(route === 'share' || route?.name === 'share') && (
        <ShareScreen student={selectedStudent} savedOffline={savedOffline}
          onHome={() => { setSelectedStudent(null); setSavedOffline(false); LS.set('lastRoute', null); go('dashboard'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Service Worker registration (requires HTTP/HTTPS, not file://) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(e => console.log('SW registration skipped:', e.message));
    });
  }
</script>

<!-- iOS PWA safe area fix -->
<script>
  // Reset zoom when user finishes typing (blur or enter)
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    var base = 'width=device-width, initial-scale=1, viewport-fit=cover';
    document.addEventListener('focusout', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        vp.setAttribute('content', base + ', maximum-scale=1');
        requestAnimationFrame(function() {
          vp.setAttribute('content', base);
        });
      }
    });
  })();
</script>

<script>
  // iOS home-screen apps expose safe-area values through env().
  if (window.navigator.standalone === true) {
    document.documentElement.classList.add('is-standalone');
  }
</script>
