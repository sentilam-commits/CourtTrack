  <!--
  ══════════════════════════════════════════════
   SQL — Run once in your Supabase SQL Editor

  -- Update get_public_student to include coach profile:
  CREATE OR REPLACE FUNCTION public.get_public_student(public_student_id uuid)
  RETURNS jsonb LANGUAGE sql SECURITY DEFINER SET search_path = public AS $$
    SELECT CASE WHEN s.id IS NULL THEN NULL ELSE jsonb_build_object(
      'student',    to_jsonb(s),
      'class_logs', COALESCE((
        SELECT jsonb_agg(to_jsonb(cl) ORDER BY cl.date DESC, cl.created_at DESC)
        FROM public.class_logs cl WHERE cl.student_id = s.id
      ), '[]'::jsonb),
      'coach', (
        SELECT jsonb_build_object('display_name', p.display_name, 'club_name', p.club_name)
        FROM public.profiles p WHERE p.id = s.coach_id LIMIT 1
      )
    ) END
    FROM public.students s WHERE s.id = public_student_id LIMIT 1;
  $$;
  GRANT EXECUTE ON FUNCTION public.get_public_student(uuid) TO anon, authenticated;

  -- Profiles RLS: run once in Supabase SQL Editor.
  -- The app writes profiles.id = auth.uid(). If your profiles table also has
  -- user_id, the app writes user_id = auth.uid() too.
  ALTER TABLE public.profiles ENABLE ROW LEVEL SECURITY;

  DROP POLICY IF EXISTS "profiles_select_own" ON public.profiles;
  DROP POLICY IF EXISTS "profiles_insert_own" ON public.profiles;
  DROP POLICY IF EXISTS "profiles_update_own" ON public.profiles;

  CREATE POLICY "profiles_select_own"
    ON public.profiles FOR SELECT TO authenticated
    USING (id = auth.uid());

  CREATE POLICY "profiles_insert_own"
    ON public.profiles FOR INSERT TO authenticated
    WITH CHECK (id = auth.uid());

  CREATE POLICY "profiles_update_own"
    ON public.profiles FOR UPDATE TO authenticated
    USING (id = auth.uid())
    WITH CHECK (id = auth.uid());

  -- Referencia Visual: run once in Supabase SQL Editor
  ALTER TABLE public.class_logs
    ADD COLUMN IF NOT EXISTS media_url        TEXT,
    ADD COLUMN IF NOT EXISTS media_type       TEXT,
    ADD COLUMN IF NOT EXISTS visual_what      TEXT,
    ADD COLUMN IF NOT EXISTS visual_correction TEXT,
    ADD COLUMN IF NOT EXISTS visual_task      TEXT;

  -- Storage bucket: run once in Supabase SQL Editor
  INSERT INTO storage.buckets (id, name, public)
    VALUES ('class-media', 'class-media', true)
    ON CONFLICT (id) DO NOTHING;

  CREATE POLICY IF NOT EXISTS "Coaches can upload media"
    ON storage.objects FOR INSERT TO authenticated
    WITH CHECK (bucket_id = 'class-media');

  CREATE POLICY IF NOT EXISTS "Media is public"
    ON storage.objects FOR SELECT TO anon, authenticated
    USING (bucket_id = 'class-media');

  -- Account deletion + data retention: run once in Supabase SQL Editor.
  --
  -- Archive table survives coach deletion (no FK to auth.users). RLS enabled with
  -- NO policies, so coaches can't read it — only the Supabase dashboard / service role.
  -- Each row is a full JSONB snapshot, so every column (incl. media_*/visual_*) is kept.
  CREATE TABLE IF NOT EXISTS public.archived_records (
    id                 uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    kind               text NOT NULL,            -- 'student' | 'class_log' | 'progress_score'
    original_id        uuid,
    coach_id           uuid,
    coach_email        text,
    coach_display_name text,
    data               jsonb NOT NULL,           -- full snapshot of the original row
    archived_at        timestamptz DEFAULT now()
  );
  ALTER TABLE public.archived_records ENABLE ROW LEVEL SECURITY;

  -- Archives the coach's students/classes/scores (with coach email + name), then
  -- deletes the auth user — the cascade clears the live profile/students/logs/scores.
  -- Takes no arguments and uses auth.uid(), so a user can only delete themselves.
  CREATE OR REPLACE FUNCTION public.delete_my_account()
  RETURNS void LANGUAGE plpgsql SECURITY DEFINER SET search_path = public AS $$
  DECLARE
    uid     uuid := auth.uid();
    c_email text;
    c_name  text;
  BEGIN
    IF uid IS NULL THEN RAISE EXCEPTION 'Not authenticated'; END IF;

    SELECT u.email        INTO c_email FROM auth.users u    WHERE u.id = uid;
    SELECT p.display_name INTO c_name  FROM public.profiles p WHERE p.id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'student', s.id, uid, c_email, c_name, to_jsonb(s)
      FROM public.students s WHERE s.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'class_log', cl.id, uid, c_email, c_name, to_jsonb(cl)
      FROM public.class_logs cl WHERE cl.coach_id = uid;

    INSERT INTO public.archived_records (kind, original_id, coach_id, coach_email, coach_display_name, data)
      SELECT 'progress_score', ps.id, uid, c_email, c_name, to_jsonb(ps)
      FROM public.progress_scores ps WHERE ps.coach_id = uid;

    DELETE FROM auth.users WHERE id = uid;
  END;
  $$;
  GRANT EXECUTE ON FUNCTION public.delete_my_account() TO authenticated;

    ADD COLUMN IF NOT EXISTS skills jsonb;

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:     #0E2A1C;
      --green-mid:      #4F8F5F;
      --green-soft:     #E8F0EA;
      --bg:             #ECEEE9;
      --white:          #FFFFFF;
      --orange:         #D47A2F;
      --whatsapp:       #1AAD5E;
      --text-primary:   #0E1311;
      --text-secondary: #888888;
      --text-hint:      #AAAAAA;
      --blue-slate:     #3D6B8A;
      --border:         #E0E4E1;
      --top-safe-area:   0px;
      --header-bottom-gap: 12px;
      --header-height:   64px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
    }

    button, input, textarea, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; border: none; background: none; }
    input, textarea { outline: none; }

    /* ── Offline banner ── */
    .offline-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--orange);
      color: white;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 16px;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .offline-banner.show { transform: translateY(0); }

    /* ── Screen layout ── */
    .screen {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      max-width: 480px;
      margin: 0 auto;
    }

    .screen-content {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen-bottom {
      padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      min-height: var(--header-height);
      padding: var(--top-safe-area) 16px var(--header-bottom-gap);
      background: var(--green-dark);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .header-back {
      color: white;
      font-size: 1.4rem;
      line-height: 1;
      padding: 8px;
      margin-left: -8px;
      min-width: 44px;
      display: flex;
      align-items: center;
    }

    .header-title { flex: 1; text-align: center; font-weight: 600; font-size: 0.95rem; }
    .header-right { min-width: 44px; text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.65); }
    .header-spacer { min-width: 44px; }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 5px; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .logo-dot  { color: var(--green-mid); font-size: 0.55rem; line-height: 1; animation: pulse-dot 2.8s ease-in-out infinite; }
    .logo-text { font-size: 1rem; color: white; letter-spacing: -0.01em; }
    .logo-text strong { font-weight: 700; }

    /* ── Avatar ── */
    .avatar {
      background: var(--green-soft);
      color: var(--green-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Student card ── */
    .student-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      height: 64px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
      width: 100%;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .student-card:active { opacity: 0.85; }
    .student-card--hl { border-color: var(--green-dark); border-width: 2px; }

    .sc-info { flex: 1; min-width: 0; overflow: hidden; }
    .sc-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-sub  { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .sc-chev { color: var(--text-hint); font-size: 1.1rem; line-height: 1; flex-shrink: 0; }

    .student-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .chip:active { opacity: 0.8; }
    .chip-edit-wrap { display: inline-flex; align-items: center; gap: 4px; }
    .chip-edit-input {
      height: 36px; padding: 0 12px;
      border: 2px solid var(--green-dark); border-radius: 100px;
      font-size: 16px; font-weight: 500;
      background: var(--white); color: var(--text-primary);
      min-width: 80px; max-width: 160px; outline: none;
    }
    .chip-edit-ok {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--green-dark); color: white;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .chip--on { background: var(--green-dark); border-color: var(--green-dark); color: white; }

    .chip-group { display: flex; flex-direction: column; gap: 10px; }

    .chip-input-row { display: flex; gap: 8px; }
    .chip-input {
      flex: 1; height: 44px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; background: var(--white);
      color: var(--text-primary); font-size: 16px;
    }
    .chip-input:focus { border-color: var(--green-dark); }
    .chip-input-add {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--green-dark); color: white;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; height: 52px; border-radius: 14px;
      font-size: 0.95rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; transition: opacity 0.15s; border: none;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; pointer-events: none; }

    .btn-primary  { background: var(--green-dark); color: white; }
    .btn-outline  { background: var(--white); color: var(--text-primary); border: 1.5px solid var(--border); }
    .btn-whatsapp { background: var(--whatsapp); color: white; }
    .btn-link {
      background: none; border: none;
      color: var(--text-secondary); font-size: 0.9rem;
      text-align: center; width: 100%; padding: 12px; cursor: pointer;
    }

    /* ── Forms ── */
    .form-field { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; height: 52px;
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0 16px; background: var(--white);
      color: var(--text-primary); font-size: 16px;
    }
    .field-input:focus { border-color: var(--green-dark); }

    .error-msg {
      font-size: 0.84rem; color: #c0392b;
      padding: 10px 14px; background: #fdf0ef;
      border-radius: 8px; margin-bottom: 12px;
    }

    .screen-title    { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .screen-subtitle { font-size: 0.88rem; color: var(--text-secondary); }

    .section-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-secondary); margin-bottom: 12px;
    }

    /* ── Auth ── */
    .auth-screen {
      min-height: 100svh; background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 28px; max-width: 480px; margin: 0 auto;
    }
    .auth-logo { margin-bottom: 48px; }
    .auth-logo .logo-text { color: var(--text-primary); font-size: 1.5rem; }
    .auth-logo .logo-dot  { color: var(--green-mid); font-size: 0.9rem; }
    .auth-form { width: 100%; display: flex; flex-direction: column; }
    .auth-form .form-field { margin-bottom: 14px; }
    .auth-form .btn { margin-top: 6px; }
    .auth-toggle {
      text-align: center; margin-top: 16px;
      font-size: 0.88rem; color: var(--text-secondary);
    }
    .auth-toggle button {
      color: var(--green-dark); font-weight: 600;
      text-decoration: underline; font-size: 0.88rem;
    }
    .auth-forgot {
      text-align: right; margin-top: -4px; margin-bottom: 16px;
    }
    .auth-forgot button {
      font-size: 0.82rem; color: var(--text-secondary);
      text-decoration: none; background: none; border: none; cursor: pointer;
    }
    .auth-forgot button:hover { color: var(--green-dark); }
    .auth-success-box {
      width: 100%; background: #f0faf4; border: 1.5px solid var(--green-mid);
      border-radius: 16px; padding: 28px 24px; text-align: center;
    }

    /* ── Dashboard ── */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      min-height: var(--header-height); padding: var(--top-safe-area) 20px var(--header-bottom-gap);
      background: var(--green-dark); position: sticky; top: 0; z-index: 10; flex-shrink: 0;
      box-sizing: border-box;
    }
    .dash-avatar-wrap {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .dash-avatar-wrap .avatar {
      width: 36px !important; height: 36px !important;
      border-radius: 50% !important; background: white !important;
      color: var(--green-dark) !important; font-size: 0.8rem !important;
    }
    .dash-date     { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .dash-greeting { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }

    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .stat-card  { border-radius: 14px; padding: 20px 18px; }
    .stat-card--light { background: var(--white); color: var(--text-primary); }
    .stat-card--dark  { background: var(--green-dark); color: white; }
    .stat-num { font-size: 2.6rem; font-weight: 800; line-height: 1; color: inherit; -webkit-text-fill-color: inherit; }
    .stat-lbl { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 6px; }
    .stat-card--dark .stat-lbl { color: rgba(255,255,255,0.55); }

    .bottom-bar {
      display: flex; gap: 12px; padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg); border-top: 1px solid var(--border);
      position: sticky; bottom: 0; flex-shrink: 0;
    }
    .bottom-bar .btn { flex: 1; }

    /* ── Log Class ── */
    .log-content { padding: 14px 16px max(28px, env(safe-area-inset-bottom)); }

      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 12px;
    }
    .quick-report-copy { min-width: 0; }
    .quick-report-kicker {

      margin-bottom: 4px;

      font-size: 1.28rem; font-weight: 800; line-height: 1.14;

    .required-section .chip-input-row { margin-top: 2px; }

    .required-hint {
      text-align: center; font-size: 0.76rem; color: var(--text-hint);
      margin-top: 8px;

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Supabase ─────────────────────────────────────────────────
const SUPABASE_URL      = 'https://svviqpjdorxiyywnblxt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HSl0bc6L62gGl5egjtVfRg_6DfhA35X';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── LocalStorage cache + offline queue ───────────────────────
const LS = {
  _k: k => 'pl:' + k,
  get(k)    { try { return JSON.parse(localStorage.getItem(this._k(k))); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) { console.warn('LS write:', e); } },
  queue: {
    get()    { return LS.get('q') || []; },
    push(op) { LS.set('q', [...LS.queue.get(), { ...op, _ts: Date.now() }]); },
    set(q)   { LS.set('q', q); },
  },
};

const SAVED_EMAIL_KEY = 'saved_email';
const normalizeEmail = email => (email || '').trim().toLowerCase();
function getSavedCoachEmail() {
  return normalizeEmail(localStorage.getItem(SAVED_EMAIL_KEY) || '');
}
function saveCoachEmail(email) {
  const value = normalizeEmail(email);
  if (value) localStorage.setItem(SAVED_EMAIL_KEY, value);
  return value;
}
function clearLocalStorageKeepingCoachEmail() {
  const savedEmail = getSavedCoachEmail();
  localStorage.clear();
  if (savedEmail) saveCoachEmail(savedEmail);
}

// Attempt to push any queued offline writes to Supabase
async function flushQueue(uid) {
  if (!navigator.onLine) return;
  const q = LS.queue.get();
  if (!q.length) return;
  const failed = [];
  for (const op of q) {
    try {
      if (op.type === 'student') {
        const { data, error } = await sb.from('students').insert(op.data).select().single();
        if (error || !data) { failed.push(op); continue; }
        // replace the tmp entry in cache with the real one
        const studs = (LS.get(`s:${uid}`) || []).map(s => s._tmp === op._ts ? data : s);
        LS.set(`s:${uid}`, studs);
      } else if (op.type === 'log') {
        const { data, error } = await sb.from('class_logs').insert(op.data).select().single();
        if (error || !data) { failed.push(op); continue; }
        const logs = (LS.get(`l:${uid}`) || []).map(l => l._tmp === op._ts ? data : l);
        LS.set(`l:${uid}`, logs);
      }
    } catch (e) { failed.push(op); }
  }
  LS.queue.set(failed);
}

// ── Helpers ──────────────────────────────────────────────────
const initials = name =>
  (name || '?').trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');

const todayISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  return `hace ${diff} días`;
}

function formatDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatFullDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]}`;
}

function shortDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

  if (!str) return [];
  if (Array.isArray(str)) return str;
  return str.split(',').map(s => s.trim()).filter(Boolean);
};

const PROFILE_SAVE_ERROR = 'No pudimos guardar tu perfil. Intenta nuevamente.';
const PROFILE_LOG_PREFIX = '[ProfileSave]';
let profileUserIdColumnSupported = null;

const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

class ProfileSaveError extends Error {
  constructor(kind, message, cause) {
    super(message || kind);
    this.name = 'ProfileSaveError';
    this.kind = kind;
    this.cause = cause;
  }
}

function supabaseErrorInfo(error) {
  return {
    name: error?.name || null,
    message: error?.message || String(error || ''),
    code: error?.code || null,
    status: error?.status || null,
    details: error?.details || null,
    hint: error?.hint || null,
  };
}

function errorText(error) {
  const info = supabaseErrorInfo(error);
  return [info.name, info.message, info.code, info.status, info.details, info.hint]
    .filter(Boolean)
    .join(' ')
    .toLowerCase();
}

function classifyProfileSaveError(error) {
  const text = errorText(error);
  const offline = typeof navigator !== 'undefined' && navigator.onLine === false;
  if (error?.kind === 'session-not-found' || text.includes('session')) return 'session-not-found';
  if (error?.kind === 'missing-user-id' || text.includes('user id')) return 'missing-user-id';
  if (offline || text.includes('load failed') || text.includes('failed to fetch') ||
      text.includes('network') || text.includes('fetcherror')) return 'network';
  if (text.includes('row-level security') || text.includes('rls') || text.includes('42501')) return 'rls';
  return 'supabase';
}

function logProfileSaveFailure(source, kind, error, extra = {}) {
  const label = {
    'session-not-found': 'session not found before saving profile',
    'missing-user-id': 'authenticated user id missing before saving profile',
    network: 'network error while saving profile',
    rls: 'RLS blocked profile save',
    supabase: 'Supabase error while saving profile',
  }[kind] || 'profile save failed';
  console.error(`${PROFILE_LOG_PREFIX} ${label}`, {
    source,
    kind,
    ...extra,
    error: supabaseErrorInfo(error),
  });
}

// Turns a ProfileSaveError (or raw Supabase/network error) into a clear,
// actionable Spanish message. The RLS rejection on profiles only happens when
// there is no authenticated session (auth.uid() is null) — typically a coach
// who signed up but hasn't confirmed their email yet, so we guide them there
// instead of showing a generic "try again".
function profileSaveErrorMessage(error) {
  const kind = error?.kind || classifyProfileSaveError(error);
  switch (kind) {
    case 'session-not-found':
    case 'missing-user-id':
    case 'rls':
      return 'Tu sesión no está activa. Si acabas de registrarte, confirma tu email (revisa tu bandeja de entrada y la carpeta de spam) e inicia sesión. Después vuelve a guardar tu perfil.';
    case 'network':
      return 'No hay conexión estable. Revisa tu internet e inténtalo de nuevo.';
    default:
      return PROFILE_SAVE_ERROR;
  }
}

function isMissingProfileColumn(error, columnName) {
  const text = errorText(error);
  return text.includes(`'${columnName}' column`) ||
         text.includes(`column "${columnName}" does not exist`) ||
         (text.includes(columnName) && text.includes('schema cache'));
}

async function getAuthenticatedUserForProfileSave(fallbackUser, source) {
  let session = null;
  let lastSessionError = null;

  for (let attempt = 1; attempt <= 3; attempt += 1) {
    try {
      const { data, error } = await sb.auth.getSession();
      if (error) throw error;
      session = data?.session || null;
      if (session?.user?.id) break;
      console.warn(`${PROFILE_LOG_PREFIX} session not ready`, { source, attempt });
    } catch (e) {
      lastSessionError = e;
      console.warn(`${PROFILE_LOG_PREFIX} getSession failed`, {
        source,
        attempt,
        error: supabaseErrorInfo(e),
      });
    }
    if (attempt < 3) await sleep(180 * attempt);
  }

  if (!session?.user) {
    logProfileSaveFailure(source, 'session-not-found', lastSessionError, {
      fallbackUserId: fallbackUser?.id || null,
    });
    throw new ProfileSaveError('session-not-found', 'No auth session', lastSessionError);
  }

  if (!session.user.id) {
    logProfileSaveFailure(source, 'missing-user-id', null, {
      fallbackUserId: fallbackUser?.id || null,
    });
    throw new ProfileSaveError('missing-user-id', 'Session user id missing');
  }

  if (fallbackUser?.id && fallbackUser.id !== session.user.id) {
    console.warn(`${PROFILE_LOG_PREFIX} prop user id differs from session user id`, {
      source,
      propUserId: fallbackUser.id,
      sessionUserId: session.user.id,
    });
  }

  let userResult;
  try {
    userResult = await sb.auth.getUser();
  } catch (e) {
    const kind = classifyProfileSaveError(e);
    logProfileSaveFailure(source, kind, e, { sessionUserId: session.user.id });
    throw new ProfileSaveError(kind, 'Could not verify authenticated user', e);
  }

  if (userResult.error) {
    const kind = classifyProfileSaveError(userResult.error);
    logProfileSaveFailure(source, kind, userResult.error, { sessionUserId: session.user.id });
    throw new ProfileSaveError(kind, 'Could not verify authenticated user', userResult.error);
  }

  const verifiedUser = userResult.data?.user || null;
  if (!verifiedUser?.id) {
    logProfileSaveFailure(source, 'missing-user-id', null, { sessionUserId: session.user.id });
    throw new ProfileSaveError('missing-user-id', 'Verified user id missing');
  }

  if (verifiedUser.id !== session.user.id) {
    console.warn(`${PROFILE_LOG_PREFIX} verified user id differs from session user id`, {
      source,
      verifiedUserId: verifiedUser.id,
      sessionUserId: session.user.id,
    });
  }

  console.info(`${PROFILE_LOG_PREFIX} authenticated user verified`, {
    source,
    userId: verifiedUser.id,
  });
  return verifiedUser;
}

async function upsertOwnProfile(profileFields, authUser, source) {
  const basePayload = { id: authUser.id, ...profileFields };
  const attempts = profileUserIdColumnSupported === false
    ? [{ payload: basePayload, hasUserId: false }]
    : [
        { payload: { ...basePayload, user_id: authUser.id }, hasUserId: true },
        { payload: basePayload, hasUserId: false },
      ];

  for (const attempt of attempts) {
    console.info(`${PROFILE_LOG_PREFIX} upserting own profile`, {
      source,
      userId: authUser.id,
      hasUserId: attempt.hasUserId,
    });

    let result;
    try {
      result = await sb.from('profiles').upsert(attempt.payload, { onConflict: 'id' });
    } catch (e) {
      const kind = classifyProfileSaveError(e);
      logProfileSaveFailure(source, kind, e, {
        userId: authUser.id,
        hasUserId: attempt.hasUserId,
      });
      throw new ProfileSaveError(kind, 'Profile upsert failed', e);
    }

    if (!result.error) {
      profileUserIdColumnSupported = attempt.hasUserId;
      console.info(`${PROFILE_LOG_PREFIX} profile saved`, {
        source,
        userId: authUser.id,
        hasUserId: attempt.hasUserId,
      });
      return attempt.payload;
    }

    if (attempt.hasUserId && isMissingProfileColumn(result.error, 'user_id')) {
      profileUserIdColumnSupported = false;
      console.info(`${PROFILE_LOG_PREFIX} profiles.user_id not found; retrying with id only`, {
        source,
        userId: authUser.id,
        error: supabaseErrorInfo(result.error),
      });
      continue;
    }

    const kind = classifyProfileSaveError(result.error);
    logProfileSaveFailure(source, kind, result.error, {
      userId: authUser.id,
      hasUserId: attempt.hasUserId,
    });
    throw new ProfileSaveError(kind, 'Profile upsert failed', result.error);
  }

  throw new ProfileSaveError('supabase', 'Profile upsert did not run');
}

async function saveOwnProfile(profileFields, fallbackUser, source) {
  const authUser = await getAuthenticatedUserForProfileSave(fallbackUser, source);
  const savedProfile = await upsertOwnProfile(profileFields, authUser, source);
  return { user: authUser, profile: savedProfile };
}

async function fetchProfile(uid) {

async function fetchStudentsAndLogs(uid) {
  try {
    const [sr, lr] = await Promise.all([
      sb.from('students').select('*').eq('coach_id', uid).is('deleted_at', null).order('name'),
      sb.from('class_logs').select('*').eq('coach_id', uid).is('deleted_at', null).order('date', { ascending: false }),
    ]);
    if (!sr.error && sr.data) LS.set(`s:${uid}`, sr.data);
    if (!lr.error && lr.data) LS.set(`l:${uid}`, lr.data);
    return {
      studs: sr.data  || LS.get(`s:${uid}`) || [],
      logs:  lr.data  || LS.get(`l:${uid}`) || [],
    };
  } catch(e) {}
  return { studs: LS.get(`s:${uid}`) || [], logs: LS.get(`l:${uid}`) || [] };
}

async function insertStudent({ coachId, name, level }) {
  const payload = { coach_id: coachId, name, level: level || null };
  try {
    const { data, error } = await sb.from('students').insert(payload).select().single();
    if (!error && data) {
      const studs = [...(LS.get(`s:${coachId}`) || []), data]
        .sort((a, b) => a.name.localeCompare(b.name));
      LS.set(`s:${coachId}`, studs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const studs = [...(LS.get(`s:${coachId}`) || []), tmp]
    .sort((a, b) => a.name.localeCompare(b.name));
  LS.set(`s:${coachId}`, studs);
  LS.queue.push({ type: 'student', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

async function insertLog(payload) {
  const { coach_id } = payload;
  try {
    const { data, error } = await sb.from('class_logs').insert(payload).select().single();
    if (!error && data) {
      const logs = [data, ...(LS.get(`l:${coach_id}`) || [])];
      LS.set(`l:${coach_id}`, logs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const logs = [tmp, ...(LS.get(`l:${coach_id}`) || [])];
  LS.set(`l:${coach_id}`, logs);
  LS.queue.push({ type: 'log', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

// ── Linkify ──────────────────────────────────────────────────
function linkify(text) {
  if (!text || typeof text !== 'string') return text;
  const parts = text.split(/(https?:\/\/[^\s]+)/);
  // split with a capturing group: even indices = plain text, odd indices = URLs
  return parts.map((part, i) =>
    i % 2 === 1
      ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" style={{
          color:'var(--green-mid)', textDecoration:'underline', wordBreak:'break-all'
        }}>{part}</a>
      : part
  );
}

// ── Media upload ─────────────────────────────────────────────
async function uploadMedia(file, coachId, studentId) {
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${coachId}/${studentId}/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from('class-media').upload(path, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  const { data: { publicUrl } } = sb.storage.from('class-media').getPublicUrl(path);
  return publicUrl;
}

// ── Chip ─────────────────────────────────────────────────────
function Chip({ label, on, onClick, onLongPress }) {
  const timerRef = useRef(null);
  const longPressRef = useRef(false);

  function startPress(e) {
    if (!onLongPress) return;
    e.preventDefault();
    longPressRef.current = false;
    timerRef.current = setTimeout(() => {
      longPressRef.current = true;
      onLongPress();
      timerRef.current = null;
    }, 500);
  }
  function cancelPress() {
    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
  }
  function handleClick(e) {
    if (longPressRef.current) {
      e.preventDefault();
      longPressRef.current = false;
      return;
    }
    onClick(e);
  }

  return (
    <button
      className={`chip${on ? ' chip--on' : ''}`}
      onClick={handleClick}
      onTouchStart={startPress}
      onTouchEnd={e => { cancelPress(); }}
      onTouchMove={cancelPress}
      onMouseDown={startPress}
      onMouseUp={cancelPress}
      onMouseLeave={cancelPress}
      onContextMenu={e => { e.preventDefault(); onLongPress && onLongPress(); }}
    >
      {on && label !== '+ Otro' && label !== '+ Escribir' ? `${label} ✓` : label}
    </button>
  );
}

// ── ChipGroup ────────────────────────────────────────────────
function ChipGroup({ chips, addLabel, values, onChange, onNewChip, onEditChip, onDeleteChip }) {
  const [showInput, setShowInput]   = useState(false);
  const [inputVal, setInputVal]     = useState('');
  const [editing, setEditing]       = useState(null);
  const [localChips, setLocalChips] = useState(() => chips);
  const inputRef = useRef();
  const editRef  = useRef();

  useEffect(() => {
    setLocalChips(chips);
  }, [chips.join('\u0001')]);

  function toggle(chip) {
    onChange(values.includes(chip) ? values.filter(v => v !== chip) : [...values, chip]);
  }

  function addCustom() {
    const v = inputVal.trim();
    if (v) {
      if (!values.includes(v)) onChange([...values, v]);
      if (!localChips.includes(v)) setLocalChips(prev => [...prev, v]);
      if (onNewChip) onNewChip(v);
    }
    setInputVal(''); setShowInput(false);
  }

  function startEdit(chip) {
    setEditing({ original: chip, value: chip });
    setTimeout(() => editRef.current?.focus(), 50);
  }

  function confirmEdit() {
    if (!editing) return;
    const newVal = editing.value.trim();
    const oldVal = editing.original;
    if (!newVal) {
      if (values.includes(oldVal)) {
        onChange(values.filter(v => v !== oldVal));
      }
      setLocalChips(prev => prev.filter(c => c !== oldVal));
      if (onDeleteChip) onDeleteChip(oldVal);
      setEditing(null);
      return;
    }
    if (newVal !== oldVal) {
      if (values.includes(oldVal)) {
        onChange(values.map(v => v === oldVal ? newVal : v));
      }
      setLocalChips(prev => [...new Set(prev.map(c => c === oldVal ? newVal : c))]);
      if (onEditChip) onEditChip(oldVal, newVal);
    }
    setEditing(null);
  }

  function cancelEdit() { setEditing(null); }

  const customValues = values.filter(v => !localChips.includes(v));

  function renderChip(c) {
    if (editing && editing.original === c) {
      return (
        <span key={c} className="chip-edit-wrap">
          <input
            ref={editRef}
            className="chip-edit-input"
            value={editing.value}
            onChange={e => setEditing(ed => ({ ...ed, value: e.target.value }))}
            onKeyDown={e => { if (e.key === 'Enter') confirmEdit(); if (e.key === 'Escape') cancelEdit(); }}
            onBlur={confirmEdit}
          />
          <button className="chip-edit-ok" onMouseDown={e => { e.preventDefault(); confirmEdit(); }}>✓</button>
        </span>
      );
    }
    return (
      <Chip key={c} label={c} on={values.includes(c)}
        onClick={() => toggle(c)}
        onLongPress={() => startEdit(c)}
      />
    );
  }

  return (
    <div className="chip-group">
      <div className="chips">
        {localChips.map(c => renderChip(c))}
        {addLabel && (
          <Chip label={addLabel} on={showInput} onClick={() => {
            setShowInput(s => !s);
            if (!showInput) setTimeout(() => inputRef.current?.focus(), 50);
          }} />
        )}
      </div>
      {showInput && (
        <form className="chip-input-row" onSubmit={e => { e.preventDefault(); addCustom(); }}>
          <input ref={inputRef} className="chip-input" value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            placeholder="Escribe aquí..."
            onKeyDown={e => e.key === 'Enter' && addCustom()} />
          <button type="submit" className="chip-input-add">✓</button>
        </form>
      )}
      {customValues.length > 0 && (
        <div className="chips">
          {customValues.map(v => renderChip(v))}
        </div>
      )}
    </div>
  );
}

// ── Error translator ─────────────────────────────────────────
function translateError(msg) {
  if (!msg) return msg;
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials') || m.includes('invalid credentials'))
    return 'Email o contraseña incorrectos.';
  if (m.includes('email not confirmed'))
    return 'Debes confirmar tu email antes de iniciar sesión. Revisa tu bandeja de entrada.';
  if (m.includes('user already registered') || m.includes('already been registered'))
    return 'Este email ya tiene una cuenta. Inicia sesión.';
  if (m.includes('error sending confirmation email') || m.includes('sending confirmation'))
    return 'No se pudo enviar el email de confirmación. Intenta de nuevo en unos minutos.';
  if (m.includes('password should be at least'))
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('unable to validate email address'))
    return 'El email no es válido.';
  if (m.includes('email rate limit exceeded') || m.includes('rate limit'))
    return 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
  if (m.includes('network') || m.includes('fetch') || m.includes('load failed'))
    return 'Error de conexión. Verifica tu internet e intenta de nuevo.';
  if (m.includes('row-level security') || m.includes('rls') || m.includes('42501'))
    return 'No pudimos guardar los cambios. Intenta nuevamente.';
  return msg;
}

          email: email.trim(),
          password,
          options: { emailRedirectTo: location.origin + location.pathname },
        });
        if (error) throw error;
        // Supabase's anti-enumeration: signing up with an existing email returns
        // no error but an empty identities array, and sends no confirmation email.
        if (data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0) {
          setError('Este email ya tiene una cuenta. Inicia sesión.');
          return;
        }
        saveCoachEmail(email);
        setSignupDone(true);
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        saveCoachEmail(email);
      }
    } catch (e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  async function sendReset() {
    if (!email.trim()) { setError('Ingresá tu email primero.'); return; }
    saveCoachEmail(email);
    setLoading(true); setError('');
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
        redirectTo: location.origin + location.pathname
      });
      if (error) throw error;
      setResetSent(true);
    } catch(e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  // ── Signup success ───────────────────────────────────────────
  if (signupDone) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>¡Cuenta creada!</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Te enviamos un email a <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Verifica tu correo para activar tu cuenta e iniciar sesión.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        ¿Ya verificaste?{' '}
        <button onClick={() => { setSignupDone(false); setIsSignup(false); setPassword(''); }}>Iniciar sesión</button>
      </div>
    </div>
  );

  // ── Reset password success ───────────────────────────────────
  if (resetSent) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-success-box">
        <div style={{fontSize:'2.2rem', marginBottom:12}}>✉️</div>
        <div style={{fontWeight:800, fontSize:'1.2rem', color:'var(--green-dark)', marginBottom:8}}>Email enviado</div>
        <div style={{fontSize:'0.9rem', color:'var(--text-secondary)', lineHeight:1.6}}>
          Revisá tu bandeja de entrada en <strong style={{color:'var(--text-primary)'}}>{email}</strong>.<br/>
          Tocá el enlace del email para restablecer tu contraseña.
        </div>
      </div>
      <div className="auth-toggle" style={{marginTop:24}}>
        <button onClick={() => { setResetSent(false); setForgotMode(false); setError(''); }}>
          ← Volver al inicio de sesión
        </button>
      </div>
    </div>
  );

  // ── Forgot password ──────────────────────────────────────────
  if (forgotMode) return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        <div style={{marginBottom:24}}>
          <div style={{fontWeight:700, fontSize:'1.1rem', color:'var(--text-primary)', marginBottom:6}}>
            Restablecer contraseña
          </div>
          <div style={{fontSize:'0.88rem', color:'var(--text-secondary)', lineHeight:1.5}}>
            Te enviaremos un enlace a tu email para crear una nueva contraseña.
          </div>
        </div>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" value={email}
            onChange={e => handleEmailChange(e.target.value)}
            placeholder="tu@email.com"
            onKeyDown={e => e.key === 'Enter' && sendReset()} />
        </div>
        <button className="btn btn-primary" onClick={sendReset} disabled={loading || !email.trim()}>
          {loading ? 'Enviando...' : 'Enviar enlace'}
        </button>
        <div className="auth-toggle">
          <button onClick={() => { setForgotMode(false); setError(''); }}>← Volver al inicio de sesión</button>
        </div>
      </div>
    </div>
  );

  // ── Login / Signup ───────────────────────────────────────────
  return (
    <div className="auth-screen">
      <div className="auth-logo"><Logo /></div>
      <div className="auth-form">
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Email</label>

        {!isSignup && (
          <div className="auth-forgot">

const DEFAULT_FOCUS    = ['Revés','Volea','Bandeja','Globo','Pared','Smash','Saque','Posicionamiento'];
const DEFAULT_IMPROVED = ['Volea','Reacción','Confianza','Consistencia','Técnica','Actitud','Potencia','Puntería','Juego en red'];
const DEFAULT_CORRECTION = ['Preparar antes','Usar piernas','Distancia con la bola','Mirar la bola','Recuperar posición','Elegir mejor golpe','Bajar la pala','Terminar el gesto'];
const DEFAULT_HOMEWORK = ['Practicar bandeja','Ver video','Ejercicio físico','Practicar saque','Ver partido','Fortalecer muñeca'];

const chipCustomKey = (coachId, category) => `coach_chips:${category}:${coachId}`;
const chipDeletedKey = (coachId, category) => `coach_chips_deleted:${category}:${coachId}`;
const normalizeChips = chips => [...new Set((chips || []).map(c => (c || '').trim()).filter(Boolean))];

function getCoachChips(coachId, category, defaults) {
  const custom = normalizeChips(LS.get(chipCustomKey(coachId, category)) || []);
  const deleted = new Set(normalizeChips(LS.get(chipDeletedKey(coachId, category)) || []));
  return [...new Set([...defaults.filter(chip => !deleted.has(chip)), ...custom])];
}
function saveCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []);
  if (!existing.includes(value)) LS.set(customKey, [...existing, value]);
  LS.set(deletedKey, normalizeChips(LS.get(deletedKey) || []).filter(c => c !== value));
}
function editCoachChip(coachId, category, oldChip, newChip) {
  const oldVal = (oldChip || '').trim();
  const newVal = (newChip || '').trim();
  if (!oldVal) return;
  if (!newVal) { deleteCoachChip(coachId, category, oldVal); return; }
  if (oldVal === newVal) return;

  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []).filter(c => c !== oldVal);
  LS.set(customKey, normalizeChips([...existing, newVal]));

  const deleted = normalizeChips(LS.get(deletedKey) || []).filter(c => c !== newVal);
  LS.set(deletedKey, normalizeChips([...deleted, oldVal]));
}
function deleteCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  LS.set(customKey, normalizeChips(LS.get(customKey) || []).filter(c => c !== value));
  LS.set(deletedKey, normalizeChips([...(LS.get(deletedKey) || []), value]));
}

function LogClassScreen({ student, coachId, onBack, onSaved }) {
  const draftKey = `draft:${student.id}`;
  const draft    = LS.get(draftKey) || {};
  const last     = student.lastLog;

  // If no draft, seed from last log as suggestions
  const seedFocus    = draft.focus    || (last ? toArr(last.today_focus)   : []);
  const seedImproved = draft.improved || (last ? toArr(last.what_improved) : []);
  const seedCorrection = toArr(draft.correction);
  const seedCorrectionDetails = draft.correctionDetails || '';
  const seedHomework = draft.homework || [];
  const isSeeded     = !draft.focus && !draft.improved && !!last;
  const initialRequiredStep = !seedFocus.length
    ? 'focus'
    : !seedImproved.length
      ? 'improved'
      : !seedCorrection.length
        ? 'correction'
        : null;

  const [focus, setFocus]           = useState(seedFocus);
  const [improved, setImproved]     = useState(seedImproved);
  const [correction, setCorrection] = useState(seedCorrection);
  const [correctionDetails, setCorrectionDetails] = useState(seedCorrectionDetails);
  const [homework, setHomework]     = useState(seedHomework);
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [seededBanner, setSeededBanner] = useState(isSeeded);
  const [activeRequiredStep, setActiveRequiredStep] = useState(initialRequiredStep);
  const [optionalOpen, setOptionalOpen] = useState(false);

  // Visual reference state
  const [mediaUrl, setMediaUrl]           = useState('');
  const [mediaType, setMediaType]         = useState('');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat] = useState('');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat') setVisualWhat(val);
  }

  const date = todayISO();
  const firstName = student.name.split(' ')[0];

  const requiredDone = [
    focus.length > 0,
    improved.length > 0,
    correction.length > 0,
  ].filter(Boolean).length;
  const requiredComplete = requiredDone === 3;

  const progressPct = (requiredDone / 3) * 100;
  const progressColor = requiredComplete ? 'var(--green-dark)' : requiredDone > 0 ? 'var(--green-mid)' : 'var(--border)';

  function nextRequiredStep(step) {
    if (step === 'focus') return 'improved';
    if (step === 'improved') return 'correction';
    return null;
  }

  function updateRequiredStep(step, currentValues, nextValues, setter) {
    const wasEmpty = currentValues.length === 0;
    setter(nextValues);
    setError('');
    if (nextValues.length === 0) {
      setActiveRequiredStep(step);
    } else if (wasEmpty) {
      setActiveRequiredStep(nextRequiredStep(step));
    }
  }

  function renderRequiredField({ step, number, title, values, children }) {
    const isOpen = activeRequiredStep === step;
    const isComplete = values.length > 0;
    const summary = isComplete ? values.join(' • ') : 'Pendiente';
    return (
      <div className={`required-field${isOpen ? ' required-field--open' : ''}${isComplete ? ' required-field--complete' : ''}`}>
        <button
          type="button"
          className="required-label"
          onClick={() => setActiveRequiredStep(isOpen ? null : step)}
          aria-expanded={isOpen}
        >

        {!isOpen && (
          <div className={`required-summary${!isComplete ? ' required-summary--empty' : ''}`}>
            {summary}
          </div>
        )}
        {isOpen && <div className="required-options">{children}</div>}

  // Save draft to localStorage on every change
  useEffect(() => {
    LS.set(draftKey, { focus, improved, correction, correctionDetails, homework });
  }, [focus, improved, correction, correctionDetails, homework]);

  async function save() {
    if (!requiredComplete) { setError('Completa los 3 puntos rápidos para enviar.'); return; }
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    const correctionText = [fromArr(correction), correctionDetails.trim()].filter(Boolean).join('. ');
    const { data, offline } = await insertLog({
      student_id:        student.id,
      coach_id:          coachId,
      date,
      today_focus:       fromArr(focus),
      what_improved:     fromArr(improved),
      main_correction:   correctionText || null,
      homework:          fromArr(homework),
      media_url:         mediaUrl || null,
      media_type:        mediaType || null,
      visual_what:       visualWhat.trim() || null,
      visual_correction: null,
      visual_task:       null,
    });
    if (!data) { setError('Error al guardar. Intenta de nuevo.'); setLoading(false); return; }
    LS.set(draftKey, null);
    onSaved(offline, data);
  }

  return (

      <div style={{height:3, background:'var(--border)', flexShrink:0}}>

          <div className="student-pill" style={{marginBottom:0}}>

        {/* Seeded from last session banner */}
        {seededBanner && (
          <div style={{

            background:'var(--green-soft)', borderRadius:10, padding:'8px 14px',
            marginBottom:14, gap:10

            <span style={{fontSize:'0.78rem', color:'var(--green-dark)', fontWeight:500}}>
              Preseleccionado desde la última clase
            </span>
            <button onClick={() => {
              setFocus([]); setImproved([]); setActiveRequiredStep('focus'); setSeededBanner(false);
            }} style={{
              fontSize:'0.72rem', fontWeight:700, color:'var(--green-dark)',
              background:'none', border:'none', cursor:'pointer', textDecoration:'underline',
              flexShrink:0
            }}>Limpiar</button>
          </div>

        <section className="required-section" aria-label="Campos requeridos">
          {renderRequiredField({
            step: 'focus',
            number: 1,

            children: (
            <ChipGroup
              chips={getCoachChips(coachId, 'focus', DEFAULT_FOCUS)}

                setSeededBanner(false);

              onEditChip={(old, nw) => editCoachChip(coachId, 'focus', old, nw)}
              onDeleteChip={chip => deleteCoachChip(coachId, 'focus', chip)} />
            )
          })}

          {renderRequiredField({
            step: 'improved',
            number: 2,
            title: 'Qué mejoró',
            values: improved,
            children: (
            <ChipGroup
              chips={getCoachChips(coachId, 'improved', DEFAULT_IMPROVED)}
              addLabel="+ Escribir" values={improved} onChange={v => {
                updateRequiredStep('improved', improved, v, setImproved);
                setSeededBanner(false);
              }}
              onNewChip={chip => saveCoachChip(coachId, 'improved', chip)}
              onEditChip={(old, nw) => editCoachChip(coachId, 'improved', old, nw)}
              onDeleteChip={chip => deleteCoachChip(coachId, 'improved', chip)} />
            )

          {renderRequiredField({

          <div className="required-submit">

          {optionalOpen && (
            <div className="optional-body">
              <div className="log-section">
                <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
                  <div className="log-section-lbl log-section-lbl--orange" style={{marginBottom:0}}>
                    DETALLE DE LA CORRECCIÓN

                  </div>

                <textarea className="log-textarea" value={correctionDetails}
                  onChange={e => setCorrectionDetails(e.target.value)}

              </div>

              <div className="log-section">
                <div className="log-section-lbl">

                <ChipGroup

function ShareScreen({ student, savedOffline, savedLog, onHome }) {
  const base = location.origin.includes('localhost') || location.protocol === 'file:'
    ? 'https://padel-log-app.vercel.app'
    : location.origin;
  const publicUrl = `${base}/#/p/${student.id}`;
  const [copied, setCopied] = useState(false);

  function copyLink() {
    navigator.clipboard.writeText(publicUrl)
      .then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); })
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = publicUrl; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        setCopied(true); setTimeout(() => setCopied(false), 2500);
      });
  }

  function sendWhatsApp() {
    const firstName = student.name.split(' ')[0];
    const log = savedLog || {};
    const worked    = toArr(log.today_focus).join(', ');
    const improved  = toArr(log.what_improved).join(', ');
    const correction = toArr(log.main_correction).join(', ');
    const homework  = toArr(log.homework).join(', ');

    const lines = [`🎾 Resumen de la clase de hoy de ${firstName}`, ''];
    if (worked) lines.push('*Trabajamos:*', worked);
    if (improved) lines.push('*Mejoró:*', improved);
    if (correction) lines.push('*Corrección principal:*', correction);
    if (homework) lines.push('*Tarea para casa:*', homework);
    if (log.media_url) {
      lines.push('');
      lines.push(log.media_type === 'photo'
        ? '📸 Te dejé una foto, la ves en el link de abajo 👇'
        : '📹 Te dejé un video, lo ves en el link de abajo 👇');
    }
    lines.push('', 'Ver progreso completo 👉', publicUrl);

    const msg = encodeURIComponent(lines.join('\n'));
    window.open(`https://wa.me/?text=${msg}`, '_blank', 'noopener,noreferrer');
  }

  return (
    <div className="share-screen">
      <div className="share-header">
        <span className="share-header-txt">✓ Clase guardada</span>
      </div>
      <div className="share-body">
        <div className="share-check">✓</div>
        <h1 className="share-title">¡Clase registrada!</h1>
        <p className="share-sub">Comparte el reporte con {student.name.split(' ')[0]}.</p>
        {savedOffline && (
          <div className="share-offline-note">
            Guardado sin conexión — se sincronizará automáticamente cuando vuelva internet.
          </div>
        )}
        <a
          className="share-link-card"
          href={publicUrl}
          target="_blank"
          rel="noopener noreferrer"
          style={{display:'block', color:'inherit', textDecoration:'none'}}
        >
          <div className="share-link-lbl">LINK DEL ALUMNO</div>
          <div className="share-link-url">{publicUrl.replace(/^https?:\/\//, '')}</div>
          <div className="share-link-note">Toca para abrirlo en una pestaña nueva.</div>
        </a>
        <button className="btn btn-whatsapp" onClick={sendWhatsApp} style={{width:'100%'}}>
          Enviar por WhatsApp
        </button>
        <button className="btn btn-outline" onClick={copyLink} style={{width:'100%', gap:8}}>
          {copied ? (
            <>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Copiado
            </>
          ) : (
            <>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="8" y="8" width="12" height="14" rx="2"/>
                <rect x="4" y="4" width="12" height="14" rx="2" fill="var(--white)" stroke="currentColor"/>
              </svg>
              Copiar link
            </>
          )}
        </button>
        <button className="btn-link" onClick={onHome}>Volver al inicio</button>
      </div>
    </div>
  );
}

// ── S7 Public Report ─────────────────────────────────────────
async function downloadMedia(url, type) {
  const fileName = type === 'video' ? 'video-padel.mp4' : 'foto-padel.jpg';
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const file = new File([blob], fileName, { type: blob.type });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Padel Log' });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }
  } catch(e) {
    window.open(url, '_blank');
  }
}

// ── VideoPlayer ──────────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  const total = Math.floor(s);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const sec = String(total % 60).padStart(2, '0');
  return h ? `${h}:${String(m).padStart(2, '0')}:${sec}` : `${m}:${sec}`;
}

function VideoPlayer({ src, maxHeight = 300, loop = false }) {
  const videoRef      = useRef(null);
  const playerRef     = useRef(null);
  const tapTimer      = useRef(null);
  const lastTapSide   = useRef(null);
  const hideTimer     = useRef(null);
  const hintTimer     = useRef(null);
  const scrubbing     = useRef(false);
  const previewAttempted = useRef(false);

  const [playing, setPlaying]         = useState(false);
  const [controls, setControls]       = useState(true);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration]       = useState(0);
  const [ready, setReady]             = useState(false);
  const [waiting, setWaiting]         = useState(true);
  const [seekHint, setSeekHint]       = useState(null);
  const [error, setError]             = useState('');
  const [isMobilePlayer, setIsMobilePlayer] = useState(false);

  useEffect(() => {
    const query = window.matchMedia?.('(max-width: 767px)');
    const updateMobileState = () => setIsMobilePlayer(query ? query.matches : window.innerWidth <= 767);
    updateMobileState();
    if (query?.addEventListener) query.addEventListener('change', updateMobileState);
    else query?.addListener?.(updateMobileState);
    window.addEventListener('resize', updateMobileState, { passive: true });
    return () => {
      if (query?.removeEventListener) query.removeEventListener('change', updateMobileState);
      else query?.removeListener?.(updateMobileState);
      window.removeEventListener('resize', updateMobileState);
    };
  }, []);

  useEffect(() => {
    setPlaying(false);
    setControls(true);
    setCurrentTime(0);
    setDuration(0);
    setReady(false);
    setWaiting(true);
    setError('');
    previewAttempted.current = false;
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, [src]);

  useEffect(() => {
    clearTimeout(hideTimer.current);
    if (playing && controls) hideTimer.current = setTimeout(() => setControls(false), 2600);
    return () => clearTimeout(hideTimer.current);
  }, [playing, controls]);

  useEffect(() => () => {
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, []);

  function showControlsTemporarily() {
    setControls(true);
    clearTimeout(hideTimer.current);
    if (videoRef.current && !videoRef.current.paused) {
      hideTimer.current = setTimeout(() => setControls(false), 2600);
    }
  }

  function flashHint(side) {
    clearTimeout(hintTimer.current);
    setSeekHint(side);
    hintTimer.current = setTimeout(() => setSeekHint(null), 620);
  }

  function syncTime() {
    const v = videoRef.current;
    if (!v) return;
    setCurrentTime(v.currentTime || 0);
    if (isFinite(v.duration)) setDuration(v.duration || 0);
  }

  function markReady() {
    setReady(true);
    setWaiting(false);
    syncTime();
  }

  function preparePreviewFrame() {
    const v = videoRef.current;
    syncTime();
    if (previewAttempted.current) return;
    previewAttempted.current = true;
    if (v && isFinite(v.duration) && v.currentTime === 0) {
      v.currentTime = 0.001;
    }
    markReady();
  }

  function seek(delta) {
    const v = videoRef.current;
    if (!v) return;
    v.currentTime = Math.max(0, Math.min(v.duration || 0, v.currentTime + delta));
    syncTime();
    flashHint(delta > 0 ? 'right' : 'left');
    showControlsTemporarily();
  }

  function togglePlay(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const v = videoRef.current;
    if (!v) return;
    if (v.paused) { v.play().catch(() => {}); } else { v.pause(); }
    showControlsTemporarily();
  }

  function handleVideoPlay() {
    setPlaying(true);
    showControlsTemporarily();
  }

  function handleVideoPause() {
    setPlaying(false);
    setControls(true);
    clearTimeout(hideTimer.current);
  }

  function handleSurfaceTap(e) {
    if (e.target.closest('[data-video-control="true"]')) return;
    const rect = playerRef.current?.getBoundingClientRect();
    const x = e.clientX - (rect?.left || 0);
    const side = x < (rect?.width || 0) / 2 ? 'left' : 'right';
    if (tapTimer.current !== null && lastTapSide.current === side) {
      clearTimeout(tapTimer.current);
      tapTimer.current = null;
      lastTapSide.current = null;
      seek(side === 'left' ? -5 : 5);
      return;
    }
    lastTapSide.current = side;
    if (tapTimer.current) clearTimeout(tapTimer.current);
    tapTimer.current = setTimeout(() => {
      tapTimer.current = null;
      lastTapSide.current = null;
      togglePlay();
    }, 260);
  }

  function handleScrubStart(e) {
    scrubbing.current = true;
    e.currentTarget.setPointerCapture(e.pointerId);
    handleScrubMove(e);
    showControlsTemporarily();
  }

  function handleScrubMove(e) {
    if (!scrubbing.current) return;
    const rail = playerRef.current?.querySelector('.video-player__seek');
    if (!rail) return;
    const rect = rail.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const v = videoRef.current;
    if (v && isFinite(v.duration)) { v.currentTime = pct * v.duration; syncTime(); }
  }

  function handleScrubEnd(e) {
    scrubbing.current = false;
    showControlsTemporarily();
  }

  function enterFullscreen(e) {
    e.preventDefault(); e.stopPropagation();
    showControlsTemporarily();
    const v = videoRef.current;
    if (!v) return;
    const target = playerRef.current || v;
    if (target?.requestFullscreen) target.requestFullscreen().catch?.(() => {});
    else if (target?.webkitRequestFullscreen) target.webkitRequestFullscreen();
  }

  const pct = duration ? Math.max(0, Math.min(100, (currentTime / duration) * 100)) : 0;
  const loading = !ready || waiting;
  const playerClass = `video-player${controls || !playing ? ' video-player--controls' : ''}${loading ? ' video-player--loading' : ''}${ready ? ' video-player--ready' : ''}`;

  return (
    <div className="video-wrap">
      <video src={src} controls playsInline loop={loop} preload="metadata" style={{display:'block', width:'100%', background:'#000'}} />
    </div>
  );
}

}

const SKILL_DEFS = [
  { key: 'defensa',         label: 'Defensa'         },
  { key: 'volea',           label: 'Volea'           },
  { key: 'posicionamiento', label: 'Posicionamiento' },
  { key: 'confianza',       label: 'Confianza'       },

function EditStudentScreen({ student, onBack, onSaved, onDeleted }) {
  const [name, setName]     = useState(student.name || '');
  const [level, setLevel]   = useState(student.level || '');
  const [skills, setSkills] = useState(student.skills || {});
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting]     = useState(false);
  const levels = ['Iniciación', 'Básico', 'Intermedio', 'Avanzado'];

  function setSkill(key, val) {
    setSkills(s => ({ ...s, [key]: Math.min(10, Math.max(1, val)) }));
  }

  async function save() {
    if (!name.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    try {
      const hasSkills = Object.keys(skills).length > 0;
      const newSkillsVal = hasSkills ? skills : null;

      // Append snapshot to skill_history only when skills change
      let newHistory = student.skill_history || [];
      if (hasSkills) {
        const last = newHistory[newHistory.length - 1];
        const changed = !last || JSON.stringify(last.skills) !== JSON.stringify(skills);
        if (changed) {
          newHistory = [...newHistory, { date: new Date().toISOString().slice(0, 10), skills }];
        }
      }

      const { data, error } = await sb.from('students')
        .update({ name: name.trim(), level: level || null, skills: newSkillsVal, skill_history: newHistory })
        .eq('id', student.id)
        .select().single();
      if (error) throw error;
      onSaved(data);
    } catch(e) { setError(translateError(e.message)); setLoading(false); }
  }

  async function deleteStudent() {
    setDeleting(true); setError('');
    try {
      const now = new Date().toISOString();
      await sb.from('class_logs').update({ deleted_at: now }).eq('student_id', student.id).is('deleted_at', null);
      await sb.from('students').update({ deleted_at: now }).eq('id', student.id);
      onDeleted(student.id);
    } catch(e) { setError('Error al eliminar. Intenta de nuevo.'); setDeleting(false); }
  }

  return (
    <div className="screen">
      <Header title="Editar alumno" onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Editar alumno</h1>

        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Nombre completo</label>
          <input className="field-input" value={name}
            onChange={e => setName(e.target.value)} placeholder="María Álvarez"
            onKeyDown={e => e.key === 'Enter' && save()} />
        </div>
        <div className="form-field">
          <label className="field-label">Nivel</label>
          <div className="chips" style={{marginTop: 8}}>
            {levels.map(l => (
              <Chip key={l} label={l} on={level === l}
                onClick={() => setLevel(level === l ? '' : l)} />
            ))}
          </div>
        </div>

        {/* Skill scores */}
        <div className="form-field" style={{marginTop:24}}>
          <label className="field-label">Evaluación de habilidades</label>
          <p style={{fontSize:'0.78rem', color:'var(--text-secondary)', marginTop:2, marginBottom:12, lineHeight:1.4}}>
            Puntuación del 1 al 10. Se muestra al alumno en su sección de progreso.
          </p>
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            {SKILL_DEFS.map(({ key, label }) => {
              const val = skills[key];
              return (
                <div key={key} style={{
                  display:'flex', alignItems:'center',
                  background:'var(--white)', border:'1px solid var(--border)',
                  borderRadius:12, padding:'10px 14px',
                }}>
                  <span style={{flex:1, fontSize:'0.88rem', fontWeight:600, color:'var(--text-primary)'}}>{label}</span>
                  <div style={{display:'flex', alignItems:'center', gap:0}}>
                    <button onClick={() => setSkill(key, (val || 5) - 1)} style={{
                      width:34, height:34, borderRadius:8, border:'1.5px solid var(--border)',
                      background:'var(--bg)', fontSize:'1.1rem', fontWeight:500,
                      color:'var(--text-secondary)', cursor:'pointer', lineHeight:1,
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>−</button>
                    <span style={{
                      width:36, textAlign:'center', fontSize:'1rem', fontWeight:800,
                      color: val ? 'var(--green-dark)' : 'var(--text-hint)',
                    }}>{val || '—'}</span>
                    <button onClick={() => setSkill(key, (val || 4) + 1)} style={{
                      width:34, height:34, borderRadius:8, border:'1.5px solid var(--border)',
                      background:'var(--bg)', fontSize:'1.1rem', fontWeight:500,
                      color:'var(--text-secondary)', cursor:'pointer', lineHeight:1,
                      display:'flex', alignItems:'center', justifyContent:'center',

                  </div>

            })}

        </div>

        {/* Delete student section */}
        <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)'}}>
          {!confirmDelete ? (
            <button onClick={() => setConfirmDelete(true)} style={{
              background:'none', border:'none', color:'#c0392b',
              fontSize:'0.88rem', fontWeight:600, cursor:'pointer', padding:0
            }}>Eliminar alumno</button>
          ) : (
            <div style={{background:'#fdf0ef', borderRadius:12, padding:16}}>

// ── S11 Edit Log ─────────────────────────────────────────────
function EditLogScreen({ log, student, onBack, onSaved }) {
  const correctionChoices = getCoachChips(log.coach_id, 'correction', DEFAULT_CORRECTION);
  const parseCorrection = (() => {
    const raw = (log.main_correction || '').trim();
    if (!raw) return { values: [], details: '' };
    const parts = raw.split(/\.\s+/);
    const firstPart = parts[0].trim();
    const firstValues = toArr(firstPart);
    const firstPartLooksLikeChips = firstValues.length > 0 && firstValues.every(v => correctionChoices.includes(v));
    if (firstPartLooksLikeChips && parts.length > 1) {
      return { values: firstValues, details: parts.slice(1).join('. ').trim() };
    }
    return { values: toArr(raw), details: '' };
  })();
  const initialFocus = toArr(log.today_focus);
  const initialImproved = toArr(log.what_improved);
  const initialCorrection = parseCorrection.values;
  const initialRequiredStep = !initialFocus.length
    ? 'focus'
    : !initialImproved.length
      ? 'improved'
      : !initialCorrection.length
        ? 'correction'
        : null;

  const [focus, setFocus]           = useState(initialFocus);
  const [improved, setImproved]     = useState(initialImproved);
  const [correction, setCorrection] = useState(initialCorrection);
  const [correctionDetails, setCorrectionDetails] = useState(parseCorrection.details);
  const [homework, setHomework]     = useState(toArr(log.homework));
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [activeRequiredStep, setActiveRequiredStep] = useState(initialRequiredStep);
  const [optionalOpen, setOptionalOpen] = useState(false);

  // Visual reference state (pre-fill from existing log)
  const [mediaUrl, setMediaUrl]           = useState(log.media_url || '');
  const [mediaType, setMediaType]         = useState(log.media_type || '');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat]       = useState(log.visual_what || '');
  const [visualCorrection, setVisualCorrection] = useState(log.visual_correction || '');
  const [visualTask, setVisualTask]       = useState(log.visual_task || '');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat')       setVisualWhat(val);
    if (key === 'visualCorrection') setVisualCorrection(val);
    if (key === 'visualTask')       setVisualTask(val);
  }

  const firstName = student.name.split(' ')[0];
  const requiredDone = [
    focus.length > 0,
    improved.length > 0,
    correction.length > 0,
  ].filter(Boolean).length;
  const requiredComplete = requiredDone === 3;
  const progressPct = (requiredDone / 3) * 100;
  const progressColor = requiredComplete ? 'var(--green-dark)' : requiredDone > 0 ? 'var(--green-mid)' : 'var(--border)';

  function nextRequiredStep(step) {
    if (step === 'focus') return 'improved';
    if (step === 'improved') return 'correction';
    return null;
  }

  function updateRequiredStep(step, currentValues, nextValues, setter) {
    const wasEmpty = currentValues.length === 0;
    setter(nextValues);
    setError('');
    if (nextValues.length === 0) {
      setActiveRequiredStep(step);
    } else if (wasEmpty) {
      setActiveRequiredStep(nextRequiredStep(step));
    }
  }

  function renderRequiredField({ step, number, title, values, children }) {
    const isOpen = activeRequiredStep === step;
    const isComplete = values.length > 0;
    const summary = isComplete ? values.join(' • ') : 'Pendiente';
    return (
      <div className={`required-field${isOpen ? ' required-field--open' : ''}${isComplete ? ' required-field--complete' : ''}`}>
        <button
          type="button"
          className="required-label"
          onClick={() => setActiveRequiredStep(isOpen ? null : step)}
          aria-expanded={isOpen}
        >
          <span className="required-label-num">{number}</span>
          <span className="required-title">{title}</span>
          {isComplete && <span className="required-check">✓</span>}
        </button>
        {!isOpen && (
          <div className={`required-summary${!isComplete ? ' required-summary--empty' : ''}`}>
            {summary}
          </div>
        )}
        {isOpen && <div className="required-options">{children}</div>}
      </div>
    );
  }

  async function save() {
    if (!requiredComplete) { setError('Completa los 3 puntos rápidos para guardar.'); return; }
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    try {
      const correctionText = [fromArr(correction), correctionDetails.trim()].filter(Boolean).join('. ');
      const { data, error } = await sb.from('class_logs')
        .update({
          today_focus:       fromArr(focus),
          what_improved:     fromArr(improved),
          main_correction:   correctionText || null,
          homework:          fromArr(homework),
