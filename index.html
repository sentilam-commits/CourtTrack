// ── Progress Section ──────────────────────────────────────────

function skillStatus(score) {
  if (score >= 7) return 'Mejorando';
  if (score >= 5) return 'Estable';
  return 'A trabajar';
}

function StatusBadge({ status }) {
  const map = {
    'Mejorando':  { bg: '#D6EFE0', color: '#2E7A4B' },
    'Estable':    { bg: '#E8EDEC', color: '#5A7570' },
    'A trabajar': { bg: '#FDE8D4', color: '#B35A18' },
  };
  const s = map[status] || map['Estable'];
  return (
    <span style={{
      fontSize: '0.68rem', fontWeight: 700, letterSpacing: '0.04em',
      padding: '2px 7px', borderRadius: 20,
      background: s.bg, color: s.color,
    }}>{status}</span>
  );
}

function Sparkline({ points }) {
  const w = 120, h = 32, pad = 4;
  const min = Math.min(...points), max = Math.max(...points);
  const range = max - min || 1;
  const xs = points.map((_, i) => pad + (i / (points.length - 1)) * (w - pad * 2));
  const ys = points.map(v => h - pad - ((v - min) / range) * (h - pad * 2));
  const d = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x},${ys[i]}`).join(' ');
  const fill = `${d} L${xs[xs.length-1]},${h} L${xs[0]},${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible'}}>
      <path d={fill} fill="rgba(255,255,255,0.12)" />
      <path d={d} fill="none" stroke="rgba(255,255,255,0.75)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {xs.map((x, i) => (
        <circle key={i} cx={x} cy={ys[i]} r={i === xs.length - 1 ? 4 : 2.5}
          fill={i === xs.length - 1 ? '#fff' : 'rgba(255,255,255,0.55)'} />
      ))}
    </svg>
  );
}

function historyAvg(entry) {
  const keys = SKILL_DEFS.filter(d => entry.skills[d.key] != null);
  if (!keys.length) return 0;
  return parseFloat((keys.reduce((s, d) => s + entry.skills[d.key], 0) / keys.length).toFixed(1));
}

function ProgressSection({ student }) {
  const raw = student?.skills || {};
  const history = student?.skill_history || [];
  const scored = SKILL_DEFS.filter(d => raw[d.key] != null);

  if (scored.length === 0) return null;

  const overall = (scored.reduce((s, d) => s + raw[d.key], 0) / scored.length).toFixed(1);

  // Sparkline only when there are 2+ history entries
  const sparkPoints = history.length >= 2 ? history.map(historyAvg) : null;
  const delta = sparkPoints ? (parseFloat(overall) - sparkPoints[0]).toFixed(1) : null;

  // Last 3 entries, newest first
  const recentHistory = history.slice().reverse().slice(0, 3);

  const arrowSvg = (color) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  );

  return (
    <div style={{marginTop: 32, marginBottom: 24}}>
      <div className="section-label" style={{marginBottom: 10}}>TU PROGRESO</div>

      {/* Main card */}
      <div style={{
        background: 'var(--green-dark)', borderRadius: 18,
        padding: '20px 20px 16px', marginBottom: 10,
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
      }}>
        <div>
          <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.1em', color:'rgba(255,255,255,0.55)', marginBottom:4}}>
            PROGRESO GENERAL
          </div>
          <div style={{fontSize:'3rem', fontWeight:800, color:'#fff', lineHeight:1, marginBottom:4}}>
            {overall}
          </div>
          <div style={{fontSize:'0.78rem', color:'rgba(255,255,255,0.65)', display:'flex', alignItems:'center', gap:4}}>
            {delta != null ? (
              <>
                {parseFloat(delta) >= 0
                  ? <span style={{color:'#7DEFA1', fontWeight:700}}>+{delta}</span>
                  : <span style={{color:'#f4a261', fontWeight:700}}>{delta}</span>}
                promedio de habilidades
              </>
            ) : (
              <span>primera evaluación</span>
            )}
          </div>
        </div>
        {sparkPoints && (
          <div style={{paddingBottom: 4}}>
            <Sparkline points={sparkPoints} />
          </div>
        )}
      </div>

      {/* Skill cards — 2 col grid */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
        {SKILL_DEFS.map(({ key, label }) => {
          const score = raw[key];
          if (score == null) return null;
          return (
            <div key={key} style={{
              background:'var(--white)', border:'1px solid var(--border)',
              borderRadius:14, padding:'14px 14px 12px',
            }}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                <div style={{fontSize:'0.78rem', fontWeight:700, color:'var(--text-primary)'}}>{label}</div>
                <div style={{fontSize:'0.78rem', fontWeight:800, color:'var(--green-dark)'}}>
                  {score}<span style={{fontSize:'0.65rem', color:'var(--text-hint)', fontWeight:600}}>/10</span>
                </div>
              </div>
              <div style={{height:5, borderRadius:99, background:'var(--border)', marginBottom:8, overflow:'hidden'}}>
                <div style={{
                  height:'100%', borderRadius:99, width:`${score * 10}%`,
                  background: score >= 7 ? 'var(--green-mid)' : score >= 5 ? 'var(--orange)' : '#c0392b',
                  transition:'width 0.6s ease',
                }} />
              </div>
              <StatusBadge status={skillStatus(score)} />
            </div>
          );
        })}
      </div>

      {/* Últimas clases — desde historial real */}
      {history.length > 0 && (
        <div style={{background:'var(--white)', border:'1px solid var(--border)', borderRadius:14, padding:'14px 16px'}}>
          <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--text-secondary)', marginBottom:10}}>
            ÚLTIMAS CLASES
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {recentHistory.map((entry, i) => {
              const classNum = history.length - i;
              const prevEntry = i < recentHistory.length - 1 ? recentHistory[i + 1] : null;

              if (!prevEntry) {
                // Primera entrada — mostrar habilidad con puntuación más alta
                const topSkill = SKILL_DEFS
                  .filter(d => entry.skills[d.key] != null)
                  .sort((a, b) => entry.skills[b.key] - entry.skills[a.key])[0];
                if (!topSkill) return null;
                return (
                  <div key={i} style={{display:'flex', alignItems:'center'}}>
                    <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                    <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-primary)', fontWeight:600}}>{topSkill.label}</div>
                    <div style={{display:'flex', alignItems:'center', gap:5}}>
                      <span style={{fontSize:'0.82rem', color:'var(--text-hint)'}}>Inicio</span>
                      {arrowSvg('var(--green-mid)')}
                      <span style={{fontSize:'0.82rem', fontWeight:800, color:'var(--green-mid)'}}>{entry.skills[topSkill.key]}</span>
                    </div>
                  </div>
                );
              }

              // Mostrar el cambio más grande respecto a la clase anterior
              const changes = SKILL_DEFS
                .filter(d => entry.skills[d.key] != null && prevEntry.skills[d.key] != null)
                .map(d => ({ label: d.label, from: prevEntry.skills[d.key], to: entry.skills[d.key], diff: Math.abs(entry.skills[d.key] - prevEntry.skills[d.key]) }))
                .filter(c => c.diff > 0)
                .sort((a, b) => b.diff - a.diff);

              if (changes.length === 0) return (
                <div key={i} style={{display:'flex', alignItems:'center'}}>
                  <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                  <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-hint)'}}>Sin cambios</div>
                </div>
              );

              const top = changes[0];
              const improved = top.to > top.from;
              return (
                <div key={i} style={{display:'flex', alignItems:'center'}}>
                  <div style={{fontSize:'0.8rem', color:'var(--text-secondary)', minWidth:54}}>Clase {classNum}</div>
                  <div style={{flex:1, fontSize:'0.82rem', color:'var(--text-primary)', fontWeight:600}}>{top.label}</div>
                  <div style={{display:'flex', alignItems:'center', gap:5}}>
                    <span style={{fontSize:'0.82rem', color:'var(--text-hint)'}}>{top.from}</span>
                    {arrowSvg(improved ? 'var(--green-mid)' : '#c0392b')}
                    <span style={{fontSize:'0.82rem', fontWeight:800, color: improved ? 'var(--green-mid)' : '#c0392b'}}>{top.to}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function StudentProfileScreen({ student, coachId, onBack, onEdit, onRegisterClass, onLogDeleted }) {

    ? 'https://padel-log-app.vercel.app'
    : location.origin;
  const shareUrl = `${shareBase}/#/p/${student.id}`;

  function shareStudent() {
    if (navigator.share) {
      navigator.share({ title: 'Padel Log', url: shareUrl }).catch(() => {});
    } else {
      try {
        navigator.clipboard.writeText(shareUrl);
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = shareUrl; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);

      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2000);

    sb.from('class_logs')
      .select('*')
      .eq('student_id', student.id)
      .is('deleted_at', null)
      .order('date', { ascending: false })
      .then(({ data }) => { setLogs(data || []); setLoading(false); });
  }, [student.id]);

  async function deleteLog(logId) {
    const { error } = await sb.from('class_logs').update({ deleted_at: new Date().toISOString() }).eq('id', logId);

      alert('No se pudo eliminar la clase. Verificá tu conexión e intentá de nuevo.');
      setConfirmDelete(null);
      return;

                            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                          </svg>
                        </button>
                      )}
                    </div>
                  </div>
                  {focusArr.length > 0 && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-dark)', marginBottom:4}}>TRABAJARON</div>
                      <div style={{fontSize:'0.88rem'}}>{focusArr.join(', ')}</div>
                    </div>
                  )}
                  {improvedArr.length > 0 && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:4}}>MEJORÓ</div>
                      <div style={{fontSize:'0.88rem'}}>{improvedArr.join(', ')}</div>
                    </div>
                  )}
                  {log.main_correction && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--orange)', marginBottom:4}}>CORREGIR</div>
                      <div style={{fontSize:'0.88rem'}}>{log.main_correction}</div>
                    </div>
                  )}
                  {homeworkArr.length > 0 && (
                    <div style={{marginBottom: (log.media_url || log.visual_what) ? 8 : 0}}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--blue-slate)', marginBottom:4}}>TAREA</div>
                      <div style={{fontSize:'0.88rem'}}>{homeworkArr.join(', ')}</div>
                    </div>
                  )}
                  {(log.media_url || log.visual_what) && (
                    <div style={{
                      marginTop:10, borderTop:'1px solid var(--border)', paddingTop:10
                    }}>
                      <div style={{fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--green-mid)', marginBottom:8, display:'flex', alignItems:'center', gap:5}}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
                        </svg>
                        REFERENCIA VISUAL
                      </div>
                      {log.media_url && (
                        <div style={{borderRadius:10, overflow:'hidden', background:'#000', marginBottom: log.visual_what ? 8 : 0, lineHeight:0}}>
                          {log.media_type === 'video'
                            ? <VideoPlayer src={log.media_url} maxHeight={400} loop />
                            : <a href={log.media_url} target="_blank" rel="noopener noreferrer">
                                <img src={log.media_url} alt="Referencia visual" loading="lazy"
                                  style={{width:'100%', maxHeight:200, objectFit:'cover', display:'block', cursor:'zoom-in'}} />
                              </a>
                          }
                        </div>
                      )}
                      {log.visual_what && (
                        <div style={{fontSize:'0.85rem', color:'var(--text-primary)', lineHeight:1.5}}>{log.visual_what}</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <div style={{height:16}} />
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [route, setRoute]                   = useState('loading');
  const [user, setUser]                     = useState(null);
  const [profile, setProfile]               = useState(null);
  const [students, setStudents]             = useState([]);
  const [todayCount, setTodayCount]         = useState(0);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [savedOffline, setSavedOffline]     = useState(false);
  const [savedLog, setSavedLog]             = useState(null);
  const [selectedLog, setSelectedLog]         = useState(null);
  const [isOffline, setIsOffline]           = useState(!navigator.onLine);
  const [isManaging, setIsManaging]         = useState(false);

  const go = r => {
    setRoute(r);
    if (r && r !== 'loading' && r !== 'auth') {
      LS.set('lastRoute', r);
      LS.set('lastRouteTs', Date.now());
    }
  };

  const publicMatch = () => {
    const m = location.hash.match(/^#\/p\/([0-9a-f-]{36})$/i);
    return m ? m[1] : null;
  };

  // Online/offline detection + queue flush
  useEffect(() => {
    const onOnline  = () => { setIsOffline(false); if (user) flushQueue(user.id); };
    const onOffline = () => setIsOffline(true);
    window.addEventListener('online',  onOnline);
    window.addEventListener('offline', onOffline);
    return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
  }, [user]);

  useEffect(() => {
    const publicId = publicMatch();
    if (publicId) { go({ name: 'public', id: publicId }); return; }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        saveCoachEmail(session.user.email);
        setUser(session.user);
        loadEverything(session.user.id);
      } else {
        go('auth');
      }
    }).catch(() => go('auth'));

    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) { saveCoachEmail(session.user.email); setUser(session.user); loadEverything(session.user.id); }
      else { setUser(null); setProfile(null); go('auth'); }
    });

    const handleHash = () => { const pid = publicMatch(); if (pid) go({ name: 'public', id: pid }); };
    window.addEventListener('hashchange', handleHash);
    return () => { subscription.unsubscribe(); window.removeEventListener('hashchange', handleHash); };
  }, []);

  async function loadEverything(uid) {
    const prof = await fetchProfile(uid);
    if (!prof?.display_name) { go('onboarding'); return; }
    setProfile(prof);
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    const mappedStudents = studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null }));
    setStudents(mappedStudents);

    // Restore last route (no time limit)
    const savedRoute = LS.get('lastRoute');
    const isPublicUrl = !!location.hash.match(/^#\/p\//);
    if (!isPublicUrl && savedRoute && savedRoute !== 'dashboard' && savedRoute !== 'auth' && savedRoute !== 'loading') {
      const rName = typeof savedRoute === 'object' ? savedRoute.name : savedRoute;
      if (['logClass','editLog','share','studentProfile','editStudent'].includes(rName)) {
        const sId = typeof savedRoute === 'object' ? savedRoute.studentId : null;
        const restoredS = sId ? mappedStudents.find(s => s.id === sId) : null;
        if (restoredS) {
          setSelectedStudent(restoredS);
          if (rName === 'editLog' && savedRoute?.logId) {
            const restoredLog = logs.find(l => l.id === savedRoute.logId);
            if (!restoredLog) { go('dashboard'); flushQueue(uid); return; }
            setSelectedLog(restoredLog);
          }
          setRoute(savedRoute);
          flushQueue(uid);
          return;
        }
        // Student not found (deleted?), fall through to dashboard
      } else if (['pickStudent','addStudent','editProfile','manageStudents'].includes(rName)) {
        setRoute(savedRoute);
        flushQueue(uid);
        return;
      }
    }
    LS.set('lastRoute', 'dashboard');
    go('dashboard');
    flushQueue(uid);
  }

  async function refreshStudents(uid) {
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    setStudents(studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null })));
  }

  // ── Render ──
  if (route?.name === 'public') return <PublicReportScreen studentId={route.id} />;
  if (route === 'loading') return <div className="loading">Cargando…</div>;

  return (
    <>
      <div className={`offline-banner${isOffline ? ' show' : ''}`}>
        Sin conexión — los cambios se guardan localmente
      </div>

      {route === 'auth' && <AuthScreen />}

      {route === 'onboarding' && (
        <OnboardingScreen user={user}
          onDone={(prof, authUser) => {
            const savedUser = authUser || user;
            if (authUser) setUser(authUser);
            setProfile(prof);
            if (savedUser?.id) refreshStudents(savedUser.id);
            go('dashboard');
          }} />
      )}

      {route === 'dashboard' && (
        <DashboardScreen profile={profile} students={students} todayCount={todayCount}
          onAddStudent={() => go('addStudent')}
          onRegisterClass={() => go('pickStudent')}
          onSelectStudent={s => { setSelectedStudent(s); go({ name: 'studentProfile', studentId: s.id }); }}
          onSignOut={() => { LS.set('lastRoute', null); sb.auth.signOut(); }}
          onEditProfile={() => go('editProfile')}
          onEditStudent={s => { setSelectedStudent(s); go({ name: 'editStudent', studentId: s.id }); }}
          onEditLog={(s, log) => { setSelectedStudent(s); setSelectedLog(log); go({ name: 'editLog', studentId: s.id, logId: log.id }); }}
          onManageStudents={() => go('manageStudents')}
          onQuickLog={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'dashboard', studentId: s.id }); }}
          managing={isManaging}
          onManagingChange={setIsManaging} />
      )}

      {route?.name === 'studentProfile' && (
        (() => {
          const s = selectedStudent || students.find(st => st.id === route.studentId);
          return s ? (
            <StudentProfileScreen
              student={s}
              coachId={user.id}
              onBack={() => go('dashboard')}
              onEdit={() => { setSelectedStudent(s); go({ name: 'editStudent', from: 'studentProfile', studentId: s.id }); }}
              onRegisterClass={() => { setSelectedStudent(s); go({ name: 'logClass', from: 'studentProfile', studentId: s.id }); }}
              onLogDeleted={() => refreshStudents(user.id)} />
          ) : null;
        })()
      )}

      {route === 'pickStudent' && (
        <PickStudentScreen students={students} onBack={() => go('dashboard')}
          onSelect={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'pickStudent', studentId: s.id }); }} />
      )}

      {route === 'addStudent' && (
        <AddStudentScreen coachId={user.id} onBack={() => go('dashboard')}
          onDone={s => {
            setStudents(prev =>
              [...prev, { ...s, lastLog: null }].sort((a, b) => a.name.localeCompare(b.name))
            );
            go('dashboard');
          }} />
      )}

      {route?.name === 'logClass' && (
        <LogClassScreen student={selectedStudent} coachId={user.id}
          onBack={() => go(route.from === 'dashboard' || route.from === 'studentProfile' ? (route.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard') : 'pickStudent')}
          onSaved={(offline, log) => {
            setSavedOffline(offline);
            setSavedLog(log);
            refreshStudents(user.id);
            go({ name: 'share', studentId: selectedStudent.id });
          }} />
      )}

      {route === 'manageStudents' && (
        <ManageStudentsScreen students={students} onBack={() => go('dashboard')}
          onEditStudent={s => { setSelectedStudent(s); go({ name: 'editStudent', studentId: s.id }); }} />
      )}

      {(route === 'editStudent' || route?.name === 'editStudent') && selectedStudent && (
        <EditStudentScreen student={selectedStudent}
          onBack={() => {
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: selectedStudent.id });
            else go('dashboard');
          }}
          onSaved={updated => {
            setStudents(prev => prev.map(s => s.id === updated.id ? { ...s, ...updated } : s));
            const from = route?.from;
            if (from === 'studentProfile') go({ name: 'studentProfile', studentId: updated.id });
            else go('dashboard');
          }}
          onDeleted={id => {
            setStudents(prev => prev.filter(s => s.id !== id));
            setSelectedStudent(null);
            go('dashboard');
          }} />
      )}

      {(route === 'editLog' || route?.name === 'editLog') && selectedLog && selectedStudent && (
        <EditLogScreen log={selectedLog} student={selectedStudent} onBack={() => go('dashboard')}
          onSaved={updated => {
            refreshStudents(user.id);
            go('dashboard');
          }} />
      )}

      {route === 'editProfile' && (
        <EditProfileScreen user={user} profile={profile} onBack={() => go('dashboard')}
          onSaved={(prof, authUser) => { if (authUser) setUser(authUser); setProfile(prof); go('dashboard'); }}
          onDeleted={() => { setUser(null); setProfile(null); go('auth'); }} />
      )}

      {(route === 'share' || route?.name === 'share') && (
        <ShareScreen student={selectedStudent} savedOffline={savedOffline} savedLog={savedLog}
          onHome={() => { setSelectedStudent(null); setSavedOffline(false); setSavedLog(null); LS.set('lastRoute', null); go('dashboard'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  <!-- Service Worker registration (requires HTTP/HTTPS, not file://) -->
  <script>
  (function() {
    const APP_VERSION = '2026-06-04-17:00-confirm-session-msg';
    window.PADEL_LOG_APP_VERSION = APP_VERSION;
    console.log('Padel Log build:', APP_VERSION);

    async function checkDeployedVersion() {
      if (location.protocol === 'file:') return;
      try {
        const response = await fetch(`./version.json?ts=${Date.now()}`, {
          cache: 'no-store',
        });
        if (!response.ok) return;
        const data = await response.json();
        if (data.version && data.version !== APP_VERSION) {
          console.log('New Padel Log build found:', data.version);
          window.location.reload();
        }
      } catch (_) {}
    }

    checkDeployedVersion();
    window.addEventListener('focus', checkDeployedVersion);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) checkDeployedVersion();
    });
    setInterval(checkDeployedVersion, 5 * 60 * 1000);

    if (!('serviceWorker' in navigator) || location.protocol === 'file:') return;

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'APP_UPDATED' && event.data.version !== APP_VERSION) {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      }
    });

    function activateWaitingWorker(registration) {
      if (registration && registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    }

    window.addEventListener('load', async () => {
      try {
        const registration = await navigator.serviceWorker.register(`./sw.js?v=${APP_VERSION}`, {
          updateViaCache: 'none',
        });

        activateWaitingWorker(registration);

        registration.addEventListener('updatefound', () => {
          const worker = registration.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });

        registration.update().catch(() => {});
      } catch (e) {
        console.log('SW registration skipped:', e.message);
      }
    });
  })();
  </script>

<!-- iOS PWA safe area fix -->
<script>
  // Reset zoom when user finishes typing (blur or enter)
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    var base = 'width=device-width, initial-scale=1, viewport-fit=cover';
    document.addEventListener('focusout', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        vp.setAttribute('content', base + ', maximum-scale=1');
        requestAnimationFrame(function() {
          vp.setAttribute('content', base);
        });
      }
    });
  })();
</script>

<script>
  // iOS home-screen apps expose safe-area values through env().
  if (window.navigator.standalone === true) {
    document.documentElement.classList.add('is-standalone');
  }
</script>
