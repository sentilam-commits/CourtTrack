<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CourtTrack — App para entrenadores de pádel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F2F1EC; font-family: 'Inter', system-ui, sans-serif;
                color: #0E1311; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button:focus-visible { outline: 2px solid oklch(0.62 0.14 152); outline-offset: 2px; }
  /* Hide scrollbar in mock */
  .ct-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .ct-shell {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
    background:
      radial-gradient(circle at 20% 4%, rgba(255,255,255,0.92), rgba(255,255,255,0) 32%),
      linear-gradient(145deg, #FAFAF6 0%, #ECEDE6 48%, #DDE6DD 100%);
  }
  .ct-stage {
    width: min(100%, 900px);
    display: grid;
    grid-template-columns: minmax(230px, 310px) minmax(320px, 390px);
    align-items: center;
    justify-content: center;
    gap: 36px;
  }
  .ct-brand-panel { padding: 20px 8px; }
  .ct-kicker {
    margin-bottom: 12px;
    color: #4F8F5F;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.7px;
    text-transform: uppercase;
  }
  .ct-brand-title {
    margin: 0;
    color: #0E1311;
    font-size: clamp(34px, 6vw, 58px);
    line-height: 0.96;
    font-weight: 750;
    letter-spacing: 0;
  }
  .ct-brand-copy {
    margin-top: 18px;
    max-width: 31ch;
    color: #3A4441;
    font-size: 15px;
    line-height: 1.55;
  }
  .ct-brand-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }
  .ct-brand-metric {
    border: 1px solid rgba(14,19,17,0.1);
    border-radius: 8px;
    padding: 12px;
    background: rgba(255,255,255,0.58);
    box-shadow: 0 10px 24px rgba(14,19,17,0.06);
  }
  .ct-brand-metric strong {
    display: block;
    color: #0E1311;
    font-size: 20px;
    line-height: 1;
  }
  .ct-brand-metric span {
    display: block;
    margin-top: 5px;
    color: #6B746F;
    font-size: 11px;
    font-weight: 650;
    letter-spacing: 0.45px;
    text-transform: uppercase;
  }
  @media (max-width: 760px) {
    .ct-shell { align-items: flex-start; padding: 14px 12px 18px; }
    .ct-stage { grid-template-columns: 1fr; gap: 18px; }
    .ct-brand-panel { padding: 6px 4px 0; }
    .ct-brand-copy { margin-top: 10px; max-width: 42ch; }
    .ct-brand-metrics { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="text/babel" src="ios-frame.jsx?v=4"></script>
<script type="text/babel" src="data.jsx?v=4"></script>
<script type="text/babel" src="store.jsx?v=4"></script>
<script type="text/babel" src="ui.jsx?v=4"></script>
<script type="text/babel" src="auth.jsx?v=4"></script>
<script type="text/babel" src="screens-dashboard.jsx?v=4"></script>
<script type="text/babel" src="screens-profile.jsx?v=4"></script>
<script type="text/babel" src="screens-log.jsx?v=4"></script>
<script type="text/babel" src="screens-share.jsx?v=4"></script>
<script type="text/babel" src="app.jsx?v=4"></script>
</body>
</html>
