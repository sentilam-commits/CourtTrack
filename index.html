function PickStudentScreen({ students, initialGroupMode = false, onBack, onSelect, onSelectGroup, onAddStudent }) {
  const [groupMode, setGroupMode] = useState(initialGroupMode);
  const [picked, setPicked] = useState([]);
  const toggle = id => setPicked(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const modeBtn = (label, active, onClick) => (
    <button
      onClick={onClick}
      style={{
        flex:1, minHeight:38, borderRadius:10, border:'none',
        fontSize:'0.85rem', fontWeight:800, cursor:'pointer',
        background: active ? 'var(--white)' : 'transparent',
        color: active ? 'var(--green-dark)' : 'var(--text-secondary)',
        boxShadow: active ? '0 1px 0 rgba(14,19,17,0.04)' : 'none'
      }}>{label}</button>
  );
  return (
    <div className="screen">
      <Header title="Registrar clase" onBack={onBack} />
      <div className="screen-content screen-content--with-bottom-bar">
        <h1 className="screen-title" style={{marginTop: 8}}>¿Con quién fue la clase?</h1>
        <p className="screen-subtitle" style={{marginBottom: 16}}>
          {groupMode ? 'Marca a todos los alumnos de la clase grupal.' : 'Toca al alumno para continuar.'}
        </p>
        <div style={{
          display:'flex', gap:6, padding:4, marginBottom:20,
          background:'rgba(14,42,28,0.07)', border:'1px solid rgba(14,42,28,0.08)', borderRadius:14
        }}>
          {modeBtn('Individual', !groupMode, () => { setGroupMode(false); setPicked([]); })}
          {modeBtn('Clase grupal', groupMode, () => setGroupMode(true))}
        </div>
        <button className="pick-add-student" onClick={() => onAddStudent?.(groupMode)}>
          <span>+</span>
          Registrar alumno nuevo
        </button>
        <div className="student-list">
          {students.map((s, i) => {
            if (!groupMode) {
              return (
                <StudentCard key={s.id} student={s} lastLog={s.lastLog}
                  onClick={() => onSelect(s)} highlighted={i === 0} />
              );
            }
            const on = picked.includes(s.id);
            return (
              <div key={s.id} style={{display:'flex', alignItems:'stretch', gap:8}}>
                <div style={{flex:1, minWidth:0, overflow:'hidden'}}>
                  <StudentCard student={s} lastLog={s.lastLog}
                    onClick={() => toggle(s.id)} highlighted={on} />
                </div>
                <button
                  onClick={() => toggle(s.id)}
                  aria-label={on ? 'Quitar de la clase' : 'Añadir a la clase'}
                  style={{
                    flexShrink:0, width:56, borderRadius:14,
                    border: on ? 'none' : '1.5px solid var(--border)',
                    background: on ? 'var(--green-dark)' : 'var(--white)',
                    color: on ? 'white' : 'var(--text-hint)',
                    fontSize:'1.3rem', fontWeight:600, cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center'
                  }}>{on ? '✓' : '+'}</button>
              </div>
            );
          })}
        </div>
      </div>
      {groupMode && (
        <div className="bottom-bar">
          <button
            className="btn btn-primary"
            disabled={picked.length < 2}
            onClick={() => onSelectGroup(students.filter(s => picked.includes(s.id)))}>
            {picked.length < 2 ? 'Marca 2 o más alumnos' : `Continuar con ${picked.length} alumnos`}
          </button>
        </div>
      )}
    </div>
  );
}

function AddStudentScreen({ coachId, onBack, onDone }) {
  const [name, setName]     = useState('');
  const [level, setLevel]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState('');
  const levels = ['Iniciación', 'Básico', 'Intermedio', 'Avanzado'];

  async function save() {
    if (!name.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    const { data, offline } = await insertStudent({ coachId, name: name.trim(), level });
    setLoading(false);
    if (!data) { setError('Error al guardar. Intenta de nuevo.'); return; }
    onDone(data);
  }

  return (
    <div className="screen">
      <Header title="Nuevo alumno" onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Añadir alumno</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>Registra los datos del alumno para empezar.</p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Nombre completo</label>
          <input className="field-input" value={name}
            onChange={e => setName(e.target.value)} placeholder="María Álvarez"
            onKeyDown={e => e.key === 'Enter' && save()} />
        </div>
        <div className="form-field">
          <label className="field-label">Nivel</label>
          <div className="chips" style={{marginTop: 8}}>
            {levels.map(l => (
              <Chip key={l} label={l} on={level === l}
                onClick={() => setLevel(level === l ? '' : l)} />
            ))}
          </div>
        </div>
      </div>
      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || !name.trim()}>
          {loading ? 'Guardando...' : 'Añadir alumno'}
        </button>
      </div>
    </div>
  );
}

function AddPaymentScreen({ coachId, students, existingPayment, onBack, onDone, onDeleted }) {
  const editing = !!existingPayment;
  const current = editing ? normalizePayment(existingPayment) : null;
  const [studentId, setStudentId] = useState(current?.student_id || students[0]?.id || '');
  const [title, setTitle]         = useState(current?.title || 'Clase');
  const [amount, setAmount]       = useState(current ? String(current.amount || '') : '');
  const [status, setStatus]       = useState(current?.status || 'pending');
  const [dueDate, setDueDate]     = useState(String(current?.paid_at || current?.due_date || todayISO()).slice(0, 10));
  const [loading, setLoading]     = useState(false);
  const [deleting, setDeleting]   = useState(false);
  const [error, setError]         = useState('');

  async function save() {
    if (!studentId) { setError('Elige un alumno.'); return; }
    if (parseMoney(amount) <= 0) { setError('Ingresa un monto válido.'); return; }
    setLoading(true); setError('');
    const payload = {
      student_id: studentId,
      title: title.trim() || 'Clase',
      amount,
      due_date: dueDate || null,
      status,
    };
    const payment = editing
      ? await updateCoachPayment(coachId, current, payload)
      : await createCoachPayment(coachId, payload);
    setLoading(false);
    onDone(payment);
  }

  async function remove() {
    if (!editing) return;
    const ok = window.confirm('¿Eliminar este pago? Esta acción no borra alumnos, bonos ni clases.');
    if (!ok) return;
    setDeleting(true); setError('');
    const deletedId = await deleteCoachPayment(coachId, current);
    setDeleting(false);
    onDeleted(deletedId);
  }

  return (
    <div className="screen">
      <Header title={editing ? 'Editar pago' : 'Nuevo pago'} onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>{editing ? 'Editar pago' : 'Registrar pago'}</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>
          {editing ? 'Cambia monto, estado o alumno.' : 'Registra cobros pendientes o pagos ya recibidos.'}
        </p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Alumno</label>
          <select className="field-input" value={studentId} onChange={e => setStudentId(e.target.value)}>
            <option value="">Selecciona un alumno</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label className="field-label">Concepto</label>
          <input className="field-input" value={title} onChange={e => setTitle(e.target.value)} placeholder="Clase, bono, mensualidad" />
        </div>
        <div className="form-field">
          <label className="field-label">Monto</label>
          <input className="field-input" type="number" min="0" inputMode="decimal" value={amount}
            onChange={e => setAmount(e.target.value)} placeholder="160" />
        </div>
        <div className="form-field">
          <label className="field-label">Estado</label>
          <div className="chips" style={{marginTop: 8}}>
            <Chip label="Pendiente" on={status === 'pending'} onClick={() => setStatus('pending')} />
            <Chip label="Pagado" on={status === 'paid'} onClick={() => setStatus('paid')} />
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">{status === 'paid' ? 'Fecha de pago' : 'Fecha de vencimiento'}</label>
          <input className="field-input" type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
        </div>
      </div>
      <div className="screen-bottom" style={{display:'grid', gap:10}}>
        <button className="btn btn-primary" onClick={save} disabled={loading || !studentId || parseMoney(amount) <= 0}>
          {loading ? 'Guardando...' : editing ? 'Guardar cambios' : status === 'paid' ? 'Guardar como pagado' : 'Guardar pago pendiente'}
        </button>
        {editing && (
          <button className="btn btn-outline" onClick={remove} disabled={loading || deleting}
            style={{borderColor:'#F3B8B3', color:'#B3261E', background:'#FDECEC'}}>
            {deleting ? 'Eliminando...' : 'Eliminar pago'}
          </button>
        )}
      </div>
    </div>
  );
}

function AddScheduledClassScreen({ coachId, students, existingClass, prefill, onBack, onDone, onDeleted }) {
  const editing = !!existingClass;
  const current = existingClass ? normalizeScheduledClass(existingClass) : null;
  const [studentId, setStudentId] = useState(current?.student_id || prefill?.student_id || students[0]?.id || '');
  const [classDate, setClassDate] = useState(current?.class_date || prefill?.class_date || todayISO());
  const [startTime, setStartTime] = useState(current?.start_time ? timeInputValue(current.start_time) : '');
  const [duration, setDuration]   = useState(String(current?.duration_minutes || 60));
  const [court, setCourt]         = useState(current?.court || '');
  const [status, setStatus]       = useState(current?.status || 'scheduled');
  const [notes, setNotes]         = useState(current?.notes || '');
  const [loading, setLoading]     = useState(false);
  const [deleting, setDeleting]   = useState(false);
  const [error, setError]         = useState('');

  async function save() {
    if (!studentId) { setError('Elige un alumno.'); return; }
    if (!classDate) { setError('Elige la fecha.'); return; }
    if (Number(duration || 0) <= 0) { setError('Ingresa una duración válida.'); return; }
    const student = students.find(s => s.id === studentId);
    setLoading(true); setError('');
    const payload = {
      student_id: studentId,
      title: student?.name || 'Clase',
      class_date: classDate,
      start_time: startTime,
      duration_minutes: duration,
      court: court.trim(),
      status,
      notes: notes.trim(),
    };
    const scheduled = editing
      ? await updateScheduledClass(coachId, current, payload)
      : await createScheduledClass(coachId, payload);
    setLoading(false);
    onDone(scheduled);
  }

  async function remove() {
    if (!editing) return;
    const ok = window.confirm('¿Eliminar esta clase agendada? No se borran pagos, bonos ni reportes.');
    if (!ok) return;
    setDeleting(true); setError('');
    const deletedId = await deleteScheduledClass(coachId, current);
    setDeleting(false);
    onDeleted(deletedId);
  }

  return (
    <div className="screen">
      <Header title={editing ? 'Editar agenda' : 'Agendar clase'} onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>{editing ? 'Reprogramar clase' : 'Nueva clase en agenda'}</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>
          {editing ? 'Cambia fecha, hora, duración o cancha. Esto no toca pagos, bonos ni reportes.' : 'Pon la fecha para que aparezca en el inicio del coach. La hora puede quedar pendiente.'}
        </p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Alumno</label>
          <select className="field-input" value={studentId} onChange={e => setStudentId(e.target.value)}>
            <option value="">Selecciona un alumno</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
          <div className="form-field">
            <label className="field-label">Fecha</label>
            <input className="field-input" type="date" value={classDate} onChange={e => setClassDate(e.target.value)} />
          </div>
          <div className="form-field">
            <label className="field-label">Hora <span style={{color:'var(--text-hint)', fontWeight:400, textTransform:'none', letterSpacing:0}}>· opcional</span></label>
            <input className="field-input" type="time" step="300" value={startTime} onChange={e => setStartTime(e.target.value)} />
          </div>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
          <div className="form-field">
            <label className="field-label">Duración</label>
            <input className="field-input" type="number" min="15" step="15" inputMode="numeric" value={duration}
              onChange={e => setDuration(e.target.value)} />
          </div>
          <div className="form-field">
            <label className="field-label">Cancha <span style={{color:'var(--text-hint)', fontWeight:400, textTransform:'none', letterSpacing:0}}>· opcional</span></label>
            <input className="field-input" value={court} onChange={e => setCourt(e.target.value)} placeholder="Cancha 2" />
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">Estado</label>
          <div className="chips" style={{marginTop: 8}}>
            <Chip label="Agendada" on={status === 'scheduled'} onClick={() => setStatus('scheduled')} />
            <Chip label="Confirmada" on={status === 'confirmed'} onClick={() => setStatus('confirmed')} />
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">Nota para agenda <span style={{color:'var(--text-hint)', fontWeight:400, textTransform:'none', letterSpacing:0}}>· opcional</span></label>
          <textarea
            className="field-input field-textarea"
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="Ej: reservar cancha 2" />

function AddBonusScreen({ coachId, students, existingBonus, onBack, onDone, onDeleted }) {
  const editing = !!existingBonus;
  const current = editing ? normalizeBonus(existingBonus) : null;
  const [studentId, setStudentId] = useState(current?.student_id || students[0]?.id || '');
  const [name, setName]           = useState(current?.name || 'Bono 10 clases');
  const [total, setTotal]         = useState(current ? String(current.total_classes || 10) : '10');
  const [remaining, setRemaining] = useState(current ? String(current.remaining_classes ?? current.total_classes ?? 10) : '10');
  const [alertAt, setAlertAt]     = useState(current ? String(current.alert_at || 3) : '3');
  const [loading, setLoading]     = useState(false);
  const [deleting, setDeleting]   = useState(false);
  const [error, setError]         = useState('');

  async function save() {
    if (!studentId) { setError('Elige un alumno.'); return; }
    const totalNum = Number(total || 0);
    const remainingNum = Number(remaining || 0);
    if (totalNum <= 0) { setError('Ingresa el total de clases.'); return; }
    if (remainingNum < 0 || remainingNum > totalNum) { setError('Las clases restantes deben estar entre 0 y el total.'); return; }
    setLoading(true); setError('');
    const payload = {
      student_id: studentId,
      name: name.trim() || `Bono ${total} clases`,
      total_classes: total,
      remaining_classes: remaining || total,
      alert_at: alertAt || 3,
    };
    const bonus = editing
      ? await updateClassBonus(coachId, current, payload)
      : await createClassBonus(coachId, payload);
    setLoading(false);
    onDone(bonus);
  }

  async function remove() {
    if (!editing) return;
    const ok = window.confirm('¿Eliminar este bono? No se borran pagos, alumnos ni reportes.');
    if (!ok) return;
    setDeleting(true); setError('');
    const deletedId = await deleteClassBonus(coachId, current);
    setDeleting(false);
    onDeleted(deletedId);
  }

  return (
    <div className="screen">
      <Header title={editing ? 'Editar bono' : 'Nuevo bono'} onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>{editing ? 'Editar bono' : 'Crear bono'}</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>
          {editing ? 'Ajusta clases incluidas, restantes o alerta.' : 'Si pagó 4 clases y ya diste 1, pon 4 incluidas y 3 restantes.'}
        </p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Alumno</label>
          <select className="field-input" value={studentId} onChange={e => setStudentId(e.target.value)}>
            <option value="">Selecciona un alumno</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label className="field-label">Nombre del bono</label>
          <input className="field-input" value={name} onChange={e => setName(e.target.value)} placeholder="Bono 10 clases" />
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
          <div className="form-field">
            <label className="field-label">Clases incluidas</label>
            <input className="field-input" type="number" min="1" inputMode="numeric" value={total}
              onChange={e => {
                const next = e.target.value;
                setTotal(next);
                if (Number(remaining) > Number(next || 0)) setRemaining(next);
              }} />
          </div>
          <div className="form-field">
            <label className="field-label">Clases restantes</label>
            <input className="field-input" type="number" min="0" inputMode="numeric" value={remaining}
              onChange={e => setRemaining(e.target.value)} />
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">Notificar cuando queden</label>
          <input className="field-input" type="number" min="1" inputMode="numeric" value={alertAt}
            onChange={e => setAlertAt(e.target.value)} />
        </div>
      </div>
      <div className="screen-bottom" style={{display:'grid', gap:10}}>
        <button className="btn btn-primary" onClick={save} disabled={loading || !studentId || Number(total) <= 0}>
          {loading ? 'Guardando...' : editing ? 'Guardar cambios' : 'Guardar bono'}
        </button>
        {editing && (
          <button className="btn btn-outline" onClick={remove} disabled={loading || deleting}
            style={{borderColor:'#F3B8B3', color:'#B3261E', background:'#FDECEC'}}>
            {deleting ? 'Eliminando...' : 'Eliminar bono'}
          </button>
        )}
      </div>
    </div>
  );
}

const DEFAULT_FOCUS    = ['Revés','Volea','Bandeja','Pared','Saque','Posición'];
const DEFAULT_IMPROVED = ['Consistencia','Técnica','Confianza','Actitud','Red','Puntería'];
const DEFAULT_CORRECTION = ['Preparar antes','Usar piernas','Mirar bola','Recuperar','Elegir golpe','Terminar gesto'];
const DEFAULT_HOMEWORK = ['Practicar bandeja','Ver video','Ejercicio físico','Practicar saque','Ver partido','Fortalecer muñeca'];

const chipCustomKey = (coachId, category) => `coach_chips:${category}:${coachId}`;
const chipDeletedKey = (coachId, category) => `coach_chips_deleted:${category}:${coachId}`;
const normalizeChips = chips => [...new Set((chips || []).map(c => (c || '').trim()).filter(Boolean))];

function getCoachChips(coachId, category, defaults) {
  const custom = normalizeChips(LS.get(chipCustomKey(coachId, category)) || []);
  const deleted = new Set(normalizeChips(LS.get(chipDeletedKey(coachId, category)) || []));
  return [...new Set([...defaults.filter(chip => !deleted.has(chip)), ...custom])];
}
function saveCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []);
  if (!existing.includes(value)) LS.set(customKey, [...existing, value]);
  LS.set(deletedKey, normalizeChips(LS.get(deletedKey) || []).filter(c => c !== value));
}
function editCoachChip(coachId, category, oldChip, newChip) {
  const oldVal = (oldChip || '').trim();
  const newVal = (newChip || '').trim();
  if (!oldVal) return;
  if (!newVal) { deleteCoachChip(coachId, category, oldVal); return; }
  if (oldVal === newVal) return;

  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  const existing = normalizeChips(LS.get(customKey) || []).filter(c => c !== oldVal);
  LS.set(customKey, normalizeChips([...existing, newVal]));

  const deleted = normalizeChips(LS.get(deletedKey) || []).filter(c => c !== newVal);
  LS.set(deletedKey, normalizeChips([...deleted, oldVal]));
}
function deleteCoachChip(coachId, category, chip) {
  const value = (chip || '').trim();
  if (!value) return;
  const customKey = chipCustomKey(coachId, category);
  const deletedKey = chipDeletedKey(coachId, category);
  LS.set(customKey, normalizeChips(LS.get(customKey) || []).filter(c => c !== value));
  LS.set(deletedKey, normalizeChips([...(LS.get(deletedKey) || []), value]));
}

function LogClassScreen({ students, coachId, onBack, onSaved }) {
  const isGroup  = students.length > 1;
  const student  = students[0];
  const groupNames = students.map(s => s.name.split(' ')[0]).join(', ');
  const draftKey = isGroup ? 'draft:group' : `draft:${student.id}`;
  const draft    = LS.get(draftKey) || {};
  const last     = isGroup ? null : student.lastLog;

  // If no draft, seed from last log as suggestions
  const seedFocus    = draft.focus    || (last ? toArr(last.today_focus)   : []);
  const seedCorrection = toArr(draft.correction);
  const seedCorrectionDetails = draft.correctionDetails || '';
  const seedHomework = draft.homework || [];
  const isSeeded     = !draft.focus && !!last;
  const showSkills   = !isGroup; // skill scoring is per-student; hidden for group classes
  const initialRequiredStep = !seedFocus.length
    ? 'focus'
    : (showSkills && !Object.keys(student.skills || {}).length)
      ? 'skills'
      : !seedCorrection.length
        ? 'correction'
        : null;

  const [focus, setFocus]           = useState(seedFocus);
  const [correction, setCorrection] = useState(seedCorrection);
  const [skills, setSkills]         = useState(showSkills ? (student.skills || {}) : {});
  const [skillPickerOpen, setSkillPickerOpen] = useState(false);
  function setSkill(key, val) { setSkills(s => ({ ...s, [key]: Math.min(10, Math.max(1, val)) })); }
  function addSkill(key) { setSkills(s => s[key] != null ? s : ({ ...s, [key]: 5 })); }
  function removeSkill(key) { setSkills(s => { const n = { ...s }; delete n[key]; return n; }); }
  const [correctionDetails, setCorrectionDetails] = useState(seedCorrectionDetails);
  const [homework, setHomework]     = useState(seedHomework);
  const [coachNote, setCoachNote]   = useState(draft.coachNote || '');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [seededBanner, setSeededBanner] = useState(isSeeded);
  const [activeRequiredStep, setActiveRequiredStep] = useState(initialRequiredStep);
  const [optionalOpen, setOptionalOpen] = useState(false);

  // Visual reference state
  const [mediaUrl, setMediaUrl]           = useState('');
  const [mediaType, setMediaType]         = useState('');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat] = useState('');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat') setVisualWhat(val);
  }

  const date = todayISO();
  const firstName = student.name.split(' ')[0];

  const requiredItems = showSkills
    ? [focus.length > 0, Object.keys(skills).length > 0, correction.length > 0]
    : [focus.length > 0, correction.length > 0];
  const requiredTotal = requiredItems.length;
  const requiredDone = requiredItems.filter(Boolean).length;
  const requiredComplete = requiredDone === requiredTotal;

  const progressPct = (requiredDone / requiredTotal) * 100;
  const progressColor = requiredComplete ? 'var(--green-dark)' : requiredDone > 0 ? 'var(--green-mid)' : 'var(--border)';

  function nextRequiredStep(step) {
    if (step === 'focus') return showSkills ? 'skills' : 'correction';
    if (step === 'skills') return 'correction';
    return null;
  }

  function updateRequiredStep(step, currentValues, nextValues, setter) {
    const wasEmpty = currentValues.length === 0;
    setter(nextValues);
    setError('');
    if (nextValues.length === 0) {
      setActiveRequiredStep(step);
    } else if (wasEmpty) {
      setActiveRequiredStep(nextRequiredStep(step));
    }
  }

  function renderRequiredField({ step, number, title, values, children }) {
    const isOpen = activeRequiredStep === step;
    const isComplete = values.length > 0;
    const summary = isComplete ? values.join(' • ') : 'Pendiente';
    return (
      <div className={`required-field${isOpen ? ' required-field--open' : ''}${isComplete ? ' required-field--complete' : ''}`}>
        <button
          type="button"
          className="required-label"
          onClick={() => setActiveRequiredStep(isOpen ? null : step)}
          aria-expanded={isOpen}
        >
          <span className="required-label-num">{number}</span>
          <span className="required-title">{title}</span>
          {isComplete && <span className="required-check">✓</span>}
        </button>
        {!isOpen && (
          <div className={`required-summary${!isComplete ? ' required-summary--empty' : ''}`}>
            {summary}
          </div>
        )}
        {isOpen && <div className="required-options">{children}</div>}
      </div>
    );
  }

  // Save draft to localStorage on every change
  useEffect(() => {
    LS.set(draftKey, { focus, correction, correctionDetails, homework, coachNote });
  }, [focus, correction, correctionDetails, homework, coachNote]);

  async function save() {
    if (!requiredComplete) { setError('Completa los puntos requeridos para enviar.'); return; }
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    const correctionText = [fromArr(correction), correctionDetails.trim()].filter(Boolean).join('. ');
    const basePayload = {
      coach_id:          coachId,
      date,
      class_type:        isGroup ? 'Grupal' : 'Privada',
      today_focus:       fromArr(focus),
      what_improved:     null,
      main_correction:   correctionText || null,
      homework:          fromArr(homework),
      coach_note:        coachNote.trim() || null,
      media_url:         mediaUrl || null,
      media_type:        mediaType || null,
      visual_what:       visualWhat.trim() || null,
      visual_correction: null,
      visual_task:       null,
    };
    const logs = [];
    let anyOffline = false;
    for (const s of students) {
      const { data, offline } = await insertLog({ ...basePayload, student_id: s.id });
      if (!data) { setError('Error al guardar. Intenta de nuevo.'); setLoading(false); return; }

      anyOffline = anyOffline || offline;

    // Unified skill evaluation → write to the student's real progress (skills + skill_history)
    if (showSkills && JSON.stringify(skills) !== JSON.stringify(student.skills || {})) {
      await updateStudentSkills(student, skills);
    }
    LS.set(draftKey, null);
    onSaved(anyOffline, logs);
  }

  return (

      <div style={{height:3, background:'var(--border)', flexShrink:0}}>

          height:'100%', width:`${progressPct}%`,

        }} />

async function downloadMedia(url, type) {
  const fileName = type === 'video' ? 'video-padel.mp4' : 'foto-padel.jpg';

  function anchorDownload(blobUrl) {
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
  }

  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const file = new File([blob], fileName, { type: blob.type });

    // iOS Safari / Android: Web Share API con archivo
    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Padel Log' });
        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
        return;
      } catch(shareErr) {
        // AbortError = alumno canceló el share sheet → no hacer nada
        if (shareErr.name === 'AbortError') {
          URL.revokeObjectURL(blobUrl);
          return;
        }
        // Cualquier otro error → intentar descarga directa
        anchorDownload(blobUrl);
        return;
      }
    }

    // Desktop / Android Chrome: descarga directa
    anchorDownload(blobUrl);

  } catch {
    // fetch falló (sin conexión o WebView bloqueado) → abrir URL directa
    window.open(url, '_blank');
  }
}

// ── VideoPlayer ──────────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  const total = Math.floor(s);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const sec = String(total % 60).padStart(2, '0');
  return h ? `${h}:${String(m).padStart(2, '0')}:${sec}` : `${m}:${sec}`;
}

function VideoPlayer({ src, maxHeight = 300, loop = false }) {
  const videoRef      = useRef(null);
  const playerRef     = useRef(null);
  const tapTimer      = useRef(null);
  const lastTapSide   = useRef(null);
  const hideTimer     = useRef(null);
  const hintTimer     = useRef(null);
  const scrubbing     = useRef(false);
  const previewAttempted = useRef(false);

  const [playing, setPlaying]         = useState(false);
  const [controls, setControls]       = useState(true);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration]       = useState(0);
  const [ready, setReady]             = useState(false);
  const [waiting, setWaiting]         = useState(true);
  const [seekHint, setSeekHint]       = useState(null);
  const [error, setError]             = useState('');
  const [isMobilePlayer, setIsMobilePlayer] = useState(false);

  useEffect(() => {
    const query = window.matchMedia?.('(max-width: 767px)');
    const updateMobileState = () => setIsMobilePlayer(query ? query.matches : window.innerWidth <= 767);
    updateMobileState();
    if (query?.addEventListener) query.addEventListener('change', updateMobileState);
    else query?.addListener?.(updateMobileState);
    window.addEventListener('resize', updateMobileState, { passive: true });
    return () => {
      if (query?.removeEventListener) query.removeEventListener('change', updateMobileState);
      else query?.removeListener?.(updateMobileState);
      window.removeEventListener('resize', updateMobileState);
    };
  }, []);

  useEffect(() => {
    setPlaying(false);
    setControls(true);
    setCurrentTime(0);
    setDuration(0);
    setReady(false);
    setWaiting(true);
    setError('');
    previewAttempted.current = false;
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, [src]);

  useEffect(() => {
    clearTimeout(hideTimer.current);
    if (playing && controls) hideTimer.current = setTimeout(() => setControls(false), 2600);
    return () => clearTimeout(hideTimer.current);
  }, [playing, controls]);

  useEffect(() => () => {
    clearTimeout(hideTimer.current);
    clearTimeout(tapTimer.current);
    clearTimeout(hintTimer.current);
  }, []);

  function showControlsTemporarily() {
    setControls(true);
    clearTimeout(hideTimer.current);
    if (videoRef.current && !videoRef.current.paused) {
      hideTimer.current = setTimeout(() => setControls(false), 2600);
    }
  }

  function flashHint(side) {
    clearTimeout(hintTimer.current);
    setSeekHint(side);
    hintTimer.current = setTimeout(() => setSeekHint(null), 620);
  }

  function syncTime() {
    const v = videoRef.current;
    if (!v) return;
    setCurrentTime(v.currentTime || 0);
    if (isFinite(v.duration)) setDuration(v.duration || 0);
  }

  function markReady() {
    setReady(true);
    setWaiting(false);
    syncTime();
  }

  function preparePreviewFrame() {
    const v = videoRef.current;
    syncTime();
    if (previewAttempted.current) return;
    previewAttempted.current = true;
    if (v && isFinite(v.duration) && v.currentTime === 0) {
      v.currentTime = 0.001;
    }
    markReady();
  }

  function seek(delta) {
    const v = videoRef.current;
    if (!v) return;
    v.currentTime = Math.max(0, Math.min(v.duration || 0, v.currentTime + delta));
    syncTime();
    flashHint(delta > 0 ? 'right' : 'left');
    showControlsTemporarily();
  }

  function togglePlay(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const v = videoRef.current;
    if (!v) return;
    if (v.paused) { v.play().catch(() => {}); } else { v.pause(); }
    showControlsTemporarily();
  }

  function handleVideoPlay() {
    setPlaying(true);
    showControlsTemporarily();
  }

  function handleVideoPause() {
    setPlaying(false);
    setControls(true);
    clearTimeout(hideTimer.current);
  }

  function handleSurfaceTap(e) {
    if (e.target.closest('[data-video-control="true"]')) return;
    const rect = playerRef.current?.getBoundingClientRect();
    const x = e.clientX - (rect?.left || 0);
    const side = x < (rect?.width || 0) / 2 ? 'left' : 'right';
    if (tapTimer.current !== null && lastTapSide.current === side) {
      clearTimeout(tapTimer.current);
      tapTimer.current = null;
      lastTapSide.current = null;
      seek(side === 'left' ? -5 : 5);
      return;
    }
    lastTapSide.current = side;
    if (tapTimer.current) clearTimeout(tapTimer.current);
    tapTimer.current = setTimeout(() => {
      tapTimer.current = null;
      lastTapSide.current = null;
      togglePlay();
    }, 260);
  }

  function handleScrubStart(e) {
    scrubbing.current = true;
    e.currentTarget.setPointerCapture(e.pointerId);
    handleScrubMove(e);
    showControlsTemporarily();
  }

  function handleScrubMove(e) {
    if (!scrubbing.current) return;
    const rail = playerRef.current?.querySelector('.video-player__seek');
    if (!rail) return;
    const rect = rail.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const v = videoRef.current;
    if (v && isFinite(v.duration)) { v.currentTime = pct * v.duration; syncTime(); }
  }

  function handleScrubEnd(e) {
    scrubbing.current = false;
    showControlsTemporarily();
  }

  function enterFullscreen(e) {
    e.preventDefault(); e.stopPropagation();
    showControlsTemporarily();
    const v = videoRef.current;
    if (!v) return;
    const target = playerRef.current || v;
    if (target?.requestFullscreen) target.requestFullscreen().catch?.(() => {});
    else if (target?.webkitRequestFullscreen) target.webkitRequestFullscreen();
  }

  const pct = duration ? Math.max(0, Math.min(100, (currentTime / duration) * 100)) : 0;
  const loading = !ready || waiting;
  const playerClass = `video-player${controls || !playing ? ' video-player--controls' : ''}${loading ? ' video-player--loading' : ''}${ready ? ' video-player--ready' : ''}`;

  return (
    <div className="video-wrap">
      <video src={src} controls playsInline loop={loop} preload="metadata" style={{display:'block', width:'100%', background:'#000'}} />
    </div>
  );
}

      const saved = await saveOwnProfile(prof, user, 'editProfile');

// ── Niveles para el aro de "próxima meta" ────────────────────
// Editá libremente. Cada nivel se alcanza cuando el PROMEDIO GENERAL llega a `min`
// (mismo promedio que muestra "PROGRESO GENERAL": aspectos nuevos "en rodaje" excluidos).
// Mantené la lista ordenada de menor a mayor `min`.
const LEVELS = [
  { name: 'Básico',     min: 0 },
  { name: 'Intermedio', min: 8 },
  { name: 'Avanzado',   min: 9 },
];

// Legacy keys from the original 4-skill model — kept so existing students render.
const LEGACY_LABELS = { defensa:'Defensa', volea:'Volea', posicionamiento:'Posicionamiento', confianza:'Confianza' };

const ASPECT_LABELS = (() => {
  const m = { ...LEGACY_LABELS };
  SKILL_CATALOG.forEach(c => c.aspects.forEach(a => { m[a.key] = a.label; }));
  return m;
})();

const CATALOG_ORDER = (() => {
  const order = [];
  SKILL_CATALOG.forEach(c => c.aspects.forEach(a => order.push(a.key)));
  Object.keys(LEGACY_LABELS).forEach(k => order.push(k));
  return order;
})();

function labelFor(key) { return ASPECT_LABELS[key] || key; }

// Ordered list of {key,label} for the aspects a student actually has scored.
function scoredAspects(skills) {
  if (!skills) return [];
  const seen = new Set();
  const out = [];
  CATALOG_ORDER.forEach(k => { if (skills[k] != null) { out.push({ key: k, label: labelFor(k) }); seen.add(k); } });
  Object.keys(skills).forEach(k => { if (!seen.has(k) && skills[k] != null) out.push({ key: k, label: labelFor(k) }); });
  return out;
}

function EditStudentScreen({ student, coachId, nextScheduled, onScheduledSync, onBack, onSaved, onDeleted }) {
  const [name, setName]         = useState(student.name || '');
  const [level, setLevel]       = useState(student.level || '');
  const [skills, setSkills]     = useState(student.skills || {});
  const [nextClass, setNextClass] = useState(nextScheduled?.class_date || student.next_class || '');
  const [nextTime, setNextTime]   = useState(nextScheduled?.start_time ? timeInputValue(nextScheduled.start_time) : '');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting]     = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [customName, setCustomName] = useState('');
  const levels = ['Iniciación', 'Básico', 'Intermedio', 'Avanzado'];

  function setSkill(key, val) {
    setSkills(s => ({ ...s, [key]: Math.min(10, Math.max(1, val)) }));
  }
  function addSkill(key) {
    setSkills(s => s[key] != null ? s : ({ ...s, [key]: 5 }));
  }
  function removeSkill(key) {
    setSkills(s => { const n = { ...s }; delete n[key]; return n; });
  }
  function addCustom() {
    const k = customName.trim();
    if (!k) return;
    addSkill(k);
    setCustomName('');
  }

  async function save() {
    if (!name.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    try {
      const hasSkills = Object.keys(skills).length > 0;
      const newSkillsVal = hasSkills ? skills : null;

      // Append snapshot to skill_history only when skills change
      let newHistory = student.skill_history || [];
      if (hasSkills) {
        const last = newHistory[newHistory.length - 1];
        const changed = !last || JSON.stringify(last.skills) !== JSON.stringify(skills);
        if (changed) {
          newHistory = [...newHistory, { date: new Date().toISOString().slice(0, 10), skills }];
        }
      }

      const { data, error } = await sb.from('students')
        .update({ name: name.trim(), level: level || null, skills: newSkillsVal, skill_history: newHistory, next_class: null })
        .eq('id', student.id)
        .select().single();
      if (error) throw error;

      // Sync the next class into scheduled_classes (date + optional time) — single source of truth
      const date = nextClass || null;
      if (date) {
        const payload = {
          student_id: student.id, title: name.trim(), class_date: date,
          start_time: nextTime || null,
          duration_minutes: nextScheduled?.duration_minutes || 60,
          court: nextScheduled?.court || '', status: nextScheduled?.status || 'scheduled',
          notes: nextScheduled?.notes || '',
        };
        if (nextScheduled) await updateScheduledClass(coachId, nextScheduled, payload);
        else await createScheduledClass(coachId, payload);
      } else if (nextScheduled) {
        await deleteScheduledClass(coachId, nextScheduled);
      }
      if (onScheduledSync) onScheduledSync();

      onSaved(data);
    } catch(e) { setError(translateError(e.message)); setLoading(false); }
  }

  async function deleteStudent() {
    setDeleting(true); setError('');
    try {
      const now = new Date().toISOString();
      await sb.from('class_logs').update({ deleted_at: now }).eq('student_id', student.id).is('deleted_at', null);
      await sb.from('students').update({ deleted_at: now }).eq('id', student.id);
      onDeleted(student.id);
    } catch(e) { setError('Error al eliminar. Intenta de nuevo.'); setDeleting(false); }
  }

  return (
    <div className="screen">
      <Header title="Editar alumno" onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Editar alumno</h1>
        <p className="screen-subtitle" style={{marginBottom: 28}}>Modifica los datos del alumno.</p>
        {error && <div className="error-msg">{error}</div>}
        <div className="form-field">
          <label className="field-label">Nombre completo</label>
          <input className="field-input" value={name}
            onChange={e => setName(e.target.value)} placeholder="María Álvarez"
            onKeyDown={e => e.key === 'Enter' && save()} />
        </div>
        <div className="form-field">
          <label className="field-label">Nivel</label>
          <div className="chips" style={{marginTop: 8}}>
            {levels.map(l => (
              <Chip key={l} label={l} on={level === l}
                onClick={() => setLevel(level === l ? '' : l)} />
            ))}
          </div>
        </div>
        <div className="form-field">
          <label className="field-label">
            Próxima clase

// ── S11 Edit Log ─────────────────────────────────────────────
function EditLogScreen({ log, student, onBack, onSaved }) {
  const correctionChoices = getCoachChips(log.coach_id, 'correction', DEFAULT_CORRECTION);
  const parseCorrection = (() => {
    const raw = (log.main_correction || '').trim();
    if (!raw) return { values: [], details: '' };
    const parts = raw.split(/\.\s+/);
    const firstPart = parts[0].trim();
    const firstValues = toArr(firstPart);
    const firstPartLooksLikeChips = firstValues.length > 0 && firstValues.every(v => correctionChoices.includes(v));
    if (firstPartLooksLikeChips && parts.length > 1) {
      return { values: firstValues, details: parts.slice(1).join('. ').trim() };
    }
    return { values: toArr(raw), details: '' };
  })();
  const initialFocus = toArr(log.today_focus);
  const initialImproved = toArr(log.what_improved);
  const initialCorrection = parseCorrection.values;
  const initialRequiredStep = !initialFocus.length
    ? 'focus'
    : !initialImproved.length
      ? 'improved'
      : !initialCorrection.length
        ? 'correction'
        : null;

  const [focus, setFocus]           = useState(initialFocus);
  const [improved, setImproved]     = useState(initialImproved);
  const [correction, setCorrection] = useState(initialCorrection);
  const [correctionDetails, setCorrectionDetails] = useState(parseCorrection.details);
  const [homework, setHomework]     = useState(toArr(log.homework));
  const [coachNote, setCoachNote]   = useState(log.coach_note || '');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [activeRequiredStep, setActiveRequiredStep] = useState(initialRequiredStep);
  const [optionalOpen, setOptionalOpen] = useState(false);

  // Visual reference state (pre-fill from existing log)
  const [mediaUrl, setMediaUrl]           = useState(log.media_url || '');
  const [mediaType, setMediaType]         = useState(log.media_type || '');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat]       = useState(log.visual_what || '');
  const [visualCorrection, setVisualCorrection] = useState(log.visual_correction || '');
  const [visualTask, setVisualTask]       = useState(log.visual_task || '');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat')       setVisualWhat(val);
    if (key === 'visualCorrection') setVisualCorrection(val);
    if (key === 'visualTask')       setVisualTask(val);
  }

  const firstName = student.name.split(' ')[0];
  const requiredDone = [
    focus.length > 0,
    improved.length > 0,
    correction.length > 0,
  ].filter(Boolean).length;
  const requiredComplete = requiredDone === 3;
  const progressPct = (requiredDone / 3) * 100;
  const progressColor = requiredComplete ? 'var(--green-dark)' : requiredDone > 0 ? 'var(--green-mid)' : 'var(--border)';

  function nextRequiredStep(step) {
    if (step === 'focus') return 'improved';
    if (step === 'improved') return 'correction';
    return null;
  }

  function updateRequiredStep(step, currentValues, nextValues, setter) {
    const wasEmpty = currentValues.length === 0;
    setter(nextValues);
    setError('');
    if (nextValues.length === 0) {
      setActiveRequiredStep(step);
    } else if (wasEmpty) {
      setActiveRequiredStep(nextRequiredStep(step));
    }
  }

  function renderRequiredField({ step, number, title, values, children }) {
    const isOpen = activeRequiredStep === step;
    const isComplete = values.length > 0;
    const summary = isComplete ? values.join(' • ') : 'Pendiente';
    return (
      <div className={`required-field${isOpen ? ' required-field--open' : ''}${isComplete ? ' required-field--complete' : ''}`}>
        <button
          type="button"
          className="required-label"
          onClick={() => setActiveRequiredStep(isOpen ? null : step)}
          aria-expanded={isOpen}
        >
          <span className="required-label-num">{number}</span>
          <span className="required-title">{title}</span>
          {isComplete && <span className="required-check">✓</span>}
        </button>
        {!isOpen && (
          <div className={`required-summary${!isComplete ? ' required-summary--empty' : ''}`}>
            {summary}
          </div>
        )}
        {isOpen && <div className="required-options">{children}</div>}
      </div>
    );
  }

  async function save() {
    if (!requiredComplete) { setError('Completa los 3 puntos rápidos para guardar.'); return; }
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    try {
      const correctionText = [fromArr(correction), correctionDetails.trim()].filter(Boolean).join('. ');
      const { data, error } = await sb.from('class_logs')
        .update({
          today_focus:       fromArr(focus),
          what_improved:     fromArr(improved),
          main_correction:   correctionText || null,
          homework:          fromArr(homework),
          coach_note:        coachNote.trim() || null,
          media_url:         mediaUrl || null,
          media_type:        mediaType || null,
          visual_what:       visualWhat.trim() || null,
          visual_correction: null,
          visual_task:       null,
        })
        .eq('id', log.id)
        .select().single();
      if (error) throw error;
      onSaved(data);
    } catch(e) { setError(translateError(e.message)); setLoading(false); }
  }

  return (
    <div className="screen">
      <Header title="Editar clase" onBack={onBack} right={formatDateEs(log.date)} />

      <div style={{height:3, background:'var(--border)', flexShrink:0}}>
        <div style={{
          height:'100%', width:`${progressPct}%`,
          background: progressColor,
          transition:'width 0.3s ease, background 0.3s ease',
          borderRadius:'0 2px 2px 0'
        }} />
      </div>

      <div className="screen-content log-content">

        <div className="quick-report-header">
          <div className="quick-report-copy">
            <div className="quick-report-kicker">Editar</div>
            <h1 className="quick-report-title">Registro rápido</h1>
            <p className="quick-report-sub">{firstName}</p>
          </div>
          <div className={`quick-report-status${requiredComplete ? ' quick-report-status--ready' : ''}`}>
            {requiredComplete ? 'Listo' : `${requiredDone}/3 listo`}
          </div>
        </div>

        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
          <div className="student-pill" style={{marginBottom:0}}>
            <div className="student-pill-sq" />
            {student.name}
          </div>
        </div>

        <section className="required-section" aria-label="Campos requeridos">
          {renderRequiredField({
            step: 'focus',
            number: 1,
            title: 'Foco',
            values: focus,
            children: (
            <ChipGroup
              chips={getCoachChips(log.coach_id, 'focus', DEFAULT_FOCUS)}
              addLabel="+ Otro" values={focus} onChange={v =>
                updateRequiredStep('focus', focus, v, setFocus)
              }
              onNewChip={chip => saveCoachChip(log.coach_id, 'focus', chip)}
              onEditChip={(old, nw) => editCoachChip(log.coach_id, 'focus', old, nw)}
              onDeleteChip={chip => deleteCoachChip(log.coach_id, 'focus', chip)} />
            )
          })}

          {renderRequiredField({
            step: 'improved',
            number: 2,
            title: 'Mejoró',
            values: improved,
            children: (
            <ChipGroup
              chips={getCoachChips(log.coach_id, 'improved', DEFAULT_IMPROVED)}
              addLabel="+ Escribir" values={improved} onChange={v =>
                updateRequiredStep('improved', improved, v, setImproved)
              }
              onNewChip={chip => saveCoachChip(log.coach_id, 'improved', chip)}
              onEditChip={(old, nw) => editCoachChip(log.coach_id, 'improved', old, nw)}
              onDeleteChip={chip => deleteCoachChip(log.coach_id, 'improved', chip)} />
            )
          })}

          {renderRequiredField({
            step: 'correction',
            number: 3,
            title: 'Corrección',
            values: correction,
            children: (
            <ChipGroup
              chips={correctionChoices}
              addLabel="+ Escribir" values={correction} onChange={v =>
                updateRequiredStep('correction', correction, v, setCorrection)
              }
              onNewChip={chip => saveCoachChip(log.coach_id, 'correction', chip)}
              onEditChip={(old, nw) => editCoachChip(log.coach_id, 'correction', old, nw)}
              onDeleteChip={chip => deleteCoachChip(log.coach_id, 'correction', chip)} />
            )
          })}

          <div className="required-submit">
            {error && <div className="error-msg">{error}</div>}
            <button className="btn btn-primary" onClick={save} disabled={loading || !requiredComplete || mediaUploading}>
              {loading ? 'Guardando...' : mediaUploading ? 'Subiendo archivo…' : 'Guardar cambios'}
            </button>
            {!requiredComplete && (
              <div className="required-hint">Completa 3 puntos.</div>
            )}
          </div>
        </section>

        <section className={`optional-panel${optionalOpen ? ' is-open' : ''}`}>
          <button
            className="optional-trigger"
            onClick={() => setOptionalOpen(s => !s)}
            aria-expanded={optionalOpen}
          >
            <span className="optional-trigger-main">
              <span className="optional-trigger-title">Detalles opcionales</span>
              <span className="optional-trigger-sub">Nota, video o tarea</span>
            </span>
            <span className="optional-chevron" aria-hidden="true">⌄</span>
          </button>

          {optionalOpen && (
            <div className="optional-body">
              <div className="log-section">
                <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
                  <div className="log-section-lbl" style={{marginBottom:0}}>
                    NOTA DE TU COACH
                    {coachNote.trim() && <span style={{color:'var(--text-secondary)', marginLeft:6}}>✓</span>}
                  </div>
                  <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
                </div>
                <textarea className="log-textarea" value={coachNote}
                  onChange={e => setCoachNote(e.target.value.slice(0, 280))}
                  placeholder="ej: Gran actitud hoy. Seguí con la bandeja, vas muy bien."
                  rows={3} maxLength={280} />
                <div style={{textAlign:'right', fontSize:'0.68rem', color:'var(--text-hint)', marginTop:4}}>
                  {coachNote.length}/280
                </div>
              </div>

              <div className="log-section">
                <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
                  <div className="log-section-lbl log-section-lbl--orange" style={{marginBottom:0}}>
                    DETALLE DE LA CORRECCIÓN
                    {correctionDetails.trim() && <span style={{marginLeft:6}}>✓</span>}
                  </div>
                  <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
                </div>
                <textarea className="log-textarea" value={correctionDetails}
                  onChange={e => setCorrectionDetails(e.target.value)}
                  placeholder="ej: En la bandeja, entrar menos de frente y recuperar el centro antes."
                  rows={3} />
              </div>

              <div className="log-section">
                <div className="log-section-lbl">
                  TAREA PARA CASA
                  {homework.length > 0 && <span style={{color:'var(--text-secondary)', marginLeft:6}}>✓</span>}
                </div>
                <ChipGroup
                  chips={getCoachChips(log.coach_id, 'homework', DEFAULT_HOMEWORK)}
                  addLabel="+ Escribir" values={homework} onChange={setHomework}
                  onNewChip={chip => saveCoachChip(log.coach_id, 'homework', chip)}
                  onEditChip={(old, nw) => editCoachChip(log.coach_id, 'homework', old, nw)}
                  onDeleteChip={chip => deleteCoachChip(log.coach_id, 'homework', chip)} />
              </div>

              <VisualReferenceSection
                coachId={student.coach_id} studentId={student.id}
                mediaUrl={mediaUrl} mediaType={mediaType} localPreview={localPreview}
                uploading={mediaUploading} uploadError={uploadError}
                visualWhat={visualWhat}
                onMediaChange={handleMediaChange} onFieldChange={handleVisualField}
              />

              <div className="optional-save">
                <button className="btn btn-primary" onClick={save} disabled={loading || !requiredComplete || mediaUploading}>
                  {loading ? 'Guardando...' : mediaUploading ? 'Subiendo archivo…' : 'Guardar cambios'}
                </button>
              </div>
            </div>
          )}
        </section>
      </div>
    </div>
  );
}
