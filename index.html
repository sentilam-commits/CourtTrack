  -- Update get_public_student to include coach profile:
  CREATE OR REPLACE FUNCTION public.get_public_student(public_student_id uuid)
  RETURNS jsonb LANGUAGE sql SECURITY DEFINER SET search_path = public AS $$
    SELECT CASE WHEN s.id IS NULL THEN NULL ELSE jsonb_build_object(
      'student',    to_jsonb(s),
      'class_logs', COALESCE((
        SELECT jsonb_agg(to_jsonb(cl) ORDER BY cl.date DESC, cl.created_at DESC)
        FROM public.class_logs cl WHERE cl.student_id = s.id
      ), '[]'::jsonb),
      'coach', (
        SELECT jsonb_build_object('display_name', p.display_name, 'club_name', p.club_name)
        FROM public.profiles p WHERE p.id = s.coach_id LIMIT 1
      )
    ) END
    FROM public.students s WHERE s.id = public_student_id LIMIT 1;
  $$;
  GRANT EXECUTE ON FUNCTION public.get_public_student(uuid) TO anon, authenticated;

  -- Referencia Visual: run once in Supabase SQL Editor
  ALTER TABLE public.class_logs
    ADD COLUMN IF NOT EXISTS media_url        TEXT,
    ADD COLUMN IF NOT EXISTS media_type       TEXT,
    ADD COLUMN IF NOT EXISTS visual_what      TEXT,
    ADD COLUMN IF NOT EXISTS visual_correction TEXT,
    ADD COLUMN IF NOT EXISTS visual_task      TEXT;

  -- Storage bucket: run once in Supabase SQL Editor
  INSERT INTO storage.buckets (id, name, public)
    VALUES ('class-media', 'class-media', true)
    ON CONFLICT (id) DO NOTHING;

  CREATE POLICY IF NOT EXISTS "Coaches can upload media"
    ON storage.objects FOR INSERT TO authenticated
    WITH CHECK (bucket_id = 'class-media');

  CREATE POLICY IF NOT EXISTS "Media is public"
    ON storage.objects FOR SELECT TO anon, authenticated
    USING (bucket_id = 'class-media');
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:     #0E2A1C;
      --green-mid:      #4F8F5F;
      --green-soft:     #E8F0EA;
      --bg:             #ECEEE9;
      --white:          #FFFFFF;
      --orange:         #D47A2F;
      --whatsapp:       #1AAD5E;
      --text-primary:   #0E1311;
      --text-secondary: #888888;
      --text-hint:      #AAAAAA;
      --border:         #E0E4E1;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
    }

    button, input, textarea, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; border: none; background: none; }
    input, textarea { outline: none; }

    /* ── Offline banner ── */
    .offline-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--orange);
      color: white;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 16px;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .offline-banner.show { transform: translateY(0); }

    /* ── Screen layout ── */
    .screen {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      max-width: 480px;
      margin: 0 auto;
    }

    .screen-content {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen-bottom {
      padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      height: 52px;
      padding: 0 16px;
      background: var(--green-dark);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .header-back {
      color: white;
      font-size: 1.4rem;
      line-height: 1;
      padding: 8px;
      margin-left: -8px;
      min-width: 44px;
      display: flex;
      align-items: center;
    }

    .header-title { flex: 1; text-align: center; font-weight: 600; font-size: 0.95rem; }
    .header-right { min-width: 44px; text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.65); }
    .header-spacer { min-width: 44px; }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 5px; }
    .logo-dot  { color: var(--green-mid); font-size: 0.55rem; line-height: 1; }
    .logo-text { font-size: 1rem; color: white; letter-spacing: -0.01em; }
    .logo-text strong { font-weight: 700; }

    /* ── Avatar ── */
    .avatar {
      background: var(--green-soft);
      color: var(--green-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Student card ── */
    .student-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
      width: 100%;
    }
    .student-card:active { opacity: 0.85; }
    .student-card--hl { border-color: var(--green-dark); border-width: 2px; }

    .sc-info { flex: 1; min-width: 0; }
    .sc-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
    .sc-sub  { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; }
    .sc-chev { color: var(--text-hint); font-size: 1.1rem; line-height: 1; }

    .student-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .chip:active { opacity: 0.8; }
    .chip--on { background: var(--green-dark); border-color: var(--green-dark); color: white; }

    .chip-group { display: flex; flex-direction: column; gap: 10px; }

    .chip-input-row { display: flex; gap: 8px; }
    .chip-input {
      flex: 1; height: 44px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; background: var(--white);
      color: var(--text-primary); font-size: 0.88rem;
    }
    .chip-input:focus { border-color: var(--green-dark); }
    .chip-input-add {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--green-dark); color: white;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; height: 52px; border-radius: 14px;
      font-size: 0.95rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; transition: opacity 0.15s; border: none;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; pointer-events: none; }

    .btn-primary  { background: var(--green-dark); color: white; }
    .btn-outline  { background: var(--white); color: var(--text-primary); border: 1.5px solid var(--border); }
    .btn-whatsapp { background: var(--whatsapp); color: white; }
    .btn-link {
      background: none; border: none;
      color: var(--text-secondary); font-size: 0.9rem;
      text-align: center; width: 100%; padding: 12px; cursor: pointer;
    }

    /* ── Forms ── */
    .form-field { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; height: 52px;
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0 16px; background: var(--white);
      color: var(--text-primary); font-size: 0.95rem;
    }
    .field-input:focus { border-color: var(--green-dark); }

    .error-msg {
      font-size: 0.84rem; color: #c0392b;
      padding: 10px 14px; background: #fdf0ef;
      border-radius: 8px; margin-bottom: 12px;
    }

    .screen-title    { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .screen-subtitle { font-size: 0.88rem; color: var(--text-secondary); }

    .section-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-secondary); margin-bottom: 12px;
    }

    /* ── Auth ── */
    .auth-screen {
      min-height: 100svh; background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 28px; max-width: 480px; margin: 0 auto;
    }
    .auth-logo { margin-bottom: 48px; }
    .auth-logo .logo-text { color: var(--text-primary); font-size: 1.5rem; }
    .auth-logo .logo-dot  { color: var(--green-mid); font-size: 0.9rem; }
    .auth-form { width: 100%; display: flex; flex-direction: column; }
    .auth-form .form-field { margin-bottom: 14px; }
    .auth-form .btn { margin-top: 6px; }
    .auth-toggle {
      text-align: center; margin-top: 16px;
      font-size: 0.88rem; color: var(--text-secondary);
    }
    .auth-toggle button {
      color: var(--green-dark); font-weight: 600;
      text-decoration: underline; font-size: 0.88rem;
    }

    /* ── Dashboard ── */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 52px;
      background: var(--green-dark); position: sticky; top: 0; z-index: 10; flex-shrink: 0;
    }
    .dash-avatar-wrap {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .dash-avatar-wrap .avatar {
      width: 36px !important; height: 36px !important;
      border-radius: 50% !important; background: white !important;
      color: var(--green-dark) !important; font-size: 0.8rem !important;
    }
    .dash-date     { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .dash-greeting { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }

    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .stat-card  { border-radius: 14px; padding: 20px 18px; }
    .stat-card--light { background: var(--white); }
    .stat-card--dark  { background: var(--green-dark); color: white; }
    .stat-num { font-size: 2.6rem; font-weight: 800; line-height: 1; }
    .stat-lbl { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 6px; }
    .stat-card--dark .stat-lbl { color: rgba(255,255,255,0.55); }

    .bottom-bar {
      display: flex; gap: 12px; padding: 16px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: var(--bg); border-top: 1px solid var(--border);
      position: sticky; bottom: 0; flex-shrink: 0;
    }
    .bottom-bar .btn { flex: 1; }

    /* ── Log Class ── */
    .log-content { padding-bottom: 24px; }

    .student-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--green-dark); color: white;
      border-radius: 100px; padding: 8px 14px 8px 10px;
      font-size: 0.88rem; font-weight: 600; margin-bottom: 28px;
    }
    .student-pill-sq {
      width: 20px; height: 20px; border-radius: 5px;
      background: var(--green-mid); flex-shrink: 0;
    }

    .log-section { margin-bottom: 28px; }
    .log-section-lbl {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-primary); margin-bottom: 12px;
    }
    .log-section-lbl--green  { color: var(--green-mid); }
    .log-section-lbl--orange { color: var(--orange); }

    .log-textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
      padding: 14px 16px; background: var(--white);
      color: var(--text-primary); font-size: 0.92rem; resize: none; min-height: 80px;
    }
    .log-textarea:focus { border-color: var(--green-dark); }

    /* ── Share ── */
    .share-screen {
      background: var(--white); min-height: 100svh;
      max-width: 480px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .share-header {
      height: 52px; display: flex; align-items: center; justify-content: center;
      background: var(--green-dark); flex-shrink: 0;
    }
    .share-header-txt { color: var(--green-mid); font-size: 0.92rem; font-weight: 600; }
    .share-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 56px 28px 40px; gap: 14px;
    }
    .share-check {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--green-soft); color: var(--green-mid);
      font-size: 1.8rem;
      display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
    }
    .share-title { font-size: 1.6rem; font-weight: 800; text-align: center; }
    .share-sub   { color: var(--text-secondary); font-size: 0.9rem; text-align: center; }
    .share-link-card { width: 100%; background: var(--bg); border-radius: 14px; padding: 16px 18px; margin: 4px 0; }
    .share-link-lbl  { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 6px; }
    .share-link-url  { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); word-break: break-all; }
    .share-link-note { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
    .share-offline-note {
      font-size: 0.8rem; color: var(--orange); text-align: center;
      padding: 8px 16px; background: #fff8f3; border-radius: 10px; width: 100%;
    }

    /* ── Public report ── */
    .pub-screen { min-height: 100svh; background: var(--bg); max-width: 480px; margin: 0 auto; }
    .pub-header { background: var(--green-dark); padding: 20px 20px 24px; }
    .pub-coach-block { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; margin-top: 14px; }
    .pub-coach-tag  { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; color: var(--green-mid); margin-bottom: 4px; }
    .pub-coach-name { font-size: 1rem; font-weight: 700; color: white; }
    .pub-coach-club { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .pub-body { padding: 24px 20px; }
    .pub-report-for { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .pub-student-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .pub-date { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 24px; }

    .pub-section { border-bottom: 1px solid var(--border); padding: 16px 0; }
    .pub-section:first-of-type { border-top: 1px solid var(--border); }

    .pub-sec-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot--green  { background: var(--green-mid); }
    .dot--orange { background: var(--orange); }
    .dot--dark   { background: var(--text-primary); }

    .pub-sec-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; }
    .pub-sec-title--green  { color: var(--green-mid); }
    .pub-sec-title--orange { color: var(--orange); }
    .pub-sec-body { font-size: 0.95rem; color: var(--text-primary); line-height: 1.55; }

    .pub-hist-lbl { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-secondary); margin: 24px 0 12px; }

    .hist-list { display: flex; flex-direction: column; gap: 10px; }
    .hist-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .hist-date  { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
    .hist-title { font-size: 0.9rem; font-weight: 600; }
    .hist-tag   { font-size: 0.75rem; font-weight: 600; color: var(--green-mid); background: var(--green-soft); border-radius: 100px; padding: 4px 10px; white-space: nowrap; }

    /* ── Loading / empty ── */
    .loading { min-height: 100svh; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 0.9rem; }
    .empty-state { text-align: center; padding: 32px 0; color: var(--text-secondary); font-size: 0.88rem; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Supabase ─────────────────────────────────────────────────
const SUPABASE_URL      = 'https://svviqpjdorxiyywnblxt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HSl0bc6L62gGl5egjtVfRg_6DfhA35X';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── LocalStorage cache + offline queue ───────────────────────
const LS = {
  _k: k => 'pl:' + k,
  get(k)    { try { return JSON.parse(localStorage.getItem(this._k(k))); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) { console.warn('LS write:', e); } },
  queue: {
    get()    { return LS.get('q') || []; },
    push(op) { LS.set('q', [...LS.queue.get(), { ...op, _ts: Date.now() }]); },
    set(q)   { LS.set('q', q); },
  },
};

// Attempt to push any queued offline writes to Supabase
async function flushQueue(uid) {
  if (!navigator.onLine) return;
  const q = LS.queue.get();
  if (!q.length) return;
  const failed = [];
  for (const op of q) {
    try {
      if (op.type === 'student') {
        const { data } = await sb.from('students').insert(op.data).select().single();
        if (data) {
          // replace the tmp entry in cache with the real one
          const studs = (LS.get(`s:${uid}`) || []).map(s => s._tmp === op._ts ? data : s);
          LS.set(`s:${uid}`, studs);
        }
      } else if (op.type === 'log') {
        const { data } = await sb.from('class_logs').insert(op.data).select().single();
        if (data) {
          const logs = (LS.get(`l:${uid}`) || []).map(l => l._tmp === op._ts ? data : l);
          LS.set(`l:${uid}`, logs);
        }
      }
    } catch (e) { failed.push(op); }
  }
  LS.queue.set(failed);
}

// ── Helpers ──────────────────────────────────────────────────
const initials = name =>
  (name || '?').trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');

const todayISO = () => new Date().toISOString().split('T')[0];

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  return `hace ${diff} días`;
}

function formatDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatFullDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio',
                  'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]}`;
}

function shortDateEs(dateStr) {
  const d = new Date((dateStr || todayISO()) + 'T00:00:00');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

const fromArr = arr => arr.join(', ');
const toArr = str => {
  if (!str) return [];
  if (Array.isArray(str)) return str;
  return str.split(',').map(s => s.trim()).filter(Boolean);
};

// ── Data access (network → localStorage fallback) ─────────────
async function fetchProfile(uid) {
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', uid).single();
    if (!error && data) { LS.set(`p:${uid}`, data); return data; }
  } catch(e) {}
  return LS.get(`p:${uid}`);
}

async function fetchStudentsAndLogs(uid) {
  try {
    const [sr, lr] = await Promise.all([
      sb.from('students').select('*').eq('coach_id', uid).order('name'),
      sb.from('class_logs').select('*').eq('coach_id', uid).order('date', { ascending: false }),
    ]);
    if (!sr.error && sr.data) LS.set(`s:${uid}`, sr.data);
    if (!lr.error && lr.data) LS.set(`l:${uid}`, lr.data);
    return {
      studs: sr.data  || LS.get(`s:${uid}`) || [],
      logs:  lr.data  || LS.get(`l:${uid}`) || [],
    };
  } catch(e) {}
  return { studs: LS.get(`s:${uid}`) || [], logs: LS.get(`l:${uid}`) || [] };
}

async function insertStudent({ coachId, name, level }) {
  const payload = { coach_id: coachId, name, level: level || null };
  try {
    const { data, error } = await sb.from('students').insert(payload).select().single();
    if (!error && data) {
      const studs = [...(LS.get(`s:${coachId}`) || []), data]
        .sort((a, b) => a.name.localeCompare(b.name));
      LS.set(`s:${coachId}`, studs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const studs = [...(LS.get(`s:${coachId}`) || []), tmp]
    .sort((a, b) => a.name.localeCompare(b.name));
  LS.set(`s:${coachId}`, studs);
  LS.queue.push({ type: 'student', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

async function insertLog(payload) {
  const { coach_id } = payload;
  try {
    const { data, error } = await sb.from('class_logs').insert(payload).select().single();
    if (!error && data) {
      const logs = [data, ...(LS.get(`l:${coach_id}`) || [])];
      LS.set(`l:${coach_id}`, logs);
      return { data, offline: false };
    }
  } catch(e) {}
  // Offline: save locally and queue
  const ts = Date.now();
  const tmp = { ...payload, id: `tmp_${ts}`, created_at: new Date().toISOString(), _tmp: ts };
  const logs = [tmp, ...(LS.get(`l:${coach_id}`) || [])];
  LS.set(`l:${coach_id}`, logs);
  LS.queue.push({ type: 'log', data: payload, _ts: ts });
  return { data: tmp, offline: true };
}

// ── Linkify ──────────────────────────────────────────────────
function linkify(text) {
  if (!text) return text;
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const parts = text.split(urlRegex);
  return parts.map((part, i) =>
    urlRegex.test(part)
      ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" style={{
          color:'var(--green-mid)', textDecoration:'underline', wordBreak:'break-all'
        }}>{part}</a>
      : part
  );
}

// ── Media upload ─────────────────────────────────────────────
async function uploadMedia(file, coachId, studentId) {
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${coachId}/${studentId}/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from('class-media').upload(path, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  const { data: { publicUrl } } = sb.storage.from('class-media').getPublicUrl(path);
  return publicUrl;
}

// ── VisualReferenceSection ────────────────────────────────────
function VisualReferenceSection({ coachId, studentId, mediaUrl, mediaType, localPreview, uploading, uploadError,
  visualWhat, visualCorrection, visualTask,
  onMediaChange, onFieldChange }) {

  const fileRef = useRef();
  const hasMedia = localPreview || mediaUrl;

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const isVideo = file.type.startsWith('video');
    const maxMB = isVideo ? 80 : 15;
    if (file.size > maxMB * 1024 * 1024) {
      onMediaChange({ uploadError: `El archivo supera el límite de ${maxMB} MB.` });
      return;
    }
    const preview = URL.createObjectURL(file);
    const type = isVideo ? 'video' : 'image';
    onMediaChange({ localPreview: preview, mediaType: type, uploading: true, uploadError: null, mediaUrl: null });
    try {
      const url = await uploadMedia(file, coachId, studentId);
      onMediaChange({ localPreview: preview, mediaType: type, uploading: false, mediaUrl: url, uploadError: null });
    } catch(err) {
      onMediaChange({ localPreview: null, mediaType: null, uploading: false, mediaUrl: null, uploadError: 'Error al subir. Intenta de nuevo.' });
    }
  }

  function removeMedia() {
    onMediaChange({ localPreview: null, mediaType: null, uploading: false, mediaUrl: null, uploadError: null });
    if (fileRef.current) fileRef.current.value = '';
  }

  return (
    <div className="log-section">
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
        <div className="log-section-lbl" style={{marginBottom:0}}>
          REFERENCIA VISUAL
          {mediaUrl && !uploading && <span style={{color:'var(--green-mid)', marginLeft:6}}>✓</span>}
        </div>
        <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
      </div>

      {/* Upload area */}
      {!hasMedia && (
        <button
          onClick={() => fileRef.current?.click()}
          style={{
            width:'100%', height:80, borderRadius:14,
            border:'1.5px dashed var(--border)', background:'var(--white)',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:6, cursor:'pointer', color:'var(--text-secondary)'
          }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
            <circle cx="12" cy="13" r="3"/>
          </svg>
          <span style={{fontSize:'0.82rem', fontWeight:500}}>Subir foto o video</span>
        </button>
      )}

      {/* Preview */}
      {hasMedia && (
        <div style={{position:'relative', borderRadius:14, overflow:'hidden', background:'#000', marginBottom:12}}>
          {mediaType === 'video'
            ? <video src={localPreview || mediaUrl} controls playsInline style={{width:'100%', maxHeight:220, display:'block'}} />
            : <img src={localPreview || mediaUrl} alt="Referencia visual" style={{width:'100%', maxHeight:220, objectFit:'cover', display:'block'}} />
          }
          {uploading && (
            <div style={{
              position:'absolute', inset:0, background:'rgba(0,0,0,0.5)',
              display:'flex', alignItems:'center', justifyContent:'center',
              flexDirection:'column', gap:8
            }}>
              <div style={{
                width:32, height:32, border:'3px solid rgba(255,255,255,0.3)',
                borderTopColor:'white', borderRadius:'50%',
                animation:'spin 0.8s linear infinite'
              }} />
              <span style={{color:'white', fontSize:'0.8rem', fontWeight:600}}>Subiendo…</span>
            </div>
          )}
          {!uploading && (
            <button onClick={removeMedia} style={{
              position:'absolute', top:8, right:8,
              width:28, height:28, borderRadius:'50%',
              background:'rgba(0,0,0,0.55)', color:'white',
              border:'none', cursor:'pointer', fontSize:'0.85rem',
              display:'flex', alignItems:'center', justifyContent:'center'
            }}>✕</button>
          )}
        </div>
      )}

      {uploadError && <div className="error-msg" style={{marginBottom:10}}>{uploadError}</div>}

      <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:'none'}} onChange={handleFile} />

      {/* 3 text fields — only show after media is uploaded or skip media */}
      <div style={{display:'flex', flexDirection:'column', gap:10, marginTop: hasMedia ? 0 : 10}}>
        {[
          { key:'visualWhat',        label:'QUÉ MIRAR',   placeholder:'ej: La posición del codo en el revés', value: visualWhat },
          { key:'visualCorrection',  label:'CORRECCIÓN',  placeholder:'ej: Mantener el brazo extendido al impactar', value: visualCorrection },
          { key:'visualTask',        label:'TAREA',       placeholder:'ej: Repetir 10 veces con pared baja', value: visualTask },
        ].map(f => (
          <div key={f.key}>
            <div style={{fontSize:'0.65rem', fontWeight:700, letterSpacing:'0.08em', color:'var(--text-secondary)', marginBottom:5}}>
              {f.label}
            </div>
            <input
              className="field-input"
              style={{height:44, fontSize:'0.88rem'}}
              value={f.value}
              onChange={e => onFieldChange(f.key, e.target.value)}
              placeholder={f.placeholder}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

// ── StudentCard ──────────────────────────────────────────────
function StudentCard({ student, lastLog, onClick, highlighted }) {
  const focusParts = lastLog ? toArr(lastLog.today_focus) : [];

    student.level,

    lastLog ? relativeDate(lastLog.date) : 'Sin clases aún',

// ── Chip ─────────────────────────────────────────────────────
function Chip({ label, on, onClick }) {
  return (
    <button className={`chip${on ? ' chip--on' : ''}`} onClick={onClick}>
      {on && label !== '+ Otro' && label !== '+ Escribir' ? `${label} ✓` : label}
    </button>
  );
}

// ── ChipGroup ────────────────────────────────────────────────
function ChipGroup({ chips, addLabel, values, onChange }) {
  const [showInput, setShowInput] = useState(false);
  const [inputVal, setInputVal] = useState('');
  const inputRef = useRef();

  function toggle(chip) {
    onChange(values.includes(chip) ? values.filter(v => v !== chip) : [...values, chip]);
  }

  function addCustom() {
    const v = inputVal.trim();
    if (v && !values.includes(v)) onChange([...values, v]);
    setInputVal(''); setShowInput(false);
  }

  const customValues = values.filter(v => !chips.includes(v));

  return (
    <div className="chip-group">
      <div className="chips">
        {chips.map(c => (
          <Chip key={c} label={c} on={values.includes(c)} onClick={() => toggle(c)} />
        ))}
        {addLabel && (
          <Chip label={addLabel} on={showInput} onClick={() => {
            setShowInput(s => !s);
            if (!showInput) setTimeout(() => inputRef.current?.focus(), 50);
          }} />
        )}
      </div>
      {showInput && (
        <div className="chip-input-row">
          <input ref={inputRef} className="chip-input" value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            placeholder="Escribe aquí..."
            onKeyDown={e => e.key === 'Enter' && addCustom()} />
          <button className="chip-input-add" onClick={addCustom}>+</button>
        </div>
      )}
      {customValues.length > 0 && (
        <div className="chips">
          {customValues.map(v => <Chip key={v} label={v} on onClick={() => toggle(v)} />)}
        </div>
      )}
    </div>
  );
}

// ── Error translator ─────────────────────────────────────────
function translateError(msg) {
  if (!msg) return msg;
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials') || m.includes('invalid credentials'))
    return 'Email o contraseña incorrectos.';
  if (m.includes('email not confirmed'))
    return 'Debes confirmar tu email antes de iniciar sesión. Revisa tu bandeja de entrada.';
  if (m.includes('user already registered') || m.includes('already been registered'))
    return 'Este email ya tiene una cuenta. Inicia sesión.';
  if (m.includes('error sending confirmation email') || m.includes('sending confirmation'))
    return 'No se pudo enviar el email de confirmación. Intenta de nuevo en unos minutos.';
  if (m.includes('password should be at least'))
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('unable to validate email address'))
    return 'El email no es válido.';
  if (m.includes('email rate limit exceeded') || m.includes('rate limit'))
    return 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
  if (m.includes('network') || m.includes('fetch'))
    return 'Error de conexión. Verifica tu internet e intenta de nuevo.';
  return msg;
}

// ── S1 Auth ──────────────────────────────────────────────────
function AuthScreen() {
  const [isSignup, setIsSignup]     = useState(false);
  const [email, setEmail]           = useState('');
  const [password, setPassword]     = useState('');
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [signupDone, setSignupDone] = useState(false);

  async function submit() {
    if (!email.trim() || !password) return;
    setLoading(true); setError('');
    try {
      const fn = isSignup
        ? sb.auth.signUp({ email: email.trim(), password })
        : sb.auth.signInWithPassword({ email: email.trim(), password });
      const { error } = await fn;
      if (error) throw error;
      if (isSignup) setSignupDone(true);
    } catch (e) {
      setError(translateError(e.message));
    } finally { setLoading(false); }
  }

  if (signupDone) {
    return (
      <div className="auth-screen">
        <div className="auth-logo"><Logo /></div>
        <div style={{
          width: '100%', background: '#f0faf4', border: '1.5px solid var(--green-mid)',
          borderRadius: 16, padding: '28px 24px', textAlign: 'center'
        }}>
          <div style={{fontSize: '2.2rem', marginBottom: 12}}>✉️</div>
          <div style={{fontWeight: 800, fontSize: '1.2rem', color: 'var(--green-dark)', marginBottom: 8}}>

          </div>

          </button>
        </div>

  return (

// ── S5 Log Class ─────────────────────────────────────────────
function LogClassScreen({ student, coachId, onBack, onSaved }) {
  const draftKey = `draft:${student.id}`;
  const draft    = LS.get(draftKey) || {};
  const last     = student.lastLog;

  // If no draft, seed from last log as suggestions
  const seedFocus    = draft.focus    || (last ? toArr(last.today_focus)   : []);
  const seedImproved = draft.improved || (last ? toArr(last.what_improved) : []);
  const seedHomework = draft.homework || (last ? toArr(last.homework)      : []);
  const isSeeded     = !draft.focus && !!last;

  const [focus, setFocus]           = useState(seedFocus);
  const [improved, setImproved]     = useState(seedImproved);
  const [correction, setCorrection] = useState(draft.correction || '');
  const [homework, setHomework]     = useState(seedHomework);
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState('');
  const [seededBanner, setSeededBanner] = useState(isSeeded);

  // Visual reference state
  const [mediaUrl, setMediaUrl]           = useState('');
  const [mediaType, setMediaType]         = useState('');
  const [localPreview, setLocalPreview]   = useState('');
  const [mediaUploading, setMediaUploading] = useState(false);
  const [uploadError, setUploadError]     = useState('');
  const [visualWhat, setVisualWhat]       = useState('');
  const [visualCorrection, setVisualCorrection] = useState('');
  const [visualTask, setVisualTask]       = useState('');

  function handleMediaChange(patch) {
    if ('mediaUrl'     in patch) setMediaUrl(patch.mediaUrl || '');
    if ('mediaType'    in patch) setMediaType(patch.mediaType || '');
    if ('localPreview' in patch) setLocalPreview(patch.localPreview || '');
    if ('uploading'    in patch) setMediaUploading(patch.uploading);
    if ('uploadError'  in patch) setUploadError(patch.uploadError || '');
  }
  function handleVisualField(key, val) {
    if (key === 'visualWhat')       setVisualWhat(val);
    if (key === 'visualCorrection') setVisualCorrection(val);
    if (key === 'visualTask')       setVisualTask(val);
  }

  const date = todayISO();

  // Progress: count completed sections (1–5)
  const sectionsDone = [
    focus.length > 0,
    improved.length > 0,
    correction.trim().length > 0,
    homework.length > 0,
    !!mediaUrl || visualWhat.trim().length > 0,
  ].filter(Boolean).length;

  const progressPct = (sectionsDone / 5) * 100;
  const progressColor = sectionsDone < 2 ? 'var(--border)' : sectionsDone < 5 ? 'var(--green-mid)' : 'var(--green-dark)';

  // Save draft to localStorage on every change
  useEffect(() => {
    LS.set(draftKey, { focus, improved, correction, homework });
  }, [focus, improved, correction, homework]);

  async function save() {
    if (mediaUploading) { setError('Espera a que termine de subir el archivo.'); return; }
    setLoading(true); setError('');
    const { data, offline } = await insertLog({
      student_id:        student.id,
      coach_id:          coachId,
      date,
      today_focus:       fromArr(focus),
      what_improved:     fromArr(improved),
      main_correction:   correction.trim() || null,
      homework:          fromArr(homework),
      media_url:         mediaUrl || null,
      media_type:        mediaType || null,
      visual_what:       visualWhat.trim() || null,
      visual_correction: visualCorrection.trim() || null,
      visual_task:       visualTask.trim() || null,
    });
    if (!data) { setError('Error al guardar. Intenta de nuevo.'); setLoading(false); return; }
    LS.set(draftKey, null);
    onSaved(offline);
  }

  return (
    <div className="screen">
      <Header title="Registrar clase" onBack={onBack} right={formatDateEs(date)} />

      {/* Progress bar */}
      <div style={{height:3, background:'var(--border)', flexShrink:0}}>
        <div style={{
          height:'100%', width:`${progressPct}%`,
          background: progressColor,
          transition:'width 0.3s ease, background 0.3s ease',
          borderRadius:'0 2px 2px 0'
        }} />
      </div>

      <div className="screen-content log-content">

        {/* Student pill + progress label */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28}}>
          <div className="student-pill" style={{marginBottom:0}}>
            <div className="student-pill-sq" />
            {student.name}
          </div>
          <div style={{
            fontSize:'0.72rem', fontWeight:600, color: sectionsDone === 4 ? 'var(--green-mid)' : 'var(--text-hint)',
            letterSpacing:'0.04em'
          }}>
            {sectionsDone === 5 ? '✓ Completo' : `${sectionsDone}/5 secciones`}
          </div>
        </div>

        {/* Seeded from last session banner */}
        {seededBanner && (
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:'var(--green-soft)', borderRadius:10, padding:'8px 14px',
            marginBottom:20, gap:10
          }}>
            <span style={{fontSize:'0.78rem', color:'var(--green-dark)', fontWeight:500}}>
              💡 Preseleccionado desde la última clase
            </span>
            <button onClick={() => {
              setFocus([]); setImproved([]); setHomework([]); setSeededBanner(false);
            }} style={{
              fontSize:'0.72rem', fontWeight:700, color:'var(--green-dark)',
              background:'none', border:'none', cursor:'pointer', textDecoration:'underline',
              flexShrink:0
            }}>Limpiar</button>
          </div>
        )}

        <div className="log-section">
          <div className="log-section-lbl">
            ¿QUÉ TRABAJARON HOY?
            {focus.length > 0 && <span style={{color:'var(--green-mid)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={['Revés','Volea','Bandeja','Globo','Pared','Smash','Saque','Posicionamiento']}
            addLabel="+ Otro" values={focus} onChange={v => { setFocus(v); setSeededBanner(false); }} />
        </div>

        <div className="log-section">
          <div className="log-section-lbl log-section-lbl--green">
            LO QUE MEJORÓ
            {improved.length > 0 && <span style={{marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={['Volea','Reacción','Confianza','Consistencia','Técnica','Actitud','Potencia','Puntería','Juego en red']}
            addLabel="+ Escribir" values={improved} onChange={v => { setImproved(v); setSeededBanner(false); }} />
        </div>

        <div className="log-section">
          <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:12}}>
            <div className="log-section-lbl log-section-lbl--orange" style={{marginBottom:0}}>
              QUÉ NECESITA CORREGIR
              {correction.trim() && <span style={{marginLeft:6}}>✓</span>}
            </div>
            <span style={{fontSize:'0.68rem', color:'var(--text-hint)', fontWeight:500}}>opcional</span>
          </div>
          <textarea className="log-textarea" value={correction}
            onChange={e => setCorrection(e.target.value)}
            placeholder="ej: Mejorar el agarre en el revés, bajar más en la volea..." rows={3} />
        </div>

        <div className="log-section">
          <div className="log-section-lbl">
            TAREA PARA CASA
            {homework.length > 0 && <span style={{color:'var(--text-secondary)', marginLeft:6}}>✓</span>}
          </div>
          <ChipGroup
            chips={['Practicar bandeja','Ver video','Ejercicio físico','Practicar saque','Ver partido','Fortalecer muñeca']}
            addLabel="+ Escribir" values={homework} onChange={v => { setHomework(v); setSeededBanner(false); }} />
        </div>

        <VisualReferenceSection
          coachId={coachId} studentId={student.id}
          mediaUrl={mediaUrl} mediaType={mediaType} localPreview={localPreview}
          uploading={mediaUploading} uploadError={uploadError}
          visualWhat={visualWhat} visualCorrection={visualCorrection} visualTask={visualTask}
          onMediaChange={handleMediaChange} onFieldChange={handleVisualField}
        />

        {error && <div className="error-msg">{error}</div>}
      </div>

      <div className="screen-bottom">
        <button className="btn btn-primary" onClick={save} disabled={loading || focus.length === 0 || mediaUploading}>
          {loading ? 'Guardando...' : mediaUploading ? 'Subiendo archivo…' : 'Guardar y compartir →'}
        </button>
        {focus.length === 0 && (
          <div style={{textAlign:'center', fontSize:'0.75rem', color:'var(--text-hint)', marginTop:8}}>
            Selecciona al menos qué trabajaron hoy
          </div>
        )}
      </div>
    </div>
  );
}

// ── S6 Share ─────────────────────────────────────────────────
function ShareScreen({ student, savedOffline, onHome }) {
  const base = location.origin.includes('localhost') || location.protocol === 'file:'
    ? 'https://padel-log-app.vercel.app'
    : location.origin;
  const publicUrl = `${base}/#/p/${student.id}`;
  const [copied, setCopied] = useState(false);

  function copyLink() {
    navigator.clipboard.writeText(publicUrl)
      .then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); })
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = publicUrl; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        setCopied(true); setTimeout(() => setCopied(false), 2500);
      });
  }

  function sendWhatsApp() {
    const firstName = student.name.split(' ')[0];
    const msg = encodeURIComponent(
      `Hola ${firstName}, aquí tienes el reporte de tu clase de hoy 🎾\n${publicUrl}`
    );
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  }

  return (
    <div className="share-screen">
      <div className="share-header">
        <span className="share-header-txt">✓ Clase guardada</span>
      </div>
      <div className="share-body">
        <div className="share-check">✓</div>
        <h1 className="share-title">¡Clase registrada!</h1>
        <p className="share-sub">Comparte el reporte con {student.name.split(' ')[0]}.</p>
        {savedOffline && (
          <div className="share-offline-note">
            Guardado sin conexión — se sincronizará automáticamente cuando vuelva internet.
          </div>
        )}
        <div className="share-link-card">
          <div className="share-link-lbl">LINK DEL ALUMNO</div>
          <div className="share-link-url">{publicUrl.replace(/^https?:\/\//, '')}</div>
          <div className="share-link-note">Un link para siempre. Siempre actualizado.</div>
        </div>
        <button className="btn btn-whatsapp" onClick={sendWhatsApp} style={{width:'100%'}}>
          Enviar por WhatsApp 🎾
        </button>
        <button className="btn btn-outline" onClick={copyLink} style={{width:'100%'}}>
          {copied ? '✓ Copiado' : 'Copiar link'}
        </button>
        <button className="btn-link" onClick={onHome}>Volver al inicio</button>
      </div>
    </div>
  );
}

// ── S7 Public Report ─────────────────────────────────────────
function PublicReportScreen({ studentId }) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState('');

  useEffect(() => {
    sb.rpc('get_public_student', { public_student_id: studentId })
      .then(({ data, error }) => {
        if (error || !data) { setError('No se pudo cargar el reporte.'); }
        else setData(data);
        setLoading(false);
      });
  }, [studentId]);

  if (loading) return <div className="loading">Cargando reporte…</div>;
  if (error || !data) return <div className="loading">{error || 'Reporte no encontrado.'}</div>;

  const { student, class_logs: logs, coach } = data;
  const latest  = logs?.[0];
  const history = logs?.slice(1, 11) || [];

  const improvedArr   = toArr(latest?.what_improved);
  const homeworkArr   = toArr(latest?.homework);

function EditProfileScreen({ user, profile, onBack, onSaved, onDeleted }) {
  const [displayName, setDisplayName] = useState(profile?.display_name || '');
  const [clubName, setClubName]       = useState(profile?.club_name || '');
  const [loading, setLoading]         = useState(false);
  const [error, setError]             = useState('');
  const [saved, setSaved]             = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting]           = useState(false);

  async function save() {
    if (!displayName.trim()) { setError('El nombre es obligatorio.'); return; }
    setLoading(true); setError('');
    const prof = { display_name: displayName.trim(), club_name: clubName.trim() || null };
    try {
      const { error } = await sb.from('profiles').upsert({ id: user.id, ...prof });
      if (error) throw error;
    } catch(e) { setError(e.message); setLoading(false); return; }
    LS.set(`p:${user.id}`, { id: user.id, ...prof });
    setSaved(true);
    setTimeout(() => { onSaved(prof); }, 800);
  }

  async function deleteAccount() {
    setDeleting(true); setError('');
    try {
      // Delete class logs, students, profile then user
      await sb.from('class_logs').delete().eq('coach_id', user.id);
      await sb.from('students').delete().eq('coach_id', user.id);
      await sb.from('profiles').delete().eq('id', user.id);
      await sb.auth.admin?.deleteUser(user.id);
      // Clear local storage
      localStorage.clear();
      await sb.auth.signOut();
      onDeleted();
    } catch(e) {
      setError('Error al eliminar. Contacta soporte.');
      setDeleting(false);
    }
  }

  return (
    <div className="screen">
      <Header title="Mi perfil" onBack={onBack} />
      <div className="screen-content">
        <h1 className="screen-title" style={{marginTop: 8}}>Editar perfil</h1>

          <div className="field-input" style={{display:'flex',alignItems:'center',color:'var(--text-secondary)',background:'var(--bg)'}}>

          <input className="field-input" value={displayName}
            onChange={e => setDisplayName(e.target.value)} placeholder="Coach Benji" />
        </div>
        <div className="form-field">
          <label className="field-label">
            Club o academia{' '}
            <span style={{color:'var(--text-hint)',fontWeight:400,textTransform:'none',letterSpacing:0}}>· opcional</span>
          </label>

        </div>

        {/* Delete account section */}
        <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)'}}>
          {!confirmDelete ? (
            <button onClick={() => setConfirmDelete(true)} style={{
              background:'none', border:'none', color:'#c0392b',

// ── App ───────────────────────────────────────────────────────
function App() {
  const [route, setRoute]                   = useState('loading');
  const [user, setUser]                     = useState(null);
  const [profile, setProfile]               = useState(null);
  const [students, setStudents]             = useState([]);
  const [todayCount, setTodayCount]         = useState(0);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [savedOffline, setSavedOffline]     = useState(false);
  const [selectedLog, setSelectedLog]         = useState(null);
  const [isOffline, setIsOffline]           = useState(!navigator.onLine);

  const go = r => {
    setRoute(r);
    if (r && r !== 'loading' && r !== 'auth') {
      LS.set('lastRoute', r);
    }
  };

  const publicMatch = () => {
    const m = location.hash.match(/^#\/p\/([0-9a-f-]{36})$/i);
    return m ? m[1] : null;
  };

  // Online/offline detection + queue flush
  useEffect(() => {
    const onOnline  = () => { setIsOffline(false); if (user) flushQueue(user.id); };
    const onOffline = () => setIsOffline(true);
    window.addEventListener('online',  onOnline);
    window.addEventListener('offline', onOffline);
    return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
  }, [user]);

  useEffect(() => {
    const publicId = publicMatch();
    if (publicId) { go({ name: 'public', id: publicId }); return; }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        loadEverything(session.user.id);
      } else {
        go('auth');
      }
    }).catch(() => go('auth'));

    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) { setUser(session.user); loadEverything(session.user.id); }
      else { setUser(null); setProfile(null); go('auth'); }
    });

    const handleHash = () => { const pid = publicMatch(); if (pid) go({ name: 'public', id: pid }); };
    window.addEventListener('hashchange', handleHash);
    return () => { subscription.unsubscribe(); window.removeEventListener('hashchange', handleHash); };
  }, []);

  async function loadEverything(uid) {
    const prof = await fetchProfile(uid);
    if (!prof?.display_name) { go('onboarding'); return; }
    setProfile(prof);
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    const mappedStudents = studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null }));
    setStudents(mappedStudents);

    // Restore last route
    const lastRoute = LS.get('lastRoute');
    if (lastRoute && lastRoute !== 'dashboard' && lastRoute !== 'auth' && lastRoute !== 'loading') {
      const routeName = typeof lastRoute === 'object' ? lastRoute.name : lastRoute;

      // Routes that need a student restored
      if (['logClass', 'editStudent', 'editLog', 'share', 'studentProfile'].includes(routeName)) {
        const studentId = typeof lastRoute === 'object' ? lastRoute.studentId : null;
        const restoredStudent = studentId ? mappedStudents.find(s => s.id === studentId) : null;
        if (restoredStudent) {
          setSelectedStudent(restoredStudent);
          if (routeName === 'editLog') {
            const restoredLog = logs.find(l => l.student_id === restoredStudent.id);
            if (restoredLog) setSelectedLog(restoredLog);
          }
          setRoute(lastRoute);
          flushQueue(uid);
          return;
        }
      }

      // Simple routes that just need to be restored
      if (['pickStudent', 'addStudent', 'editProfile', 'manageStudents'].includes(routeName)) {
        setRoute(lastRoute);
        flushQueue(uid);
        return;
      }
    }

    go('dashboard');
    flushQueue(uid);
  }

  async function refreshStudents(uid) {
    const { studs, logs } = await fetchStudentsAndLogs(uid);
    const today = todayISO();
    setTodayCount(logs.filter(l => l.date === today).length);
    setStudents(studs.map(s => ({ ...s, lastLog: logs.find(l => l.student_id === s.id) || null })));
  }

  // ── Render ──
  if (route?.name === 'public') return <PublicReportScreen studentId={route.id} />;
  if (route === 'loading') return <div className="loading">Cargando…</div>;

  return (
    <>
      <div className={`offline-banner${isOffline ? ' show' : ''}`}>
        Sin conexión — los cambios se guardan localmente
      </div>

      {route === 'auth' && <AuthScreen />}

      {route === 'onboarding' && (
        <OnboardingScreen user={user}
          onDone={prof => { setProfile(prof); refreshStudents(user.id); go('dashboard'); }} />
      )}

      {route === 'dashboard' && (
        <DashboardScreen profile={profile} students={students} todayCount={todayCount}
          onAddStudent={() => go('addStudent')}
          onRegisterClass={() => go('pickStudent')}
          onSelectStudent={s => { setSelectedStudent(s); go({ name: 'studentProfile', studentId: s.id }); }}
          onSignOut={() => { LS.set('lastRoute', null); sb.auth.signOut(); }}
          onEditProfile={() => go('editProfile')}
          onEditStudent={s => { setSelectedStudent(s); go('editStudent'); }}
          onEditLog={(s, log) => { setSelectedStudent(s); setSelectedLog(log); go('editLog'); }}
          onManageStudents={() => go('manageStudents')}
          onQuickLog={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'dashboard', studentId: s.id }); }} />
      )}

      {route?.name === 'studentProfile' && (
        (() => {
          const s = selectedStudent || students.find(st => st.id === route.studentId);
          return s ? (
            <StudentProfileScreen
              student={s}
              coachId={user.id}
              onBack={() => go('dashboard')}
              onEdit={() => { setSelectedStudent(s); go('editStudent'); }}
              onRegisterClass={() => { setSelectedStudent(s); go({ name: 'logClass', from: 'studentProfile', studentId: s.id }); }} />
          ) : null;
        })()
      )}

      {route === 'pickStudent' && (
        <PickStudentScreen students={students} onBack={() => go('dashboard')}
          onSelect={s => { setSelectedStudent(s); go({ name: 'logClass', from: 'pickStudent', studentId: s.id }); }} />
      )}

      {route === 'addStudent' && (
        <AddStudentScreen coachId={user.id} onBack={() => go('dashboard')}
          onDone={s => {
            setStudents(prev =>
              [...prev, { ...s, lastLog: null }].sort((a, b) => a.name.localeCompare(b.name))
            );
            go('dashboard');
          }} />
      )}

      {route?.name === 'logClass' && (
        <LogClassScreen student={selectedStudent} coachId={user.id}
          onBack={() => go(route.from === 'dashboard' || route.from === 'studentProfile' ? (route.from === 'studentProfile' ? { name: 'studentProfile', studentId: selectedStudent.id } : 'dashboard') : 'pickStudent')}
          onSaved={offline => {
            setSavedOffline(offline);
            refreshStudents(user.id);
            go('share');
          }} />
      )}

      {route === 'manageStudents' && (
        <ManageStudentsScreen students={students} onBack={() => go('dashboard')}
          onEditStudent={s => { setSelectedStudent(s); go('editStudent'); }} />
      )}

      {route === 'editStudent' && selectedStudent && (
        <EditStudentScreen student={selectedStudent} onBack={() => go('dashboard')}
          onSaved={updated => {
            setStudents(prev => prev.map(s => s.id === updated.id ? { ...s, ...updated } : s));
            go('dashboard');
          }}
          onDeleted={id => {
            setStudents(prev => prev.filter(s => s.id !== id));
            setSelectedStudent(null);
            go('dashboard');
          }} />
      )}

      {route === 'editLog' && selectedLog && selectedStudent && (
        <EditLogScreen log={selectedLog} student={selectedStudent} onBack={() => go('dashboard')}
          onSaved={updated => {
            refreshStudents(user.id);
            go('dashboard');
          }} />
      )}

      {route === 'editProfile' && (
        <EditProfileScreen user={user} profile={profile} onBack={() => go('dashboard')}
          onSaved={prof => { setProfile(prof); go('dashboard'); }}
          onDeleted={() => { setUser(null); setProfile(null); go('auth'); }} />
      )}

      {route === 'share' && (
        <ShareScreen student={selectedStudent} savedOffline={savedOffline}
          onHome={() => { setSelectedStudent(null); setSavedOffline(false); go('dashboard'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Service Worker registration (requires HTTP/HTTPS, not file://) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(e => console.log('SW registration skipped:', e.message));
    });
  }
</script>

<!-- iOS PWA safe area fix -->
<script>
  // Only apply when launched from home screen (not Safari browser)
  if (window.navigator.standalone === true) {
    const style = document.createElement('style');
    style.textContent = `
      .app-header, .dash-header, .share-header {
        padding-top: env(safe-area-inset-top) !important;
        height: calc(52px + env(safe-area-inset-top)) !important;
        align-items: flex-end !important;
        box-sizing: border-box !important;
      }
    `;
    document.head.appendChild(style);
  }
</script>
