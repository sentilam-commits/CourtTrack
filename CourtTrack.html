function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
}
function relDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date('2026-05-07');
  const diff = Math.round((now - d) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Ayer';
  if (diff < 7) return `hace ${diff}d`;
  if (diff < 30) return `hace ${Math.round(diff/7)}sem`;
  return fmtDate(iso);
}

function AddStudent({ nav, addStudent }) {
  const [name, setName] = React.useState('');
  const [contact, setContact] = React.useState('');
  const [level, setLevel] = React.useState('Intermedio');
  const [goal, setGoal] = React.useState('');
  const [freq, setFreq] = React.useState('2x / semana');
  const [date, setDate] = React.useState('2026-05-07');
  const valid = name.trim().length > 1;

  const submit = () => {
    if (!valid) return;
    const id = 's' + Date.now();
    addStudent({ id, name, contact, level, goal, frequency: freq, startDate: date, scores: SKILLS.reduce((acc, k) => (acc[k] = 3, acc), {}), classes: [] });
    nav('profile', id);
  };

  return (
    <div style={{ background: '#fff', minHeight: '100%', paddingBottom: 130 }}>
      <ScreenHeader title="Nuevo alumno" onBack={() => nav('dashboard')} />
      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 18 }}>
        <div><Label>Nombre completo</Label><TextInput value={name} onChange={setName} placeholder="ej. Benito Álvarez" /></div>
        <div><Label>Teléfono o email</Label><TextInput value={contact} onChange={setContact} placeholder="benito@mail.com" /></div>
        <div>
          <Label>Nivel</Label>
          <div style={{ display: 'flex', gap: 8 }}>
            {LEVELS.map(l => <Chip key={l} active={level === l} onClick={() => setLevel(l)} style={{ flex: 1 }}>{l}</Chip>)}
          </div>
        </div>
        <div><Label>Objetivo principal</Label><TextInput value={goal} onChange={setGoal} placeholder="ej. Mejor control de red" /></div>
        <div>
          <Label>Frecuencia de clases</Label>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {FREQUENCIES.map(f => <Chip key={f} active={freq === f} onClick={() => setFreq(f)}>{f}</Chip>)}
          </div>
        </div>
        <div><Label>Fecha de inicio</Label><TextInput type="date" value={date} onChange={setDate} /></div>
      </div>
      <div style={{ position: 'absolute', left: 20, right: 20, bottom: 32 }}>
        <PrimaryButton onClick={submit} disabled={!valid}>Añadir alumno</PrimaryButton>
      </div>
    </div>
  );
}

// ─── log class ───────────────────────────────────────────────────────────────

function LogClass({ student, nav, addClass }) {
  const [step, setStep] = React.useState(0);
  const [date, setDate] = React.useState('2026-05-07');
  const [type, setType] = React.useState('Privada');
  const [focus, setFocus] = React.useState('');
  const [improved, setImproved] = React.useState([]);
  const [correction, setCorrection] = React.useState('');
  const [homework, setHomework] = React.useState('');
  const [homeworkCustom, setHomeworkCustom] = React.useState('');
  const [nextFocus, setNextFocus] = React.useState('');
  const [nextFocusCustom, setNextFocusCustom] = React.useState('');
  const [note, setNote] = React.useState('');

  const homeworkValue = homework === '__other' ? homeworkCustom.trim() : homework;
  const nextFocusValue = nextFocus === '__other' ? nextFocusCustom.trim() : nextFocus;

  const steps = [
    { key: 'when', title: 'Cuándo' },
    { key: 'focus', title: 'Foco de hoy' },
    { key: 'improved', title: 'Qué mejoró' },
    { key: 'correction', title: 'Corrección principal' },
    { key: 'homework', title: 'Tarea' },
    { key: 'next', title: 'Foco de la próxima clase' },
    { key: 'note', title: 'Nota del coach (opcional)' },
    { key: 'review', title: 'Revisar' },
  ];
  const cur = steps[step];
  const total = steps.length;

  const canNext = (() => {
    if (cur.key === 'when') return !!date && !!type;
    if (cur.key === 'focus') return !!focus;
    if (cur.key === 'improved') return improved.length > 0;
    if (cur.key === 'correction') return !!correction;
    if (cur.key === 'homework') return !!homeworkValue;
    if (cur.key === 'next') return !!nextFocusValue;
    return true;
  })();

  const submit = () => {
    addClass(student.id, { id: 'c' + Date.now(), date, type, focus, improved, correction, homework: homeworkValue, nextFocus: nextFocusValue, note });
    nav('share', student.id, { fromLog: true });
  };

  const toggleImproved = (v) => setImproved(improved.includes(v) ? improved.filter(x => x !== v) : [...improved, v]);

  return (
    <div style={{ background: '#fff', minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
      <ScreenHeader
        title={`Clase de ${student.name.split(' ')[0]}`}
        onBack={() => step === 0 ? nav('profile', student.id) : setStep(step - 1)}
      />

      <div style={{ padding: '0 20px 8px', display: 'flex', gap: 4 }}>
        {steps.map((s, i) => (
          <div key={s.key} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= step ? CT.green : CT.line, transition: 'background 0.2s' }} />
        ))}
      </div>
      <div style={{ padding: '4px 20px 0', fontSize: 12, color: CT.ink3, fontWeight: 500 }}>Paso {step + 1} de {total}</div>

      <div style={{ flex: 1, padding: '20px 20px 0', overflow: 'auto' }}>
        <div style={{ fontSize: 24, fontWeight: 700, color: CT.ink, letterSpacing: -0.4, marginBottom: 18 }}>{cur.title}</div>

        {cur.key === 'when' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            <div><Label>Fecha</Label><TextInput type="date" value={date} onChange={setDate} /></div>
            <div>
              <Label>Tipo de clase</Label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {CLASS_TYPES.map(t => <Chip key={t} active={type === t} onClick={() => setType(t)} style={{ flex: 1 }}>{t}</Chip>)}
              </div>
            </div>
          </div>
        )}

        {cur.key === 'focus' && <ChipGrid options={FOCUS_OPTIONS} value={focus} onSelect={setFocus} />}

        {cur.key === 'improved' && (
          <div>
            <div style={{ fontSize: 13, color: CT.ink3, marginBottom: 14 }}>Marca todo lo que aplique</div>
            <ChipGrid options={IMPROVED_OPTIONS} value={improved} onSelect={toggleImproved} multi />
          </div>
        )}

        {cur.key === 'correction' && <ChipGrid options={CORRECTION_OPTIONS} value={correction} onSelect={setCorrection} />}

        {cur.key === 'homework' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <ChipGrid options={HOMEWORK_OPTIONS} value={homework} onSelect={setHomework} stacked />
            <button onClick={() => setHomework('__other')} style={{
              textAlign: 'left', padding: '14px 16px',
              border: `1px dashed ${homework === '__other' ? CT.green : CT.ink4}`,
              background: homework === '__other' ? CT.greenSoft : '#fff',
              color: homework === '__other' ? CT.greenDeep : CT.ink2,
              borderRadius: 14, fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <span style={{ width: 18, height: 18, borderRadius: 6, border: `1.5px solid ${homework === '__other' ? CT.green : CT.ink4}`, background: homework === '__other' ? CT.green : 'transparent', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {homework === '__other' && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
              </span>
              <span style={{ flex: 1 }}>Otro — escribe tu propia tarea</span>
            </button>
            {homework === '__other' && (
              <textarea
                value={homeworkCustom}
                onChange={(e) => setHomeworkCustom(e.target.value)}
                placeholder="ej. 15 min de peloteo cruzado de revés, 2x esta semana"
                rows={3} autoFocus
                style={{ width: '100%', padding: 14, borderRadius: 14, border: `1px solid ${CT.green}`, background: '#fff', fontSize: 15, fontFamily: 'inherit', color: CT.ink, outline: 'none', boxSizing: 'border-box', resize: 'none', lineHeight: 1.4, marginTop: 4 }}
              />
            )}
          </div>
        )}

        {cur.key === 'next' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <ChipGrid options={FOCUS_OPTIONS} value={nextFocus} onSelect={setNextFocus} />
            <button onClick={() => setNextFocus('__other')} style={{
              alignSelf: 'flex-start', padding: '9px 14px',
              border: `1px dashed ${nextFocus === '__other' ? CT.green : CT.ink4}`,
              background: nextFocus === '__other' ? CT.greenSoft : '#fff',
              color: nextFocus === '__other' ? CT.greenDeep : CT.ink2,
              borderRadius: 999, fontSize: 14, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer',
            }}>+ Otro</button>
            {nextFocus === '__other' && (
              <input
                value={nextFocusCustom}
                onChange={(e) => setNextFocusCustom(e.target.value)}
                placeholder="ej. Globo defensivo"
                autoFocus
                style={{ width: '100%', height: 50, padding: '0 16px', borderRadius: 14, border: `1px solid ${CT.green}`, background: '#fff', fontSize: 16, fontFamily: 'inherit', color: CT.ink, outline: 'none', boxSizing: 'border-box' }}
              />
            )}
          </div>
        )}

        {cur.key === 'note' && (
          <div>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="¿Algo personal que decir?" rows={5}
              style={{ width: '100%', padding: 16, borderRadius: 14, border: `1px solid ${CT.line}`, background: '#fff', fontSize: 16, fontFamily: 'inherit', color: CT.ink, outline: 'none', boxSizing: 'border-box', resize: 'none', lineHeight: 1.4 }}
            />
            <div style={{ fontSize: 12, color: CT.ink4, marginTop: 8 }}>Opcional — puede quedar vacío.</div>
          </div>
        )}

        {cur.key === 'review' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Card>
              <Row k="Fecha" v={fmtDate(date)} />
              <Divider />
              <Row k="Tipo" v={type} />
              <Divider />
              <Row k="Foco" v={focus} />
              <Divider />
              <Row k="Mejoró" v={improved.join(', ')} />
              <Divider />
              <Row k="Corrección" v={correction} danger />
              <Divider />
              <Row k="Tarea" v={homeworkValue} />
              <Divider />
              <Row k="Próximo foco" v={nextFocusValue} accent />
              {note && (<><Divider /><Row k="Nota" v={note} /></>)}
            </Card>
            <div style={{ fontSize: 13, color: CT.ink3, textAlign: 'center', marginTop: 4 }}>Pulsa guardar para registrar esta clase y generar el enlace.</div>
          </div>
        )}
      </div>

      <div style={{ padding: '16px 20px 32px', background: '#fff', borderTop: `1px solid ${CT.line}` }}>
        {cur.key === 'review' ? (
          <PrimaryButton onClick={submit}>Guardar y generar enlace</PrimaryButton>
        ) : (
          <PrimaryButton onClick={() => canNext && setStep(step + 1)} disabled={!canNext}>
            {cur.key === 'note' ? 'Revisar' : 'Continuar'}
          </PrimaryButton>
        )}
      </div>
    </div>
  );
}

function ChipGrid({ options, value, onSelect, multi, stacked }) {
  if (stacked) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {options.map(o => {
          const active = multi ? value.includes(o) : value === o;
          return (
            <button key={o} onClick={() => onSelect(o)} style={{
              textAlign: 'left', padding: '14px 16px',
              border: `1px solid ${active ? CT.green : CT.line}`,
              background: active ? CT.greenSoft : '#fff',
              color: active ? CT.greenDeep : CT.ink,
              borderRadius: 14, fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <span style={{ width: 18, height: 18, borderRadius: 6, border: `1.5px solid ${active ? CT.green : CT.ink4}`, background: active ? CT.green : 'transparent', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {active && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
              </span>
              <span style={{ flex: 1 }}>{o}</span>
            </button>
          );
        })}
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
      {options.map(o => {
        const active = multi ? value.includes(o) : value === o;
        return <Chip key={o} active={active} onClick={() => onSelect(o)}>{o}</Chip>;
      })}
    </div>
  );
}

function FeedbackBlock({ kicker, body, tone }) {
  const palette = {
    good:   { bg: CT.greenSoft, fg: CT.greenDeep, dot: CT.green },
    warn:   { bg: '#FDF2E5',    fg: '#A05A1B',    dot: '#D58A3F' },
    action: { bg: '#F1F1EE',    fg: CT.ink,       dot: CT.ink2 },
  }[tone];
  return (
    <div style={{ background: palette.bg, borderRadius: 18, padding: '16px 18px', border: `1px solid ${palette.dot}22` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ width: 6, height: 6, borderRadius: 999, background: palette.dot }} />
        <div style={{ fontSize: 11, fontWeight: 700, color: palette.fg, textTransform: 'uppercase', letterSpacing: 0.5 }}>{kicker}</div>
      </div>
      <div style={{ fontSize: 15, color: palette.fg, marginTop: 8, lineHeight: 1.5, fontWeight: 500 }}>{body}</div>
    </div>
  );
}

function improvedSentence(arr) {
  if (!arr || arr.length === 0) return '';
  const map = {
    'Timing': 'tu timing con la pelota',
    'Punto de contacto': 'contactar la pelota antes y más adelante',
    'Control': 'tu control general',
    'Juego de pies': 'tu juego de pies entre golpes',
    'Confianza': 'tu confianza en el peloteo',
    'Paciencia': 'tu paciencia para construir el punto',
    'Posicionamiento': 'tu posicionamiento en pista',
    'Consistencia': 'tu consistencia en peloteos largos',
    'Recuperación tras golpe': 'tu recuperación después de cada golpe',
    'Selección de golpe': 'tu selección de golpe bajo presión',
  };
  return 'Mejoraste ' + arr.map(a => map[a] || a.toLowerCase()).join(', ') + '.';
}

function correctionSentence(c) {
  const map = {
    'Demasiado swing': 'Aún haces demasiado swing cuando la bola viene rápida — mantenlo corto y compacto.',
    'Contacto tardío': 'Sigues contactando la bola un poco tarde. Prepara la pala antes.',
    'Mala recuperación': 'Recupera hacia el centro justo después de cada golpe.',
    'Demasiado cerca de la red': 'Da un paso atrás de la red para que los globos no te sorprendan.',
    'Demasiado atrás': 'Entra tras defender — no te quedes pegado al cristal de fondo.',
    'Apresurar el punto': 'No te apresures. Espera la bola correcta para atacar.',
    'Split step deficiente': 'Split step antes de cada golpe — lo cambia todo.',
    'Preparación de pala baja': 'Mantén la pala arriba y lista antes.',
    'Mala decisión bajo presión': 'Elige opciones más simples y seguras cuando el punto se acelera.',
    'Falta de paciencia': 'Construye el punto. La paciencia gana en pádel.',
  };
  return map[c] || c;
}

// ─── app shell ───────────────────────────────────────────────────────────────

const { useState, useMemo } = React;

function App() {
  const [students, setStudents] = useState(INITIAL_STUDENTS);
  const [route, setRoute] = useState({ name: 'dashboard' });

  const nav = (name, studentId, meta = {}) => setRoute({ name, studentId, meta });
  const addStudent = (s) => setStudents(prev => [s, ...prev]);
  const addClass = (sid, c) => setStudents(prev => prev.map(s => s.id === sid ? { ...s, classes: [c, ...s.classes] } : s));
  const updateScores = (sid, scores) => setStudents(prev => prev.map(s => s.id === sid ? { ...s, scores } : s));
  const student = useMemo(() => students.find(s => s.id === route.studentId), [students, route.studentId]);

  let screen;
  switch (route.name) {
    case 'dashboard':  screen = <Dashboard students={students} nav={nav} />; break;
    case 'addStudent': screen = <AddStudent nav={nav} addStudent={addStudent} />; break;
    case 'pickStudent':screen = <PickStudent students={students} nav={nav} />; break;
    case 'profile':    screen = student ? <StudentProfile student={student} nav={nav} updateScores={updateScores} /> : <Dashboard students={students} nav={nav} />; break;
    case 'logClass':   screen = student ? <LogClass student={student} nav={nav} addClass={addClass} /> : <Dashboard students={students} nav={nav} />; break;
    case 'share':      screen = student ? <ShareScreen student={student} nav={nav} fromLog={route.meta?.fromLog} /> : <Dashboard students={students} nav={nav} />; break;
    case 'public':     screen = student ? <PublicProgress student={student} nav={nav} /> : <Dashboard students={students} nav={nav} />; break;
    default:           screen = <Dashboard students={students} nav={nav} />;
  }

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '24px 12px', background: 'radial-gradient(circle at 30% 0%, #FAFAF6, #ECEDE6)',
    }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 32, flexWrap: 'wrap', justifyContent: 'center' }}>
        {/* Brand panel */}
        <div style={{ maxWidth: 280, padding: '20px 8px', alignSelf: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
            <div style={{ width: 36, height: 36, borderRadius: 12, background: '#0E1311', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="oklch(0.62 0.14 152)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <path d="M3.5 9c4 1 9-1 13.5-3"/>
                <path d="M20.5 15c-4-1-9 1-13.5 3"/>
              </svg>
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: -0.5 }}>CourtTrack</div>
          </div>
          <div style={{ fontSize: 14, color: '#3A4441', lineHeight: 1.5 }}>
            Toca, toca, toca, envía. Un reporte de progreso profesional después de cada clase de pádel — en menos de 60 segundos.
          </div>
          <div style={{ marginTop: 22, fontSize: 11, fontWeight: 600, color: '#6B746F', textTransform: 'uppercase', letterSpacing: 0.6 }}>Pruébalo</div>
          <ul style={{ fontSize: 13, color: '#3A4441', paddingLeft: 18, lineHeight: 1.7, marginTop: 8 }}>
            <li>Pulsa <b>Registrar clase</b> en el dashboard</li>
            <li>Elige un alumno y avanza por el flujo</li>
            <li>Abre el enlace como alumno</li>
          </ul>
        </div>

        {/* Phone */}
        <IOSDevice width={390} height={820} dark={route.name === 'public'} time="9:41">
          <div className="ct-scroll" style={{ position: 'absolute', inset: 0, top: 50, overflow: 'auto', WebkitOverflowScrolling: 'touch' }}>
            {screen}
          </div>
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
