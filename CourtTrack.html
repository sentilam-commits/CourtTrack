<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ─── Supabase ─────────────────────────────────────────────────────────────────
// Replace these with your project values from https://supabase.com/dashboard → Settings → API
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'courttrack-auth' },
});

// ─── constants ────────────────────────────────────────────────────────────────
const FOCUS_OPTIONS     = ['Derecha','Revés','Volea','Bandeja','Víbora','Saque','Resto','Posicionamiento','Defensa','Control de red','Decisiones de partido','Consistencia'];
const IMPROVED_OPTIONS  = ['Timing','Punto de contacto','Control','Juego de pies','Confianza','Paciencia','Posicionamiento','Consistencia','Recuperación tras golpe','Selección de golpe'];
const CORRECTION_OPTIONS= ['Demasiado swing','Contacto tardío','Mala recuperación','Demasiado cerca de la red','Demasiado atrás','Apresurar el punto','Split step deficiente','Preparación de pala baja','Mala decisión bajo presión','Falta de paciencia'];
const HOMEWORK_OPTIONS  = ['10 min de voleas en pared, 3x esta semana','50 swings en sombra enfocando el punto de contacto','3 series de 20 derechas controladas','3 series de 20 revés controlados','Practicar split step antes de cada golpe','Ver 10 puntos pro: ataque vs defensa','Práctica de saque: 30 saques de colocación','Drill de footwork: 5 minutos al día','Practicar el movimiento de recuperación tras bandeja','Reflexión de partido: escribir 3 puntos apresurados'];
const SKILLS            = ['Derecha','Revés','Volea','Bandeja','Posicionamiento','Toma de decisiones','Consistencia','Confianza en partido'];
const LEVELS            = ['Principiante','Intermedio','Avanzado'];
const CLASS_TYPES       = ['Privada','Grupo','Análisis de partido'];
const FREQUENCIES       = ['1x / semana','2x / semana','3x / semana','Ocasional'];

// ─── helpers ──────────────────────────────────────────────────────────────────
const todayISO = () => new Date().toISOString().slice(0, 10);

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
}
function relDate(iso) {
  if (!iso) return '—';
  const diff = Math.round((Date.now() - new Date(iso + 'T00:00:00').getTime()) / 86400000);
  if (diff <= 0) return 'Hoy';
  if (diff === 1) return 'Ayer';
  if (diff < 7) return `hace ${diff}d`;
  if (diff < 30) return `hace ${Math.round(diff / 7)}sem`;
  return fmtDate(iso);
}
function todayLabel() {
  const d = new Date();
  const s = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function parseImproved(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try { return JSON.parse(raw); } catch { return []; }
}
function dbToStudent(d) {
  const sc = d.progress_scores?.[0] || {};
  const classes = (d.class_logs || [])
    .sort((a, b) => new Date(b.date) - new Date(a.date) || new Date(b.created_at) - new Date(a.created_at))
    .map(c => ({
      id: c.id, date: c.date,
      type: c.class_type || 'Privada',
      focus: c.today_focus || '',
      improved: parseImproved(c.what_improved),
      correction: c.main_correction || '',
      homework: c.homework || '',
      nextFocus: c.next_focus || '',
      note: c.coach_note || '',
    }));
  return {
    id: d.id, name: d.name,
    contact: d.email_or_phone || '',
    level: d.level || 'Intermedio',
    goal: d.main_goal || '',
    frequency: d.class_frequency || '2x / semana',
    startDate: d.start_date || '',
    scores: {
      'Derecha': sc.forehand ?? 3, 'Revés': sc.backhand ?? 3,
      'Volea': sc.volley ?? 3, 'Bandeja': sc.bandeja ?? 3,
      'Posicionamiento': sc.positioning ?? 3, 'Toma de decisiones': sc.decision_making ?? 3,
      'Consistencia': sc.consistency ?? 3, 'Confianza en partido': sc.match_confidence ?? 3,
    },
    classes,
  };
}

// ─── iOS frame ────────────────────────────────────────────────────────────────

        <span style={{ fontFamily:'-apple-system, "SF Pro", system-ui', fontWeight:590, fontSize:17, lineHeight:'22px', color:c }}>{time}</span>
      </div>
      <div style={{ flex:1, height:22, display:'flex', alignItems:'center', justifyContent:'center', gap:7, paddingTop:1, paddingRight:1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>

        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
      </div>

}
function IOSDevice({ children, width = 402, height = 874, dark = false, time = '9:41' }) {
  return (
    <div style={{ width, height, borderRadius:48, overflow:'hidden', position:'relative', background: dark ? '#000' : '#F2F2F7', boxShadow:'0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)', fontFamily:'-apple-system, system-ui, sans-serif', WebkitFontSmoothing:'antialiased' }}>
      <div style={{ position:'absolute', top:11, left:'50%', transform:'translateX(-50%)', width:126, height:37, borderRadius:24, background:'#000', zIndex:50 }} />
      <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10 }}><IOSStatusBar dark={dark} time={time} /></div>
      <div style={{ height:'100%', display:'flex', flexDirection:'column' }}><div style={{ flex:1, overflow:'auto' }}>{children}</div></div>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:60, height:34, display:'flex', justifyContent:'center', alignItems:'flex-end', paddingBottom:8, pointerEvents:'none' }}>
        <div style={{ width:139, height:5, borderRadius:100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
      </div>
    </div>
  );
}

// ─── design tokens ────────────────────────────────────────────────────────────
const CT = {
  green: 'oklch(0.62 0.14 152)', greenSoft: 'oklch(0.95 0.04 152)', greenDeep: 'oklch(0.42 0.12 152)',
  ink: '#0E1311', ink2: '#3A4441', ink3: '#6B746F', ink4: '#9AA29D',
  line: '#E8EAE7', card: '#F4F5F2', card2: '#FAFAF8',
};

// ─── UI atoms ─────────────────────────────────────────────────────────────────
function Icon({ size=22, stroke='currentColor', fill='none', sw=1.8, children }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0 }}>{children}</svg>;
}
const Icons = {
  plus:   <Icon><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>,
  back:   <Icon><polyline points="15 18 9 12 15 6"/></Icon>,
  chevR:  <Icon size={18}><polyline points="9 6 15 12 9 18"/></Icon>,
  check:  <Icon><polyline points="20 6 9 17 4 12"/></Icon>,
  share:  <Icon><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></Icon>,
  link:   <Icon><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>,
  copy:   <Icon><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>,
  user:   <Icon><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>,
  search: <Icon><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>,
  flag:   <Icon><path d="M4 22V4a1 1 0 0 1 1-1h13l-2 5 2 5H5"/></Icon>,
  arrow:  <Icon><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
  eye:    <Icon><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
  dots:   <Icon size={20}><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/></Icon>,
  edit:   <Icon size={18}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>,
  trash:  <Icon size={18}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Icon>,
};

function Chip({ children, active, onClick, color=CT.green, style={} }) {
  return <button onClick={onClick} style={{ padding:'9px 14px', borderRadius:999, border:`1px solid ${active ? color : CT.line}`, background: active ? color : '#fff', color: active ? '#fff' : CT.ink, fontSize:14, fontWeight:500, cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.15s', fontFamily:'inherit', ...style }}>{children}</button>;
}
function LevelBadge({ level, small }) {
  const map = { 'Principiante': { bg:'#FEF3E7', fg:'#B86A1A' }, 'Intermedio': { bg:CT.greenSoft, fg:CT.greenDeep }, 'Avanzado': { bg:'#E9EDFB', fg:'#3850B8' } };
  const c = map[level] || map['Intermedio'];
  return <span style={{ display:'inline-flex', alignItems:'center', padding: small ? '3px 8px' : '4px 10px', borderRadius:999, background:c.bg, color:c.fg, fontSize: small ? 11 : 12, fontWeight:600, letterSpacing:0.1, whiteSpace:'nowrap' }}>{level}</span>;
}
function PrimaryButton({ children, onClick, disabled, loading: isLoading, style={} }) {
  return (
    <button onClick={onClick} disabled={disabled || isLoading} style={{ width:'100%', height:54, borderRadius:16, border:'none', background: (disabled || isLoading) ? '#C7CCC9' : CT.ink, color:'#fff', fontSize:16, fontWeight:600, fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:8, cursor:(disabled || isLoading) ? 'not-allowed' : 'pointer', transition:'transform 0.08s, background 0.15s', ...style }}
      onMouseDown={e => !(disabled || isLoading) && (e.currentTarget.style.transform='scale(0.98)')}
      onMouseUp={e => (e.currentTarget.style.transform='scale(1)')}
      onMouseLeave={e => (e.currentTarget.style.transform='scale(1)')}
    >{isLoading ? 'Guardando...' : children}</button>
  );
}
function GhostButton({ children, onClick, style={} }) {
  return <button onClick={onClick} style={{ height:44, padding:'0 16px', borderRadius:12, border:`1px solid ${CT.line}`, background:'#fff', color:CT.ink, fontSize:14, fontWeight:500, fontFamily:'inherit', cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6, ...style }}>{children}</button>;
}
function SectionLabel({ children, style={} }) {
  return <div style={{ fontSize:12, fontWeight:600, color:CT.ink3, textTransform:'uppercase', letterSpacing:0.6, marginBottom:10, ...style }}>{children}</div>;
}
function Card({ children, style={}, onClick, soft }) {
  return <div onClick={onClick} style={{ background: soft ? CT.card2 : CT.card, border:`1px solid ${CT.line}`, borderRadius:18, padding:16, cursor: onClick ? 'pointer' : 'default', ...style }}>{children}</div>;
}
function Label({ children }) {
  return <div style={{ fontSize:13, fontWeight:600, color:CT.ink2, marginBottom:8 }}>{children}</div>;
}
function TextInput({ value, onChange, placeholder, type='text', style={} }) {
  return (
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width:'100%', height:50, padding:'0 16px', borderRadius:14, border:`1px solid ${CT.line}`, background:'#fff', fontSize:16, fontFamily:'inherit', color:CT.ink, outline:'none', boxSizing:'border-box', ...style }}
      onFocus={e => e.target.style.borderColor=CT.green}
      onBlur={e => e.target.style.borderColor=CT.line}
    />
  );
}
function ScoreBar({ value, max=5, color=CT.green, size=8, gap=5 }) {
  return <div style={{ display:'flex', gap }}>{Array.from({ length:max }).map((_,i) => <div key={i} style={{ width:size, height:size, borderRadius:999, background: i < value ? color : '#E1E4E0' }} />)}</div>;
}
function ScreenHeader({ title, onBack, right }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 6px 14px', minHeight:44 }}>
      <div style={{ width:56, display:'flex' }}>{onBack && <button onClick={onBack} style={{ width:40, height:40, borderRadius:12, border:'none', background:'transparent', cursor:'pointer', color:CT.ink, display:'flex', alignItems:'center', justifyContent:'center' }}>{Icons.back}</button>}</div>
      <div style={{ fontSize:16, fontWeight:600, color:CT.ink, flex:1, textAlign:'center' }}>{title}</div>
      <div style={{ width:56, display:'flex', justifyContent:'flex-end' }}>{right}</div>
    </div>
  );
}
function Divider() { return <div style={{ height:1, background:CT.line }} />; }
function Row({ k, v, accent, danger }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', padding:'8px 0', gap:12 }}>
      <div style={{ fontSize:13, color:CT.ink3, flexShrink:0, paddingTop:1 }}>{k}</div>
      <div style={{ fontSize:14, fontWeight:500, textAlign:'right', color: accent ? CT.greenDeep : danger ? '#A04020' : CT.ink, lineHeight:1.4 }}>{v}</div>
    </div>

}

// ─── LoadingScreen ────────────────────────────────────────────────────────────
function LoadingScreen() {
  return (
    <div style={{ minHeight:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#fff', gap:16 }}>
      <div style={{ width:44, height:44, borderRadius:14, background:CT.ink, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={CT.green} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M3.5 9c4 1 9-1 13.5-3"/><path d="M20.5 15c-4-1-9 1-13.5 3"/>
        </svg>
      </div>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <div style={{ width:18, height:18, border:`2px solid ${CT.line}`, borderTopColor:CT.green, borderRadius:999, animation:'ct-spin 0.8s linear infinite' }} />
        <span style={{ fontSize:14, color:CT.ink3 }}>Cargando...</span>
      </div>
    </div>
  );
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ toast }) {
  if (!toast) return null;
  const isErr = toast.tone === 'error';
  return (
    <div style={{ position:'fixed', top:20, left:'50%', transform:'translateX(-50%)', zIndex:9999, padding:'12px 20px', borderRadius:14, background: isErr ? '#FDECEC' : CT.greenSoft, color: isErr ? '#A04020' : CT.greenDeep, border:`1px solid ${isErr ? '#FDABAB' : CT.green+'55'}`, fontSize:14, fontWeight:600, fontFamily:'Inter, sans-serif', boxShadow:'0 8px 24px rgba(0,0,0,0.12)', animation:'ct-fadein 0.2s ease', whiteSpace:'nowrap', pointerEvents:'none' }}>
      {toast.msg}
    </div>
  );
}

// ─── ConfirmModal ─────────────────────────────────────────────────────────────
function ConfirmModal({ title, message, confirmLabel='Eliminar', onConfirm, onCancel }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:999, background:'rgba(0,0,0,0.45)', display:'flex', alignItems:'flex-end', justifyContent:'center' }} onClick={onCancel}>
      <div onClick={e => e.stopPropagation()} style={{ background:'#fff', borderRadius:'24px 24px 0 0', padding:'20px 20px 48px', width:'100%', maxWidth:480, animation:'ct-fadein 0.2s ease' }}>
        <div style={{ width:36, height:4, borderRadius:2, background:CT.line, margin:'0 auto 20px' }} />
        <div style={{ fontSize:18, fontWeight:700, color:CT.ink }}>{title}</div>
        <div style={{ fontSize:14, color:CT.ink3, marginTop:8, lineHeight:1.5 }}>{message}</div>
        <div style={{ display:'flex', gap:10, marginTop:22 }}>
          <button onClick={onCancel} style={{ flex:1, height:52, borderRadius:14, border:`1px solid ${CT.line}`, background:'#fff', color:CT.ink, fontSize:15, fontWeight:600, fontFamily:'inherit', cursor:'pointer' }}>Cancelar</button>
          <button onClick={onConfirm} style={{ flex:1, height:52, borderRadius:14, border:'none', background:'#DC2626', color:'#fff', fontSize:15, fontWeight:600, fontFamily:'inherit', cursor:'pointer' }}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ─── AuthScreen ───────────────────────────────────────────────────────────────
function AuthScreen() {
  const [mode, setMode] = useState('login');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState('');
  const [saving, setSaving] = useState(false);
  const [emailSent, setEmailSent] = useState(false);

  const valid = mode === 'login'
    ? email.trim().length > 0 && password.length > 0
    : name.trim().length > 1 && email.trim().length > 0 && password.length >= 6;

  const clearErr = () => { if (error) setError(''); };

  const submit = async () => {
    if (!valid || saving) return;
    setSaving(true); setError('');
    if (mode === 'login') {
      const { error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
      if (err) { setError('Email o contraseña incorrectos.'); setSaving(false); }
      // on success, App's onAuthStateChange handles navigation
    } else {
      const { data, error: err } = await sb.auth.signUp({
        email: email.trim(), password,
        options: { data: { name: name.trim() } },
      });
      if (err) { setError(err.message); setSaving(false); return; }
      if (!data.session) { setEmailSent(true); setSaving(false); }
      // if session exists, onAuthStateChange handles it
    }
  };

  if (emailSent) return (
    <div style={{ background:'#fff', minHeight:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' }}>
      <div style={{ width:56, height:56, borderRadius:18, background:CT.greenSoft, color:CT.greenDeep, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:18 }}>{Icons.check}</div>
      <div style={{ fontSize:20, fontWeight:700, color:CT.ink }}>Revisa tu email</div>
      <div style={{ fontSize:14, color:CT.ink3, marginTop:8, lineHeight:1.5, maxWidth:280 }}>Te enviamos un enlace de confirmación a <b>{email}</b>. Ábrelo para activar tu cuenta.</div>
      <button onClick={() => { setEmailSent(false); setMode('login'); }} style={{ marginTop:24, height:44, padding:'0 18px', borderRadius:12, border:`1px solid ${CT.line}`, background:'#fff', color:CT.ink, fontSize:14, fontWeight:600, fontFamily:'inherit', cursor:'pointer' }}>Volver al inicio de sesión</button>
    </div>
  );

  return (
    <div style={{ background:'#fff', minHeight:'100%', display:'flex', flexDirection:'column' }}>

// ─── studentStatus + StatusPill ───────────────────────────────────────────────
function studentStatus(s) {
  const last = s.classes[0];
  if (!last) return { label:'Sin clase', tone:'warn' };
  if (!last.homework) return { label:'Sin tarea', tone:'muted' };
  const days = Math.round((Date.now() - new Date(last.date + 'T00:00:00').getTime()) / 86400000);
  if (days <= 2) return { label:'Actualizado', tone:'good' };
  return { label:'Pendiente', tone:'warn' };
}
function StatusPill({ status }) {
  const palette = { good:{ bg:CT.greenSoft, fg:CT.greenDeep }, warn:{ bg:'#FDF2E5', fg:'#A05A1B' }, muted:{ bg:CT.card, fg:CT.ink3 } }[status.tone];
  return <span style={{ padding:'3px 8px', borderRadius:999, background:palette.bg, color:palette.fg, fontSize:11, fontWeight:600, letterSpacing:0.1, whiteSpace:'nowrap' }}>{status.label}</span>;
}

// ─── AddStudent ───────────────────────────────────────────────────────────────
function StudentForm({ title, initial={}, onBack, onSubmit, submitLabel }) {
  const [name, setName] = useState(initial.name || '');
  const [contact, setContact] = useState(initial.contact || '');
  const [level, setLevel] = useState(initial.level || 'Intermedio');
  const [goal, setGoal] = useState(initial.goal || '');
  const [freq, setFreq] = useState(initial.frequency || '2x / semana');
  const [date, setDate] = useState(initial.startDate || todayISO());
  const [saving, setSaving] = useState(false);
  const valid = name.trim().length > 1;

  const submit = async () => {
    if (!valid || saving) return;
    setSaving(true);
    await onSubmit({ name:name.trim(), contact, level, goal, frequency:freq, startDate:date });
    setSaving(false);
  };

  return (
    <div style={{ background:'#fff', minHeight:'100%', display:'flex', flexDirection:'column', paddingBottom:24 }}>
      <ScreenHeader title={title} onBack={onBack} />
      <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:18, flex:1 }}>
        <div><Label>Nombre completo</Label><TextInput value={name} onChange={setName} placeholder="ej. Benito Álvarez" /></div>
        <div><Label>Teléfono o email</Label><TextInput value={contact} onChange={setContact} placeholder="benito@mail.com" /></div>
        <div>
          <Label>Nivel</Label>
          <div style={{ display:'flex', gap:8 }}>{LEVELS.map(l => <Chip key={l} active={level===l} onClick={()=>setLevel(l)} style={{ flex:1 }}>{l}</Chip>)}</div>
        </div>
        <div><Label>Objetivo principal</Label><TextInput value={goal} onChange={setGoal} placeholder="ej. Mejor control de red" /></div>
        <div>
          <Label>Frecuencia de clases</Label>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>{FREQUENCIES.map(f => <Chip key={f} active={freq===f} onClick={()=>setFreq(f)}>{f}</Chip>)}</div>
        </div>
        <div><Label>Fecha de inicio</Label><TextInput type="date" value={date} onChange={setDate} /></div>
        {!valid && name.length > 0 && <div style={{ fontSize:13, color:'#A04020', padding:'10px 14px', background:'#FDECEC', borderRadius:12 }}>El nombre debe tener al menos 2 caracteres.</div>}
      </div>
      <div style={{ position:'sticky', bottom:16, margin:'20px 20px 0' }}>
        <PrimaryButton onClick={submit} disabled={!valid} loading={saving}>{submitLabel}</PrimaryButton>
      </div>
    </div>
  );
}

                <MiniStat label="Clases" value={student.classes.length} />

                <div style={{ fontSize:13, color:CT.ink3, marginTop:4 }}>Mejoró: {c.improved.join(', ')}</div>
                {c.nextFocus && <div style={{ fontSize:13, color:CT.greenDeep, marginTop:4, fontWeight:500 }}>Siguiente: {c.nextFocus}</div>}

                  <button onClick={() => setConfirmDelClass(c.id)} style={{ display:'flex', alignItems:'center', gap:5, height:34, padding:'0 12px', borderRadius:10, border:`1px solid #FECACA`, background:'#FEF2F2', color:'#DC2626', fontSize:13, fontWeight:500, fontFamily:'inherit', cursor:'pointer' }}>{Icons.trash} Eliminar</button>
                </div>

        {tab === 'scores' && (
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <SectionLabel style={{ marginBottom:0 }}>Puntuación de habilidades</SectionLabel>
              <button onClick={() => editingScores ? saveScores() : setEditingScores(true)} style={{ fontSize:13, fontWeight:600, color:CT.green, background:'transparent', border:'none', cursor:'pointer', fontFamily:'inherit' }}>
                {savingScores ? 'Guardando...' : editingScores ? 'Guardar' : 'Editar'}
              </button>
            </div>
            <Card>
              {SKILLS.map((sk, i) => (
                <div key={sk}>
                  {i > 0 && <Divider />}
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 0' }}>
                    <div style={{ fontSize:14, fontWeight:500, color:CT.ink }}>{sk}</div>
                    {editingScores ? (
                      <div style={{ display:'flex', gap:4 }}>
                        {[1,2,3,4,5].map(n => (
                          <button key={n} onClick={() => setScoreDraft({...scoreDraft, [sk]:n})} style={{ width:28, height:28, borderRadius:8, border:`1px solid ${scoreDraft[sk]===n ? CT.green : CT.line}`, background: scoreDraft[sk]===n ? CT.green : '#fff', color: scoreDraft[sk]===n ? '#fff' : CT.ink2, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>{n}</button>
                        ))}
                      </div>
                    ) : (
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <ScoreBar value={student.scores[sk]} />
                        <span style={{ fontSize:13, fontWeight:600, color:CT.ink2, width:14, textAlign:'right' }}>{student.scores[sk]}</span>

            {Icons.share} Compartir

          <button onClick={() => nav('logClass', student.id)} style={{ flex:1.4, height:54, borderRadius:16, background:CT.ink, color:'#fff', fontSize:15, fontWeight:600, border:'none', fontFamily:'inherit', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, boxShadow:'0 12px 28px rgba(14,19,17,0.25)' }}>

        />

        <ConfirmModal
          title="Eliminar clase"

          onCancel={() => setConfirmDelClass(null)}
        />
      )}

  );
}
function MiniStat({ label, value }) {
  return (
    <div style={{ background:CT.card, border:`1px solid ${CT.line}`, borderRadius:16, padding:'14px 16px' }}>
      <div style={{ fontSize:24, fontWeight:700, color:CT.ink, letterSpacing:-0.3 }}>{value}</div>
      <div style={{ fontSize:11, fontWeight:600, color:CT.ink3, marginTop:2, textTransform:'uppercase', letterSpacing:0.4 }}>{label}</div>
    </div>
  );
}

// ─── LogClass ─────────────────────────────────────────────────────────────────
function LogClass({ student, nav, onAddClass, onEditClass, existingClass }) {
  const isEdit = !!existingClass;

  const hwCustom = isEdit && existingClass.homework && !HOMEWORK_OPTIONS.includes(existingClass.homework);
  const nfCustom = isEdit && existingClass.nextFocus && !FOCUS_OPTIONS.includes(existingClass.nextFocus);

  const [step, setStep] = useState(0);
  const [date, setDate] = useState(existingClass?.date || todayISO());
  const [type, setType] = useState(existingClass?.type || 'Privada');
  const [focus, setFocus] = useState(existingClass?.focus || '');
  const [improved, setImproved] = useState(existingClass?.improved || []);
  const [correction, setCorrection] = useState(existingClass?.correction || '');
  const [homework, setHomework] = useState(hwCustom ? '__other' : (existingClass?.homework || ''));
  const [homeworkCustom, setHomeworkCustom] = useState(hwCustom ? (existingClass?.homework || '') : '');
  const [nextFocus, setNextFocus] = useState(nfCustom ? '__other' : (existingClass?.nextFocus || ''));
  const [nextFocusCustom, setNextFocusCustom] = useState(nfCustom ? (existingClass?.nextFocus || '') : '');
  const [note, setNote] = useState(existingClass?.note || '');
  const [saving, setSaving] = useState(false);

  const homeworkValue = homework === '__other' ? homeworkCustom.trim() : homework;
  const nextFocusValue = nextFocus === '__other' ? nextFocusCustom.trim() : nextFocus;

  const steps = [
    { key:'when', title:'Cuándo' }, { key:'focus', title:'Foco de hoy' }, { key:'improved', title:'Qué mejoró' },
    { key:'correction', title:'Corrección principal' }, { key:'homework', title:'Tarea' },
    { key:'next', title:'Foco de la próxima clase' }, { key:'note', title:'Nota del coach (opcional)' }, { key:'review', title:'Revisar' },
  ];
  const cur = steps[step];

  const canNext = (() => {
    if (cur.key === 'when') return !!date && !!type;
    if (cur.key === 'focus') return !!focus;
    if (cur.key === 'improved') return improved.length > 0;
    if (cur.key === 'correction') return !!correction;
    if (cur.key === 'homework') return !!homeworkValue;
    if (cur.key === 'next') return !!nextFocusValue;
    return true;
  })();

  const submit = async () => {
    if (saving) return;
    setSaving(true);
    const data = { date, type, focus, improved, correction, homework:homeworkValue, nextFocus:nextFocusValue, note };
    if (isEdit) {
      const ok = await onEditClass(student.id, existingClass.id, data);
      if (ok) nav('profile', student.id);
    } else {
      const ok = await onAddClass(student.id, data);
      if (ok) nav('share', student.id, { fromLog:true });
    }
    setSaving(false);
  };

  const toggleImproved = v => setImproved(improved.includes(v) ? improved.filter(x=>x!==v) : [...improved, v]);

  return (
    <div style={{ background:'#fff', minHeight:'100%', display:'flex', flexDirection:'column' }}>
      <ScreenHeader
        title={isEdit ? `Editar clase — ${student.name.split(' ')[0]}` : `Clase de ${student.name.split(' ')[0]}`}
        onBack={() => step === 0 ? nav('profile', student.id) : setStep(step-1)}
      />
      <div style={{ padding:'0 20px 8px', display:'flex', gap:4 }}>
        {steps.map((s,i) => <div key={s.key} style={{ flex:1, height:4, borderRadius:2, background: i<=step ? CT.green : CT.line, transition:'background 0.2s' }} />)}
      </div>
      <div style={{ padding:'4px 20px 0', fontSize:12, color:CT.ink3, fontWeight:500 }}>Paso {step+1} de {steps.length}</div>

      <div style={{ flex:1, padding:'20px 20px 0', overflow:'auto' }}>
        <div style={{ fontSize:24, fontWeight:700, color:CT.ink, letterSpacing:-0.4, marginBottom:18 }}>{cur.title}</div>

        {cur.key === 'when' && (
          <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
            <div><Label>Fecha</Label><TextInput type="date" value={date} onChange={setDate} /></div>
            <div>
              <Label>Tipo de clase</Label>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>{CLASS_TYPES.map(t => <Chip key={t} active={type===t} onClick={()=>setType(t)} style={{ flex:1 }}>{t}</Chip>)}</div>
            </div>
          </div>
        )}
        {cur.key === 'focus' && <ChipGrid options={FOCUS_OPTIONS} value={focus} onSelect={setFocus} />}
        {cur.key === 'improved' && (<div><div style={{ fontSize:13, color:CT.ink3, marginBottom:14 }}>Marca todo lo que aplique</div><ChipGrid options={IMPROVED_OPTIONS} value={improved} onSelect={toggleImproved} multi /></div>)}
        {cur.key === 'correction' && <ChipGrid options={CORRECTION_OPTIONS} value={correction} onSelect={setCorrection} />}
        {cur.key === 'homework' && (
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <ChipGrid options={HOMEWORK_OPTIONS} value={homework} onSelect={setHomework} stacked />
            <button onClick={() => setHomework('__other')} style={{ textAlign:'left', padding:'14px 16px', border:`1px dashed ${homework==='__other' ? CT.green : CT.ink4}`, background: homework==='__other' ? CT.greenSoft : '#fff', color: homework==='__other' ? CT.greenDeep : CT.ink2, borderRadius:14, fontSize:14, fontWeight:500, fontFamily:'inherit', cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ width:18, height:18, borderRadius:6, border:`1.5px solid ${homework==='__other' ? CT.green : CT.ink4}`, background: homework==='__other' ? CT.green : 'transparent', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>{homework==='__other' && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</span>
              <span>Otro — escribe tu propia tarea</span>
            </button>
            {homework === '__other' && <textarea value={homeworkCustom} onChange={e => setHomeworkCustom(e.target.value)} placeholder="ej. 15 min de peloteo cruzado de revés, 2x esta semana" rows={3} autoFocus style={{ width:'100%', padding:14, borderRadius:14, border:`1px solid ${CT.green}`, background:'#fff', fontSize:15, fontFamily:'inherit', color:CT.ink, outline:'none', boxSizing:'border-box', resize:'none', lineHeight:1.4 }} />}
          </div>
        )}
        {cur.key === 'next' && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <ChipGrid options={FOCUS_OPTIONS} value={nextFocus} onSelect={setNextFocus} />
            <button onClick={() => setNextFocus('__other')} style={{ alignSelf:'flex-start', padding:'9px 14px', border:`1px dashed ${nextFocus==='__other' ? CT.green : CT.ink4}`, background: nextFocus==='__other' ? CT.greenSoft : '#fff', color: nextFocus==='__other' ? CT.greenDeep : CT.ink2, borderRadius:999, fontSize:14, fontWeight:500, fontFamily:'inherit', cursor:'pointer' }}>+ Otro</button>
            {nextFocus === '__other' && <input value={nextFocusCustom} onChange={e => setNextFocusCustom(e.target.value)} placeholder="ej. Globo defensivo" autoFocus style={{ width:'100%', height:50, padding:'0 16px', borderRadius:14, border:`1px solid ${CT.green}`, background:'#fff', fontSize:16, fontFamily:'inherit', color:CT.ink, outline:'none', boxSizing:'border-box' }} />}
          </div>
        )}
        {cur.key === 'note' && (
          <div>
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="¿Algo personal que decir?" rows={5} style={{ width:'100%', padding:16, borderRadius:14, border:`1px solid ${CT.line}`, background:'#fff', fontSize:16, fontFamily:'inherit', color:CT.ink, outline:'none', boxSizing:'border-box', resize:'none', lineHeight:1.4 }} />
            <div style={{ fontSize:12, color:CT.ink4, marginTop:8 }}>Opcional — puede quedar vacío.</div>
          </div>
        )}
        {cur.key === 'review' && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <Card>
              <Row k="Fecha" v={fmtDate(date)} /><Divider />
              <Row k="Tipo" v={type} /><Divider />
              <Row k="Foco" v={focus} /><Divider />
              <Row k="Mejoró" v={improved.join(', ')} /><Divider />
              <Row k="Corrección" v={correction} danger /><Divider />
              <Row k="Tarea" v={homeworkValue} /><Divider />
              <Row k="Próximo foco" v={nextFocusValue} accent />
              {note && (<><Divider /><Row k="Nota" v={note} /></>)}
            </Card>
            <div style={{ fontSize:13, color:CT.ink3, textAlign:'center', marginTop:4 }}>{isEdit ? 'Pulsa actualizar para guardar los cambios.' : 'Pulsa guardar para registrar esta clase y generar el enlace.'}</div>
          </div>
        )}
      </div>

      <div style={{ padding:'16px 20px 32px', background:'#fff', borderTop:`1px solid ${CT.line}` }}>
        {cur.key === 'review'
          ? <PrimaryButton onClick={submit} loading={saving}>{isEdit ? 'Actualizar clase' : 'Guardar y generar enlace'}</PrimaryButton>
          : <PrimaryButton onClick={() => canNext && setStep(step+1)} disabled={!canNext}>{cur.key === 'note' ? 'Revisar' : 'Continuar'}</PrimaryButton>
        }
      </div>
    </div>
  );
}

function ChipGrid({ options, value, onSelect, multi, stacked }) {
  if (stacked) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {options.map(o => {
          const active = multi ? value.includes(o) : value === o;
          return (
            <button key={o} onClick={() => onSelect(o)} style={{ textAlign:'left', padding:'14px 16px', border:`1px solid ${active ? CT.green : CT.line}`, background: active ? CT.greenSoft : '#fff', color: active ? CT.greenDeep : CT.ink, borderRadius:14, fontSize:14, fontWeight:500, fontFamily:'inherit', cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ width:18, height:18, borderRadius:6, border:`1.5px solid ${active ? CT.green : CT.ink4}`, background: active ? CT.green : 'transparent', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>{active && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</span>
              <span style={{ flex:1 }}>{o}</span>
            </button>
          );
        })}
      </div>
    );
  }
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
      {options.map(o => { const active = multi ? value.includes(o) : value === o; return <Chip key={o} active={active} onClick={() => onSelect(o)}>{o}</Chip>; })}
    </div>
  );
}

                <div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,0.6)', textTransform:'uppercase', fontWeight:600, letterSpacing:0.5 }}>Trabajaremos en</div>
                  <div style={{ fontSize:18, fontWeight:700, marginTop:2, letterSpacing:-0.3 }}>{last.nextFocus}</div>
                </div>
                <span style={{ color:CT.green }}>{Icons.arrow}</span>
              </div>
            </div>
          </>
        ) : (
          <div style={{ padding:24, borderRadius:18, background:CT.card, textAlign:'center', color:CT.ink3, fontSize:14 }}>Aún no hay clases registradas.</div>
        )}
        <div>
          <SectionLabel>Tu mapa de habilidades · prom. {avg}/5</SectionLabel>
          <Card>
            {SKILLS.map((sk,i) => (
              <div key={sk}>
                {i > 0 && <Divider />}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 0' }}>
                  <div style={{ fontSize:14, fontWeight:500, color:CT.ink }}>{sk}</div>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <ScoreBar value={student.scores[sk]} />
                    <span style={{ fontSize:12, fontWeight:600, color:CT.ink2, width:22, textAlign:'right' }}>{student.scores[sk]}/5</span>
                  </div>
                </div>
              </div>
            ))}
          </Card>
        </div>
        <div style={{ textAlign:'center', fontSize:11, color:CT.ink4, padding:'8px 0 24px' }}>
          Enviado con CourtTrack{coachName ? ` · ${coachName}` : ''}
        </div>
      </div>
    </div>
  );
}

function FeedbackBlock({ kicker, body, tone }) {
  const palette = { good:{ bg:CT.greenSoft, fg:CT.greenDeep, dot:CT.green }, warn:{ bg:'#FDF2E5', fg:'#A05A1B', dot:'#D58A3F' }, action:{ bg:'#F1F1EE', fg:CT.ink, dot:CT.ink2 } }[tone];
  return (
    <div style={{ background:palette.bg, borderRadius:18, padding:'16px 18px', border:`1px solid ${palette.dot}22` }}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ width:6, height:6, borderRadius:999, background:palette.dot }} />
        <div style={{ fontSize:11, fontWeight:700, color:palette.fg, textTransform:'uppercase', letterSpacing:0.5 }}>{kicker}</div>
      </div>
      <div style={{ fontSize:15, color:palette.fg, marginTop:8, lineHeight:1.5, fontWeight:500 }}>{body}</div>
    </div>
  );
}
function improvedSentence(arr) {
  if (!arr || arr.length === 0) return '—';
  const map = { 'Timing':'tu timing con la pelota','Punto de contacto':'contactar la pelota antes y más adelante','Control':'tu control general','Juego de pies':'tu juego de pies entre golpes','Confianza':'tu confianza en el peloteo','Paciencia':'tu paciencia para construir el punto','Posicionamiento':'tu posicionamiento en pista','Consistencia':'tu consistencia en peloteos largos','Recuperación tras golpe':'tu recuperación después de cada golpe','Selección de golpe':'tu selección de golpe bajo presión' };
  return 'Mejoraste ' + arr.map(a => map[a] || a.toLowerCase()).join(', ') + '.';
}
function correctionSentence(c) {
  const map = { 'Demasiado swing':'Aún haces demasiado swing cuando la bola viene rápida — mantenlo corto y compacto.','Contacto tardío':'Sigues contactando la bola un poco tarde. Prepara la pala antes.','Mala recuperación':'Recupera hacia el centro justo después de cada golpe.','Demasiado cerca de la red':'Da un paso atrás de la red para que los globos no te sorprendan.','Demasiado atrás':'Entra tras defender — no te quedes pegado al cristal de fondo.','Apresurar el punto':'No te apresures. Espera la bola correcta para atacar.','Split step deficiente':'Split step antes de cada golpe — lo cambia todo.','Preparación de pala baja':'Mantén la pala arriba y lista antes.','Mala decisión bajo presión':'Elige opciones más simples y seguras cuando el punto se acelera.','Falta de paciencia':'Construye el punto. La paciencia gana en pádel.' };
  return map[c] || c;
}

// ─── responsive hook ──────────────────────────────────────────────────────────
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 600);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 600);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [route, setRoute] = useState({ name:'dashboard' });
  const [toast, setToast] = useState(null);
  const isMobile = useIsMobile();

  const userId = session?.user?.id;
  const coach = session ? (() => {
    const rawName = (session.user.user_metadata?.name || '').trim();
    const displayName = rawName || session.user.email.split('@')[0];
    return {
      name: displayName,
      email: session.user.email,
      initials: displayName.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase(),
    };
  })() : null;

  const showToast = (msg, tone='good') => { setToast({msg,tone}); setTimeout(()=>setToast(null), 3000); };
  const nav = (name, studentId, meta={}) => setRoute({name,studentId,meta});

  const loadStudents = async (uid) => {
    const { data, error } = await sb
      .from('students')
      .select('*, class_logs(*), progress_scores(*)')
      .eq('coach_id', uid)
      .order('created_at', { ascending:false });
    if (!error && data) setStudents(data.map(dbToStudent));
    setLoading(false);
  };

  useEffect(() => {
    const { data:{ subscription } } = sb.auth.onAuthStateChange(async (event, sess) => {
      setSession(sess);
      if (sess && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
        await loadStudents(sess.user.id);
      } else {
        setStudents([]);
        setLoading(false);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── CRUD handlers ────────────────────────────────────────────────────────────
  const handleAddStudent = async (studentData) => {
    const { data:s, error:e1 } = await sb.from('students').insert({
      coach_id:userId, name:studentData.name, email_or_phone:studentData.contact,
      level:studentData.level, main_goal:studentData.goal,
      class_frequency:studentData.frequency, start_date:studentData.startDate || null,
    }).select().single();
    if (e1) { showToast('Error al añadir alumno', 'error'); return null; }
    const defScores = { student_id:s.id, coach_id:userId, forehand:3, backhand:3, volley:3, bandeja:3, positioning:3, decision_making:3, consistency:3, match_confidence:3 };
    await sb.from('progress_scores').insert(defScores);
    setStudents(prev => [dbToStudent({...s, class_logs:[], progress_scores:[defScores]}), ...prev]);
    showToast('Alumno añadido');
    return s.id;
  };

  const handleEditStudent = async (id, studentData) => {
    const { error } = await sb.from('students').update({
      name:studentData.name, email_or_phone:studentData.contact, level:studentData.level,
      main_goal:studentData.goal, class_frequency:studentData.frequency,
      start_date:studentData.startDate || null, updated_at:new Date().toISOString(),
    }).eq('id', id);
    if (error) { showToast('Error al actualizar alumno', 'error'); return false; }
    setStudents(prev => prev.map(s => s.id === id ? {...s, name:studentData.name, contact:studentData.contact, level:studentData.level, goal:studentData.goal, frequency:studentData.frequency, startDate:studentData.startDate} : s));
    showToast('Alumno actualizado');
    return true;
  };

  const handleDeleteStudent = async (id) => {
    const { error } = await sb.from('students').delete().eq('id', id);
    if (error) { showToast('Error al eliminar alumno', 'error'); return; }
    setStudents(prev => prev.filter(s => s.id !== id));
    nav('dashboard');
    showToast('Alumno eliminado');
  };

  const handleAddClass = async (studentId, classData) => {
    const { data:c, error } = await sb.from('class_logs').insert({
      student_id:studentId, coach_id:userId,
      date:classData.date, class_type:classData.type,
      today_focus:classData.focus, what_improved:JSON.stringify(classData.improved),
      main_correction:classData.correction, homework:classData.homework,
      next_focus:classData.nextFocus, coach_note:classData.note,
    }).select().single();
    if (error) { showToast('Error al guardar la clase', 'error'); return false; }
    const appClass = { id:c.id, date:c.date, type:c.class_type, focus:c.today_focus, improved:classData.improved, correction:c.main_correction, homework:c.homework, nextFocus:c.next_focus, note:c.coach_note };
    setStudents(prev => prev.map(s => s.id === studentId ? {...s, classes:[appClass,...s.classes].sort((a,b)=>new Date(b.date)-new Date(a.date))} : s));
    return true;
  };

  const handleEditClass = async (studentId, classId, classData) => {
    const { error } = await sb.from('class_logs').update({
      date:classData.date, class_type:classData.type,
      today_focus:classData.focus, what_improved:JSON.stringify(classData.improved),
      main_correction:classData.correction, homework:classData.homework,
      next_focus:classData.nextFocus, coach_note:classData.note,
      updated_at:new Date().toISOString(),
    }).eq('id', classId);
    if (error) { showToast('Error al actualizar la clase', 'error'); return false; }
    setStudents(prev => prev.map(s => s.id === studentId ? {
      ...s, classes: s.classes.map(c => c.id === classId ? {...c,...classData,id:classId} : c)
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
    } : s));
    showToast('Clase actualizada');
    return true;
  };

  const handleDeleteClass = async (studentId, classId) => {
    const { error } = await sb.from('class_logs').delete().eq('id', classId);
    if (error) { showToast('Error al eliminar la clase', 'error'); return; }
    setStudents(prev => prev.map(s => s.id === studentId ? {...s, classes:s.classes.filter(c=>c.id!==classId)} : s));
    showToast('Clase eliminada');
  };

  const handleUpdateScores = async (studentId, scores) => {
    const { error } = await sb.from('progress_scores').upsert({
      student_id:studentId, coach_id:userId,
      forehand:scores['Derecha'], backhand:scores['Revés'],
      volley:scores['Volea'], bandeja:scores['Bandeja'],
      positioning:scores['Posicionamiento'], decision_making:scores['Toma de decisiones'],
      consistency:scores['Consistencia'], match_confidence:scores['Confianza en partido'],
      updated_at:new Date().toISOString(),
    }, { onConflict:'student_id' });
    if (error) { showToast('Error al guardar puntuación', 'error'); return; }
    setStudents(prev => prev.map(s => s.id === studentId ? {...s, scores} : s));
    showToast('Puntuación guardada');
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setRoute({ name:'dashboard' });
  };

  const student = useMemo(() => students.find(s => s.id === route.studentId), [students, route.studentId]);

  // ── render ───────────────────────────────────────────────────────────────────
  const screenContent = () => {
    if (loading) return <LoadingScreen />;
    if (!session) return <AuthScreen />;
    const dash = <Dashboard students={students} nav={nav} coach={coach} onLogout={handleLogout} />;
    switch (route.name) {
      case 'dashboard':   return dash;
      case 'addStudent':  return <AddStudent nav={nav} onAddStudent={handleAddStudent} />;
      case 'editStudent': return student ? <EditStudent student={student} nav={nav} onEditStudent={handleEditStudent} /> : dash;
      case 'pickStudent': return <PickStudent students={students} nav={nav} />;
      case 'profile':     return student ? <StudentProfile student={student} nav={nav} onUpdateScores={handleUpdateScores} onDeleteStudent={handleDeleteStudent} onDeleteClass={handleDeleteClass} /> : dash;
      case 'logClass':    return student ? <LogClass student={student} nav={nav} onAddClass={handleAddClass} onEditClass={handleEditClass} existingClass={route.meta?.editClass} /> : dash;
      case 'share':       return student ? <ShareScreen student={student} nav={nav} fromLog={route.meta?.fromLog} coach={coach} /> : dash;
      case 'public':      return student ? <PublicProgress student={student} nav={nav} coachName={coach?.name} /> : dash;
      default:            return dash;
    }
  };

  if (isMobile) {
    return (
      <div style={{ minHeight:'100vh', minHeight:'100dvh', background: route.name==='public' ? CT.ink : '#fff', display:'flex', flexDirection:'column' }}>
        <Toast toast={toast} />
        <div className="ct-scroll" style={{ flex:1, overflow:'auto', WebkitOverflowScrolling:'touch' }}>
          {screenContent()}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px 12px', background:'radial-gradient(circle at 30% 0%, #FAFAF6, #ECEDE6)' }}>
      <Toast toast={toast} />
      <div style={{ display:'flex', alignItems:'flex-start', gap:32, flexWrap:'wrap', justifyContent:'center' }}>
        <div style={{ maxWidth:280, padding:'20px 8px', alignSelf:'center' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
            <div style={{ width:36, height:36, borderRadius:12, background:'#0E1311', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="oklch(0.62 0.14 152)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="9"/><path d="M3.5 9c4 1 9-1 13.5-3"/><path d="M20.5 15c-4-1-9 1-13.5 3"/>
              </svg>
            </div>
            <div style={{ fontSize:20, fontWeight:700, letterSpacing:-0.5 }}>CourtTrack</div>
          </div>
          <div style={{ fontSize:14, color:'#3A4441', lineHeight:1.5 }}>Registra cada clase en menos de 60 segundos y envía a tus alumnos un resumen claro con progreso, correcciones y tarea semanal.</div>
          <div style={{ marginTop:22, fontSize:11, fontWeight:600, color:'#6B746F', textTransform:'uppercase', letterSpacing:0.6 }}>Cómo empezar</div>
          <ul style={{ fontSize:13, color:'#3A4441', paddingLeft:18, lineHeight:1.7, marginTop:8 }}>
            <li>Crea tu cuenta con email y contraseña</li>
            <li>Añade tu primer alumno</li>
            <li>Registra una clase y comparte el enlace</li>
          </ul>
        </div>
        <IOSDevice width={390} height={820} dark={route.name==='public'} time="9:41">
          <div className="ct-scroll" style={{ position:'absolute', inset:0, top:50, overflow:'auto', WebkitOverflowScrolling:'touch' }}>
            {screenContent()}
          </div>
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
